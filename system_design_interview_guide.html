    "body": "<p>At fleet scale, instances fail constantly; the system must detect and replace them automatically. Good health checking is subtler than a single <code>/health</code> endpoint.</p>\n<div class=\"section-title\">Types of health checks</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Liveness:   is the process alive? failing → RESTART it (deadlock, hang)\nReadiness:  can it serve traffic NOW? failing → remove from LB (warming up, deps down)\nStartup:    slow-starting app → don't kill it prematurely\n# Conflating liveness & readiness is a classic bug: a dependency blip\n# flips readiness (fine) but if wired to liveness it RESTARTS healthy pods (bad).</div>\n</div>\n<div class=\"section-title\">Deep vs shallow checks</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Shallow: \"process responds\" — cheap, but misses broken dependencies\nDeep: \"can I actually query the DB / serve a real request\" — catches more,\n      but risk: a shared-dependency blip fails ALL instances at once →\n      mass eviction → outage. Tune carefully; don't cascade.</div>\n</div>\n<div class=\"section-title\">Self-healing loop</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Detect (health check fails) → react (restart / replace / reschedule) →\nverify (new instance healthy) → rebalance.\nAutoscaler replaces failed nodes; orchestrator reschedules pods.\nGuard rails: don't replace so aggressively you mask a real bug or thrash.</div>\n</div>\n<div class=\"tip\"><b>Interview tip:</b> Distinguish liveness (restart) from readiness (depool) from startup probes — conflating them causes the infamous failure where a transient dependency hiccup restarts your entire healthy fleet. Discuss the deep-vs-shallow trade-off: deep checks catch more but can cause correlated mass eviction during a shared-dependency blip. Self-healing is a detect→react→verify loop with guardrails so it doesn't thrash or hide bugs.</div>"
  },
  {
    "n": 78,
    "tag": "platform",
    "q": "Design a secrets management system. How are credentials stored, rotated, and accessed?",
    "body": "<p>Secrets (DB passwords, API keys, certs) must never live in code or plain config. A secrets manager centralizes secure storage, access control, rotation, and audit.</p>\n<div class=\"arch-box\">App → authenticate (workload identity) → Secrets Manager (Vault/KMS/cloud)\n          ↓ authorized?\n     return secret (short-lived ideally) + audit log entry\n          ↑\n     Encryption at rest (master key in HSM/KMS), encryption in transit</div>\n<div class=\"section-title\">Core requirements</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Encryption: at rest (envelope encryption, master key in HSM/KMS) + in transit\nAccess control: least-privilege; identity-based (not a shared static token)\nAudit: every access logged (who, what, when) — essential for compliance\nNo secrets in code/images/env files committed to git</div>\n</div>\n<div class=\"section-title\">Rotation & dynamic secrets</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Static secret rotation: change credential + update consumers without downtime\nDynamic secrets (Vault): generate short-lived, per-request DB creds that auto-expire\n  → drastically shrinks the blast radius of a leak\nLease + revoke: secrets have TTLs; can be revoked instantly if compromised</div>\n</div>\n<div class=\"section-title\">Workload identity</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\"># The bootstrapping problem: how does an app prove who it is to GET secrets?\n# Use platform identity (K8s ServiceAccount, cloud IAM role / IRSA) —\n# NOT a long-lived token stored somewhere (which is itself a secret to protect).</div>\n</div>\n<div class=\"tip\"><b>Principal answer:</b> Three pillars: encryption (envelope encryption with the master key in an HSM/KMS), identity-based least-privilege access with full audit, and rotation. The advanced move is dynamic, short-lived secrets (Vault generating per-request DB credentials that auto-expire) so a leaked credential is useless within minutes. Solve the bootstrapping problem with workload identity (IAM roles / K8s service accounts) rather than a static token — otherwise you just have a secret guarding your secrets.</div>"
  },
  {
    "n": 79,
    "tag": "networking",
    "q": "Design a system using a service mesh. What does it add over plain service-to-service calls?",
    "body": "<p>A service mesh moves cross-cutting network concerns (security, reliability, observability) out of application code into a sidecar proxy layer.</p>\n<div class=\"arch-box\">Service A [app + sidecar proxy] ⇄ [sidecar proxy + app] Service B\n                    ↑ data plane (Envoy proxies handle the traffic)\n          Control plane (Istio/Linkerd): config, certs, policy, telemetry</div>\n<div class=\"section-title\">What the mesh provides</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Security:   automatic mTLS between services (encrypted + authenticated), zero code change\nReliability: retries, timeouts, circuit breaking, load balancing in the proxy\nObservability: uniform metrics/traces/logs for ALL service-to-service traffic\nTraffic control: canary, blue-green, traffic splitting, fault injection</div>\n</div>\n<div class=\"section-title\">Sidecar vs sidecar-less</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Sidecar (Istio classic): a proxy per pod → flexible but resource overhead + latency\nSidecar-less / ambient / eBPF (Cilium): node-level proxying → less overhead\nTrade-off: capability/isolation vs resource cost and per-hop latency.</div>\n</div>\n<div class=\"section-title\">When it's worth it</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Worth it: many services, need uniform mTLS + observability + traffic policy\nOverkill: a handful of services — the operational complexity outweighs benefit\n# A mesh is powerful but adds a whole control plane to operate.</div>\n</div>\n<div class=\"tip\"><b>Interview tip:</b> The pitch is: take retries, timeouts, mTLS, and telemetry out of every app (in every language) and standardize them in a sidecar/proxy layer with a central control plane. The big wins are automatic mTLS and uniform observability for free. Be balanced — call out the costs (sidecar latency/resource overhead, a control plane to operate) and that it's overkill for a few services. Mention eBPF/ambient mesh as the lower-overhead modern direction.</div>"
  },
  {
    "n": 80,
    "tag": "scalability",
    "q": "Design a leaderboard / ranking system for millions of users in real time.",
    "body": "<p>A real-time leaderboard needs fast rank queries (top-N and a user's own rank) under constant score updates — a poor fit for naive SQL ordering.</p>\n<div class=\"section-title\">Why SQL struggles</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\"># \"SELECT ... ORDER BY score DESC LIMIT 10\" on 50M rows on every request,\n# plus \"what's MY rank\" = COUNT(scores &gt; mine) → expensive at scale + churn.</div>\n</div>\n<div class=\"section-title\">Redis Sorted Set (the standard answer)</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">ZADD board score user      # update score: O(log N)\nZREVRANGE board 0 9        # top 10: O(log N + 10)\nZREVRANK board user        # a user's rank: O(log N)\nZINCRBY board +10 user     # atomic increment\n# Sorted set keeps everything ranked incrementally — no full re-sort.</div>\n</div>\n<div class=\"section-title\">Scaling beyond one node</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Sharding: partition by region/segment; merge top-Ns for a global board\nApproximate global rank: exact rank among 50M is costly — bucket/percentile\n  (\"top 5%\") is often enough for display\nTime windows: daily/weekly boards → separate keys with TTL\nDurability: Redis is the serving layer; persist authoritative scores in a DB too</div>\n</div>\n<div class=\"tip\"><b>Principal answer:</b> Redis sorted sets are purpose-built for this — O(log N) updates and rank queries, atomic increments, no re-sorting. For global scale, shard by segment and merge top-Ns; provide approximate/percentile rank for the long tail since exact rank among millions is expensive and rarely needed for display. Use separate TTL'd keys for time-windowed boards, and keep a durable copy of authoritative scores in a DB behind the Redis serving layer.</div>"
  },
  {
    "n": 81,
    "tag": "tradeoffs",
    "q": "How do you design APIs for scale and evolution? REST vs gRPC vs GraphQL, and versioning.",
    "body": "<p>API design choices affect performance, client ergonomics, and how painlessly you can evolve without breaking consumers.</p>\n<div class=\"arch-box\">REST/JSON:   ubiquitous, cacheable, human-readable\n  → public APIs, broad client support\ngRPC/protobuf: binary, fast, streaming, strong contracts\n  → internal service-to-service, low latency, polyglot\nGraphQL:     client picks exactly the fields → no over/under-fetching\n  → varied clients (mobile/web) with different data needs; complex graphs</div>\n<div class=\"section-title\">Choosing</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Internal high-perf RPC          → gRPC\nPublic, cache-friendly, simple  → REST\nMany clients, flexible queries  → GraphQL (mind N+1 and query-cost limits)</div>\n</div>\n<div class=\"section-title\">Versioning & evolution</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Backward compatibility first: add fields, don't remove/rename (additive changes)\nVersioning: URI (/v2/), header, or content negotiation\nDeprecation: announce → dual-run → sunset with timelines + metrics on old version\nprotobuf: reserve field numbers; never reuse → safe wire-compat evolution</div>\n</div>\n<div class=\"section-title\">Scale concerns</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Pagination (cursor &gt; offset for large sets), filtering, field selection\nRate limiting + quotas, idempotency keys for writes\nGraphQL: depth/complexity limits to prevent abusive expensive queries</div>\n</div>\n<div class=\"tip\"><b>Interview tip:</b> Match protocol to use case — gRPC for internal low-latency RPC, REST for public/cacheable APIs, GraphQL when diverse clients need flexible field selection (while guarding against N+1 and runaway query cost). On evolution, emphasize additive, backward-compatible changes as the default (add fields, never repurpose them), cursor-based pagination for scale, and a real deprecation process with dual-running and usage metrics before sunsetting a version.</div>"
  },
  {
    "n": 82,
    "tag": "data",
    "q": "Design a system that needs both OLTP and OLAP. How do you avoid analytics killing production?",
    "body": "<p>Transactional (OLTP) and analytical (OLAP) workloads have opposite needs; running heavy analytics on your production DB will degrade or crash it. You separate them.</p>\n<div class=\"section-title\">OLTP vs OLAP</div>\n<div class=\"arch-box\">OLTP: many small, fast read/write txns (orders, logins)\n  → row store, normalized, low latency, high concurrency (Postgres/MySQL)\nOLAP: few huge scan/aggregate queries (revenue by region last year)\n  → columnar, denormalized, throughput-oriented (BigQuery/Snowflake/ClickHouse)\n# A giant analytical scan on the OLTP DB locks/IO-starves production.</div>\n<div class=\"section-title\">Separation patterns</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">1. Read replica for analytics: cheap isolation; replica absorbs heavy reads\n   (still row-store — OK for moderate analytics, not big aggregations)\n2. ETL/ELT to a warehouse: batch export OLTP → columnar warehouse\n3. CDC (change data capture): stream OLTP changes (Debezium → Kafka) →\n   warehouse / lake in near-real-time, zero load on the primary\n4. HTAP systems (TiDB, SingleStore): both in one — convenient, niche trade-offs</div>\n</div>\n<div class=\"section-title\">Modern pattern</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">CDC from OLTP → Kafka → stream/batch into a columnar lakehouse.\nKeeps production isolated, gives analysts a query-optimized copy, near-real-time.</div>\n</div>\n<div class=\"tip\"><b>Principal answer:</b> Never run OLAP on your OLTP database — the access patterns are opposite (row vs columnar, point vs scan). Isolate with a read replica for light analytics, or for real scale, stream changes via CDC (Debezium/Kafka) into a columnar warehouse or lakehouse. CDC is the modern default: near-real-time, zero query load on the primary, and the analysts get a store actually optimized for big aggregations. Mention HTAP databases as a unified-but-niche alternative.</div>"
  },
  {
    "n": 83,
    "tag": "reliability",
    "q": "Design a deployment system supporting canary, blue-green, and instant rollback.",
    "body": "<p>Safe deployment minimizes blast radius and enables fast recovery. The core strategies trade infrastructure cost against risk control.</p>\n<div class=\"arch-box\">Rolling:    replace instances gradually (default; some mixed-version time)\nBlue-Green: full parallel env (green), switch traffic at once, old (blue) on standby\n  + instant rollback (flip back)   - 2x infra during deploy\nCanary:     route a small % to the new version, watch metrics, ramp gradually\n  + smallest blast radius, real-traffic validation   - slower, needs good metrics</div>\n<div class=\"section-title\">Canary flow (the gold standard)</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">1. Deploy new version alongside old\n2. Route 1% → 5% → 25% → 100% in steps\n3. At each step: compare canary vs baseline (error rate, latency, business KPIs)\n4. Automated analysis → promote if healthy, auto-rollback if not</div>\n</div>\n<div class=\"section-title\">Rollback & safety</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Instant rollback: keep previous version ready (blue-green flip, or redeploy prev image)\nDB migrations: must be backward-compatible (expand/contract) — you can't roll back data\n  → decouple schema change from code: add column → deploy code → backfill → drop later\nFeature flags: decouple release from deploy → flip off without redeploying</div>\n</div>\n<div class=\"tip\"><b>Interview tip:</b> Canary is the strongest answer — validate on real traffic with automated metric comparison and auto-rollback, minimizing blast radius. The detail that separates seniors: database migrations break the rollback story, so use the expand/contract (backward-compatible) pattern and decouple schema changes from code deploys. Pair deployments with feature flags so you can disable a feature instantly without a redeploy. Always have a tested, fast rollback path.</div>"
  },
  {
    "n": 84,
    "tag": "platform",
    "q": "Design a multi-tenant SaaS platform. Compare isolation models and the noisy-neighbor problem.",
    "body": "<p>Multi-tenancy serves many customers from shared infrastructure. The central trade-off is isolation (security, blast radius, noisy-neighbor) vs cost/operational efficiency.</p>\n<div class=\"arch-box\">Isolation models (most shared → most isolated):\n\nShared everything (pooled): one DB, tenant_id column on every row\n  + cheapest, easiest to operate   - weakest isolation, noisy-neighbor risk\nShared app, DB-per-tenant (bridge):\n  + good data isolation, per-tenant backup/restore   - more DBs to manage\nSilo (stack per tenant):\n  + strongest isolation, per-tenant customization   - costliest, ops-heavy</div>\n<div class=\"section-title\">Tenant isolation concerns</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Data: enforce tenant_id everywhere (a missed filter = cross-tenant leak!)\n  → row-level security, scoped data-access layer, tested rigorously\nNoisy neighbor: one tenant's load degrades others\n  → per-tenant quotas, rate limits, resource caps, fair scheduling\nBlast radius: a bad deploy/incident shouldn't take down all tenants\n  → cell-based architecture (shard tenants into isolated cells)</div>\n</div>\n<div class=\"section-title\">Cell-based architecture</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\"># Partition tenants into independent \"cells\" (each a full stack serving a subset).\n# A cell failure affects only its tenants. Big tenants can get a dedicated cell.\n# Best balance of isolation + efficiency at scale.</div>\n</div>\n<div class=\"tip\"><b>Principal answer:</b> Frame it as an isolation/cost spectrum (pooled → bridge → silo) and pick per requirements — enterprise customers may demand a dedicated DB or cell; SMB tenants pool cheaply. The two failure modes to address explicitly: cross-tenant data leakage (one missed tenant_id filter is a breach — enforce via row-level security and a scoped data layer) and noisy neighbors (per-tenant quotas/rate limits). At scale, cell-based architecture caps blast radius while keeping efficiency — the answer that signals real SaaS experience.</div>"
  },
  {
    "n": 85,
    "tag": "scalability",
    "q": "Design a photo/media-sharing service (like Instagram). End-to-end from upload to feed.",
    "body": "<p>A media-sharing service combines object storage, async processing, CDN delivery, and a feed system — a great integrative question.</p>\n<div class=\"arch-box\">Upload: client → presigned URL → object store (original)\n   → async: generate thumbnails/sizes, extract metadata, moderation\n   → store renditions → distribute to CDN\n\nServe: feed request → metadata (posts) + CDN URLs for media\n   → client loads images from nearest CDN edge</div>\n<div class=\"section-title\">Upload path</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Direct-to-storage via presigned URL (don't proxy big files through app servers)\nAsync pipeline: resize to multiple resolutions, strip EXIF, content moderation\nMetadata (caption, author, timestamp, media refs) → DB</div>\n</div>\n<div class=\"section-title\">Storage & delivery</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Originals + renditions → object store (S3/GCS), tiered by age\nServe via CDN (images are static, cacheable → huge hit ratio)\nResponsive: deliver the right size per device (don't send 4K to a phone)</div>\n</div>\n<div class=\"section-title\">Feed (ties to fan-out design)</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Feed = post metadata + CDN media URLs, hybrid fan-out (push/pull for celebs)\nMetadata DB sharded by user; media is just references → small feed payloads\nCounts (likes/views) via striped counters; comments paginated separately</div>\n</div>\n<div class=\"tip\"><b>Interview tip:</b> Hit the four pillars: (1) direct-to-storage upload via presigned URLs (never proxy large media through app servers), (2) an async processing pipeline for renditions + moderation, (3) CDN delivery since images are the ideal cacheable static asset, and (4) a feed that stores only metadata + media references with hybrid fan-out. This question rewards composing patterns from earlier problems — call those connections out explicitly.</div>"
  },
  {
    "n": 86,
    "tag": "tradeoffs",
    "q": "How do you estimate cost and design for cost-efficiency (FinOps) in a system design?",
    "body": "<p>Senior designs account for cost, not just correctness and scale. Showing cost-awareness distinguishes a principal-level answer.</p>\n<div class=\"section-title\">Where the money goes</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Compute: often the biggest line; right-size, autoscale, use spot for fault-tolerant work\nStorage: tier aggressively (hot/warm/cold/archive); lifecycle policies\nData transfer: egress (esp. cross-region & internet) is sneakily expensive\nManaged services: convenient but premium-priced; build-vs-buy math\nIdle/over-provisioned resources: the silent budget killer</div>\n</div>\n<div class=\"section-title\">Cost-efficiency levers</div>\n<div class=\"arch-box\">Caching/CDN:  cuts compute + egress (cache hit is far cheaper than origin)\nAutoscaling:  match capacity to demand; scale to zero for spiky/dev workloads\nSpot/preemptible: 60–90% cheaper for interruptible batch/stateless work\nStorage tiering: move cold data to cheap tiers automatically\nData locality:  keep traffic in-region/in-AZ to dodge egress charges\nRight-sizing:   measure actual usage; trim over-provisioned requests</div>\n<div class=\"section-title\">The trade-offs</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Cost vs reliability: spot saves money but can be reclaimed → only for tolerant work\nCost vs latency: cheaper cold storage = slower access\nCost vs simplicity: a hand-rolled cheaper solution may cost more in eng time\n# Optimize for TOTAL cost of ownership, including engineering effort.</div>\n</div>\n<div class=\"tip\"><b>Principal answer:</b> Weave cost in as a first-class constraint: do a rough cost estimate (compute + storage + egress are the big three) the same way you do a capacity estimate. Lean on caching/CDN (cuts both compute and pricey egress), autoscaling, spot instances for interruptible work, and storage tiering. Flag data egress as the commonly-overlooked cost. Frame every cost lever as a trade-off (spot vs reliability, cold storage vs latency) and optimize total cost of ownership, engineering time included.</div>"
  },
  {
    "n": 87,
    "tag": "reliability",
    "q": "Design observability for a large distributed system. Logs, metrics, and traces together.",
    "body": "<p>Observability is the ability to understand a system's internal state from its outputs — essential for operating distributed systems where failures are emergent. The three pillars work together.</p>\n<div class=\"arch-box\">Metrics  (what & how much): aggregated numbers, cheap, alerting\nLogs     (what happened):    discrete events, detailed, debugging\nTraces   (where & why slow): request path across services, latency breakdown\n        ↓                ↓                  ↓\n   Time-series DB     Log store         Trace store\n        ↓                ↓                  ↓\n           Unified query / dashboards / alerting</div>\n<div class=\"section-title\">When you use each</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Metrics: dashboards + alerting (\"error rate &gt; 1%\", \"P99 &gt; 500ms\") — start here\nTraces:  \"this request is slow — WHICH service/hop?\" — distributed latency\nLogs:    \"what exactly happened in that failing request\" — deepest detail\nFlow: alert (metric) → trace (locate) → logs (root cause). They chain.</div>\n</div>\n<div class=\"section-title\">Key practices</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Correlation IDs: propagate a request/trace id through all services → tie the 3 together\nStructured logs: JSON, queryable, not free-text grep\nGolden signals: latency, traffic, errors, saturation (alert on these)\nSampling traces: 100% is expensive → head/tail sample (keep slow/error traces)\nCardinality discipline: high-cardinality labels blow up metric stores</div>\n</div>\n<div class=\"tip\"><b>Interview tip:</b> Explain how the three pillars chain in an incident: a metric alert tells you something is wrong, a trace localizes which service/hop, and logs give the root cause. The glue is correlation/trace IDs propagated everywhere so you can pivot between them. Alert on the four golden signals, use structured logs, sample traces (keep errors/slow ones), and watch metric cardinality. OpenTelemetry as the vendor-neutral instrumentation standard is a good name-drop.</div>"
  },
  {
    "n": 88,
    "tag": "networking",
    "q": "Design a system with WebSockets for millions of concurrent connections.",
    "body": "<p>Holding millions of persistent WebSocket connections is a distinct scaling challenge: the connections themselves are the constrained resource, and the connection tier is stateful.</p>\n<div class=\"arch-box\">Clients ⇄ (WSS) ⇄ Connection/Gateway tier (stateful, holds sockets)\n                        ↓ registry: user → which gateway holds the socket (Redis)\n                   Pub/Sub (Redis/Kafka) for cross-gateway message routing\n                        ↓\n                   Backend services (stateless) publish events</div>\n<div class=\"section-title\">The scaling challenges</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Each connection consumes memory + a file descriptor → tune OS limits (ulimit, ephemeral ports)\nConnections are LONG-LIVED → LB must support sticky/WS, can't freely rebalance\nState: a gateway holds specific users' sockets → need a registry to find them\nA single box maxes out around tens-hundreds of K conns → must scale horizontally</div>\n</div>\n<div class=\"section-title\">Cross-node message routing</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\"># User A (on gateway 1) messages User B (on gateway 3).\n# Gateway 1 publishes to pub/sub → gateway 3 (subscribed for B) pushes to B's socket.\n# Registry maps user → gateway so you route to the right node.</div>\n</div>\n<div class=\"section-title\">Resilience</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Heartbeats/ping-pong → detect dead connections, free resources\nReconnect with backoff + resume (sync missed messages since last ack)\nGraceful gateway drain on deploy (migrate connections, don't drop all at once)</div>\n</div>\n<div class=\"tip\"><b>Principal answer:</b> The key realization is that the connection tier is stateful and the sockets are the bottleneck resource — so you scale it as a dedicated horizontal layer, tune OS limits, and use a registry (user→gateway) plus pub/sub to route messages between nodes. Handle the operational realities: sticky LB for long-lived connections, heartbeats to reap dead ones, reconnect-with-resume for mobile clients, and graceful drain on deploy so a rollout doesn't drop millions of connections at once.</div>"
  },
  {
    "n": 89,
    "tag": "tradeoffs",
    "q": "Walk through a build-vs-buy decision for a major system component.",
    "body": "<p>Senior engineers don't build everything — knowing when to buy/adopt vs build is a key judgment. It's a TCO and focus decision, not an ego one.</p>\n<div class=\"section-title\">The decision framework</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Is it core/differentiating to YOUR business? → lean BUILD (it's your edge)\nIs it commodity (auth, queues, search, monitoring)? → lean BUY/adopt\nWhat's the TOTAL cost: build + maintain + operate forever, vs license + integrate?\nTime-to-market: buy is faster now; build is a long-term investment\nOpportunity cost: every engineer building commodity infra isn't building product</div>\n</div>\n<div class=\"section-title\">Hidden costs of BUILD</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">It's not just initial dev — it's maintenance, on-call, security patching,\nscaling, docs, and the bus-factor risk, forever. Most \"we'll build it\" \nunderestimates the perpetual carrying cost by a lot.</div>\n</div>\n<div class=\"section-title\">Hidden costs of BUY</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Vendor lock-in, pricing at scale, customization limits, integration effort,\ndependency on vendor reliability/roadmap, data egress/portability.\n→ Mitigate with open standards / abstraction layers / exit strategy.</div>\n</div>\n<div class=\"tip\"><b>Interview tip:</b> Anchor on \"is this core to our differentiation?\" Build the thing that IS your product; buy or adopt open-source for commodity infrastructure (don't build your own message queue or monitoring stack to save a license fee — you'll pay far more in perpetual maintenance and opportunity cost). Be explicit that build cost is forever (maintenance, on-call, security), and de-risk buy decisions against lock-in with abstraction layers and an exit plan. This signals business judgment, not just engineering.</div>"
  },
  {
    "n": 90,
    "tag": "tradeoffs",
    "q": "You're given vague requirements and limited time in the interview. How do you scope and drive the design?",
    "body": "<p>Most system design interviews are deliberately open-ended and time-boxed. Managing scope and driving the conversation is itself a graded skill — often the difference between levels.</p>\n<div class=\"section-title\">Drive, don't wait</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">1. Clarify & scope FIRST (5 min): functional + non-functional reqs,\n   scale, and EXPLICITLY state what's out of scope. Get agreement.\n2. Propose a plan: \"I'll do estimation, then high-level design,\n   then deep-dive the 2 hardest parts. Sound good?\" → you're steering.\n3. Time-box yourself: don't spend 20 min on the easy CRUD part.\n4. Signpost trade-offs as you go: every choice has alternatives — say them.</div>\n</div>\n<div class=\"section-title\">Manage scope actively</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Breadth first (a complete simple design) THEN depth (deep-dive hard parts).\nA finished simple system &gt; an unfinished elaborate one.\nAsk \"is it more valuable to go deeper here or cover X?\" → collaborative scoping.\nWatch the interviewer's cues — they'll steer you to what they want to probe.</div>\n</div>\n<div class=\"section-title\">Seniority signals</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">- Owning the structure (not waiting to be prompted)\n- Stating assumptions explicitly when info is missing (then proceeding)\n- Naming trade-offs and justifying choices, not presenting one \"right\" answer\n- Knowing what to leave out and saying why</div>\n</div>\n<div class=\"tip\"><b>Principal answer:</b> Treat the ambiguity as the test. Open by clarifying requirements and explicitly bounding scope, then propose and narrate a plan so you're visibly driving. Go breadth-first to a complete simple design, then deep-dive the genuinely hard parts, time-boxing the trivial bits. Continuously surface trade-offs and stated assumptions rather than hunting for one \"correct\" architecture. Senior interviewers are grading whether you can impose structure on an under-specified problem — so impose it.</div>"
  }
]
</script>

<script>
/* ── dark mode ───────────────────────────── */
(function(){
  if(localStorage.getItem('ekn-dark')==='1'){
    document.body.classList.add('dark');
    var b=document.getElementById('dm-btn');
    if(b) b.textContent='\u2600 Light';
  }
})();
function toggleDark(){
  var on=document.body.classList.toggle('dark');
  localStorage.setItem('ekn-dark',on?'1':'0');
  var b=document.getElementById('dm-btn');
  if(b) b.textContent=on?'\u2600 Light':'\u263E Dark';
}

/* ── load data ───────────────────────────── */
var QS = JSON.parse(document.getElementById('qs-data').textContent);

/* ── render cards ────────────────────────── */
(function(){
  var list = document.getElementById('q-list');
  QS.forEach(function(q){
    var card = document.createElement('div');
    card.className = 'q-card';
    card.setAttribute('data-tag', q.tag);
    card.innerHTML =
      '<div class="q-header" onclick="toggleQ(' + q.n + ')">' +
        '<span class="q-num">' + q.n + '.</span>' +
        '<span class="q-title">' + escHtml(q.q) + '</span>' +
        '<div class="q-right">' +
          '<span class="badge ' + q.tag + '">' + q.tag + '</span>' +
          '<span class="chevron" id="c' + q.n + '">&#9660;</span>' +
        '</div>' +
      '</div>' +
      '<div class="q-body" id="b' + q.n + '">' + q.body + '</div>';
    list.appendChild(card);
  });
  document.getElementById('count-bar').textContent = 'Showing ' + QS.length + ' questions';
})();

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── toggle Q ────────────────────────────── */
var openCount = 0;
function toggleQ(id){
  var body = document.getElementById('b'+id);
  var chev = document.getElementById('c'+id);
  var isOpen = body.classList.toggle('open');
  chev.classList.toggle('open', isOpen);
  if(isOpen){ openCount++; document.getElementById('open-count').textContent = openCount; }
}

/* ── filter ──────────────────────────────── */
var activeFilter = 'all';
function setFilter(f, el){
  activeFilter = f;
  document.querySelectorAll('.chip').forEach(function(c){ c.classList.remove('active'); });
  el.classList.add('active');
  filterQs();
}
function filterQs(){
  var q = document.getElementById('search').value.toLowerCase().trim();
  var cards = document.querySelectorAll('.q-card');
  var shown = 0;
  cards.forEach(function(c){
    var title = c.querySelector('.q-title').textContent.toLowerCase();
    var body  = c.querySelector('.q-body') ? c.querySelector('.q-body').textContent.toLowerCase() : '';
    var tag   = c.getAttribute('data-tag') || '';
    var ok = (!q || title.indexOf(q)!==-1 || body.indexOf(q)!==-1) &&
             (activeFilter==='all' || tag===activeFilter);
    c.style.display = ok ? '' : 'none';
    if(ok) shown++;
  });
  document.getElementById('count-bar').textContent =
    'Showing ' + shown + ' question' + (shown!==1 ? 's' : '');
}

/* ── interview mode ──────────────────────── */
var fmQs=[], fmIdx=0, fmGot=0, fmMiss=0;
function fmStart(){
  var all = document.querySelectorAll('.q-card');
  fmQs = [];
  all.forEach(function(c){
    if(c.style.display === 'none') return;
    fmQs.push({
      q: c.querySelector('.q-title').textContent,
      a: c.querySelector('.q-body').innerHTML
    });
  });
  fmQs.sort(function(){ return Math.random() - .5; });
  fmIdx=0; fmGot=0; fmMiss=0;
  document.getElementById('fm-bar').classList.add('open');
  fmShow();
}
function fmShow(){
  if(fmIdx >= fmQs.length){
    document.getElementById('fm-q-text').innerHTML =
      '<span style="color:var(--accent);font-weight:700;">&#10003; Done! Score: '+fmGot+'/'+(fmGot+fmMiss)+'</span>';
    document.getElementById('fm-answer').classList.remove('show');
    ['fm-reveal','fm-got','fm-miss'].forEach(function(id){ document.getElementById(id).style.display='none'; });
    document.getElementById('fm-prog').style.width = '100%';
    return;
  }
  var total = fmQs.length;
  document.getElementById('fm-meta').textContent = 'Question '+(fmIdx+1)+' of '+total;
  document.getElementById('fm-q-text').textContent = fmQs[fmIdx].q;
  document.getElementById('fm-answer').innerHTML = fmQs[fmIdx].a;
  document.getElementById('fm-answer').classList.remove('show');
  document.getElementById('fm-reveal').style.display = '';
  document.getElementById('fm-got').style.display = 'none';
  document.getElementById('fm-miss').style.display = 'none';
  document.getElementById('fm-score').textContent = fmGot+'/'+fmIdx+' correct';
  document.getElementById('fm-prog').style.width = (fmIdx/total*100)+'%';
}
function fmReveal(){
  document.getElementById('fm-answer').classList.add('show');
  document.getElementById('fm-reveal').style.display = 'none';
  document.getElementById('fm-got').style.display = '';
  document.getElementById('fm-miss').style.display = '';
}
function fmNext(got){
  if(got) fmGot++; else fmMiss++;
  fmIdx++;
  fmShow();
}
function fmStop(){
  document.getElementById('fm-bar').classList.remove('open');
}
</script>
</body>
</html>
