    "body": "<p>Money demands strong consistency, idempotency, auditability, and reconciliation. \"Eventually consistent\" is unacceptable for balances.</p>\n<div class=\"arch-box\">Client → Payment API (idempotency key)\n   ↓\nLedger Service (double-entry, ACID DB — Postgres/Spanner)\n   ↓\nPayment Orchestrator → external PSP (Stripe/bank) via saga\n   ↓\nReconciliation job ← compare ledger vs PSP statements (daily)</div>\n<div class=\"section-title\">Non-negotiables</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Idempotency:  client sends idempotency_key; same key = same result, never double-charge\nDouble-entry ledger: every txn = debit + credit; balances are DERIVED, immutable log\nACID:         use a transactional DB for the ledger; no eventual consistency here\nAudit:        append-only ledger, never UPDATE/DELETE a posted entry</div>\n</div>\n<div class=\"section-title\">Distributed payment flow (saga)</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">1. Reserve/authorize funds (pending entry)\n2. Call external PSP\n3a. Success → capture (post entry)\n3b. Failure/timeout → compensating action (reverse the reservation)\nState machine per payment: PENDING → AUTHORIZED → CAPTURED | FAILED | REVERSED</div>\n</div>\n<div class=\"section-title\">Handling the unknown</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\"># PSP call times out — did it succeed? Don't guess.\n  → store as PENDING, query PSP status (idempotent), reconcile.\n# Never assume failure on timeout → that's how you double-pay or lose money.</div>\n</div>\n<div class=\"tip\"><b>Principal answer:</b> Three pillars: (1) idempotency keys end-to-end so retries can't double-charge, (2) an immutable double-entry ledger where balances are computed from entries, never mutated in place, and (3) reconciliation against the PSP to catch drift. Use a saga with compensating transactions across the external boundary, and treat timeouts as \"unknown\" — verify, never assume. This is one place to explicitly reject eventual consistency.</div>"
  },
  {
    "n": 40,
    "tag": "scalability",
    "q": "Design a video streaming platform (like YouTube/Netflix). Cover upload, transcoding, and playback.",
    "body": "<p>Two very different paths: a heavy async ingest/transcode pipeline, and a globally-cached, adaptive playback path.</p>\n<div class=\"arch-box\">UPLOAD:\n  Creator → upload (resumable, to object store) → Transcode Queue\n     → Transcoding workers: produce multiple renditions (240p…4K) + segments (HLS/DASH)\n     → store segments in object store → distribute to CDN\n\nPLAYBACK:\n  Viewer → manifest (.m3u8) → CDN edge → video segments (adaptive bitrate)</div>\n<div class=\"section-title\">Transcoding pipeline</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">- Split source into chunks → parallel transcode (massively parallel)\n- Output ABR ladder: 240p/480p/720p/1080p/4K, each segmented (~2–10s chunks)\n- Generate manifests (HLS m3u8 / DASH mpd) listing segments per bitrate\n- This is async — user gets \"processing\" then \"ready\"</div>\n</div>\n<div class=\"section-title\">Adaptive bitrate (ABR) playback</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Player measures bandwidth → requests next segment at suitable bitrate\nDrop quality on congestion, raise on recovery → no rebuffering\nSegments are static files → perfectly CDN-cacheable (huge hit ratio)</div>\n</div>\n<div class=\"section-title\">Scale levers</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Storage: object store (S3/GCS) for source + renditions; cold tiers for old/rare\nDelivery: CDN does the heavy lifting — video is the ultimate cacheable static asset\nPopularity skew: pre-warm CDN for anticipated hits; long-tail served from origin</div>\n</div>\n<div class=\"tip\"><b>Interview tip:</b> Cleanly separate the asynchronous upload/transcode pipeline from the read-optimized playback path. Stress that video segments are static and thus ideal for CDN caching (that's how Netflix serves a third of internet traffic). Mention ABR for smooth playback, chunked parallel transcoding for fast processing, and storage tiering for the massive long tail of rarely-watched content.</div>"
  },
  {
    "n": 41,
    "tag": "data",
    "q": "Design a distributed unique ID generator. Compare UUID, Snowflake, and DB ticket servers.",
    "body": "<p>Many systems need unique IDs without a single bottleneck. The classic answer is Snowflake; know the trade-offs of each approach.</p>\n<div class=\"section-title\">Options compared</div>\n<div class=\"arch-box\">UUID v4 (random):\n  + Fully decentralized, zero coordination\n  - 128-bit, not sortable, poor DB index locality (random inserts)\n\nDB auto-increment / ticket server:\n  + Simple, sequential\n  - Single point of contention; sharded ticket servers add complexity\n\nSnowflake (64-bit): [timestamp | machine_id | sequence]\n  + Roughly time-sortable, no central coordination, compact\n  - Needs unique machine_id assignment + clock sync</div>\n<div class=\"section-title\">Snowflake layout (64 bits)</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">1 bit  : unused (sign)\n41 bits: timestamp (ms since custom epoch) → ~69 years\n10 bits: machine/worker id → 1024 nodes\n12 bits: per-ms sequence → 4096 ids per node per ms\n→ ~4M ids/sec/node, time-ordered, no coordination on the hot path</div>\n</div>\n<div class=\"section-title\">The clock problem</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\"># Clock skew / NTP step backwards → could repeat timestamps\n# Mitigation: refuse to issue (wait) if clock moves backward;\n#             monotonic clock; alert on large skew.</div>\n</div>\n<div class=\"tip\"><b>Principal answer:</b> Default to Snowflake-style IDs: time-sortable (great for index locality and pagination), compact (64-bit fits in BIGINT), and coordination-free per node. Call out the two operational gotchas — assigning unique worker IDs (via Zookeeper/etcd or config) and handling clock moving backwards. Use UUIDs only when you truly need client-side generation with zero infrastructure; their index fragmentation hurts write-heavy tables.</div>"
  },
  {
    "n": 42,
    "tag": "data",
    "q": "Design a search engine / full-text search system. Cover indexing and ranking.",
    "body": "<p>Full-text search at scale = an inverted index, distributed across shards, with relevance ranking. Elasticsearch is the canonical implementation.</p>\n<div class=\"arch-box\">INDEXING (write path):\n  Docs → Ingest → analyze (tokenize, lowercase, stem, stop-words)\n       → build inverted index: term → [doc_ids + positions + freq]\n       → shard by doc_id, replicate per shard\n\nQUERY (read path):\n  Query → analyze same way → look up terms in inverted index\n        → scatter to all shards → gather + rank → top-K → merge</div>\n<div class=\"section-title\">Inverted index</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">term \"design\" → [doc1:tf=3, doc7:tf=1, doc9:tf=5, ...]\n# Query \"system design\" = intersect postings lists for both terms\n# Positions stored too → phrase queries (\"system design\" adjacent)</div>\n</div>\n<div class=\"section-title\">Ranking</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">TF-IDF / BM25: term frequency × inverse document frequency (classic relevance)\n+ signals: freshness, popularity, click-through, personalization\n+ optional: vector / semantic search (embeddings + ANN) for meaning, not just keywords</div>\n</div>\n<div class=\"section-title\">Scatter-gather at scale</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Query hits ALL shards (term could be anywhere) → each returns local top-K\n→ coordinator merges → global top-K. Latency = slowest shard (tail latency matters).\nReplicas serve reads in parallel; index refresh is near-real-time, not instant.</div>\n</div>\n<div class=\"tip\"><b>Interview tip:</b> Lead with the inverted index — it's the heart of the answer. Explain BM25 for ranking, and that search is scatter-gather (every shard queried, results merged), making tail latency the enemy. Distinguish indexing (write-heavy, async, eventually searchable) from querying (read-heavy, latency-sensitive). Bonus points for mentioning semantic/vector search as a modern layer over keyword search.</div>"
  },
  {
    "n": 43,
    "tag": "reliability",
    "q": "Design a system for exactly-once message processing. Is it even possible?",
    "body": "<p>True end-to-end exactly-once delivery is impossible in a distributed system (two-generals problem). What you achieve is <strong>at-least-once delivery + idempotent processing = effectively-once</strong>.</p>\n<div class=\"section-title\">The three delivery guarantees</div>\n<div class=\"arch-box\">At-most-once:   fire and forget. May lose messages. (metrics, logs)\nAt-least-once:  retry until acked. May duplicate. (most systems)\nExactly-once:   no loss, no dup. Impossible as pure delivery —\n                achieved as at-least-once + dedup/idempotency.</div>\n<div class=\"section-title\">Achieving effectively-once</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">1. Producer: idempotent producer (dedup by sequence number, e.g. Kafka)\n2. Consumer: idempotent processing\n   - dedup table: store processed message_id, skip if seen\n   - or naturally idempotent ops (SET x=5, not x+=5)\n3. Atomic: commit offset + side-effect together (transactional outbox)</div>\n</div>\n<div class=\"section-title\">Transactional outbox pattern</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\"># Problem: write to DB AND publish to Kafka atomically (no XA across them)\n# Solution: in ONE DB txn, write business row + an \"outbox\" row\n#           separate relay reads outbox → publishes to Kafka → marks sent\n# Guarantees the event is published iff the DB change committed.</div>\n</div>\n<div class=\"tip\"><b>Principal answer:</b> Start by stating exactly-once delivery is impossible, then pivot to how it's done in practice: at-least-once + idempotency keys + a dedup store, or naturally idempotent operations. Mention the transactional outbox for the dual-write problem (DB + message broker) and Kafka's idempotent producer + transactions. The mature signal is knowing it's an end-to-end property, not something one component provides.</div>"
  },
  {
    "n": 44,
    "tag": "data",
    "q": "How do you handle database sharding? Cover shard keys, resharding, and cross-shard queries.",
    "body": "<p>Sharding splits data horizontally across DBs when one node can't hold the data or handle the load. The shard key choice makes or breaks it.</p>\n<div class=\"section-title\">Sharding strategies</div>\n<div class=\"arch-box\">Range-based:   shard by key range (A–M | N–Z)\n  + range queries easy   - hotspots if keys skew (sequential ids)\nHash-based:    shard by hash(key)\n  + even distribution    - range queries hit all shards\nDirectory/lookup: explicit key→shard map (flexible, extra hop)\nGeo/entity:    shard by region or tenant (data locality)</div>\n<div class=\"section-title\">Choosing the shard key</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Good key: high cardinality, even access, matches query patterns\nBad key:  low cardinality (gender), monotonic (timestamp → hotspot on newest shard)\nExample: shard by user_id → user's data co-located, queries scoped to one shard</div>\n</div>\n<div class=\"section-title\">The hard problems</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Cross-shard queries: scatter-gather (slow) — design schema to avoid them\nCross-shard transactions: 2PC (slow/fragile) or saga — avoid if possible\nResharding: use consistent hashing / vnodes so adding a shard moves minimal data\nCelebrity/hot shard: a single popular key overwhelms one shard → sub-partition it</div>\n</div>\n<div class=\"tip\"><b>Interview tip:</b> Spend your time on shard-key selection — it determines whether queries stay single-shard (fast) or become scatter-gather (slow). Warn against monotonic keys (they hotspot the newest shard). For resharding, consistent hashing minimizes data movement. State plainly: the goal is to make the common queries hit exactly one shard, and to denormalize so you rarely need cross-shard joins.</div>"
  },
  {
    "n": 45,
    "tag": "reliability",
    "q": "Design a distributed locking system. When do you need one and what are the pitfalls?",
    "body": "<p>A distributed lock coordinates exclusive access to a resource across processes/nodes. It's subtle — naive implementations are unsafe.</p>\n<div class=\"section-title\">When you need it</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">- Leader election (one active scheduler/worker)\n- Preventing duplicate work (only one node processes job X)\n- Guarding a non-idempotent external action\n# Often you can AVOID locks via idempotency or single-writer partitioning — prefer that.</div>\n</div>\n<div class=\"section-title\">Implementations</div>\n<div class=\"arch-box\">Redis (SET key val NX PX ttl):  fast, simple\n  - single-instance: not fault-tolerant\n  - Redlock (multi-instance): debated safety under GC pauses/clock skew\netcd / Zookeeper:  consensus-backed (Raft/Zab), lease + watch\n  + safer, linearizable; - higher latency\nDB row lock / advisory lock: simple if you already have the DB</div>\n<div class=\"section-title\">The classic pitfalls</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">1. No TTL → holder dies → lock held forever (deadlock). Always expire.\n2. TTL too short → lock expires mid-work → two holders. \n3. Process pause (GC/STW) → lock expires → another acquires → BOTH act.\n   → Fencing token: lock issues monotonic token; resource rejects stale tokens.\n4. Releasing someone else's lock → check-and-delete must be atomic (Lua/CAS).</div>\n</div>\n<div class=\"tip\"><b>Principal answer:</b> First ask whether you can design the lock away (idempotency, single-writer-per-partition). If you truly need one, use a consensus store (etcd/Zookeeper) with leases for safety-critical locks, and always pair it with a <strong>fencing token</strong> so a paused-then-resumed old holder can't corrupt the resource — the resource rejects any token lower than the highest it has seen. TTLs alone are not safe under process pauses.</div>"
  },
  {
    "n": 46,
    "tag": "platform",
    "q": "Design a feature flag / experimentation platform. Support gradual rollouts and A/B tests.",
    "body": "<p>Feature flags decouple deploy from release. The platform must evaluate flags fast, support targeting, and enable experiments.</p>\n<div class=\"arch-box\">Flag Config (dashboard) → Config Store → distributed to SDKs\n                                              ↓\n  App (SDK) evaluates locally: rules + targeting + % rollout → on/off\n                                              ↓\n  Exposure events → analytics → experiment results</div>\n<div class=\"section-title\">Evaluation must be local & fast</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\"># Don't call a service per flag check (latency + SPOF).\n# SDK pulls/streams ruleset, evaluates IN-PROCESS (microseconds).\n# Streaming updates (SSE/poll) propagate changes in seconds.</div>\n</div>\n<div class=\"section-title\">Targeting & rollout</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Rules: by user attribute, segment, geo, app version\nGradual rollout: hash(user_id) % 100 &lt; rollout_pct → stable bucketing\n  (same user stays in-bucket as % grows — no flip-flapping)\nKill switch: instant flag off → disable a bad feature without redeploy</div>\n</div>\n<div class=\"section-title\">Experimentation (A/B)</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Deterministic assignment: hash(user_id + experiment_id) → variant\nLog exposures + metrics → statistical significance analysis\nGuardrail metrics + automated rollback if a variant harms key metrics</div>\n</div>\n<div class=\"tip\"><b>Interview tip:</b> The key insight is local in-process evaluation — flag checks happen millions of times, so they can't be network calls. Stress consistent bucketing via hashing so a user doesn't flip variants as you ramp the percentage. Mention the kill switch (the operational reason flags exist) and that exposure logging is what turns a flag into an experiment.</div>"
  },
  {
    "n": 47,
    "tag": "data",
    "q": "Design an analytics / metrics ingestion pipeline. Handle billions of events per day.",
    "body": "<p>High-volume event analytics splits into a real-time path (fast, approximate) and a batch path (complete, accurate) — the classic lambda/kappa choice.</p>\n<div class=\"arch-box\">Producers → Collector (validate, enrich) → Kafka (buffer)\n     ├─► Stream processor (Flink/Spark) → real-time aggregates → fast store\n     └─► Batch / data lake (object store) → warehouse (BigQuery/Snowflake) → reports\n                                          ↓\n                                    Dashboards / OLAP queries</div>\n<div class=\"section-title\">Ingestion at scale</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Buffer with Kafka → absorbs spikes, decouples producers from processors\nSchema + validation at edge; drop/dead-letter malformed events\nPartition by event-type or tenant for parallel consumption\nSampling for ultra-high-volume, low-value streams</div>\n</div>\n<div class=\"section-title\">Storage by access pattern</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Time-series DB (Prometheus/InfluxDB): operational metrics, recent, fast\nColumnar warehouse (BigQuery/Redshift/ClickHouse): ad-hoc analytics over history\nData lake (Parquet on S3): cheap raw retention, reprocessing\nPre-aggregation / rollups: hourly/daily cubes for common queries</div>\n</div>\n<div class=\"section-title\">Lambda vs Kappa</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Lambda: separate batch (accurate) + speed (fast) layers, merge at query\nKappa:  single stream-processing path, reprocess by replaying the log (simpler)</div>\n</div>\n<div class=\"tip\"><b>Principal answer:</b> Separate by access pattern: real-time approximate aggregates (stream processor → fast store) for live dashboards, and a batch path into a columnar warehouse for accurate historical analysis. Kafka is the shock absorber. Use pre-aggregation/rollups so dashboards don't scan raw events. Mention Kappa (replayable log, one code path) as the modern simplification over classic Lambda.</div>"
  },
  {
    "n": 48,
    "tag": "reliability",
    "q": "Design a system to handle the 'thundering herd' and cache stampede problems.",
    "body": "<p>A thundering herd happens when many clients hit the origin simultaneously — typically after a cache expiry, a cold start, or a recovery. Left unmanaged, it can cascade into an outage.</p>\n<div class=\"section-title\">Where herds form</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">- Hot cache key expires → thousands of misses stampede the DB at once\n- Service restarts cold → every request rebuilds expensive state\n- Recovery after outage → all clients retry simultaneously</div>\n</div>\n<div class=\"section-title\">Mitigations</div>\n<div class=\"arch-box\">1. Request coalescing (single-flight):\n   only ONE request recomputes a missing key; others wait for its result.\n\n2. TTL jitter:\n   add randomness to expiries so keys don't all expire at the same instant.\n\n3. Early/probabilistic refresh:\n   refresh hot keys slightly BEFORE expiry, in the background.\n\n4. stale-while-revalidate:\n   serve the stale value while one worker refreshes async.\n\n5. Exponential backoff + jitter on client retries (prevents retry storms).</div>\n<div class=\"section-title\">Defensive backpressure</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">- Concurrency limits / load shedding at the origin (protect the DB)\n- Circuit breaker: stop hammering a struggling dependency\n- Queue + rate-limit the rebuild work</div>\n</div>\n<div class=\"tip\"><b>Interview tip:</b> Name the specific pattern for each cause: single-flight/coalescing for hot-key misses, TTL jitter so keys don't expire in lockstep, stale-while-revalidate so users never block on a refresh, and exponential backoff <em>with jitter</em> for retry storms (jitter is the part people forget). Top it with load shedding so the origin sheds excess load rather than collapsing.</div>"
  },
  {
    "n": 49,
    "tag": "data",
    "q": "Design a time-series database / monitoring data store. Why not just use PostgreSQL?",
    "body": "<p>Time-series workloads (metrics, IoT, monitoring) have a distinctive shape: massive append-only writes, time-ordered, recent-data-heavy reads, and aggregation queries. Purpose-built TSDBs exploit this.</p>\n<div class=\"section-title\">Why a general RDBMS struggles</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">- Write volume: millions of points/sec overwhelm B-tree index updates\n- Storage: raw rows are huge; TS data compresses ~10x with the right encoding\n- Retention: old data must auto-expire; deletes in RDBMS are expensive\n- Query shape: \"avg over 5-min buckets, last 24h\" wants columnar + downsampling</div>\n</div>\n<div class=\"section-title\">TSDB design choices</div>\n<div class=\"arch-box\">Storage: columnar + time-partitioned chunks (write to newest, read recent)\nCompression: delta-of-delta on timestamps, XOR on float values (Gorilla)\nDownsampling: roll up raw → 1m → 1h → 1d as data ages\nRetention: drop whole old partitions (cheap), tiered storage for history\nCardinality: the killer — each unique label combo = a series; bound it!</div>\n<div class=\"section-title\">The cardinality trap</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\"># label like user_id or request_id → millions of series → memory blowup\n# Rule: labels must be low-cardinality (region, service, status_code)\n# High-cardinality dimensions belong in logs/traces, not metric labels.</div>\n</div>\n<div class=\"tip\"><b>Principal answer:</b> Time-series data is append-mostly, time-ordered, and read recent-first — so a TSDB uses time-partitioned columnar chunks, aggressive compression (Gorilla-style delta + XOR), downsampling as data ages, and partition-drop retention. The interview gotcha is cardinality: warn that putting a high-cardinality field (user_id, UUID) in a metric label explodes the series count and OOMs the DB — that's what kills Prometheus in production.</div>"
  },
  {
    "n": 50,
    "tag": "scalability",
    "q": "Design a collaborative document editor (like Google Docs). Handle concurrent edits.",
    "body": "<p>Real-time collaboration needs concurrent edits to converge to the same state without locking. Two families: OT and CRDT.</p>\n<div class=\"arch-box\">Client A ⇄ WebSocket ⇄ Collab Server ⇄ WebSocket ⇄ Client B\n   (local edit applied instantly = optimistic)\n        ↓ send op\n   Server orders/transforms ops → broadcasts → clients converge\n        ↓\n   Persist op log + periodic snapshots</div>\n<div class=\"section-title\">OT vs CRDT</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Operational Transformation (OT):\n  Transform concurrent ops against each other so they apply consistently.\n  Used by Google Docs. Needs a central server to order/transform. Complex but compact.\n\nCRDT (Conflict-free Replicated Data Type):\n  Data structure mathematically guarantees convergence regardless of order.\n  Peer-friendly, offline-friendly. Metadata overhead (tombstones, ids).</div>\n</div>\n<div class=\"section-title\">Key mechanics</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Optimistic local apply: editor feels instant; reconcile when server confirms\nOrdering: server assigns a total order (or version vectors for CRDT)\nPresence/cursors: broadcast lightweight cursor positions to collaborators\nPersistence: append ops to a log; snapshot periodically to bound replay</div>\n</div>\n<div class=\"tip\"><b>Interview tip:</b> Frame the core problem as <em>conflict resolution without locking</em>, then contrast OT (server-centric, used by Google Docs) vs CRDTs (convergence by construction, great for offline/P2P). Mention optimistic local application for responsiveness, an op log + snapshots for persistence, and that cursor/presence is a separate low-stakes broadcast. Picking one and justifying it (OT for a central server, CRDT for offline-first) shows depth.</div>"
  },
  {
    "n": 51,
    "tag": "reliability",
    "q": "How do you design for high availability? Walk through redundancy at every layer.",
    "body": "<p>HA means no single point of failure and graceful handling of component loss. You design redundancy at every tier and target a measurable availability SLO.</p>\n<div class=\"section-title\">Availability math</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">99.9%  (three 9s) = 8.7 hours downtime/year   = 43 min/month\n99.99% (four 9s) = 52 minutes/year             = 4.3 min/month\n99.999%(five 9s) = 5.3 minutes/year\n# Serial dependencies MULTIPLY: two 99.9% services in series = 99.8%\n# Redundant (parallel) components ADD nines.</div>\n</div>\n<div class=\"section-title\">Redundancy at each layer</div>\n<div class=\"arch-box\">DNS:        multiple providers, health-checked failover\nLB:         redundant LBs, multi-AZ\nApp tier:   stateless, N+1 instances across AZs, auto-scaling\nData tier:  primary + replicas, automated failover, multi-AZ\nRegion:     multi-region (active-active or active-passive) for disaster\nDependencies: timeouts, retries, circuit breakers, fallbacks</div>\n<div class=\"section-title\">Eliminating SPOFs</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">- No single instance, AZ, or region the whole system depends on\n- Health checks + automated failover (manual failover is too slow)\n- Test it: chaos engineering / game days to prove failover actually works</div>\n</div>\n<div class=\"tip\"><b>Interview tip:</b> Start with the SLO target (it dictates cost — five 9s is wildly more expensive than three). Show you understand serial vs parallel availability math, then walk redundancy tier by tier. The mature point: redundancy you haven't tested isn't redundancy — mention game days / chaos testing to verify failover works before a real incident.</div>"
  },
  {
    "n": 52,
    "tag": "reliability",
    "q": "Design a circuit breaker and explain graceful degradation under dependency failure.",
    "body": "<p>A circuit breaker stops a service from repeatedly calling a failing dependency, preventing cascading failure and giving the dependency room to recover.</p>\n<div class=\"section-title\">Circuit breaker states</div>\n<div class=\"arch-box\">CLOSED:     calls pass through. Count failures.\n   │ failure rate &gt; threshold\n   ▼\nOPEN:       calls fail fast (no call made). Return fallback immediately.\n   │ after cooldown timer\n   ▼\nHALF-OPEN:  allow a few trial calls.\n   ├─ success → CLOSED (recovered)\n   └─ failure → OPEN (keep waiting)</div>\n<div class=\"section-title\">Why it matters</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\"># Without it: dependency slows → threads pile up waiting → caller exhausts\n#             its thread pool → caller fails too → cascade up the stack.\n# With it: caller fails fast, sheds load off the sick dependency, stays alive.</div>\n</div>\n<div class=\"section-title\">Graceful degradation</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">When a dependency is down, degrade — don't crash:\n  - serve stale cache instead of live data\n  - hide a non-essential feature (recommendations) but keep core flow\n  - default/empty response with a clear partial-result indicator\nExample: product page loads even if the reviews service is down.</div>\n</div>\n<div class=\"tip\"><b>Principal answer:</b> Pair the circuit breaker with timeouts (a slow dependency is as dangerous as a dead one), bulkheads (isolate thread pools per dependency so one can't starve the others), and a defined fallback per call site. The design goal is partial availability: a single failed dependency should degrade one feature, never take down the whole request path. That's the difference between an incident and an outage.</div>"
  },
  {
    "n": 53,
    "tag": "tradeoffs",
    "q": "Synchronous vs asynchronous communication: when do you use each between services?",
    "body": "<p>Choosing sync (request-response) vs async (messaging/events) per interaction is one of the most consequential architecture decisions.</p>\n<div class=\"arch-box\">SYNCHRONOUS (REST/gRPC, caller waits):\n  + simple, immediate result, easy to reason about\n  - tight coupling, caller blocked, failure propagates, latency adds up\n  → use when: you need the result NOW to continue (read a user profile)\n\nASYNCHRONOUS (queue/event, fire-and-continue):\n  + decoupled, resilient (buffer absorbs spikes), scalable\n  - eventual consistency, harder to trace, ordering/dedup concerns\n  → use when: work can happen later (send email, process upload, fan-out)</div>\n<div class=\"section-title\">Decision heuristics</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Need immediate response to proceed?        → sync\nCan it be processed later / in background?  → async\nWant to decouple producer/consumer scale?  → async\nMultiple consumers of one event?            → async (pub/sub)\nLong-running work (transcode, report)?       → async + status polling</div>\n</div>\n<div class=\"section-title\">Hybrid: the common real pattern</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\"># Sync ack + async work:\n# POST /upload → 202 Accepted (sync) + enqueue processing (async)\n# Client polls /status or gets a webhook/websocket update when done.</div>\n</div>\n<div class=\"tip\"><b>Interview tip:</b> Don't pick a side globally — decide per interaction. The strongest answer is the hybrid: respond synchronously with an acknowledgment, then do heavy work asynchronously. Call out async's costs honestly (eventual consistency, harder debugging, need for idempotency) so it's clear you're not cargo-culting \"async = scalable.\"</div>"
  },
  {
    "n": 54,
    "tag": "tradeoffs",
    "q": "Message queue vs event streaming (e.g. RabbitMQ/SQS vs Kafka). How do you choose?",
    "body": "<p>Both decouple producers and consumers, but their models differ fundamentally — queues are about task distribution, logs are about durable replayable streams.</p>\n<div class=\"arch-box\">Traditional Queue (RabbitMQ, SQS):\n  - message consumed → removed from queue\n  - work distribution among competing consumers\n  - per-message ack, routing, priorities, DLQ\n  → jobs/tasks: \"process this once, by someone\"\n\nLog/Stream (Kafka, Kinesis, Pulsar):\n  - append-only log; messages RETAINED (by time/size)\n  - consumers track their own offset; can replay\n  - ordered within a partition; high throughput\n  → events: \"this happened; many consumers, replayable\"</div>\n<div class=\"section-title\">Choose a queue when</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">- Task/work distribution (one job done once)\n- Need per-message priority, complex routing, or visibility timeouts\n- Don't need replay or multiple independent consumer groups</div>\n</div>\n<div class=\"section-title\">Choose a log/stream when</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">- Event sourcing, multiple consumers of the same events\n- Need replay (reprocess history, bootstrap a new consumer)\n- Very high throughput, ordered per key (partition)\n- Stream processing / analytics pipelines</div>\n</div>\n<div class=\"tip\"><b>Principal answer:</b> The deciding question is replay + multiple consumers. If many independent consumers need the same events, or you need to reprocess history, that's Kafka (the log is retained and each consumer owns its offset). If it's competing workers draining a task queue once, that's RabbitMQ/SQS. Mention Kafka's per-partition ordering and that it's not ideal when you need per-message priority or fine-grained routing.</div>"
  },
  {
    "n": 55,
    "tag": "networking",
    "q": "Design an API gateway. What responsibilities belong there vs in services?",
    "body": "<p>An API gateway is the single entry point for clients, handling cross-cutting concerns so individual services don't reimplement them.</p>\n<div class=\"arch-box\">Clients → API Gateway → [auth, rate-limit, routing, TLS, transform]\n                            ↓\n              Service A   Service B   Service C\n                            ↓\n                    (service mesh handles service↔service)</div>\n<div class=\"section-title\">Gateway responsibilities (edge concerns)</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">- TLS termination, request routing / path-based dispatch\n- AuthN (validate token) — coarse authZ\n- Rate limiting / quota enforcement per API key\n- Request/response transformation, protocol translation (REST↔gRPC)\n- Aggregation (BFF: combine several services for one client call)\n- Observability: logging, tracing injection, metrics</div>\n</div>\n<div class=\"section-title\">What stays in services</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">- Business logic (always)\n- Fine-grained authorization (resource-level permissions)\n- Domain validation\n# Gateway = cross-cutting plumbing; services = domain. Don't leak logic into the gateway.</div>\n</div>\n<div class=\"section-title\">Pitfalls</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">- Gateway becomes a SPOF → run it redundantly, multi-AZ\n- Fat gateway with business logic → \"distributed monolith\" anti-pattern\n- Latency: it's an extra hop → keep it lean</div>\n</div>\n<div class=\"tip\"><b>Interview tip:</b> Draw the line clearly: the gateway owns cross-cutting edge concerns (auth, rate limiting, routing, TLS), services own business logic and fine-grained authorization. Mention the Backend-for-Frontend variant for client-specific aggregation, and warn against the common failure mode — stuffing business logic into the gateway until it becomes a bottleneck and a deployment chokepoint.</div>"
  },
  {
    "n": 56,
    "tag": "networking",
    "q": "Design load balancing. Compare L4 vs L7, and the main algorithms.",
    "body": "<p>Load balancers distribute traffic across backends for scale and availability. The L4 vs L7 distinction and algorithm choice are the core of the answer.</p>\n<div class=\"arch-box\">L4 (transport): routes by IP:port, no payload inspection\n  + very fast, protocol-agnostic, low overhead\n  - can't route by URL/header, no content awareness\n\nL7 (application): understands HTTP — routes by path/host/header/cookie\n  + smart routing, TLS termination, sticky sessions, rewrites\n  - more CPU per request</div>\n<div class=\"section-title\">Algorithms</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Round robin:        simple, even — ignores backend load\nWeighted RR:        bigger boxes get more traffic\nLeast connections:  send to least-busy backend (good for long-lived conns)\nLeast response time: factor in latency\nConsistent hashing: same client/key → same backend (cache affinity, sticky)\nIP hash:            session stickiness without cookies</div>\n</div>\n<div class=\"section-title\">Health & resilience</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Active health checks → eject unhealthy backends automatically\nGraceful drain on deploy (connection draining)\nOutlier detection: eject a backend that starts erroring\nMulti-LB + DNS/anycast so the LB itself isn't a SPOF</div>\n</div>\n<div class=\"tip\"><b>Principal answer:</b> Use L4 when you need raw throughput and protocol-agnostic routing (e.g. in front of L7 LBs, or for non-HTTP), and L7 for content-based routing, TLS termination, and canary/path splitting. Default to least-connections over round-robin for uneven workloads, and consistent hashing when backend cache affinity matters. Always pair with health checks + connection draining — a dumb LB sending traffic to a dead node is worse than no LB.</div>"
  },
  {
    "n": 57,
    "tag": "tradeoffs",
    "q": "Push vs pull architectures: when do clients pull and when does the server push?",
    "body": "<p>How does a client get new data — does it ask (pull) or does the server notify it (push)? This decision shapes latency, load, and complexity.</p>\n<div class=\"arch-box\">PULL (polling):\n  Client asks repeatedly: \"anything new?\"\n  + simple, stateless, client controls rate\n  - wasteful (empty polls), latency = poll interval\n\nPUSH (server → client):\n  Server sends when something changes\n  + real-time, efficient (no empty checks)\n  - server holds connection state, harder to scale</div>\n<div class=\"section-title\">Push mechanisms</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Long polling:     client request held open until data or timeout (easy, works everywhere)\nServer-Sent Events: one-way server→client stream over HTTP (dashboards, feeds)\nWebSocket:        full-duplex persistent connection (chat, games, collab)\nWebhooks:         server-to-server push (callback URL)</div>\n</div>\n<div class=\"section-title\">Choosing</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Low-frequency / tolerant of delay → polling (simplest)\nReal-time, one-way (notifications, prices) → SSE\nReal-time, two-way (chat, multiplayer) → WebSocket\nHybrid: pull for initial state + push for live deltas (very common)</div>\n</div>\n<div class=\"tip\"><b>Interview tip:</b> Match the mechanism to the need: don't reach for WebSockets when SSE or even long-polling suffices — persistent connections are expensive to hold at scale (millions of open sockets need a stateful gateway tier). The common production pattern is pull-then-push: fetch initial state via a normal request, then subscribe to live deltas. Mention the scaling cost of stateful connections explicitly.</div>"
  },
  {
    "n": 58,
    "tag": "reliability",
    "q": "Design backpressure and load shedding. How does a system protect itself from overload?",
    "body": "<p>When demand exceeds capacity, a system must degrade gracefully rather than collapse. Backpressure and load shedding are how it protects itself.</p>\n<div class=\"section-title\">Backpressure</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Signal upstream to slow down when you're saturated:\n  - bounded queues (reject/block when full, don't grow unboundedly)\n  - TCP flow control / HTTP 429 with Retry-After\n  - reactive streams (request N items at a time)\n# Unbounded queues are a trap: they hide overload, add latency, then OOM.</div>\n</div>\n<div class=\"section-title\">Load shedding</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">When you can't keep up, drop work deliberately:\n  - reject low-priority requests first (shed by priority)\n  - admission control: cap concurrent requests\n  - fail fast with 503 rather than queueing into oblivion\n# Better to serve 90% well than 100% badly (or crash and serve 0%).</div>\n</div>\n<div class=\"section-title\">Related protections</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Rate limiting:     bound input rate per client\nConcurrency limits: cap in-flight work (e.g. semaphore per dependency)\nBulkheads:         isolate resource pools so one tenant can't starve others\nAutoscaling:       add capacity — but it lags; shedding handles the gap</div>\n</div>\n<div class=\"tip\"><b>Principal answer:</b> The mental model is: autoscaling handles sustained growth, but it lags by minutes — so you need load shedding to survive the seconds-scale spike. Use bounded queues (unbounded queues just defer the crash via OOM), shed by priority so critical traffic survives, and fail fast with 503 + Retry-After instead of queueing requests the client has already given up on. Protecting throughput for the majority beats trying to serve everyone and toppling.</div>"
  },
  {
    "n": 59,
    "tag": "data",
    "q": "Design a data replication strategy. Compare sync, async, and quorum replication.",
    "body": "<p>Replication copies data across nodes for durability, availability, and read scaling. The sync/async/quorum choice trades consistency against latency and availability.</p>\n<div class=\"arch-box\">Synchronous: primary waits for replica(s) to ack before confirming write\n  + no data loss on primary failure   - higher write latency, availability risk\n\nAsynchronous: primary acks immediately, replicates in background\n  + low latency, high availability   - data loss window if primary dies\n\nQuorum (W+R &gt; N): write to W replicas, read from R; tune consistency\n  + flexible balance   - more complex, still needs conflict handling</div>\n<div class=\"section-title\">Quorum math (Dynamo-style)</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">N = replicas, W = write quorum, R = read quorum\nW + R &gt; N  → strong consistency (read sees latest write)\nW=N, R=1   → fast reads, slow/fragile writes\nW=1, R=N   → fast writes, slow reads\nW=R=2, N=3 → common balanced choice (survive 1 node loss)</div>\n</div>\n<div class=\"section-title\">Topologies & conflicts</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Single-leader:  one primary, replicas follow (most common; failover needed)\nMulti-leader:   writes to multiple regions → conflict resolution required\nLeaderless:     any node accepts writes (Dynamo/Cassandra) → quorum + read-repair\nConflict resolution: last-write-wins (lossy), vector clocks, CRDTs</div>\n</div>\n<div class=\"tip\"><b>Interview tip:</b> Tie the choice to the data: synchronous for can't-lose data (payments) accepting the latency, async for read-scaling and availability where a small loss window on failover is tolerable. For leaderless/multi-region, show the quorum formula W+R&gt;N and that you still need conflict resolution (LWW loses data; vector clocks/CRDTs preserve it). Mention replication lag as the source of read-your-writes anomalies.</div>"
  },
  {
    "n": 60,
    "tag": "tradeoffs",
    "q": "How do you achieve read-your-writes and other consistency guarantees with replication lag?",
    "body": "<p>With async replicas, a user can write to the primary then read a stale replica — seeing their own change vanish. Several consistency models address such anomalies.</p>\n<div class=\"section-title\">The consistency spectrum</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Strong / linearizable: every read sees the latest write (expensive)\nRead-your-writes:      you always see YOUR own writes\nMonotonic reads:       you never see time go backwards (no flicker)\nConsistent prefix:     reads see writes in causal order\nEventual:              replicas converge \"eventually\" (weakest)</div>\n</div>\n<div class=\"section-title\">Techniques to fix lag anomalies</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Read-your-writes:\n  - route a user's reads to the primary for a short window after their write\n  - or pin reads to a replica known to have caught up (track write timestamp/LSN)\nMonotonic reads:\n  - pin a user to the same replica (sticky) so they don't bounce to a staler one\nVersion tokens:\n  - client passes last-seen version; system serves a replica >= that version</div>\n</div>\n<div class=\"section-title\">Practical pattern</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\"># After write, return a write-timestamp/LSN to the client.\n# On read, client sends it; router picks a replica that has applied >= that LSN,\n# else falls back to primary. Gives read-your-writes without all-strong cost.</div>\n</div>\n<div class=\"tip\"><b>Principal answer:</b> Don't reach for global strong consistency to fix one anomaly — it's expensive. Identify the specific guarantee the use case needs (usually read-your-writes + monotonic reads) and solve it surgically: route post-write reads to the primary or to a caught-up replica via a version token, and use sticky replica routing to prevent reads going backwards. This gives the UX of consistency at a fraction of the cost of linearizability.</div>"
  },
  {
    "n": 61,
    "tag": "platform",
    "q": "Design a multi-region active-active architecture. How do you handle data and failover?",
    "body": "<p>Active-active serves traffic from multiple regions simultaneously for low latency and disaster resilience. The hard part is data consistency across regions.</p>\n<div class=\"arch-box\">Users → GeoDNS / Anycast → nearest region\n  Region US        Region EU        Region APAC\n  [full stack]     [full stack]     [full stack]\n      ↕                ↕                ↕\n   cross-region data replication / globally-distributed DB</div>\n<div class=\"section-title\">Active-active vs active-passive</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Active-passive: one region serves, standby on failover\n  + simpler, no write-conflict problem   - wasted capacity, failover lag\nActive-active: all regions serve traffic\n  + low latency everywhere, instant failover   - cross-region write conflicts</div>\n</div>\n<div class=\"section-title\">Data strategies</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">1. Partition by geo (data residency): EU users' data lives in EU\n   → most writes stay regional, no conflict. Great when data is user-scoped.\n2. Globally-distributed DB (Spanner/CockroachDB/DynamoDB global tables)\n   → handles replication + consistency for you (at a cost).\n3. Single write-region + read replicas elsewhere (active-active reads only)</div>\n</div>\n<div class=\"section-title\">Failover & conflicts</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Health-checked GeoDNS reroutes away from a dead region automatically\nConflict resolution for multi-region writes: LWW, CRDTs, or geo-partitioning\nWatch: cross-region latency (~100ms+) makes synchronous global writes painful</div>\n</div>\n<div class=\"tip\"><b>Interview tip:</b> The cleanest active-active answer is geo-partitioning: shard data so a user's writes stay in their home region, eliminating cross-region write conflicts entirely. If data must be global and strongly consistent, name Spanner/CockroachDB and accept the latency cost of cross-region consensus. Always cover automatic failover via health-checked GeoDNS, and call out that ~100ms inter-region latency makes naive synchronous global writes a non-starter.</div>"
  },
  {
    "n": 62,
    "tag": "platform",
    "q": "Design a service discovery system. How do services find each other dynamically?",
    "body": "<p>In dynamic environments services come and go (autoscaling, deploys, failures), so hard-coded addresses don't work. Service discovery maintains a live registry of healthy instances.</p>\n<div class=\"arch-box\">Service instances → register (with health) → Service Registry\n                                                  (etcd/Consul/Eureka)\nCaller → query registry → get healthy instances → call one (with LB)\n        ↑ registry health-checks instances, removes dead ones</div>\n<div class=\"section-title\">Discovery patterns</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Client-side discovery: client queries registry, picks instance, calls directly\n  + fewer hops   - discovery logic in every client/language\nServer-side discovery: client calls a LB/router that consults the registry\n  + clients stay dumb   - extra hop\nDNS-based (K8s Services): query a stable DNS name → resolves to healthy pods</div>\n</div>\n<div class=\"section-title\">Health & consistency</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Registration: self-register on startup OR third-party (orchestrator) registers\nHealth checks: registry probes instances; remove on failure (with grace)\nThe registry itself must be HA + consistent → backed by Raft (etcd/Consul)\nStale entries are the enemy: a removed-too-slowly dead node gets traffic</div>\n</div>\n<div class=\"tip\"><b>Principal answer:</b> In Kubernetes this is mostly solved for you — Services + kube-dns/CoreDNS give a stable virtual IP/DNS name that load-balances across healthy pods, with the control plane handling registration and health. Explain the underlying model anyway (registry + health checks + Raft-backed consistency) and the client-side vs server-side trade-off. The recurring failure mode to mention: stale registry entries routing traffic to dead instances, which is why aggressive health-checking matters.</div>"
  },
  {
    "n": 63,
    "tag": "reliability",
    "q": "How do you prevent and handle cascading failures in a microservices architecture?",
    "body": "<p>A cascading failure is when one service's failure propagates and topples others, turning a small incident into a system-wide outage. Microservices are especially prone to it.</p>\n<div class=\"section-title\">How cascades happen</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Service C slows → callers (B) block on it → B's threads exhaust →\nB's callers (A) block on B → A exhausts → the whole chain is down.\nOr: retry storms — failures trigger retries → amplify load → make it worse.</div>\n</div>\n<div class=\"section-title\">Defenses</div>\n<div class=\"arch-box\">Timeouts:        never wait forever on a dependency (the #1 cause)\nCircuit breakers: stop calling a failing dependency, fail fast\nBulkheads:       isolate thread/connection pools per dependency\nRetry budgets:   cap retries (e.g. ≤10% extra) + backoff + JITTER\nLoad shedding:   drop excess load to protect core capacity\nFallbacks:       degrade gracefully (stale cache, default response)</div>\n<div class=\"section-title\">Retry storms (the amplifier)</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\"># Naive retries during an outage MULTIPLY load on the struggling service.\n# Fix: exponential backoff + jitter, retry budgets, and circuit breakers\n#      that stop retrying once a dependency is clearly down.</div>\n</div>\n<div class=\"tip\"><b>Interview tip:</b> Name timeouts as the root cause first — unbounded waits are what let a slow dependency exhaust caller threads. Then layer circuit breakers (fail fast), bulkheads (contain the blast), and retry budgets with jitter (so retries don't become a self-inflicted DDoS). The senior insight: retries are a double-edged sword — they help with transient blips but amplify sustained outages, so they must be bounded and paired with circuit breaking.</div>"
  },
  {
    "n": 64,
    "tag": "tradeoffs",
    "q": "Monolith vs microservices: how do you actually decide, and what's the cost of microservices?",
    "body": "<p>Microservices are not automatically better. The decision hinges on team size, domain maturity, and operational capability — not hype.</p>\n<div class=\"arch-box\">MONOLITH:\n  + simple deploy, easy local dev, no network between modules, easy transactions\n  - scaling couples everything, large codebase, one deploy pipeline\n\nMICROSERVICES:\n  + independent scaling & deploys, team autonomy, tech diversity, fault isolation\n  - distributed-systems complexity: network, partial failure, data consistency,\n    observability, deployment/infra overhead, harder transactions</div>\n<div class=\"section-title\">When microservices pay off</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">- Multiple teams stepping on each other in one codebase (org scaling)\n- Components with very different scaling/availability needs\n- Mature domain boundaries you understand well\n- You have the ops maturity: CI/CD, observability, on-call, infra automation</div>\n</div>\n<div class=\"section-title\">When to stay monolith</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">- Small team / early product (boundaries still shifting)\n- You can't yet operate distributed systems well\n→ Start with a well-modularized monolith; extract services when pain is real.</div>\n</div>\n<div class=\"tip\"><b>Principal answer:</b> Microservices solve an <em>organizational</em> scaling problem more than a technical one — they let many teams ship independently. They impose a real tax: distributed transactions, partial failure, network latency, and a much higher observability/ops bar. The pragmatic path is a modular monolith first, then extract services along proven seams when team friction or divergent scaling justifies the cost. Beware the \"distributed monolith\" — microservices that must deploy together give you all the cost and none of the benefit.</div>"
  },
  {
    "n": 65,
    "tag": "data",
    "q": "Design an event sourcing + CQRS system. What problems does it solve and what does it cost?",
    "body": "<p>Event sourcing stores state as an immutable log of events; CQRS separates the write model from read models. Powerful for audit and complex domains, but not free.</p>\n<div class=\"arch-box\">Command → validate → append EVENT to log (source of truth)\n                          ↓ (events published)\n   Read model A (SQL view)   Read model B (search index)   Read model C (cache)\n        ↑ queries                ↑ queries                     ↑ queries\nCurrent state = fold(events). Read models are projections, rebuildable from the log.</div>\n<div class=\"section-title\">What it gives you</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">- Full audit trail / history (every change is an event, immutable)\n- Time travel: reconstruct state at any past point\n- Multiple read models optimized per query (CQRS)\n- Natural fit for event-driven integration</div>\n</div>\n<div class=\"section-title\">What it costs</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">- Complexity: eventual consistency between write log and read models\n- Event schema evolution / versioning is hard (events live forever)\n- Replay/rebuild needs snapshots to bound cost\n- Steeper learning curve; over-engineering risk for simple CRUD</div>\n</div>\n<div class=\"section-title\">Snapshots</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\"># Don't replay millions of events to get current state.\n# Periodically snapshot aggregate state; replay only events since last snapshot.</div>\n</div>\n<div class=\"tip\"><b>Interview tip:</b> Reach for event sourcing + CQRS only where its strengths matter — strong audit requirements (finance, healthcare), complex domains, or wildly divergent read patterns. For simple CRUD it's massive over-engineering. Be honest about the costs: eventual consistency between write and read sides, event versioning, and the need for snapshots. Showing you know <em>when not</em> to use it signals more maturity than knowing how.</div>"
  },
  {
    "n": 66,
    "tag": "reliability",
    "q": "Design a disaster recovery strategy. Explain RTO, RPO, and the DR tiers.",
    "body": "<p>Disaster recovery plans for catastrophic loss (region down, data corruption). Two numbers drive every decision: RTO and RPO.</p>\n<div class=\"section-title\">The two key metrics</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">RTO (Recovery Time Objective): how long until you're back up?\n  → drives your failover architecture\nRPO (Recovery Point Objective): how much data can you afford to lose?\n  → drives your backup/replication frequency\n# \"RTO 5 min, RPO 0\" is wildly more expensive than \"RTO 24h, RPO 1h.\"</div>\n</div>\n<div class=\"section-title\">DR strategy tiers (cost vs RTO/RPO)</div>\n<div class=\"arch-box\">Backup & restore:   cheap; RTO hours-days, RPO = backup interval\nPilot light:        minimal standby (DB replicating, app off); scale up on DR\nWarm standby:       scaled-down full stack running; promote on DR\nHot / active-active: full second region serving; near-zero RTO/RPO (costliest)</div>\n<div class=\"section-title\">What a real plan includes</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">- Cross-region backups (and test RESTORES — untested backups aren't backups)\n- Data corruption protection: point-in-time recovery, immutable backups\n- Runbooks for failover (don't improvise during a disaster)\n- Regular DR drills / game days to validate RTO/RPO are actually met</div>\n</div>\n<div class=\"tip\"><b>Principal answer:</b> Start by asking the business for RTO and RPO — they're requirements, not technical choices, and they determine cost. Map them to a tier: backup/restore, pilot light, warm standby, or hot active-active. The two points interviewers reward: backups are worthless unless restores are tested regularly, and DR plans are worthless unless drilled — a plan that's never been exercised will fail when you need it. Also distinguish DR (disaster) from HA (component failure); they're different problems.</div>"
  },
  {
    "n": 67,
    "tag": "platform",
    "q": "Design a container orchestration platform's scheduler (like the Kubernetes scheduler).",
    "body": "<p>The scheduler decides which node each workload runs on, balancing resource fit, constraints, and spreading — at scale, efficiently.</p>\n<div class=\"arch-box\">Pending pod → Scheduler:\n  1. FILTER (predicates): which nodes CAN run this pod?\n       resources fit? node selector / affinity? taints tolerated? volumes?\n  2. SCORE (priorities): rank feasible nodes\n       least-loaded? spread across zones? affinity preferences? image locality?\n  3. BIND: assign pod → highest-scoring node → kubelet runs it</div>\n<div class=\"section-title\">Filtering (hard constraints)</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">- Sufficient CPU/memory (requests fit remaining capacity)\n- nodeSelector / nodeAffinity match\n- Taints/tolerations (node says \"only these pods\")\n- Pod affinity/anti-affinity (co-locate or spread relative to other pods)</div>\n</div>\n<div class=\"section-title\">Scoring (soft preferences)</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">- Spread across nodes/zones for availability (topology spread)\n- Bin-packing vs spreading (cost efficiency vs blast-radius)\n- Image locality (node already has the image → faster start)\n- Preferred affinity weights</div>\n</div>\n<div class=\"section-title\">Scale & advanced</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Resource model: requests (scheduling) vs limits (runtime cap)\nPreemption: evict lower-priority pods to fit a higher-priority one\nDescheduling/rebalancing: move pods when the cluster drifts from optimal\nScale: schedule thousands of pods/sec → efficient filtering, caching node state</div>\n</div>\n<div class=\"tip\"><b>Interview tip:</b> Frame it as the two-phase filter-then-score pipeline — hard constraints eliminate infeasible nodes, soft priorities rank the rest. Discuss the bin-packing (cost) vs spreading (availability) tension as a scoring trade-off. Mention requests-vs-limits (scheduling uses requests), preemption for priority, and that at scale the scheduler caches node state and processes a queue rather than rescanning the cluster per pod.</div>"
  },
  {
    "n": 68,
    "tag": "tradeoffs",
    "q": "Strong vs eventual consistency: how do you decide per feature, with examples?",
    "body": "<p>Consistency is a per-feature decision, not a system-wide one. Strong consistency is simpler to reason about but costs latency and availability; eventual scales but admits anomalies.</p>\n<div class=\"section-title\">The trade-off</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Strong: every read sees the latest write\n  + correct & simple to reason about\n  - higher latency, reduced availability under partition (CAP: CP)\nEventual: replicas converge over time\n  + low latency, high availability, scales (CAP: AP)\n  - reads may be stale; needs conflict handling</div>\n</div>\n<div class=\"section-title\">Decide by cost of being wrong</div>\n<div class=\"arch-box\">Needs STRONG (correctness critical):\n  - account balance / payments / inventory \"last item\"\n  - unique username claim, booking the same seat\n  - anything where stale data causes money loss or double-allocation\n\nFine with EVENTUAL (stale is acceptable):\n  - social feed, like counts, view counts\n  - user profile, recommendations, search index freshness\n  - analytics, notifications</div>\n<div class=\"section-title\">Mixing within one product</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\"># E-commerce checkout:\n#   inventory decrement & payment → strong (can't oversell / double-charge)\n#   product reviews, \"customers also bought\" → eventual (stale is fine)\n# Use the right model per data type; don't make everything strong (too slow)\n# or everything eventual (bugs with money).</div>\n</div>\n<div class=\"tip\"><b>Principal answer:</b> Frame it as cost-of-staleness. Ask: if a read is a few seconds stale, what breaks? If the answer is \"money or double-allocation,\" go strong (and accept the latency/availability hit). If it's \"a slightly old like count,\" go eventual and reap the scale. The strongest answers explicitly mix models in one system — strong for the checkout/balance path, eventual for feeds and counts — showing you don't apply one hammer everywhere.</div>"
  },
  {
    "n": 69,
    "tag": "networking",
    "q": "Design rate limiting at scale across a distributed fleet. How do limits stay accurate?",
    "body": "<p>Single-node rate limiting is easy; the hard problem is enforcing a global limit across many gateway/server instances without a bottleneck or wild inaccuracy.</p>\n<div class=\"section-title\">The distributed challenge</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\"># Limit: 100 req/min per user. Traffic spread across 10 gateway pods.\n# Naive: each pod allows 100 → user actually gets 1000. Wrong.\n# Need shared state OR a smart approximation.</div>\n</div>\n<div class=\"section-title\">Approaches</div>\n<div class=\"arch-box\">Centralized (Redis) counter:\n  all pods INCR a shared key (atomic, Lua sliding window)\n  + accurate   - Redis is a hot dependency / potential bottleneck\n\nLocal + sync (token distribution):\n  each pod gets a share of the budget; periodically rebalance\n  + fast, no per-request network hop   - approximate near boundaries\n\nTiered: coarse local limit (fast) + global Redis check for precision</div>\n<div class=\"section-title\">Algorithms (recap)</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Token bucket: allows bursts, smooth refill — most common for APIs\nSliding window counter: accurate, bounded memory\nReturn headers: X-RateLimit-Remaining, Retry-After (good API citizenship)</div>\n</div>\n<div class=\"section-title\">Resilience</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\"># If the rate-limit store (Redis) is down — fail OPEN or CLOSED?\n#   fail open: don't block legit traffic (risk abuse)\n#   fail closed: protect backend (risk blocking everyone)\n# Usually fail open with a conservative local fallback limit.</div>\n</div>\n<div class=\"tip\"><b>Interview tip:</b> The crux is shared state vs accuracy. A central Redis counter with an atomic Lua sliding window is accurate but a hot dependency; local budgets with periodic sync are fast but fuzzy at boundaries. The pragmatic answer is tiered: a cheap local limit for the common case plus a global check for precision. Always address the failure mode — what happens when the limiter store is down — and lean fail-open with a conservative local cap.</div>"
  },
  {
    "n": 70,
    "tag": "platform",
    "q": "Design an internal developer platform (IDP) with golden paths and self-service.",
    "body": "<p>An IDP abstracts infrastructure so developers ship without becoming Kubernetes/cloud experts — paved roads with guardrails, self-service from day one.</p>\n<div class=\"arch-box\">Developer → Portal/CLI (self-service) →\n   Golden-path templates (service scaffold, CI/CD, observability baked in)\n   → provision via IaC (Terraform/Crossplane) on K8s/cloud\n   → guardrails: policy-as-code, quotas, security defaults\n   ← golden signals dashboards auto-wired</div>\n<div class=\"section-title\">Core capabilities</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Golden paths: opinionated templates for the 80% common case\n  → \"new service\" = repo + pipeline + dashboards + alerts in minutes\nSelf-service: provision DBs, queues, environments without filing tickets\nGuardrails: policy-as-code (OPA/Kyverno), secure defaults, cost quotas\nAbstraction: hide YAML/cloud details behind a simple interface</div>\n</div>\n<div class=\"section-title\">Design principles</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">- Paved road, not a cage: golden path is easy; deviation is possible but owned\n- Reduce cognitive load: devs think in services, not pods/IAM/VPCs\n- Day-2 included: observability, scaling, secrets, on-call wired by default\n- Treat the platform as a PRODUCT: devs are customers; measure adoption</div>\n</div>\n<div class=\"section-title\">Measuring success</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Lead time to first deploy (new service → prod)\nDeployment frequency, change-fail rate (DORA metrics)\nGolden-path adoption %, ticket reduction, developer satisfaction</div>\n</div>\n<div class=\"tip\"><b>Principal answer:</b> The philosophy is paved road, not cage: make the right way the easy way via golden-path templates that bake in CI/CD, observability, and security, while allowing (owned) deviation. Treat the platform as a product with developers as customers — measure adoption and DORA metrics, not just uptime. Backstage for the portal, Crossplane/Terraform for provisioning, OPA/Kyverno for guardrails. The goal is reducing developer cognitive load so they think in services, not infrastructure primitives.</div>"
  },
  {
    "n": 71,
    "tag": "scalability",
    "q": "Design a distributed web crawler. Crawl billions of pages politely and efficiently.",
    "body": "<p>A web crawler must fetch billions of pages, avoid re-crawling, respect politeness, and distribute work — without overwhelming any single site or itself.</p>\n<div class=\"arch-box\">Seed URLs → URL Frontier (priority + politeness queues)\n   ↓\nFetchers (distributed) → download page\n   ↓\nParser → extract links + content\n   ↓ new links            ↓ content\nDedup (seen?) ──┘     Content store + index\n   ↓ unseen\nback to Frontier</div>\n<div class=\"section-title\">The URL frontier (the heart)</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Politeness: per-domain queue + delay (don't hammer one host)\nPriority: crawl important/fresh pages first (PageRank-ish, change rate)\nPartition by domain → one host's pages handled by one worker (rate control)</div>\n</div>\n<div class=\"section-title\">Dedup & freshness</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Seen-URL set: billions of URLs → bloom filter (memory-efficient, probabilistic)\nContent dedup: hash/simhash to skip near-duplicate pages\nRe-crawl: schedule by observed change frequency (news daily, archive rarely)\nrobots.txt: fetch + cache per domain; respect crawl-delay and disallow</div>\n</div>\n<div class=\"section-title\">Scale & traps</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">- Crawler traps (infinite calendar URLs) → depth limits, URL pattern detection\n- DNS load → cache DNS aggressively\n- Distributed coordination → partition URL space by domain hash</div>\n</div>\n<div class=\"tip\"><b>Interview tip:</b> The URL frontier is the design — it encodes both politeness (per-domain rate limiting so you're a good citizen) and prioritization (crawl valuable/changing pages first). Use a bloom filter for the billions-scale seen-set, partition by domain so one worker controls a host's crawl rate, and respect robots.txt. Mention crawler traps and re-crawl scheduling by change rate to show production awareness.</div>"
  },
  {
    "n": 72,
    "tag": "data",
    "q": "Design a recommendation system. Cover candidate generation and ranking at scale.",
    "body": "<p>Recommenders predict what a user will engage with. At scale the standard architecture is a two-stage funnel: cheap candidate generation, then expensive ranking.</p>\n<div class=\"arch-box\">Millions of items\n   ↓ CANDIDATE GENERATION (fast, approximate) → ~hundreds\n   ↓ RANKING (heavy ML model, precise) → ~dozens\n   ↓ RE-RANK / business rules (diversity, freshness, dedup) → final list</div>\n<div class=\"section-title\">Candidate generation</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Collaborative filtering: users like you liked X (matrix factorization)\nContent-based: items similar to what you engaged with (embeddings + ANN)\nGraph / co-occurrence: \"bought together\", session sequences\n→ Reduce millions → a few hundred candidates cheaply (often via vector ANN)</div>\n</div>\n<div class=\"section-title\">Ranking</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Heavy model scores each candidate with rich features:\n  user features + item features + context (time, device) + cross features\nPredicts P(click)/P(engage); sort by expected value.\nToo expensive for millions of items → that's why stage 1 narrows first.</div>\n</div>\n<div class=\"section-title\">Serving & freshness</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Offline: train models, precompute embeddings/candidate lists (batch)\nOnline: real-time features + low-latency ranking (feature store + model server)\nFeedback loop: log impressions/clicks → retrain; watch for filter bubbles\nCold start: new user/item → fall back to popularity/content features</div>\n</div>\n<div class=\"tip\"><b>Principal answer:</b> The two-stage funnel is the key insight — you cannot run a heavy ranking model over millions of items per request, so cheap candidate generation (vector ANN / collaborative filtering) narrows to hundreds, then a rich model ranks those. Mention the offline/online split (batch training + precompute, real-time serving with a feature store), cold-start fallbacks, and re-ranking for diversity so you don't show ten near-identical items. The feedback loop and its bias risks (filter bubbles) show senior awareness.</div>"
  },
  {
    "n": 73,
    "tag": "scalability",
    "q": "Design a stock-trading / order-matching engine. Low latency, strict correctness.",
    "body": "<p>An order-matching engine pairs buy and sell orders with strict price-time priority, extreme low latency, and perfect correctness — a uniquely demanding workload.</p>\n<div class=\"arch-box\">Orders → Gateway (validate, risk check) → Matching Engine (per symbol)\n                                              ↓ in-memory order book\n                                         match by price-time priority\n                                              ↓\n                                    Trades → market data feed + settlement\n                                              ↓\n                                    Event log (sequenced, replayable)</div>\n<div class=\"section-title\">The order book</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Two sorted sides: bids (desc price), asks (asc price)\nMatch: incoming buy ≥ best ask → trade at resting price\nPriority: price first, then time (FIFO at each price level)\nKept fully IN MEMORY — disk/network in the hot path is too slow</div>\n</div>\n<div class=\"section-title\">Latency & correctness</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Single-threaded per symbol → no locks, deterministic ordering\n  (LMAX Disruptor pattern: one thread, ring buffer, micro/nanosecond latency)\nSequence every event → deterministic replay → audit + recovery\nPartition by symbol → AAPL engine independent of TSLA engine (scale out)</div>\n</div>\n<div class=\"section-title\">Reliability</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Replicated event log → hot standby replays the same sequence → instant failover\nDeterminism is everything: same inputs → same outputs on the replica\nRisk checks pre-trade (limits, fat-finger) at the gateway, off the hot path</div>\n</div>\n<div class=\"tip\"><b>Interview tip:</b> Counter-intuitively, the matching engine is single-threaded per symbol — concurrency would break deterministic price-time ordering and add lock latency. Cite the LMAX Disruptor model (one thread, in-memory ring buffer, no locks → microsecond latency). Everything is sequenced and in-memory for determinism, which also gives you replay-based recovery and a hot standby. Partition by symbol to scale horizontally. This is a case where strong consistency and low latency are both non-negotiable.</div>"
  },
  {
    "n": 74,
    "tag": "data",
    "q": "Design a system to store and serve large files / object storage (like S3).",
    "body": "<p>Object storage holds vast numbers of large immutable blobs with high durability and scalable throughput — a fundamentally different design from a database.</p>\n<div class=\"arch-box\">Client → API (PUT/GET) → \n   Metadata service (object → location, size, checksum, version)\n          ↓\n   Storage nodes: object split into chunks, replicated/erasure-coded across nodes\n          ↓\n   Background: repair, rebalance, integrity scrub, lifecycle/tiering</div>\n<div class=\"section-title\">Durability: replication vs erasure coding</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Replication (3x): store 3 copies → simple, 200% storage overhead\nErasure coding (e.g. 10+4): split into 10 data + 4 parity shards\n  → survive 4 shard losses with only 40% overhead (vs 200%)\n  → S3-scale uses erasure coding for cost; 11 nines of durability</div>\n</div>\n<div class=\"section-title\">Metadata & scale</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Separate metadata plane (object→chunk locations) from data plane (bytes)\nMetadata is small but high-QPS → sharded, replicated KV store\nLarge uploads: multipart upload (parallel chunks, resumable)\nImmutability + versioning: objects are versioned, not edited in place</div>\n</div>\n<div class=\"section-title\">Operational</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Background scrubbing: detect bit-rot via checksums, re-replicate/rebuild\nRebalancing: spread load as nodes are added/fail\nLifecycle/tiering: hot → cold → archive (cost optimization)</div>\n</div>\n<div class=\"tip\"><b>Principal answer:</b> Two big design points: (1) separate the metadata plane from the data plane — metadata is small/high-QPS (sharded KV), data is huge (storage nodes); (2) use erasure coding rather than naive 3x replication at scale — it gives the same durability (11 nines) at a fraction of the storage cost. Add multipart upload for large/resumable transfers, background integrity scrubbing for bit-rot, and lifecycle tiering for cost. Objects are immutable + versioned, never edited in place.</div>"
  },
  {
    "n": 75,
    "tag": "fundamentals",
    "q": "How do you approach a system design question when you've never seen the domain before?",
    "body": "<p>Interviewers often pick unfamiliar domains deliberately — they're testing your <em>process</em>, not domain trivia. A repeatable method keeps you composed.</p>\n<div class=\"section-title\">The method (reduce the unknown to knowns)</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">1. Clarify relentlessly: turn the vague prompt into concrete requirements.\n   \"Design X\" → who uses it, what are the core flows, what scale, what's out of scope?\n2. Map to primitives you DO know:\n   nearly everything decomposes into reads, writes, storage, queues, caches,\n   fan-out, search, real-time push — patterns you've seen before.\n3. Identify the hard part: what makes THIS problem non-trivial? Optimize the design around it.\n4. Start simple, then scale: a working simple design beats a half-drawn complex one.</div>\n</div>\n<div class=\"section-title\">Pattern-match the core challenge</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">High write volume?     → queue + partition + async\nLow-latency reads?     → cache + CDN + pre-compute\nReal-time updates?     → push (WebSocket/SSE) + pub-sub\nMassive storage?       → object store + tiering\nSearch/discovery?      → inverted index / vector search\nStrict correctness?    → strong consistency + idempotency</div>\n</div>\n<div class=\"tip\"><b>Interview tip:</b> Say this out loud: \"I haven't built exactly this, so let me clarify the requirements and decompose it into patterns I know.\" Then narrate the mapping. Unfamiliar domains are won by process — clarify, decompose into primitives (reads/writes/cache/queue/search), find the one hard part, and design around it. Drive the conversation; don't freeze waiting to recall a domain you've never touched.</div>"
  },
  {
    "n": 76,
    "tag": "data",
    "q": "Design a counter / metrics aggregation system for things like view counts and likes at scale.",
    "body": "<p>Counting seems trivial until it's billions of increments/sec on hot items. Naive <code>UPDATE counter SET c=c+1</code> on a row becomes a contention nightmare.</p>\n<div class=\"section-title\">Why naive counting fails</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\"># A viral video gets 1M likes/min → 1M writes to ONE row →\n# row lock contention, the single row is a hotspot, DB melts.</div>\n</div>\n<div class=\"section-title\">Scaling techniques</div>\n<div class=\"arch-box\">1. Sharded/striped counters:\n   split one logical counter into N sub-counters; increment a random shard;\n   total = SUM(shards). Spreads write contention by N.\n\n2. In-memory aggregation + flush:\n   increment in Redis (atomic INCR) → periodically flush to durable store.\n\n3. Stream aggregation:\n   emit \"like\" events → Kafka → stream processor aggregates → store rollups.\n   Decouples write spikes from the counter store.</div>\n<div class=\"section-title\">Accuracy vs cost</div>\n<div class=\"cmd-list\">\n<div class=\"cmd\">Exact counts: striped counters / stream aggregation (eventual, but exact total)\nApproximate (huge cardinality, e.g. unique viewers):\n  HyperLogLog → count distinct in ~1.5KB with ~2% error\nDisplay counts can be eventually consistent — nobody needs a like count to the ms.</div>\n</div>\n<div class=\"tip\"><b>Principal answer:</b> Name the hot-row problem immediately, then solve write contention with striped counters (increment one of N shards, sum to read) or in-memory INCR in Redis flushed asynchronously. For unique counts (distinct viewers) at scale, reach for HyperLogLog — exact distinct-count storage is infeasible, and ~2% error is fine for a view counter. The framing that impresses: display counters tolerate eventual consistency, so trade exactness/latency for write scalability deliberately.</div>"
  },
  {
    "n": 77,
    "tag": "reliability",
    "q": "Design health checks and self-healing for a large service fleet.",
