<style>

.fm-miss:hover { background: #f9d5d5; }

/* toolbar row (count + IM button) */

<script>
const QS = [
  {
    n:1, tag:'state',
    q:'What is Terraform and how does it manage infrastructure state?',
    body:`<p>Terraform is an open-source Infrastructure as Code (IaC) tool by HashiCorp that lets you define, provision, and manage infrastructure across multiple cloud providers using declarative HCL (HashiCorp Configuration Language) files.</p>
<p><b>State management</b>: Terraform maintains a state file (<code>terraform.tfstate</code>) that maps real-world resources to your configuration. This file tracks resource metadata, dependencies, and current values — it is Terraform's source of truth.</p>
<div class='section-title'>Key state concepts</div>
<div class='cmd-list'>
  <div class='cmd'>terraform state list           # list all tracked resources</div>
  <div class='cmd'>terraform state show &lt;resource&gt; # inspect resource attributes</div>
  <div class='cmd'>terraform refresh               # sync state with real infra</div>
</div>
<div class='tip'><b>Interview tip:</b> Mention that state enables Terraform to calculate diffs (plan), detect drift, and avoid duplicate resource creation. Remote state (S3, GCS, Terraform Cloud) is production best practice.</div>`
  },
  {
    n:2, tag:'state',
    q:'Terraform state file is accidentally deleted — how would you recover?',
    body:`<p>This is a critical incident. The recovery approach depends on whether you had backups and whether remote state was configured.</p>
<div class='section-title'>Recovery steps</div>
<div class='cmd-list'>
  <div class='cmd'># 1. Check S3 versioning / GCS object versioning for previous tfstate</div>
  <div class='cmd'># 2. Restore from backup: aws s3api list-object-versions --bucket &lt;bucket&gt;</div>
  <div class='cmd'>terraform import &lt;resource_type&gt;.&lt;name&gt; &lt;resource_id&gt;  # re-import each resource</div>
  <div class='cmd'>terraform refresh  # reconcile after imports</div>
</div>
<p>If no backup exists, use <code>terraform import</code> to re-import each existing resource one by one, then run <code>terraform plan</code> to verify no unintended changes are proposed.</p>
<div class='danger-tip'><b>Prevention:</b> Always enable S3 versioning + DynamoDB locking. Enable Terraform Cloud state history. Never store state locally in production.</div>`
  },
  {
    n:3, tag:'backend',
    q:'Multiple team members are working on the same Terraform code — how do you prevent conflicts?',
    body:`<p>State locking is the core mechanism. Configure a remote backend with locking enabled.</p>
<div class='cmd-list'>
  <div class='cmd'>terraform { backend "s3" { bucket = "tf-state" key = "prod.tfstate" dynamodb_table = "tf-lock" } }</div>
</div>
<p>DynamoDB provides atomic lock acquisition — only one <code>terraform apply</code> runs at a time. Other best practices: use Terraform workspaces per environment, enforce code review via pull requests before apply, and use Atlantis or Terraform Cloud for run orchestration.</p>
<div class='tip'><b>Key answer points:</b> Remote state + locking (DynamoDB/Consul), Atlantis for PR-based workflows, separate workspaces or state files per environment.</div>`
  },
  {
    n:4, tag:'state',
    q:'Terraform apply failed in the middle of execution — how do you recover from a partial deployment?',
    body:`<p>Terraform is not transactional. A mid-apply failure leaves some resources created and others not.</p>
<div class='section-title'>Recovery process</div>
<div class='cmd-list'>
  <div class='cmd'>terraform plan  # identify what's missing vs what exists</div>
  <div class='cmd'>terraform apply  # re-run — Terraform skips already-created resources</div>
  <div class='cmd'>terraform state list  # verify state matches reality</div>
</div>
<p>If a resource was created outside state (partial creation with no state entry), use <code>terraform import</code>. For resources stuck in a bad state, use <code>terraform taint &lt;resource&gt;</code> (pre-1.0) or <code>terraform apply -replace</code> to force recreation.</p>
<div class='danger-tip'><b>Root cause:</b> Check provider API errors, IAM permissions, quota limits, or dependency ordering issues before re-applying.</div>`
  },
  {
    n:5, tag:'state',
    q:'Terraform shows drift between infrastructure and state — how do you identify and fix it?',
    body:`<p>Drift occurs when resources are modified outside Terraform (manual console changes, other automation).</p>
<div class='cmd-list'>
  <div class='cmd'>terraform plan  # drift shows as "changes" in plan output</div>
  <div class='cmd'>terraform refresh  # update state to match real infra (careful!)</div>
  <div class='cmd'>terraform plan -refresh-only  # preview what refresh would change (TF 1.1+)</div>
</div>
<p>To fix: either update your Terraform config to match the manual changes (then apply to align), or apply Terraform to revert the manual change back to IaC-defined values. The choice depends on whether the manual change was intentional.</p>
<div class='tip'><b>Production advice:</b> Use drift detection in CI pipelines — run <code>terraform plan</code> on a schedule and alert on non-empty plans. AWS Config or Driftctl can augment this.</div>`
  },
  {
    n:6, tag:'state',
    q:'Terraform plan shows unexpected resource changes — how do you troubleshoot?',
    body:`<p>Unexpected plan changes are often caused by provider upgrades, computed attributes, or config drift.</p>
<div class='section-title'>Debugging steps</div>
<div class='cmd-list'>
  <div class='cmd'>TF_LOG=DEBUG terraform plan 2>&1 | tee debug.log</div>
  <div class='cmd'>terraform state show &lt;resource&gt;  # compare state values with config</div>
  <div class='cmd'>terraform providers lock  # check provider version pinning</div>
</div>
<p>Common causes: provider version bump changing default attribute values, computed fields (like ARNs) changing on recreation, <code>ignore_changes</code> not set for externally managed attributes, or sensitive value encoding differences.</p>
<div class='tip'><b>Fix:</b> Pin provider versions in <code>required_providers</code>. Use <code>lifecycle { ignore_changes = [...] }</code> for attributes managed externally.</div>`
  },
  {
    n:7, tag:'backend',
    q:'Remote backend (like S3) is not accessible — how do you debug backend issues?',
    body:`<div class='cmd-list'>
  <div class='cmd'>TF_LOG=TRACE terraform init 2>&1 | grep -i backend</div>
  <div class='cmd'>aws s3 ls s3://&lt;bucket&gt;/&lt;key&gt;  # verify bucket access manually</div>
  <div class='cmd'>aws sts get-caller-identity  # confirm correct AWS credentials/role</div>
</div>
<p>Check: IAM permissions for the executing role (s3:GetObject, s3:PutObject, s3:ListBucket, DynamoDB read/write). Verify VPC endpoint or internet access if running in a private subnet. Check S3 bucket policy — it may block cross-account access.</p>
<div class='danger-tip'><b>CI/CD context:</b> Ensure the pipeline IAM role has explicit backend access. Environment variables AWS_ACCESS_KEY_ID / AWS_ROLE_ARN must be set correctly in the runner.</div>`
  },
  {
    n:8, tag:'backend',
    q:'Terraform state file is locked — how do you resolve state lock issues?',
    body:`<div class='cmd-list'>
  <div class='cmd'>terraform force-unlock &lt;LOCK_ID&gt;  # get lock ID from error message</div>
  <div class='cmd'># For DynamoDB: aws dynamodb delete-item --table-name tf-lock --key '{"LockID": {"S": "..."}}'</div>
</div>
<p>A stale lock occurs when a previous apply was interrupted (network failure, process kill). The lock ID is shown in the error message. Always verify no other apply is actually running before force-unlocking — concurrent applies corrupt state.</p>
<div class='danger-tip'><b>Never</b> force-unlock if you are unsure whether another apply is in progress. Check CI/CD pipeline status and team communication first.</div>`
  },
  {
    n:9, tag:'state',
    q:'Terraform resources are getting recreated unexpectedly — what could be the cause?',
    body:`<p>Unexpected recreation (destroy + create) is usually caused by one of these:</p>
<div class='cmd-list'>
  <div class='cmd'># ForceNew attribute changed — check provider docs for which attrs trigger recreation</div>
  <div class='cmd'>terraform plan -out=tfplan && terraform show -json tfplan | jq '.resource_changes'</div>
</div>
<p>Common causes: changing a resource name or ID (some resources require recreation on name change), provider upgrade altering default values, computed attributes not stored in state, or <code>taint</code> left from a previous operation. Use <code>lifecycle { prevent_destroy = true }</code> to guard critical resources.</p>
<div class='tip'><b>Key trick:</b> Read the plan's "replacement triggered by" message carefully — it tells you the exact attribute driving recreation.</div>`
  },
  {
    n:10, tag:'security',
    q:'Sensitive values are visible in Terraform state — how do you secure them?',
    body:`<p>Terraform state contains sensitive data in plaintext (passwords, keys, secrets). This is a known limitation.</p>
<div class='section-title'>Mitigations</div>
<div class='cmd-list'>
  <div class='cmd'>sensitive = true  # mark outputs/variables as sensitive (redacted in plan output)</div>
  <div class='cmd'># S3 backend: enable server-side encryption (SSE-S3 or SSE-KMS)</div>
  <div class='cmd'># Use Vault provider or AWS Secrets Manager for secrets, not tfvars</div>
</div>
<p>Restrict state file access via IAM policies — only CI/CD roles should have S3 read access to state. Enable S3 access logging. Use Terraform Cloud/Enterprise for encrypted state with RBAC. Never commit <code>.tfstate</code> or <code>.tfvars</code> files to Git.</p>
<div class='tip'><b>Production pattern:</b> Store secrets in Vault/SSM Parameter Store and reference via data sources — they never need to be in your TF config at all.</div>`
  },
  {
    n:11, tag:'modules',
    q:'Terraform modules are not working as expected — how do you debug module issues?',
    body:`<div class='cmd-list'>
  <div class='cmd'>terraform init -upgrade  # refresh module sources</div>
  <div class='cmd'>terraform validate  # syntax and reference errors</div>
  <div class='cmd'>TF_LOG=DEBUG terraform plan  # trace module resolution</div>
  <div class='cmd'>terraform console  # interactively evaluate expressions</div>
</div>
<p>Common issues: incorrect module source path (relative vs absolute), version constraint conflicts, missing required variables, output not exposed correctly. Use <code>terraform console</code> to test expressions interactively. Check that module outputs are referenced as <code>module.&lt;name&gt;.&lt;output&gt;</code>.</p>
<div class='tip'><b>Registry modules:</b> Pin module versions explicitly. Never use <code>source = "terraform-aws-modules/vpc/aws"</code> without <code>version = "X.Y.Z"</code>.</div>`
  },
  {
    n:12, tag:'modules',
    q:'A resource dependency is not respected — how do you handle dependency issues?',
    body:`<p>Terraform builds a dependency graph automatically from references. When implicit dependencies are insufficient, use explicit <code>depends_on</code>.</p>
<div class='cmd-list'>
  <div class='cmd'>resource "aws_instance" "app" { depends_on = [aws_security_group.sg] }</div>

let activeFilter = 'all';
let openCards = new Set();
let viewedCount = 0;

function badge(tag) {
  const map = {state:'state',backend:'backend',cicd:'cicd',modules:'modules',security:'security',prod:'prod',perf:'perf'};
  const labels = {state:'State',backend:'Backend',cicd:'CI/CD',modules:'Modules',security:'Security',prod:'Production',perf:'Performance'};
  return `<span class="badge ${map[tag]}">${labels[tag]||tag}</span>`;
}

function render(qs) {
  const list = document.getElementById('q-list');
  document.getElementById('count-bar').textContent = `Showing ${qs.length} of 30 questions`;
  list.innerHTML = qs.map((q, i) => `
    <div class="q-card" id="card-${q.n}">
      <div class="q-header" onclick="toggle(${q.n})">
        <span class="q-num">Q${q.n}</span>
        <span class="q-title">${q.q}</span>
        <div class="q-right">
          ${badge(q.tag)}
          <span class="chevron${openCards.has(q.n)?' open':''}" id="chev-${q.n}">▼</span>
        </div>
      </div>
      <div class="q-body${openCards.has(q.n)?' open':''}" id="body-${q.n}">${q.body}</div>
    </div>
  `).join('');
}

function toggle(n) {
  const body = document.getElementById('body-'+n);
  const chev = document.getElementById('chev-'+n);
  if (openCards.has(n)) {
    openCards.delete(n);
    body.classList.remove('open');
    chev.classList.remove('open');
  } else {
    openCards.add(n);
    body.classList.add('open');
    chev.classList.add('open');
    viewedCount++;
    document.getElementById('open-count').textContent = openCards.size;
  }
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  filterQs();
}

function filterQs() {
  const q = document.getElementById('search').value.toLowerCase();
  let filtered = QS;
  if (activeFilter !== 'all') filtered = filtered.filter(x => x.tag === activeFilter);
  if (q) filtered = filtered.filter(x => x.q.toLowerCase().includes(q) || x.body.toLowerCase().includes(q));
  render(filtered);
}

render(QS);


/* ── DARK MODE ────────────────────── */
(function(){
  var saved = localStorage.getItem('ekn-dark');
  if (saved === '1') document.body.classList.add('dark');
})();
function toggleDark() {
  var on = document.body.classList.toggle('dark');
  localStorage.setItem('ekn-dark', on ? '1' : '0');
  var btn = document.getElementById('dm-btn');
  if (btn) btn.textContent = on ? '☀ Light' : '☾ Dark';
}

/* ── INTERVIEW MODE ───────────────── */
var fmAll = [], fmIdx = 0, fmGot = 0, fmTotal = 0;

function fmStart() {
  // collect currently visible QS
  fmAll = [];
  var cards = document.querySelectorAll('.q-card');
  cards.forEach(function(c) {
    var n = parseInt(c.id.replace('card-',''));
    var q = QS.find ? QS.find(function(x){ return x.n === n; })
                    : (function(){ for(var i=0;i<QS.length;i++){ if(QS[i].n===n) return QS[i]; } })();
    if (q) fmAll.push(q);
  });
  // shuffle
  for (var i = fmAll.length-1; i > 0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var tmp = fmAll[i]; fmAll[i] = fmAll[j]; fmAll[j] = tmp;
  }
  fmIdx = 0; fmGot = 0; fmTotal = fmAll.length;
  var bar = document.getElementById('fm-bar');
  if (bar) { bar.classList.add('open'); fmShow(); }
}
function fmShow() {
  var bar = document.getElementById('fm-bar');
  if (!bar || fmIdx >= fmTotal) { fmDone(); return; }
  var q = fmAll[fmIdx];
  var pct = fmTotal > 0 ? Math.round((fmIdx/fmTotal)*100) : 0;
  document.getElementById('fm-prog').style.width = pct + '%';
  document.getElementById('fm-meta').textContent = 'Question ' + (fmIdx+1) + ' of ' + fmTotal;
  document.getElementById('fm-q-text').textContent = q.q;
  document.getElementById('fm-answer').innerHTML = q.body;
  document.getElementById('fm-answer').classList.remove('show');
  document.getElementById('fm-reveal').style.display = '';
  document.getElementById('fm-got').style.display    = 'none';
  document.getElementById('fm-miss').style.display   = 'none';
  document.getElementById('fm-score').textContent    = fmGot + ' / ' + fmIdx + ' correct';
}
function fmReveal() {
  document.getElementById('fm-answer').classList.add('show');
  document.getElementById('fm-reveal').style.display = 'none';
  document.getElementById('fm-got').style.display    = '';
  document.getElementById('fm-miss').style.display   = '';
}
function fmNext(ok) {
  if (ok) fmGot++;
  fmIdx++;
  fmShow();
}
function fmStop() {
  var bar = document.getElementById('fm-bar');
  if (bar) bar.classList.remove('open');
}
function fmDone() {
  var bar = document.getElementById('fm-bar');
  if (!bar) return;
  bar.innerHTML = '<div class="fm-done">&#127881; Session complete! You got <strong>' + fmGot + ' / ' + fmTotal + '</strong> correct.</div>'
    + '<button class="fm-stop" onclick="fmStop()">Close</button>';
}

</script>
