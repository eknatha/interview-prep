<div class='tip'><b>Interview tip:</b> the lock file (<code>.terraform.lock.hcl</code>) is the detail that separates juniors from seniors here — it guarantees reproducible provider versions and verifies checksums (supply-chain integrity). Always commit it.</div>`
  },
  {
    n:73, tag:'security',
    q:'How do you keep secrets out of Terraform code and state?',
    body:`<p>Two distinct problems: secrets in <b>code</b> (committed to Git) and secrets in <b>state</b> (Terraform stores resource attributes, including some sensitive values, in plaintext state).</p>
<div class='section-title'>Out of code</div>
<div class='cmd-list'>
  <div class='cmd'># Never hardcode. Source secrets at runtime:</div>
  <div class='cmd'>data "aws_secretsmanager_secret_version" "db" { secret_id = "prod/db" }</div>
  <div class='cmd'>variable "db_password" { sensitive = true }   # mark sensitive</div>
  <div class='cmd'># pass via TF_VAR_db_password env, Vault provider, or a secrets manager data source</div>
</div>
<div class='section-title'>Out of (or protected in) state</div>
<div class='cmd-list'>
  <div class='cmd'># State CAN contain secrets in plaintext — so protect the backend:</div>
  <div class='cmd'># - encrypt state at rest (SSE-KMS on S3), restrict bucket access tightly</div>
  <div class='cmd'># - use a backend that encrypts (Terraform Cloud, or KMS-encrypted S3)</div>
</div>
<p>Mark variables and outputs <code>sensitive = true</code> so they are redacted in plan/CLI output. But understand that <b>sensitive does not encrypt state</b> — the value is still in the state file in plaintext. The real protection for state is a locked-down, encrypted backend with strict IAM. The cleanest pattern is to reference secrets from a secrets manager at apply time rather than passing them through Terraform at all.</p>
<div class='danger-tip'><b>Critical misconception:</b> <code>sensitive = true</code> only hides values in CLI output — it does NOT encrypt them in state. Anyone with read access to the state file sees the plaintext. Lock down and encrypt the backend, and prefer external secret references.</div>`
  },
  {
    n:74, tag:'security',
    q:'How do you scan Terraform code for security and compliance issues?',
    body:`<p>Static analysis catches misconfigurations (open security groups, unencrypted buckets, public access) before they are applied. Run scanners in CI as a required gate.</p>
<div class='cmd-list'>
  <div class='cmd'>tfsec .                      # security-focused static analysis</div>
  <div class='cmd'>checkov -d .                 # policy-as-code scanning (CIS, etc.)</div>
  <div class='cmd'>terrascan scan               # compliance scanning</div>
  <div class='cmd'>trivy config .               # misconfig + vuln scanning</div>
  <div class='cmd'># Policy-as-code enforcement:</div>
  <div class='cmd'># - Sentinel (Terraform Cloud/Enterprise)</div>
  <div class='cmd'># - OPA / Conftest against the plan JSON: terraform show -json tfplan</div>
</div>
<p>Scanners like <b>tfsec</b>, <b>Checkov</b>, and <b>Terrascan</b> flag insecure patterns (e.g. <code>0.0.0.0/0</code> ingress, unencrypted volumes, public S3) directly from HCL. For enforceable guardrails, use <b>policy-as-code</b>: Sentinel (in Terraform Cloud) or OPA/Conftest evaluated against the plan JSON (<code>terraform show -json</code>) so you can block, for example, any plan that creates a publicly accessible database.</p>
<div class='tip'><b>Interview tip:</b> distinguish <i>scanning</i> (tfsec/Checkov find issues) from <i>policy enforcement</i> (Sentinel/OPA block merges/applies that violate policy). Mentioning evaluating policy against the <code>-json</code> plan output shows you know how to make guardrails truly preventive, not just advisory.</div>`
  },
  {
    n:75, tag:'security',
    q:'How do you manage least-privilege IAM for the Terraform execution role itself?',
    body:`<p>The Terraform runner often has broad permissions — making it a high-value target. Scope it tightly and prefer short-lived, federated credentials over static keys.</p>
<div class='cmd-list'>
  <div class='cmd'># CI authenticates via OIDC federation (no stored cloud keys):</div>
  <div class='cmd'>#   GitHub Actions → AWS IAM role via OIDC, short-lived STS creds</div>
  <div class='cmd'># Scope the role to only what the config manages:</div>
  <div class='cmd'>#   - per-environment roles (prod runner cannot touch dev and vice versa)</div>
  <div class='cmd'>#   - permission boundaries to cap maximum privilege</div>
  <div class='cmd'>#   - deny creating IAM admin / leaving the account</div>
</div>
<p>Replace long-lived access keys with <b>OIDC federation</b> so the pipeline assumes a role and gets credentials valid for minutes. Give each environment its own execution role scoped to that environment’s resources, and apply <b>permission boundaries</b> to cap what the role can ever do (so a compromised or buggy config cannot escalate to account-admin). Separate plan (read-only) from apply (write) credentials where possible.</p>
<div class='danger-tip'><b>Blast radius:</b> a Terraform role with <code>*:*</code> is effectively account-admin and a single leaked credential compromises everything. Scope per environment, use permission boundaries, and federate so nothing long-lived is stored in CI.</div>`
  },
  {
    n:76, tag:'security',
    q:'What does sensitive = true do, and what are its limits?',
    body:`<p><code>sensitive = true</code> marks a variable or output so Terraform <b>redacts it from CLI/plan output and logs</b>. It is an output-hygiene feature, not encryption.</p>
<div class='cmd-list'>
  <div class='cmd'>variable "api_key" { type = string  sensitive = true }</div>
  <div class='cmd'>output "db_endpoint" { value = ...  sensitive = true }</div>
  <div class='cmd'># In plan output the value shows as: (sensitive value)</div>
  <div class='cmd'># Terraform propagates sensitivity: anything derived from it is also redacted</div>
</div>
<p>It prevents accidental leakage of secrets into console output, plan diffs, and CI logs, and Terraform tracks sensitivity through expressions (a value computed from a sensitive input stays redacted). Its limits: it does <b>not</b> encrypt the value in the state file (still plaintext), and a determined user can still extract it via <code>terraform output -json</code> or by reading state. It also does not stop the value from reaching the provider/API.</p>
<div class='tip'><b>Interview tip:</b> frame it precisely — "<code>sensitive</code> protects against accidental disclosure in output/logs, not against someone with state access." That precision is what interviewers are listening for; conflating it with encryption is a common red flag.</div>`
  },
  {
    n:77, tag:'security',
    q:'How would you enforce that no resource is ever created with public internet exposure?',
    body:`<p>This is a policy-as-code problem: codify the rule and enforce it in the pipeline so violating plans cannot be applied.</p>
<div class='cmd-list'>
  <div class='cmd'># Sentinel (Terraform Cloud/Enterprise) policy example intent:</div>
  <div class='cmd'>#   deny any security_group rule with cidr_blocks containing 0.0.0.0/0 on 22/3389</div>
  <div class='cmd'>#   deny S3 buckets without public-access-block</div>
  <div class='cmd'># OPA/Conftest against plan JSON:</div>
  <div class='cmd'>terraform show -json tfplan &gt; plan.json</div>
  <div class='cmd'>conftest test plan.json      # rego policies evaluate the planned resources</div>
  <div class='cmd'># Make the policy check a REQUIRED status check before apply</div>
</div>
<p>Generate the machine-readable plan (<code>terraform show -json</code>) and evaluate it with <b>OPA/Conftest</b> (open-source) or <b>Sentinel</b> (Terraform Cloud). The policy inspects every planned resource — e.g. reject any security group opening <code>0.0.0.0/0</code> on SSH/RDP, any database with <code>publicly_accessible = true</code>, any bucket missing a public-access block — and fails the pipeline so the apply never runs. This is preventive, not advisory.</p>
<div class='tip'><b>Interview tip:</b> the strong answer evaluates policy against the <i>plan</i> (what will actually be created), not just the HCL source — because dynamic values and modules can produce public exposure that static source review misses. Wire it as a blocking gate.</div>`
  },
  {
    n:78, tag:'security',
    q:'How do you handle state file security given it may contain plaintext secrets?',
    body:`<p>State is sensitive: it can hold passwords, keys, and certificates in plaintext. Treat the backend like a secrets store.</p>
<div class='cmd-list'>
  <div class='cmd'># S3 backend hardening:</div>
  <div class='cmd'>#   - SSE-KMS encryption at rest, with a restricted KMS key</div>
  <div class='cmd'>#   - bucket policy: deny non-TLS access, restrict to the TF role</div>
  <div class='cmd'>#   - block all public access; enable versioning + access logging</div>
  <div class='cmd'>#   - DynamoDB lock table with the same tight access</div>
  <div class='cmd'># Terraform Cloud encrypts state and controls access via teams</div>
</div>
<p>Because <code>sensitive = true</code> does not encrypt state, the defense is at the backend: encrypt at rest (SSE-KMS), enforce TLS in transit, and restrict read access to only the Terraform execution role and a minimal set of operators. Enable versioning (for recovery) and access logging (for audit). Never store production state on a developer laptop or in an unencrypted, broadly-readable bucket.</p>
<div class='danger-tip'><b>Audit reminder:</b> anyone who can read the state bucket can read every secret Terraform touched. Review who has access, encrypt with a scoped KMS key, and log access. State leakage is a full credential compromise.</div>`
  },
  {
    n:79, tag:'cicd',
    q:'How do you implement drift detection in an automated way?',
    body:`<p>Drift is when real infrastructure diverges from state (manual console changes, out-of-band tooling). Automated detection runs plan on a schedule and alerts on non-empty diffs.</p>
<div class='cmd-list'>
  <div class='cmd'># Scheduled CI job (e.g. nightly):</div>
  <div class='cmd'>terraform plan -detailed-exitcode</div>
  <div class='cmd'>#   exit 0 = no changes (no drift)</div>
  <div class='cmd'>#   exit 2 = changes present (DRIFT) → alert</div>
  <div class='cmd'>#   exit 1 = error</div>
  <div class='cmd'># Terraform Cloud has built-in drift detection + notifications</div>
</div>
<p>The key flag is <code>-detailed-exitcode</code>: it returns 2 when the plan is non-empty, which a scheduled job interprets as drift and routes to an alert (Slack/PagerDuty). Run it read-only (plan, never apply) so detection never mutates anything. Terraform Cloud/Enterprise offers this natively with health assessments. On detection, a human decides whether to revert the drift (apply) or absorb it into code.</p>
<div class='tip'><b>Interview tip:</b> stress that drift detection should be <i>read-only and scheduled</i>, and that the response is a decision, not an automatic apply — sometimes the manual change was a legitimate emergency fix that should be codified rather than reverted.</div>`
  },
  {
    n:80, tag:'cicd',
    q:'How do you test Terraform code? What are unit vs integration approaches?',
    body:`<p>Terraform testing spans static checks, plan assertions, and real-resource integration tests — each catching a different class of error.</p>
<div class='section-title'>Layers of testing</div>
<div class='cmd-list'>
  <div class='cmd'>terraform fmt -check / validate         # static: syntax, formatting</div>
  <div class='cmd'>tflint                                  # lint: provider-specific best practices</div>
  <div class='cmd'>terraform test                          # native test framework (.tftest.hcl), since TF 1.6</div>
  <div class='cmd'># plan-based assertions (validate values without creating resources)</div>
  <div class='cmd'># integration: Terratest (Go) — apply to a sandbox, assert, then destroy</div>
  <div class='cmd'>checkov / tfsec                         # security policy tests</div>
</div>
<p>Native <code>terraform test</code> (1.6+) runs <code>.tftest.hcl</code> files that can do plan-only assertions (cheap, no resources) or full apply/destroy against a real sandbox. <b>Terratest</b> (Go) is the mature integration approach: it applies real infrastructure to a throwaway account, makes assertions (HTTP checks, API calls), and tears it down. Combine with static analysis and policy scanning for full coverage.</p>
<div class='tip'><b>Interview tip:</b> mention the testing pyramid for IaC — lots of cheap static/plan checks, fewer expensive integration tests that actually provision. Native <code>terraform test</code> (1.6+) is the current, in-the-box answer; Terratest is the battle-tested integration option.</div>`
  },
  {
    n:81, tag:'cicd',
    q:'How do you safely roll out a change to shared modules used by many teams?',
    body:`<p>A shared module is a published dependency — changing it can break every consumer. Version it semantically and roll out gradually.</p>
<div class='cmd-list'>
  <div class='cmd'># Semantic versioning of the module + a registry (or git tags):</div>
  <div class='cmd'>module "vpc" { source = "app.terraform.io/org/vpc/aws"  version = "~&gt; 5.0" }</div>
  <div class='cmd'># Breaking change → bump MAJOR (6.0.0); consumers opt in deliberately</div>
  <div class='cmd'># Non-breaking → MINOR/PATCH; ~&gt; constraint lets consumers pick it up</div>
</div>
<p>Treat the module like any released library: <b>semantic versioning</b> (major = breaking, minor = feature, patch = fix), published to a registry or pinned by git tag. Consumers pin versions, so a breaking change does not auto-propagate — they upgrade on their own schedule, testing in dev first. Provide a changelog and migration notes for major bumps. Avoid <code>source</code> pointing at a mutable branch (e.g. <code>main</code>), which silently breaks consumers.</p>
<div class='danger-tip'><b>Anti-pattern:</b> sourcing a shared module from a moving git branch. A merge to that branch instantly changes every consumer’s infrastructure plan with no opt-in. Always pin to immutable versions/tags.</div>`
  },
  {
    n:82, tag:'security',
    q:'How do you manage Terraform Cloud / Enterprise workspaces and RBAC at scale?',
    body:`<p>At scale, you manage many workspaces with team-based access, variable sets, and policy guardrails — ideally itself defined as code.</p>
<div class='cmd-list'>
  <div class='cmd'># Workspace-per-(service x environment); group by project</div>
  <div class='cmd'># Teams → workspace permissions (read / plan / write / admin)</div>
  <div class='cmd'># Variable sets: share common vars/creds across workspaces centrally</div>
  <div class='cmd'># Sentinel policy sets enforced org-wide (e.g. no public DBs, required tags)</div>
  <div class='cmd'># Manage TFC itself with the tfe provider (workspaces/teams as code)</div>
</div>
<p>Structure workspaces by service × environment, assign access via <b>teams</b> (least privilege: most users get plan, fewer get apply, admin is rare), and use <b>variable sets</b> to distribute shared credentials/config without copy-paste. Enforce <b>Sentinel policy sets</b> org-wide for guardrails. Crucially, manage TFC configuration itself with the <code>tfe</code> Terraform provider so workspace/team/policy setup is reviewable code, not console clicks.</p>
<div class='tip'><b>Interview tip:</b> "manage the platform with the platform" — defining TFC workspaces, teams, and policies via the <code>tfe</code> provider is the staff-level move. It makes access and guardrails auditable and prevents console drift.</div>`
  },
  {
    n:83, tag:'cicd',
    q:'A long-running apply is stuck holding the state lock. How do you handle it safely?',
    body:`<p>A stuck lock blocks all other runs. The safe path is to first confirm whether an apply is genuinely still running before force-unlocking — force-unlocking a live apply corrupts state.</p>
<div class='cmd-list'>
  <div class='cmd'>terraform plan               # will report: Error acquiring state lock + lock ID + who/when</div>
  <div class='cmd'># Investigate: is a CI job / person actually still applying?</div>
  <div class='cmd'>#   check CI run status, the lock's 'Who' and 'Created' fields</div>
  <div class='cmd'># Only if you've CONFIRMED no apply is running:</div>
  <div class='cmd'>terraform force-unlock &lt;LOCK_ID&gt;</div>
</div>
<p>The lock error shows the lock ID, who acquired it, and when — use that to investigate. If a CI job died mid-apply (crash, cancelled runner), the lock can be orphaned and <code>force-unlock</code> is appropriate. But if an apply is truly still in progress, force-unlocking lets a second apply run concurrently against the same state → corruption. So confirm first, unlock second.</p>
<div class='danger-tip'><b>Never force-unlock blindly.</b> Two concurrent applies on one state file can corrupt it irreparably. Verify no apply is actually running (CI status, lock metadata) before <code>force-unlock</code>. Set reasonable CI timeouts so dead jobs release locks.</div>`
  },
  {
    n:84, tag:'security',
    q:'How do you handle credentials and provider authentication securely in Terraform?',
    body:`<p>Provider auth should use short-lived, environment-provided credentials — never hardcoded keys in HCL, which end up in Git and state.</p>
<div class='cmd-list'>
  <div class='cmd'># DON'T:</div>
  <div class='cmd'>provider "aws" { access_key = "AKIA..."  secret_key = "..." }  # leaked to Git</div>
  <div class='cmd'># DO — let the environment provide creds:</div>
  <div class='cmd'>provider "aws" { region = "us-east-1" }   # uses env / instance role / OIDC</div>
  <div class='cmd'># Local dev: SSO / aws-vault / short-lived STS</div>
  <div class='cmd'># CI: OIDC federation → assume-role → short-lived STS creds (nothing stored)</div>
</div>
<p>Hardcoding credentials in the provider block commits them to Git and risks them landing in state — a classic leak. Instead let the provider pick up credentials from the environment: an instance/pod role, AWS SSO + <code>aws-vault</code> locally, and OIDC federation in CI so the pipeline assumes a role for minutes-long STS credentials. This keeps nothing long-lived anywhere in code or config.</p>
<div class='tip'><b>Interview tip:</b> the modern best-practice answer is OIDC federation for CI (no stored secrets) plus instance/pod roles or SSO for humans. Hardcoded keys in a provider block is an instant red flag in a security-minded interview.</div>`
  },
{
    n:85, tag:'prod',
    q:'Terraform plan wants to destroy and recreate a production database. How do you prevent disaster?',
    body:`<p>A destroy/recreate on a stateful resource means data loss and downtime. First understand <i>why</i> Terraform wants to replace it, then protect against it.</p>
<div class='section-title'>Diagnose the forced replacement</div>
<div class='cmd-list'>
  <div class='cmd'>terraform plan          # look for '# forces replacement' next to an attribute</div>
  <div class='cmd'># common causes: changing an immutable attribute (engine_version path,</div>
  <div class='cmd'>#   availability_zone, name), provider treating a change as ForceNew</div>
  <div class='cmd'>terraform plan -json | jq '.resource_changes[] | select(.change.actions[]=="delete")'</div>
</div>
<div class='section-title'>Protect it</div>
<div class='cmd-list'>
  <div class='cmd'>lifecycle { prevent_destroy = true }   # hard stop: apply errors instead of destroying</div>
  <div class='cmd'>lifecycle { ignore_changes = [&lt;attr&gt;] } # if the change is spurious/managed elsewhere</div>
  <div class='cmd'>terraform state mv ...                  # if it's an addressing change, not a real replace</div>
</div>
<p>Read the plan to find the attribute that "forces replacement" — often an immutable field changed inadvertently, or a provider quirk. Add <code>prevent_destroy = true</code> to critical stateful resources as a safety net so any plan that would destroy them fails loudly. If the change is spurious, <code>ignore_changes</code> or fixing the config avoids the replacement. If it is merely a rename/move, <code>terraform state mv</code> updates addressing without recreating.</p>
<div class='danger-tip'><b>Always run <code>prevent_destroy</code> on production databases, stateful volumes, and anything holding data.</b> It converts a catastrophic silent destroy into a loud apply failure that forces a human decision.</div>`
  },
  {
    n:86, tag:'prod',
    q:'How do you import existing (manually-created) infrastructure into Terraform management?',
    body:`<p>Brownfield adoption: bring already-running resources under Terraform without recreating them. Modern Terraform supports both CLI import and declarative import blocks.</p>
<div class='section-title'>Declarative import (TF 1.5+, preferred)</div>
<div class='cmd-list'>
  <div class='cmd'>import {</div>
  <div class='cmd'>  to = aws_instance.web</div>
  <div class='cmd'>  id = "i-0abc123"</div>
  <div class='cmd'>}</div>
  <div class='cmd'>terraform plan -generate-config-out=generated.tf  # scaffold the HCL</div>
  <div class='cmd'>terraform apply                                    # adopt into state</div>
</div>
<div class='section-title'>CLI import (classic)</div>
<div class='cmd-list'>
  <div class='cmd'>terraform import aws_instance.web i-0abc123</div>
  <div class='cmd'># then hand-write matching HCL until plan shows no changes</div>
</div>
<p>Import blocks (1.5+) are declarative and can even <b>generate</b> starter configuration with <code>-generate-config-out</code>, which dramatically speeds up adopting large existing estates. The classic <code>terraform import</code> imports one resource into state, after which you write HCL that matches reality until <code>plan</code> is clean. The goal in both cases: a green plan (no changes) proving config matches the real resource.</p>
<div class='tip'><b>Interview tip:</b> mention import blocks + <code>-generate-config-out</code> as the current approach — it shows you are on modern Terraform. The success criterion is always "plan shows no changes," meaning your code now faithfully represents the imported resource.</div>`
  },
  {
    n:87, tag:'prod',
    q:'Two resources in state need to swap names / move into a module. How do you do it without recreation?',
    body:`<p>Renaming a resource or moving it into a module changes its <i>address</i>. Without telling Terraform, it sees the old address as "destroy" and the new as "create." <code>moved</code> blocks and <code>state mv</code> avoid that.</p>
<div class='section-title'>Declarative moved blocks (preferred)</div>
<div class='cmd-list'>
  <div class='cmd'>moved {</div>
  <div class='cmd'>  from = aws_instance.web</div>
  <div class='cmd'>  to   = module.compute.aws_instance.web</div>
  <div class='cmd'>}</div>
  <div class='cmd'># committed in code; plan shows a move, not destroy+create</div>
</div>
<div class='section-title'>Imperative state mv</div>
<div class='cmd-list'>
  <div class='cmd'>terraform state mv aws_instance.web module.compute.aws_instance.web</div>
  <div class='cmd'>terraform state mv aws_instance.a aws_instance.tmp   # for swaps, via a temp address</div>
  <div class='cmd'>terraform state mv aws_instance.b aws_instance.a</div>
  <div class='cmd'>terraform state mv aws_instance.tmp aws_instance.b</div>
</div>
<p><code>moved</code> blocks (1.1+) record the address change declaratively in code, so every collaborator and CI run applies the move consistently and reviewably — the plan shows a move with no resource churn. <code>terraform state mv</code> is the imperative equivalent for one-off surgery; swapping two names requires a temporary address to avoid a collision.</p>
<div class='tip'><b>Interview tip:</b> prefer <code>moved</code> blocks over <code>state mv</code> — they are versioned, reviewed, and self-documenting, whereas manual <code>state mv</code> is an out-of-band operation others cannot see. Both avoid the destroy/recreate that a naive rename would trigger.</div>`
  },
  {
    n:88, tag:'prod',
    q:'A resource was deleted outside Terraform (in the console). What happens on next plan?',
    body:`<p>Terraform compares state against reality. A resource deleted out-of-band is still in state but gone in the cloud — Terraform detects this as drift and plans to recreate it.</p>
<div class='cmd-list'>
  <div class='cmd'>terraform plan          # shows the resource will be CREATED (it's missing in reality)</div>
  <div class='cmd'>terraform apply         # recreates it to match config</div>
  <div class='cmd'># if you intended the deletion, remove it from config + state instead:</div>
  <div class='cmd'>terraform state rm &lt;addr&gt;   # drop from state (stop managing) ...</div>
  <div class='cmd'># ... and delete the resource block from HCL so plan stays clean</div>
</div>
<p>On refresh, Terraform notices the real resource is absent and reconciles by planning to <b>recreate</b> it (config still declares it). If the deletion was a mistake, apply restores it. If the deletion was intentional, the correct action is to remove the resource from both the HCL and the state (<code>state rm</code>) so Terraform stops expecting it — otherwise it will keep trying to recreate it on every run.</p>
<div class='tip'><b>Interview tip:</b> the key insight is that state + config define desired state; reality is reconciled toward them. "Deleted in console" → Terraform recreates, because as far as it knows you still want it. This is also why drift detection matters.</div>`
  },
  {
    n:89, tag:'prod',
    q:'How do you perform a zero-downtime change to a load-balanced fleet with Terraform?',
    body:`<p>Use <code>create_before_destroy</code> lifecycle plus health-checked target registration so new instances are serving before old ones are removed.</p>
<div class='cmd-list'>
  <div class='cmd'>resource "aws_launch_template" "app" { ... }   # change here triggers rollout</div>
  <div class='cmd'>lifecycle { create_before_destroy = true }      # new resource up before old torn down</div>
  <div class='cmd'># With ASG + LB: instance refresh / rolling update strategy</div>
  <div class='cmd'>#   - new instances launch, pass health checks, register to LB</div>
  <div class='cmd'>#   - only then are old instances drained and terminated</div>
</div>

    q:'How do you structure Terraform to limit blast radius across a large infrastructure estate?',
    body:`<p>Blast radius is bounded by how state is partitioned. Many small, independent state files limit the damage any single apply (or corrupted state) can do.</p>

<div class='cmd-list'>

  <div class='cmd'>#   data/ (databases)          — isolated, prevent_destroy</div>
  <div class='cmd'>#   compute/ (apps)            — changes often, low blast radius</div>

</div>
<p>Rather than one monolithic state for everything, split by environment, layer (network/data/compute), and service. Each gets its own state file, so a mistake or corruption in the compute layer cannot affect the network or data layers, and applies are smaller and faster. Layers reference each other’s outputs via <code>terraform_remote_state</code> data sources. This also enables independent change cadences — stable layers (network) change rarely; volatile layers (apps) change often.</p>

    body:`<p>Teardown must account for cross-state dependencies and protected resources. Plan it like a controlled decommission, not a single <code>destroy</code>.</p>

    q:'Terraform state has become corrupted or out of sync with reality. How do you recover?',
    body:`<p>State corruption (truncated file, bad manual edit, conflicting writes) is serious but recoverable via backend versioning and surgical state commands.</p>
<div class='cmd-list'>
  <div class='cmd'># 1. Restore a known-good version from backend history:</div>
  <div class='cmd'>aws s3api list-object-versions --bucket &lt;b&gt; --prefix &lt;key&gt;</div>

  <div class='cmd'># 2. Or repair surgically:</div>
  <div class='cmd'>terraform state pull &gt; backup.tfstate     # always back up first</div>
  <div class='cmd'>terraform state list                       # see what's tracked</div>
  <div class='cmd'>terraform state rm &lt;bad-addr&gt;              # remove a broken entry</div>
  <div class='cmd'>terraform import &lt;addr&gt; &lt;id&gt;               # re-add a missing/real resource</div>
  <div class='cmd'>terraform state push &lt;fixed.tfstate&gt;       # push a corrected state (last resort)</div>
</div>
<p>If you enabled backend versioning (you should have), the fastest recovery is restoring the last good state version. For targeted issues, always <code>state pull</code> a backup first, then use <code>state rm</code> / <code>import</code> to bring state back in line with reality, verifying with a clean <code>plan</code>. <code>state push</code> of a hand-corrected file is the last resort and must be done with locking and care.</p>
<div class='danger-tip'><b>Prevention is the real answer:</b> S3/GCS versioning + locking makes corruption a quick rollback instead of a crisis. Always <code>state pull</code> a backup before any manual state surgery, and never hand-edit state JSON directly.</div>`

    body:`<p>Major provider upgrades can change resource schemas, defaults, or force replacements. Upgrade deliberately in a controlled, reviewed, environment-by-environment rollout.</p>

<p>Treat it like a dependency major bump: isolate it in its own PR, run <code>init -upgrade</code>, and <b>scrutinize the plan</b> for forced replacements (a schema change can make Terraform want to recreate resources — dangerous for stateful ones). Consult the provider’s official upgrade guide for migration steps, apply <code>moved</code>/<code>ignore_changes</code> where the change is cosmetic, and protect stateful resources with <code>prevent_destroy</code>. Roll through dev → staging → prod, never straight to prod.</p>

    body:`<p>Multi-region DR with Terraform means parameterizing region and replicating the stack, with state and data-replication concerns handled explicitly.</p>

<p>Make region a variable and deploy the same module to each region (separate state per region for isolation), or use <b>provider aliases</b> to manage primary and DR regions from one configuration when they must be coordinated. Terraform provisions the infrastructure shape in both regions; <b>data</b> replication (DB read replicas, S3 cross-region replication, backups) is configured as resources but the actual failover/promotion is usually an operational runbook, not a Terraform apply.</p>

  {
    n:96, tag:'prod',
    q:'A count-based resource list changed in the middle, and Terraform wants to destroy/recreate many resources. Why, and how do you fix it?',
    body:`<p><code>count</code> indexes resources by position. Removing an item in the middle shifts every subsequent index, so Terraform thinks each shifted resource is a different one — mass destroy/recreate. <code>for_each</code> avoids this.</p>
<div class='cmd-list'>
  <div class='cmd'># Problem: count indexes by position</div>
  <div class='cmd'>resource "aws_instance" "x" { count = length(var.names) ... }</div>
  <div class='cmd'># remove names[1] → indices 2,3,4 shift to 1,2,3 → churn</div>
  <div class='cmd'># Fix: for_each keys by a stable identifier</div>
  <div class='cmd'>resource "aws_instance" "x" {</div>
  <div class='cmd'>  for_each = toset(var.names)   # keyed by name, not position</div>
  <div class='cmd'>  ...</div>
  <div class='cmd'>}</div>
  <div class='cmd'># migrate existing count resources without recreation:</div>
  <div class='cmd'>terraform state mv 'aws_instance.x[1]' 'aws_instance.x["web2"]'</div>
</div>
<p>With <code>count</code>, the address is <code>x[0]</code>, <code>x[1]</code>, ... — purely positional. Deleting a middle element renumbers everything after it, and Terraform plans to destroy/recreate each shifted resource. <code>for_each</code> keys resources by a stable value (a name/ID), so adding or removing one item only affects that one. To migrate an existing count-based resource to for_each without recreation, <code>state mv</code> each from its index to its new key.</p>
<div class='tip'><b>Interview tip:</b> "use <code>for_each</code> over <code>count</code> for sets of distinct, identifiable resources; use <code>count</code> only for truly homogeneous, order-independent copies or simple on/off (<code>count = var.enabled ? 1 : 0</code>)." Knowing the positional-index pitfall is a classic senior-level distinguisher.</div>`

    n:97, tag:'prod',
    q:'How do you roll back a bad Terraform change that has already been applied to production?',
    body:`<p>Terraform has no native "rollback" — you roll forward to the previous desired state. The mechanism is reverting the code and re-applying, with state versioning as the safety net.</p>
<div class='cmd-list'>
  <div class='cmd'>git revert &lt;bad-commit&gt;      # restore the previous configuration</div>
  <div class='cmd'>terraform plan               # confirm it reverses the bad change</div>

<p>The clean path is Git: revert the commit that introduced the bad change and re-apply, so Terraform reconciles back toward the previous configuration. Because infrastructure changes are not always perfectly reversible (a destroyed resource may not come back identical, data may be lost), review the revert plan carefully — it shows exactly what reversing will do. Backend state versioning lets you also recover a prior state file if state, not just config, was damaged.</p>
<div class='danger-tip'><b>Key caveat:</b> "rollback" of infrastructure is roll-forward, and some changes are irreversible (deleted data, recreated resources with new IDs). This is why <code>prevent_destroy</code>, plan review, and staged rollouts matter — preventing the bad apply beats reversing it.</div>`

    n:99, tag:'prod',
    q:'How do you handle resources that must be managed partly outside Terraform (e.g. autoscaling-adjusted values)?',
    body:`<p>Some attributes are legitimately changed by other systems (autoscaling adjusts desired_count; another tool manages a tag). <code>ignore_changes</code> tells Terraform to stop fighting those changes.</p>
<div class='cmd-list'>
  <div class='cmd'>resource "aws_autoscaling_group" "app" {</div>

    body:`<p>A <code>dynamic</code> block generates repeatable nested blocks (like multiple ingress rules) from a collection, instead of writing each by hand.</p>

  {
    n:104, tag:'modules',
    q:'How do you design a reusable module with a clean interface?',
    body:`<p>A good module is a black box with a deliberate interface: well-named input variables (with types, defaults, validation), useful outputs, and no hidden assumptions.</p>

  <div class='cmd'>variable "instance_type" {</div>

  {
    n:105, tag:'modules',
    q:'What is the difference between a root module, child modules, and how is composition done well?',
    body:`<p>The <b>root module</b> is the directory you run Terraform in; it calls <b>child modules</b>. Good composition keeps the root thin and pushes reusable logic into focused children.</p>
<div class='cmd-list'>
  <div class='cmd'># root (environments/prod/main.tf):</div>
  <div class='cmd'>module "network" { source = "../../modules/network"  cidr = "10.0.0.0/16" }</div>
  <div class='cmd'>module "app" {</div>
  <div class='cmd'>  source     = "../../modules/app"</div>
  <div class='cmd'>  subnet_ids = module.network.private_subnet_ids   # wire outputs to inputs</div>
  <div class='cmd'>}</div>
</div>
<p>The root module wires environment-specific values and connects child modules by passing one module’s outputs as another’s inputs (e.g. network subnets into the app module). Well-composed Terraform has small, single-purpose child modules (network, data, compute) and a thin root that just composes and parameterizes them per environment. Avoid deep module nesting (modules calling modules calling modules) — it obscures data flow and complicates debugging.</p>

  {
    n:106, tag:'state',
    q:'How does terraform_remote_state work and what are its alternatives for sharing data between configs?',
    body:`<p><code>terraform_remote_state</code> reads another configuration’s outputs from its state file, letting one layer consume another’s values (e.g. compute reads the network’s VPC ID).</p>
<div class='cmd-list'>
  <div class='cmd'>data "terraform_remote_state" "network" {</div>
  <div class='cmd'>  backend = "s3"</div>
  <div class='cmd'>  config  = { bucket = "tf-state"  key = "network/prod.tfstate"  region = "us-east-1" }</div>

  <div class='cmd'># use: subnet_ids = data.terraform_remote_state.network.outputs.private_subnet_ids</div>
  <div class='cmd'># alternatives:</div>
  <div class='cmd'>data "aws_vpc" "main" { tags = { Name = "prod" } }   # query the cloud directly</div>
  <div class='cmd'># or pass values via SSM Parameter Store / variables</div>
</div>
<p>Remote state coupling is convenient but creates a hard dependency: the consumer needs read access to the producer’s state, and you are coupling to internal outputs. Alternatives that reduce coupling: <b>data sources</b> that query the cloud directly (e.g. look up the VPC by tag) so you depend on the real resource not its state, or a shared store like <b>SSM Parameter Store</b> where the producer publishes values and consumers read them — decoupling the two configs from each other’s state.</p>
<div class='tip'><b>Interview tip:</b> note the trade-off — <code>terraform_remote_state</code> is simple but couples configs to each other’s state and requires state read access. Data sources (query reality) or a published parameter store reduce coupling and are often the more robust choice at scale.</div>`

    n:107, tag:'state',

<p>Refresh reconciles state with actual resource attributes (picking up out-of-band changes). The standalone <code>terraform refresh</code> is deprecated because it silently mutated state with no review; <code>-refresh-only</code> lets you <i>see</i> the proposed state changes (plan) and approve them (apply) without any infrastructure modification — useful for absorbing legitimate drift into state. <code>-refresh=false</code> skips refresh entirely for speed when you trust state is current.</p>

    n:109, tag:'modules',
    q:'What are locals, and how do they differ from variables and outputs?',
    body:`<p><code>locals</code> are named values computed within a module for internal reuse — they are not inputs (variables) or exposed values (outputs).</p>
<div class='cmd-list'>
  <div class='cmd'>variable "env" { type = string }              # INPUT from the caller</div>
  <div class='cmd'>locals {</div>
  <div class='cmd'>  name_prefix = "\${var.env}-myapp"            # INTERNAL computed value</div>
  <div class='cmd'>  common_tags = { Env = var.env  ManagedBy = "terraform" }</div>

</div>
<p>Variables are the module’s inputs (set by the caller). Outputs are what the module exposes to its caller. <code>locals</code> sit in between: intermediate expressions computed once and reused throughout the module (a name prefix, a merged tag map, a derived flag) to avoid repetition and centralize logic. Unlike variables they cannot be overridden from outside; unlike outputs they are not visible externally.</p>

    n:110, tag:'modules',

    body:`<p>Both create multiple instances of a resource/module, but they index differently — which determines stability when the collection changes.</p>
<div class='cmd-list'>
  <div class='cmd'># count: positional index [0], [1], [2] ...</div>
  <div class='cmd'>resource "aws_instance" "x" { count = 3 }            # 3 identical copies</div>
  <div class='cmd'>resource "aws_instance" "x" { count = var.enabled ? 1 : 0 }  # conditional create</div>
  <div class='cmd'># for_each: keyed by map key or set value</div>
  <div class='cmd'>resource "aws_instance" "x" { for_each = toset(["web","api"]) }  # x["web"], x["api"]</div>

<p>Use <b>count</b> for a number of truly identical, order-independent copies, or for a simple conditional (<code>count = var.enabled ? 1 : 0</code>). Use <b>for_each</b> for a set/map of distinct, individually-identifiable resources — because it keys by a stable identifier, adding or removing one element only affects that element (no positional churn). For_each is the safer default whenever the items have meaningful identities.</p>
<div class='tip'><b>Interview tip:</b> the discriminator is "are the instances interchangeable copies (count) or distinct identifiable things (for_each)?" Pairing this with the count-middle-deletion churn problem (positional reindexing) demonstrates real production scar tissue.</div>`

    n:112, tag:'backend',
    q:'How does state locking work, and what happens when locking is misconfigured or absent?',
    body:`<p>State locking serializes mutating operations so only one apply touches a state file at a time. Without it, concurrent applies race and corrupt state.</p>
<div class='cmd-list'>
  <div class='cmd'># S3 + DynamoDB locking:</div>
  <div class='cmd'>backend "s3" { bucket="tf-state" key="prod.tfstate" dynamodb_table="tf-lock" }</div>
  <div class='cmd'># DynamoDB provides atomic lock acquisition (conditional write)</div>
  <div class='cmd'># (modern Terraform/OpenTofu also support S3-native lockfile locking)</div>
  <div class='cmd'>terraform force-unlock &lt;LOCK_ID&gt;   # clear a stuck lock (only if no apply is running)</div>
</div>
<p>When an apply starts, Terraform acquires a lock (historically a DynamoDB item for S3 backends); others attempting to apply get "Error acquiring state lock" and wait/fail. This prevents two applies from writing the state file simultaneously — which would interleave updates and corrupt it. If locking is absent (e.g. local state, or S3 without a lock mechanism), concurrent runs can silently corrupt state or create duplicate resources.</p>
<div class='danger-tip'><b>Always enable locking for shared state.</b> Its absence is invisible until two applies collide and corrupt state. A stuck lock from a crashed run is cleared with <code>force-unlock</code> — but only after confirming no apply is genuinely in progress, or you risk the very corruption locking prevents.</div>`

    body:`<p>HCL is declarative, so "conditionals" are expressed via <code>count</code>/<code>for_each</code> gating, the ternary operator, and <code>try</code>/<code>coalesce</code> for optional values.</p>

  <div class='cmd'># conditional resource creation:</div>

  <div class='cmd'># optional attribute / default fallback:</div>

<p>Conditional creation uses <code>count = condition ? 1 : 0</code> (or <code>for_each</code> over a possibly-empty collection). Reference such resources guardedly since the index may not exist. For optional inputs, <code>coalesce</code>/<code>try</code> provide fallbacks, and <code>optional()</code> object attributes (1.3+) let you define typed inputs with defaults. The mindset shift: you do not write imperative if/else — you declaratively gate resource existence and choose values via expressions.</p>
<div class='tip'><b>Interview tip:</b> show the declarative idioms — <code>count</code>-gating for optional resources, ternaries for values, <code>try</code>/<code>coalesce</code> for optional attributes, and <code>optional()</code> in object types. Mentioning the safe-reference pattern (<code>resource[0]</code> may not exist) reflects real-world burns.</div>`

    q:'When and why would you use -target, and why is it considered a smell if overused?',
    body:`<p><code>-target</code> limits an operation to specific resources. It is a legitimate triage/recovery tool but a dangerous habit if it becomes routine.</p>

<p><code>-target</code> tells Terraform to operate on only the named resources (and their dependencies), skipping the rest. It is appropriate for <b>recovery</b> — finishing a partially-failed apply, or surgically fixing one resource in an incident. But routine use is a smell: it means you are applying a partial view of desired state, which can leave config and reality inconsistent, hide dependency problems, and produce surprising drift. If you <i>need</i> targeting regularly, the real fix is usually to split the state.</p>
<div class='danger-tip'><b>Anti-pattern:</b> using <code>-target</code> as a normal workflow to "only apply my change." This bypasses the holistic plan and can mask broken dependencies. Reserve it for triage; if it is a habit, partition your state instead.</div>`

    body:`<p>State should track resource metadata, not bulk data or secrets. Large/inappropriate data in state bloats it, slows operations, and risks exposure.</p>

    n:116, tag:'backend',
    q:'What is partial backend configuration and why is it useful in CI/CD?',
    body:`<p>Partial backend config leaves some backend settings out of the HCL and supplies them at init time — useful so the same code initializes different backends per environment without hardcoding.</p>

<div class='tip'><b>Interview tip:</b> name the toolset — <code>terraform console</code> for expressions, JSON plan for "why is it changing this," <code>TF_LOG=DEBUG</code> for provider-level mysteries, <code>graph</code> for dependency issues. Knowing the JSON plan reveals the forced-replacement attribute is a particularly practical detail.</div>`

let activeFilter = 'all';
let openCards = new Set();
let viewedCount = 0;

function badge(tag) {
  const map = {state:'state',backend:'backend',cicd:'cicd',modules:'modules',security:'security',prod:'prod',perf:'perf'};
  const labels = {state:'State',backend:'Backend',cicd:'CI/CD',modules:'Modules',security:'Security',prod:'Production',perf:'Performance'};
  return `<span class="badge ${map[tag]}">${labels[tag]||tag}</span>`;
}

function render(qs) {
  const list = document.getElementById('q-list');
  document.getElementById('count-bar').textContent = `Showing ${qs.length} of 120 questions`;
  list.innerHTML = qs.map((q, i) => `
    <div class="q-card" id="card-${q.n}">
      <div class="q-header" onclick="toggle(${q.n})">
        <span class="q-num">Q${q.n}</span>
        <span class="q-title">${q.q}</span>
        <div class="q-right">
          ${badge(q.tag)}
          <span class="chevron${openCards.has(q.n)?' open':''}" id="chev-${q.n}">▼</span>
        </div>
      </div>
      <div class="q-body${openCards.has(q.n)?' open':''}" id="body-${q.n}">${q.body}</div>
    </div>
  `).join('');
}

function toggle(n) {
  const body = document.getElementById('body-'+n);
  const chev = document.getElementById('chev-'+n);
  if (openCards.has(n)) {
    openCards.delete(n);
    body.classList.remove('open');
    chev.classList.remove('open');
  } else {
    openCards.add(n);
    body.classList.add('open');
    chev.classList.add('open');
    viewedCount++;
    document.getElementById('open-count').textContent = openCards.size;
  }
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  filterQs();
}

function filterQs() {
  const q = document.getElementById('search').value.toLowerCase();
  let filtered = QS;
  if (activeFilter !== 'all') filtered = filtered.filter(x => x.tag === activeFilter);
  if (q) filtered = filtered.filter(x => x.q.toLowerCase().includes(q) || x.body.toLowerCase().includes(q));
  render(filtered);
}

render(QS);

var fmAll = [], fmIdx = 0, fmGot = 0, fmTotal = 0;

function fmStart() {
  // collect currently visible QS
  fmAll = [];
  var cards = document.querySelectorAll('.q-card');
  cards.forEach(function(c) {
    var n = parseInt(c.id.replace('card-',''));
    var q = QS.find ? QS.find(function(x){ return x.n === n; })
                    : (function(){ for(var i=0;i<QS.length;i++){ if(QS[i].n===n) return QS[i]; } })();
    if (q) fmAll.push(q);
  });
  // shuffle
  for (var i = fmAll.length-1; i > 0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var tmp = fmAll[i]; fmAll[i] = fmAll[j]; fmAll[j] = tmp;
  }
  fmIdx = 0; fmGot = 0; fmTotal = fmAll.length;
  var bar = document.getElementById('fm-bar');
  if (bar) { bar.classList.add('open'); fmShow(); }
}
function fmShow() {
  var bar = document.getElementById('fm-bar');
  if (!bar || fmIdx >= fmTotal) { fmDone(); return; }
  var q = fmAll[fmIdx];
  var pct = fmTotal > 0 ? Math.round((fmIdx/fmTotal)*100) : 0;
  document.getElementById('fm-prog').style.width = pct + '%';
  document.getElementById('fm-meta').textContent = 'Question ' + (fmIdx+1) + ' of ' + fmTotal;
  document.getElementById('fm-q-text').textContent = q.q;
  document.getElementById('fm-answer').innerHTML = q.body;
  document.getElementById('fm-answer').classList.remove('show');
  document.getElementById('fm-reveal').style.display = '';
  document.getElementById('fm-got').style.display    = 'none';
  document.getElementById('fm-miss').style.display   = 'none';
  document.getElementById('fm-score').textContent    = fmGot + ' / ' + fmIdx + ' correct';
}
function fmReveal() {
  document.getElementById('fm-answer').classList.add('show');
  document.getElementById('fm-reveal').style.display = 'none';
  document.getElementById('fm-got').style.display    = '';
  document.getElementById('fm-miss').style.display   = '';
}
function fmNext(ok) {
  if (ok) fmGot++;
  fmIdx++;
  fmShow();
}
function fmStop() {
  var bar = document.getElementById('fm-bar');
  if (bar) bar.classList.remove('open');
}
function fmDone() {
  var bar = document.getElementById('fm-bar');
  if (!bar) return;
  bar.innerHTML = '<div class="fm-done">&#127881; Session complete! You got <strong>' + fmGot + ' / ' + fmTotal + '</strong> correct.</div>'
    + '<button class="fm-stop" onclick="fmStop()">Close</button>';
}

</script>
