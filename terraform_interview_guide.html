body {
  --dm-bg:         #111314;

body.dark {

body.dark header,

/* cards */

/* commands */
body.dark .cmd     { background: var(--dm-cmd-bg); color: #c9d1d9; border-left-color: var(--dm-cmd-border); }

/* stats */
body.dark .stat    { background: var(--dm-surface); border-color: var(--dm-border); }

/* tips/warns */

body.dark .good    { background: #0d1f0d; color: #7aba5e; }

/* toolbar row (count + IM button) */

<script>
const QS = [
  {
    n:1, tag:'state',
    q:'What is Terraform and how does it manage infrastructure state?',
    body:`<p>Terraform is an open-source Infrastructure as Code (IaC) tool by HashiCorp that lets you define, provision, and manage infrastructure across multiple cloud providers using declarative HCL (HashiCorp Configuration Language) files.</p>
<p><b>State management</b>: Terraform maintains a state file (<code>terraform.tfstate</code>) that maps real-world resources to your configuration. This file tracks resource metadata, dependencies, and current values — it is Terraform's source of truth.</p>
<div class='section-title'>Key state concepts</div>
<div class='cmd-list'>
  <div class='cmd'>terraform state list           # list all tracked resources</div>
  <div class='cmd'>terraform state show &lt;resource&gt; # inspect resource attributes</div>
  <div class='cmd'>terraform refresh               # sync state with real infra</div>
</div>
<div class='tip'><b>Interview tip:</b> Mention that state enables Terraform to calculate diffs (plan), detect drift, and avoid duplicate resource creation. Remote state (S3, GCS, Terraform Cloud) is production best practice.</div>`
  },
  {
    n:2, tag:'state',
    q:'Terraform state file is accidentally deleted — how would you recover?',
    body:`<p>This is a critical incident. The recovery approach depends on whether you had backups and whether remote state was configured.</p>
<div class='section-title'>Recovery steps</div>
<div class='cmd-list'>
  <div class='cmd'># 1. Check S3 versioning / GCS object versioning for previous tfstate</div>
  <div class='cmd'># 2. Restore from backup: aws s3api list-object-versions --bucket &lt;bucket&gt;</div>
  <div class='cmd'>terraform import &lt;resource_type&gt;.&lt;name&gt; &lt;resource_id&gt;  # re-import each resource</div>
  <div class='cmd'>terraform refresh  # reconcile after imports</div>
</div>
<p>If no backup exists, use <code>terraform import</code> to re-import each existing resource one by one, then run <code>terraform plan</code> to verify no unintended changes are proposed.</p>
<div class='danger-tip'><b>Prevention:</b> Always enable S3 versioning + DynamoDB locking. Enable Terraform Cloud state history. Never store state locally in production.</div>`
  },
  {
    n:3, tag:'backend',
    q:'Multiple team members are working on the same Terraform code — how do you prevent conflicts?',
    body:`<p>State locking is the core mechanism. Configure a remote backend with locking enabled.</p>
<div class='cmd-list'>
  <div class='cmd'>terraform { backend "s3" { bucket = "tf-state" key = "prod.tfstate" dynamodb_table = "tf-lock" } }</div>
</div>
<p>DynamoDB provides atomic lock acquisition — only one <code>terraform apply</code> runs at a time. Other best practices: use Terraform workspaces per environment, enforce code review via pull requests before apply, and use Atlantis or Terraform Cloud for run orchestration.</p>
<div class='tip'><b>Key answer points:</b> Remote state + locking (DynamoDB/Consul), Atlantis for PR-based workflows, separate workspaces or state files per environment.</div>`
  },
  {
    n:4, tag:'state',
    q:'Terraform apply failed in the middle of execution — how do you recover from a partial deployment?',
    body:`<p>Terraform is not transactional. A mid-apply failure leaves some resources created and others not.</p>
<div class='section-title'>Recovery process</div>
<div class='cmd-list'>
  <div class='cmd'>terraform plan  # identify what's missing vs what exists</div>
  <div class='cmd'>terraform apply  # re-run — Terraform skips already-created resources</div>
  <div class='cmd'>terraform state list  # verify state matches reality</div>
</div>
<p>If a resource was created outside state (partial creation with no state entry), use <code>terraform import</code>. For resources stuck in a bad state, use <code>terraform taint &lt;resource&gt;</code> (pre-1.0) or <code>terraform apply -replace</code> to force recreation.</p>
<div class='danger-tip'><b>Root cause:</b> Check provider API errors, IAM permissions, quota limits, or dependency ordering issues before re-applying.</div>`
  },
  {
    n:5, tag:'state',
    q:'Terraform shows drift between infrastructure and state — how do you identify and fix it?',
    body:`<p>Drift occurs when resources are modified outside Terraform (manual console changes, other automation).</p>
<div class='cmd-list'>
  <div class='cmd'>terraform plan  # drift shows as "changes" in plan output</div>
  <div class='cmd'>terraform refresh  # update state to match real infra (careful!)</div>
  <div class='cmd'>terraform plan -refresh-only  # preview what refresh would change (TF 1.1+)</div>
</div>
<p>To fix: either update your Terraform config to match the manual changes (then apply to align), or apply Terraform to revert the manual change back to IaC-defined values. The choice depends on whether the manual change was intentional.</p>
<div class='tip'><b>Production advice:</b> Use drift detection in CI pipelines — run <code>terraform plan</code> on a schedule and alert on non-empty plans. AWS Config or Driftctl can augment this.</div>`
  },
  {
    n:6, tag:'state',
    q:'Terraform plan shows unexpected resource changes — how do you troubleshoot?',
    body:`<p>Unexpected plan changes are often caused by provider upgrades, computed attributes, or config drift.</p>
<div class='section-title'>Debugging steps</div>
<div class='cmd-list'>
  <div class='cmd'>TF_LOG=DEBUG terraform plan 2>&1 | tee debug.log</div>
  <div class='cmd'>terraform state show &lt;resource&gt;  # compare state values with config</div>
  <div class='cmd'>terraform providers lock  # check provider version pinning</div>
</div>
<p>Common causes: provider version bump changing default attribute values, computed fields (like ARNs) changing on recreation, <code>ignore_changes</code> not set for externally managed attributes, or sensitive value encoding differences.</p>
<div class='tip'><b>Fix:</b> Pin provider versions in <code>required_providers</code>. Use <code>lifecycle { ignore_changes = [...] }</code> for attributes managed externally.</div>`
  },
  {
    n:7, tag:'backend',
    q:'Remote backend (like S3) is not accessible — how do you debug backend issues?',
    body:`<div class='cmd-list'>
  <div class='cmd'>TF_LOG=TRACE terraform init 2>&1 | grep -i backend</div>
  <div class='cmd'>aws s3 ls s3://&lt;bucket&gt;/&lt;key&gt;  # verify bucket access manually</div>
  <div class='cmd'>aws sts get-caller-identity  # confirm correct AWS credentials/role</div>
</div>
<p>Check: IAM permissions for the executing role (s3:GetObject, s3:PutObject, s3:ListBucket, DynamoDB read/write). Verify VPC endpoint or internet access if running in a private subnet. Check S3 bucket policy — it may block cross-account access.</p>
<div class='danger-tip'><b>CI/CD context:</b> Ensure the pipeline IAM role has explicit backend access. Environment variables AWS_ACCESS_KEY_ID / AWS_ROLE_ARN must be set correctly in the runner.</div>`
  },
  {
    n:8, tag:'backend',
    q:'Terraform state file is locked — how do you resolve state lock issues?',
    body:`<div class='cmd-list'>
  <div class='cmd'>terraform force-unlock &lt;LOCK_ID&gt;  # get lock ID from error message</div>
  <div class='cmd'># For DynamoDB: aws dynamodb delete-item --table-name tf-lock --key '{"LockID": {"S": "..."}}'</div>
</div>
<p>A stale lock occurs when a previous apply was interrupted (network failure, process kill). The lock ID is shown in the error message. Always verify no other apply is actually running before force-unlocking — concurrent applies corrupt state.</p>
<div class='danger-tip'><b>Never</b> force-unlock if you are unsure whether another apply is in progress. Check CI/CD pipeline status and team communication first.</div>`
  },
  {
    n:9, tag:'state',
    q:'Terraform resources are getting recreated unexpectedly — what could be the cause?',
    body:`<p>Unexpected recreation (destroy + create) is usually caused by one of these:</p>
<div class='cmd-list'>
  <div class='cmd'># ForceNew attribute changed — check provider docs for which attrs trigger recreation</div>
  <div class='cmd'>terraform plan -out=tfplan && terraform show -json tfplan | jq '.resource_changes'</div>
</div>
<p>Common causes: changing a resource name or ID (some resources require recreation on name change), provider upgrade altering default values, computed attributes not stored in state, or <code>taint</code> left from a previous operation. Use <code>lifecycle { prevent_destroy = true }</code> to guard critical resources.</p>
<div class='tip'><b>Key trick:</b> Read the plan's "replacement triggered by" message carefully — it tells you the exact attribute driving recreation.</div>`
  },
  {
    n:10, tag:'security',
    q:'Sensitive values are visible in Terraform state — how do you secure them?',
    body:`<p>Terraform state contains sensitive data in plaintext (passwords, keys, secrets). This is a known limitation.</p>
<div class='section-title'>Mitigations</div>
<div class='cmd-list'>
  <div class='cmd'>sensitive = true  # mark outputs/variables as sensitive (redacted in plan output)</div>
  <div class='cmd'># S3 backend: enable server-side encryption (SSE-S3 or SSE-KMS)</div>
  <div class='cmd'># Use Vault provider or AWS Secrets Manager for secrets, not tfvars</div>
</div>
<p>Restrict state file access via IAM policies — only CI/CD roles should have S3 read access to state. Enable S3 access logging. Use Terraform Cloud/Enterprise for encrypted state with RBAC. Never commit <code>.tfstate</code> or <code>.tfvars</code> files to Git.</p>
<div class='tip'><b>Production pattern:</b> Store secrets in Vault/SSM Parameter Store and reference via data sources — they never need to be in your TF config at all.</div>`
  },
  {
    n:11, tag:'modules',
    q:'Terraform modules are not working as expected — how do you debug module issues?',
    body:`<div class='cmd-list'>
  <div class='cmd'>terraform init -upgrade  # refresh module sources</div>
  <div class='cmd'>terraform validate  # syntax and reference errors</div>
  <div class='cmd'>TF_LOG=DEBUG terraform plan  # trace module resolution</div>
  <div class='cmd'>terraform console  # interactively evaluate expressions</div>
</div>
<p>Common issues: incorrect module source path (relative vs absolute), version constraint conflicts, missing required variables, output not exposed correctly. Use <code>terraform console</code> to test expressions interactively. Check that module outputs are referenced as <code>module.&lt;name&gt;.&lt;output&gt;</code>.</p>
<div class='tip'><b>Registry modules:</b> Pin module versions explicitly. Never use <code>source = "terraform-aws-modules/vpc/aws"</code> without <code>version = "X.Y.Z"</code>.</div>`
  },
  {
    n:12, tag:'modules',
    q:'A resource dependency is not respected — how do you handle dependency issues?',
    body:`<p>Terraform builds a dependency graph automatically from references. When implicit dependencies are insufficient, use explicit <code>depends_on</code>.</p>
<div class='cmd-list'>
  <div class='cmd'>resource "aws_instance" "app" { depends_on = [aws_security_group.sg] }</div>

{
    n:31, tag:'state',
    q:'Explain terraform state mv, rm, and import — when do you use each in production?',
    body:`<p>These are surgical state operations for reconciling state with reality without destroying/recreating resources. Each addresses a different mismatch.</p>
<div class='section-title'>The three operations</div>
<div class='cmd-list'>
  <div class='cmd'>terraform state mv aws_instance.old aws_instance.new   # rename/move in state, no infra change</div>
  <div class='cmd'>terraform state mv 'module.a.x' 'module.b.x'            # move a resource between modules</div>
  <div class='cmd'>terraform state rm aws_instance.legacy                 # forget a resource (does NOT destroy it)</div>
  <div class='cmd'>terraform import aws_instance.web i-0abc123             # bring an existing resource under management</div>
</div>
<p><b>state mv</b> is for refactors: you renamed a resource or moved it into a module, and want Terraform to keep managing the same real resource instead of destroying and recreating it. <b>state rm</b> tells Terraform to stop tracking a resource without touching the real infrastructure — useful when handing ownership to another stack or removing something you will manage manually. <b>import</b> is the reverse: adopt an existing resource into state.</p>
<div class='tip'><b>Modern note:</b> for refactors, prefer <code>moved {}</code> blocks (Terraform 1.1+) over imperative <code>state mv</code> — they are declarative, code-reviewed, and run automatically during apply, so the refactor is reproducible for everyone rather than a manual one-off.</div>`
  },
  {
    n:32, tag:'state',
    q:'What are moved {} and import {} blocks, and why are they better than CLI commands?',
    body:`<p>These declarative blocks (Terraform 1.1+ for moved, 1.5+ for import) encode state operations in code instead of as manual CLI steps, making refactors and adoptions reproducible and reviewable.</p>
<div class='section-title'>Declarative refactor & import</div>
<div class='cmd-list'>
  <div class='cmd'>moved {</div>
  <div class='cmd'>  from = aws_instance.old_name</div>
  <div class='cmd'>  to   = aws_instance.new_name</div>
  <div class='cmd'>}</div>
  <div class='cmd'>import {</div>
  <div class='cmd'>  to = aws_instance.web</div>
  <div class='cmd'>  id = "i-0abc123def"</div>
  <div class='cmd'>}</div>
  <div class='cmd'>terraform plan -generate-config-out=generated.tf   # scaffold config for imported resource</div>
</div>
<p>A <code>moved</code> block means every teammate and CI run applies the rename automatically — nobody has to remember to run <code>state mv</code> on their machine. An <code>import</code> block makes adopting existing infra part of the plan/apply cycle, and <code>-generate-config-out</code> can scaffold the resource HCL for you. Both turn fragile, undocumented CLI surgery into version-controlled, auditable changes.</p>
<div class='good'><b>Why it matters:</b> imperative <code>state mv</code> only runs where someone types it — a classic source of "works on my machine, drift on yours." Declarative blocks make state changes a reviewed commit, which is the IaC philosophy applied to state itself.</div>`
  },
  {
    n:33, tag:'backend',
    q:'Compare S3+DynamoDB, Terraform Cloud, and Consul as state backends. How do you choose?',
    body:`<p>The choice trades off operational ownership, locking, collaboration features, and cost. All provide remote state; they differ in what else they give you.</p>
<div class='section-title'>Backend comparison</div>
<div class='cmd-list'>
  <div class='cmd'>S3 + DynamoDB : you own it; S3 stores state, DynamoDB provides locking; cheap, AWS-native</div>
  <div class='cmd'>Terraform Cloud/Enterprise : managed state + locking + run orchestration + policy (Sentinel/OPA)</div>
  <div class='cmd'>Consul        : KV store with locking; good if you already run Consul; more ops overhead</div>
  <div class='cmd'>GCS / azurerm : cloud-native equivalents with built-in locking</div>
</div>
<p><b>S3+DynamoDB</b> is the pragmatic default on AWS — cheap, simple, you control encryption and access via IAM, locking via DynamoDB. <b>Terraform Cloud</b> adds the things teams eventually want: remote runs, a run queue, VCS integration, policy-as-code, and a state UI — at a cost and with vendor coupling. <b>Consul</b> only makes sense if you already operate it. Note: as of Terraform 1.10+, S3 backend supports native locking via a lockfile, reducing the need for DynamoDB.</p>
<div class='tip'><b>Decision framing:</b> start with cloud-native (S3+DynamoDB/GCS) for simplicity and cost; graduate to Terraform Cloud/Enterprise when you need run orchestration, policy enforcement, and audit at team scale. State the trade-off (ownership/cost vs managed features) rather than naming a single winner.</div>`
  },
  {
    n:34, tag:'state',
    q:'How do you structure state files across environments and teams to limit blast radius?',
    body:`<p>Monolithic state is a blast-radius and contention problem: one apply can affect everything and locks block everyone. The fix is splitting state along boundaries of change and ownership.</p>
<div class='section-title'>State segmentation strategies</div>
<div class='cmd-list'>
  <div class='cmd'>Per environment : separate state for dev / staging / prod (separate keys/backends)</div>
  <div class='cmd'>Per layer       : networking / data / compute / app in separate states</div>
  <div class='cmd'>Per team/service: each owning team has its own state + backend</div>
  <div class='cmd'># Cross-state references via remote state data source (read-only):</div>
  <div class='cmd'>data "terraform_remote_state" "network" { backend = "s3" config = { ... } }</div>
</div>
<p>Split state by <b>rate of change and ownership</b>: slow-moving foundational layers (networking, IAM) in their own state, fast-moving app layers in another. This limits blast radius (an app apply cannot accidentally touch networking), reduces lock contention, and speeds up plans. Layers share data through the <code>terraform_remote_state</code> data source (read-only outputs) or, better, through provider data sources / SSM parameters to avoid tight state coupling.</p>
<div class='warn'><b>Trade-off:</b> more state files mean more orchestration (ordering between layers) and more remote-state plumbing. Over-splitting creates a dependency web. Split where ownership or change-rate genuinely differs — not arbitrarily.</div>`
  },
  {
    n:35, tag:'backend',
    q:'A state file became corrupted or has stale entries. How do you safely repair it?',
    body:`<p>State repair is delicate — mistakes can orphan or destroy real resources. Always back up first, then use targeted operations.</p>
<div class='section-title'>Repair procedure</div>
<div class='cmd-list'>
  <div class='cmd'>terraform state pull &gt; backup.tfstate        # ALWAYS back up first</div>
  <div class='cmd'>aws s3api list-object-versions --bucket tf-state  # find a prior good version (if versioned)</div>
  <div class='cmd'>terraform state rm &lt;bad_address&gt;             # remove a stale/duplicate entry</div>
  <div class='cmd'>terraform import &lt;address&gt; &lt;real_id&gt;         # re-attach a resource that exists but is mistracked</div>
  <div class='cmd'>terraform state push backup.tfstate          # restore a known-good version (last resort)</div>
  <div class='cmd'>terraform plan                               # verify NO unexpected changes before applying</div>
</div>
<p>Pull and back up the current state first — every repair is reversible if you have the prior state. For stale entries, <code>state rm</code> the bad address; for resources that exist but are tracked wrong, <code>import</code> them back correctly. If corruption is broad, restore a versioned prior state with <code>state push</code>. The non-negotiable final step is <code>terraform plan</code> showing no surprising changes before any apply.</p>
<div class='danger-tip'><b>Never</b> hand-edit the raw tfstate JSON in production unless there is genuinely no alternative — it is easy to break references and serial numbers. Prefer <code>state rm</code>/<code>import</code>/versioned restore. And confirm state versioning + locking are enabled so this is recoverable next time.</div>`
  },
  {
    n:36, tag:'state',
    q:'Explain Terraform workspaces. When are they appropriate vs separate state files/dirs?',
    body:`<p>Workspaces let one configuration maintain multiple independent states (e.g. dev/staging/prod) under the same backend key prefix. They are convenient but commonly misused for environment separation.</p>
<div class='section-title'>Workspace mechanics</div>
<div class='cmd-list'>
  <div class='cmd'>terraform workspace new staging</div>
  <div class='cmd'>terraform workspace select prod</div>
  <div class='cmd'>terraform workspace list</div>
  <div class='cmd'># reference the active workspace in config:</div>
  <div class='cmd'>locals { env = terraform.workspace }</div>
</div>
<p>Workspaces share the same code and backend, switching only the state. They suit <b>ephemeral or near-identical</b> variations — per-developer sandboxes, short-lived test environments. They are a poor fit for prod-vs-dev when those environments diverge (different sizes, regions, accounts) or need different access controls, because the shared code and single backend make isolation weak and a mistake can hit the wrong env.</p>
<div class='tip'><b>Best practice for real environments:</b> separate directories/state with explicit backends (or a tool like Terragrunt) gives true isolation — distinct access, distinct blast radius, divergent config. Reserve CLI workspaces for ephemeral or developer-scratch use. State this distinction; it is a common interview discriminator.</div>`
  },
  {
    n:37, tag:'backend',
    q:'How does Terraform state locking actually work, and how do you handle a stuck lock?',
    body:`<p>Locking prevents concurrent applies from corrupting state by serializing write access. The mechanism is backend-specific; a stuck lock blocks everyone until cleared.</p>
<div class='section-title'>Locking & unlock</div>
<div class='cmd-list'>
  <div class='cmd'># DynamoDB: a lock item (LockID) is written before apply, deleted after</div>
  <div class='cmd'># A crashed/killed apply can leave the lock orphaned:</div>
  <div class='cmd'>terraform force-unlock &lt;LOCK_ID&gt;             # remove a stuck lock (get ID from the error)</div>
  <div class='cmd'># Inspect the DynamoDB lock item directly if needed:</div>
  <div class='cmd'>aws dynamodb get-item --table-name tf-lock --key '{"LockID":{"S":"..."}}'</div>
</div>
<p>Before a state-writing operation, Terraform acquires an exclusive lock (a DynamoDB conditional put, a Consul session, etc.). If an apply crashes or is killed, the lock can be orphaned, and the next run errors with a lock ID and who/when held it. <code>force-unlock</code> with that ID clears it.</p>
<div class='danger-tip'><b>Before force-unlocking, confirm no apply is actually running</b> — force-unlocking an in-progress operation lets two applies run concurrently and can corrupt state. Check with the holder (the error shows who and when) first. Only force-unlock genuinely orphaned locks.</div>`
  },
  {
    n:38, tag:'state',
    q:'What is terraform refresh / -refresh-only, and why was refresh-during-plan behavior changed?',
    body:`<p>Refresh reconciles state with the real world by reading current resource attributes. Terraform 0.15.4+ added <code>-refresh-only</code> to make drift reconciliation an explicit, reviewable step.</p>
<div class='section-title'>Refresh operations</div>
<div class='cmd-list'>
  <div class='cmd'>terraform plan -refresh-only      # show drift (real vs state) WITHOUT proposing config changes</div>
  <div class='cmd'>terraform apply -refresh-only     # update state to match reality, no infra changes</div>
  <div class='cmd'>terraform plan -refresh=false     # skip refresh (faster plans; risky if drift exists)</div>
  <div class='cmd'># (the standalone 'terraform refresh' command is deprecated in favor of -refresh-only)</div>
</div>
<p>Plain <code>terraform plan</code> refreshes implicitly, then diffs against config. <code>-refresh-only</code> separates concerns: it shows you what drifted in reality and lets you accept that into state without conflating it with config-driven changes. This matters because an automatic refresh can mask or surprise you with out-of-band changes; making it explicit gives a clean, reviewable "reconcile drift" step distinct from "apply my code changes."</p>
<div class='tip'><b>Performance note:</b> on large states, refresh is the slow part of plan. <code>-refresh=false</code> speeds CI plans but only safe when you trust there is no drift — pair it with periodic <code>-refresh-only</code> drift checks. Mentioning this trade-off shows operational maturity.</div>`
  },
  {
    n:39, tag:'backend',
    q:'How do you migrate state from one backend to another (e.g. local to S3) with zero downtime?',
    body:`<p>Terraform automates backend migration when you change the backend block and re-init. The key is doing it carefully so no state is lost in transit.</p>
<div class='section-title'>Migration steps</div>
<div class='cmd-list'>
  <div class='cmd'>terraform state pull &gt; pre-migration-backup.tfstate   # back up first</div>
  <div class='cmd'># 1. Add/modify the backend block in terraform { backend "s3" { ... } }</div>
  <div class='cmd'>terraform init -migrate-state                          # Terraform copies state to the new backend</div>
  <div class='cmd'>#    it prompts to confirm copying existing state</div>
  <div class='cmd'>terraform state list                                   # verify all resources present post-migration</div>
  <div class='cmd'>terraform plan                                         # confirm no changes proposed</div>
</div>
<p>When you change the backend configuration and run <code>terraform init -migrate-state</code>, Terraform detects the change and offers to copy the existing state to the new backend. Always pull a manual backup first. After migration, verify with <code>state list</code> and a clean <code>plan</code>. There is no real downtime because state migration does not touch live infrastructure — it only relocates the tracking data.</p>
<div class='warn'><b>Coordinate the team:</b> everyone must re-init against the new backend, and you should ensure no apply is mid-flight during migration. Commit the backend change and announce it so stale local backends do not cause split state.</div>`
  },
  {
    n:40, tag:'state',
    q:'What is sensitive data exposure in state, and how do you protect it?',
    body:`<p>State stores resource attributes in plaintext JSON — including secrets like generated passwords, private keys, and connection strings. Anyone with state access can read them.</p>
<div class='section-title'>Protection layers</div>
<div class='cmd-list'>
  <div class='cmd'># 1. Encrypt state at rest + in transit:</div>
  <div class='cmd'>#    S3 SSE-KMS, GCS CMEK, Terraform Cloud encrypted state</div>
  <div class='cmd'># 2. Restrict state access via IAM (least privilege on the bucket/table)</div>
  <div class='cmd'># 3. Mark variables/outputs sensitive to keep them out of logs:</div>
  <div class='cmd'>variable "db_password" { type = string sensitive = true }</div>
  <div class='cmd'>output "endpoint" { value = ... sensitive = true }</div>
  <div class='cmd'># 4. Don't generate secrets in TF at all — reference a secrets manager:</div>
  <div class='cmd'>data "aws_secretsmanager_secret_version" "db" { secret_id = "prod/db" }</div>
</div>
<p>Defense in depth: encrypt state at rest (KMS) and in transit, lock down access with least-privilege IAM, and mark sensitive variables/outputs so they are redacted from CLI/CI logs (note: <code>sensitive</code> hides them from output but they are <b>still plaintext in state</b>). The strongest measure is architectural — do not have Terraform generate or hold secrets; reference a secrets manager (Vault, AWS Secrets Manager) so the secret never lands in state.</p>
<div class='danger-tip'><b>Critical misconception:</b> <code>sensitive = true</code> does NOT encrypt state — it only suppresses log output. The secret is still readable in the raw tfstate. Anyone who can read your state bucket can read every secret in it. Treat state access as equivalent to secret access.</div>`
  },
  {
    n:41, tag:'backend',
    q:'How would you design state for a multi-account, multi-region AWS organization?',
    body:`<p>At org scale, state design must reflect account boundaries, blast-radius isolation, and clear ownership, while enabling controlled cross-references.</p>
<div class='section-title'>Design approach</div>
<div class='cmd-list'>
  <div class='cmd'>Per-account state backend (state lives in or is keyed per account)</div>
  <div class='cmd'>Layered: org/identity (slow) | networking | platform | per-service app (fast)</div>
  <div class='cmd'>Naming convention for state keys: &lt;account&gt;/&lt;region&gt;/&lt;layer&gt;/&lt;service&gt;.tfstate</div>
  <div class='cmd'>Cross-account reads via assumed roles + terraform_remote_state or SSM/Parameter Store</div>
  <div class='cmd'>Centralized backend bucket with strict IAM, or backend-per-account for isolation</div>
</div>
<p>Mirror the org structure: separate state per account and per layer, with a consistent key naming scheme so any state is findable. Foundational layers (identity, networking) change rarely and many things depend on them — isolate and protect them. Cross-account/cross-layer data flows through assumed-role remote-state reads or, preferably, a shared parameter store to avoid brittle state-to-state coupling. Access to each state is governed by least-privilege IAM matching who owns that layer.</p>
<div class='tip'><b>Tooling:</b> Terragrunt or Terraform Cloud workspaces help manage the proliferation of backends/state keys with DRY backend config and dependency ordering. Mention that the goal is isolation + clear ownership + controlled cross-references, and that over-centralizing state recreates the blast-radius problem.</div>`
  },
  {
    n:42, tag:'state',
    q:'Explain dependency ordering: how does Terraform build its graph and where do depends_on and lifecycle fit?',
    body:`<p>Terraform builds a directed acyclic graph (DAG) from resource references and walks it to parallelize independent work and order dependent work. Most ordering is implicit via references.</p>
<div class='section-title'>Graph & ordering controls</div>
<div class='cmd-list'>
  <div class='cmd'># Implicit dependency (preferred): referencing an attribute creates an edge</div>
  <div class='cmd'>subnet_id = aws_subnet.main.id   # this resource now depends on the subnet</div>
  <div class='cmd'># Explicit, when there is a hidden dependency Terraform can't infer:</div>
  <div class='cmd'>depends_on = [aws_iam_role_policy.app]</div>
  <div class='cmd'># Lifecycle controls ordering/replacement behavior:</div>
  <div class='cmd'>lifecycle { create_before_destroy = true }</div>
  <div class='cmd'>lifecycle { prevent_destroy = true }</div>
  <div class='cmd'>lifecycle { ignore_changes = [tags] }</div>
  <div class='cmd'>lifecycle { replace_triggered_by = [aws_instance.web.id] }</div>
</div>
<p>Prefer <b>implicit</b> dependencies — referencing <code>aws_subnet.main.id</code> automatically orders creation. Use <code>depends_on</code> only for dependencies Terraform cannot see (e.g. an IAM policy that must exist before an app starts, with no attribute reference). <code>lifecycle</code> tunes behavior: <code>create_before_destroy</code> avoids downtime on replacement, <code>prevent_destroy</code> guards critical resources, <code>ignore_changes</code> stops fighting out-of-band edits, and <code>replace_triggered_by</code> forces replacement when a related resource changes.</p>
<div class='tip'><b>Interview depth:</b> emphasize implicit-over-explicit (overusing <code>depends_on</code> serializes the graph and slows applies), and that <code>create_before_destroy</code> is the key to zero-downtime resource replacement. Visualize with <code>terraform graph | dot -Tpng</code>.</div>`
  },
  {
    n:43, tag:'backend',
    q:'What is a partial backend configuration and why use it?',
    body:`<p>Partial backend config omits some backend settings from code and supplies them at init time — useful for keeping environment-specific or sensitive backend details out of the repo.</p>
<div class='section-title'>Partial config pattern</div>
<div class='cmd-list'>
  <div class='cmd'># In code: backend block with minimal/empty settings</div>
  <div class='cmd'>terraform { backend "s3" {} }</div>
  <div class='cmd'># Supply the rest at init via a file or flags:</div>
  <div class='cmd'>terraform init -backend-config=prod.s3.tfbackend</div>
  <div class='cmd'>terraform init -backend-config="bucket=tf-state-prod" -backend-config="key=app.tfstate"</div>
  <div class='cmd'># prod.s3.tfbackend:  bucket=... key=... region=... dynamodb_table=...</div>
</div>
<p>Backend blocks cannot use variables, so partial configuration is the sanctioned way to parameterize them. You keep a minimal backend block in code and inject the bucket/key/region per environment at <code>init</code> time via <code>-backend-config</code> files or flags. This lets the same code target different backends (dev/staging/prod) and keeps account-specific identifiers out of version control.</p>
<div class='info'><b>Common use:</b> CI pipelines pass the right <code>.tfbackend</code> file per environment, so one codebase initializes against the correct state per deploy target. Terragrunt automates this pattern (generating backend config) at scale.</div>`
  },
  {
    n:44, tag:'state',
    q:'How do you handle a resource that must be replaced with zero downtime?',
    body:`<p>By default Terraform destroys-then-creates on replacement, causing an outage. <code>create_before_destroy</code> inverts this so the new resource is healthy before the old is removed.</p>
<div class='section-title'>Zero-downtime replacement</div>
<div class='cmd-list'>
  <div class='cmd'>resource "aws_instance" "web" {</div>
  <div class='cmd'>  # ...</div>
  <div class='cmd'>  lifecycle { create_before_destroy = true }</div>
  <div class='cmd'>}</div>
  <div class='cmd'># Force a replacement explicitly when needed:</div>
  <div class='cmd'>terraform apply -replace=aws_instance.web   # replaces the 'tainted' way (modern syntax)</div>
</div>
<p><code>create_before_destroy = true</code> tells Terraform to provision the replacement first, cut over (e.g. via a load balancer or DNS that references the new resource), and only then destroy the old one — eliminating the gap. It requires that the resource can have two instances briefly (no hard uniqueness conflicts on names/IPs; handle those with naming that allows overlap). For intentional replacement, <code>-replace=</code> is the modern alternative to the deprecated <code>terraform taint</code>.</p>
<div class='warn'><b>Watch for conflicts:</b> create_before_destroy fails if the new resource collides with the old on a unique attribute (a fixed name, EIP, etc.). Design names to allow two to coexist momentarily, or the create step errors and you get neither smooth cutover nor the benefit.</div>`
  },
  {
    n:45, tag:'backend',
    q:'Explain terraform_remote_state vs data sources vs SSM for sharing values between configurations.',
    body:`<p>Three ways one Terraform config consumes values produced by another. They differ in coupling, access control, and how tightly they bind to Terraform.</p>
<div class='section-title'>The options</div>
<div class='cmd-list'>
  <div class='cmd'># 1. Remote state data source (reads another state's OUTPUTS):</div>
  <div class='cmd'>data "terraform_remote_state" "net" { backend="s3" config={...} }</div>
  <div class='cmd'>subnet = data.terraform_remote_state.net.outputs.subnet_id</div>
  <div class='cmd'># 2. Provider data source (reads from the cloud API directly):</div>
  <div class='cmd'>data "aws_vpc" "main" { tags = { Name = "prod" } }</div>
  <div class='cmd'># 3. Parameter store / SSM (decoupled, any consumer):</div>
  <div class='cmd'>data "aws_ssm_parameter" "vpc_id" { name = "/network/vpc_id" }</div>
</div>
<p><b>Remote state</b> is convenient but creates tight coupling — the consumer needs read access to the producer’s entire state (which contains secrets), and breaks if the producer renames an output. <b>Provider data sources</b> query the cloud directly (e.g. find a VPC by tag), decoupling from state entirely but depending on stable tags/naming. <b>SSM/Parameter Store</b> is the loosest coupling: the producer publishes values, any consumer (Terraform or not) reads them, with independent IAM.</p>
<div class='tip'><b>Recommendation to state:</b> prefer provider data sources or SSM over <code>terraform_remote_state</code> for cross-stack values — remote state forces granting full state read (a security and coupling cost). Reserve remote state for tightly-related layers you control end to end.</div>`
  },
  {
    n:46, tag:'state',
    q:'What happens during terraform init, plan, and apply internally — walk through the lifecycle.',
    body:`<p>Understanding the phases explains where things fail and why certain operations need re-init. Each phase has a distinct job.</p>
<div class='section-title'>The lifecycle</div>
<div class='cmd-list'>
  <div class='cmd'>init  : download providers + modules, configure backend, build .terraform/ + lock file</div>
  <div class='cmd'>plan  : refresh state (read real infra) → build graph → diff config vs state → propose actions</div>
  <div class='cmd'>apply : acquire lock → execute graph (parallelized) → update state after each resource → release lock</div>
  <div class='cmd'># Supporting:</div>
  <div class='cmd'>terraform validate   # static config/syntax/type checks (no API calls)</div>
  <div class='cmd'>terraform fmt        # canonical formatting</div>
</div>
<p><b>init</b> sets up the working directory: it downloads provider plugins and modules, configures the backend, and writes the dependency lock file — required after adding providers/modules or changing the backend. <b>plan</b> refreshes state from the real world, builds the dependency DAG, and computes the diff into a set of create/update/delete/replace actions. <b>apply</b> locks state, walks the graph executing actions in parallel where independent, and writes state incrementally so a mid-run failure still records what succeeded.</p>
<div class='tip'><b>Why apply writes state incrementally:</b> if apply fails halfway, the resources already created are in state — so re-running continues rather than recreating. This is why a partial-apply recovery is just “fix the cause and re-apply,” not “start over.”</div>`
  },
  {
    n:47, tag:'backend',
    q:'How do you safely run Terraform in CI/CD, and what are the key guardrails?',
    body:`<p>Automated Terraform must be safe by construction: plan and apply are separated, credentials are short-lived, and applies are gated and serialized.</p>
<div class='section-title'>CI/CD guardrails</div>
<div class='cmd-list'>
  <div class='cmd'>Plan on PR: terraform plan -out=tfplan  → post plan to the PR for review</div>
  <div class='cmd'>Apply on merge: terraform apply tfplan   # apply the SAVED plan, not a fresh one</div>
  <div class='cmd'>OIDC for cloud creds (no long-lived secrets in CI)</div>
  <div class='cmd'>State locking ensures only one apply at a time; serialize via environments/queues</div>
  <div class='cmd'>Policy as code: OPA/Conftest or Sentinel gates before apply</div>
  <div class='cmd'>Required manual approval for prod applies</div>
</div>
<p>The core pattern is <b>plan/apply separation</b>: generate and save a plan (<code>-out</code>) on PR for human review, then apply <i>that exact saved plan</i> on merge so what was reviewed is what runs (no drift between review and apply). Use OIDC for ephemeral cloud credentials, rely on state locking plus environment serialization to prevent concurrent applies, gate with policy-as-code (OPA/Sentinel) for compliance, and require manual approval for production.</p>
<div class='good'><b>Tools that productize this:</b> Atlantis (PR-driven plan/apply with locking comments), Terraform Cloud/Enterprise (run queue + Sentinel), Spacelift, env0. Mentioning plan/apply separation + saved-plan apply + OIDC is the strongest signal of safe automation.</div>`
  },
  {
    n:48, tag:'state',
    q:'A teammate ran terraform apply locally and it diverged from CI-managed state. How do you reconcile?',
    body:`<p>Local applies bypass review and can create drift between what CI expects and what exists. Reconciliation means getting reality, state, and code back in agreement.</p>
<div class='section-title'>Reconciliation</div>
<div class='cmd-list'>
  <div class='cmd'>terraform plan -refresh-only      # detect what reality/state diverged from code</div>
  <div class='cmd'>terraform plan                     # see what CI would now change</div>
  <div class='cmd'># If the local change is desired: codify it, PR it, let CI apply</div>
  <div class='cmd'># If undesired: revert via apply from the reviewed code</div>
  <div class='cmd'>terraform state pull &gt; current.tfstate   # inspect what state believes</div>
</div>
<p>First diagnose with <code>-refresh-only</code> (what drifted) and a normal <code>plan</code> (what CI wants to change). If the local change was legitimate, the fix is process: write it into code, open a PR, and let CI apply it so state and code agree. If it was a mistake, apply from the reviewed mainline code to revert reality. The state is shared (remote), so once code and reality align, CI is consistent again.</p>
<div class='warn'><b>Root cause is process, not Git:</b> local applies against shared prod state are the problem. The durable fix is removing humans’ ability to apply to prod directly — restrict apply to CI with OIDC, lock down state-write IAM, and require PR-driven applies. Reconciling once without fixing the process guarantees recurrence.</div>`
  },
{
    n:49, tag:'modules',
    q:'How do you design a reusable Terraform module? What makes a module good vs bad?',
    body:`<p>A good module is a well-bounded abstraction with a clear interface, sensible defaults, and minimal assumptions about its caller. A bad module either does too little (a thin wrapper) or too much (a kitchen sink).</p>
<div class='section-title'>Module design principles</div>
<div class='cmd-list'>
  <div class='cmd'>Clear interface: typed variables with descriptions, validation, sensible defaults</div>
  <div class='cmd'>Explicit outputs: expose what callers need, nothing internal</div>
  <div class='cmd'>Single responsibility: a module does one cohesive thing (a VPC, an ECS service)</div>
  <div class='cmd'>No hardcoded provider/region/account assumptions; pass them in</div>
  <div class='cmd'>Versioned + documented: README with examples, version constraints</div>
</div>
<p>Treat a module like a function: well-typed inputs (with <code>validation</code> blocks and defaults), explicit outputs, and one clear responsibility. Avoid leaking implementation details or hardcoding environment specifics — callers supply those. A module that wraps a single resource adds indirection without value; a module that provisions an entire environment is too coupled to reuse. The sweet spot is a cohesive, composable unit (a VPC, a service, a database).</p>
<div class='tip'><b>Interview signal:</b> “modules are functions for infrastructure” — inputs/outputs/single-responsibility — plus versioning and validation. Mention the registry pattern (root module composes child modules) and that over-abstraction is as harmful as none.</div>`
  },
  {
    n:50, tag:'modules',
    q:'Explain count vs for_each for resource iteration. When does each cause problems?',
    body:`<p>Both create multiple instances of a resource, but they index differently — count by integer position, for_each by a stable key — and that difference has major consequences for state stability.</p>
<div class='section-title'>count vs for_each</div>
<div class='cmd-list'>
  <div class='cmd'># count: integer-indexed (aws_instance.web[0], [1], [2])</div>
  <div class='cmd'>resource "aws_instance" "web" { count = 3 }</div>
  <div class='cmd'># for_each: key-indexed (aws_instance.web["api"], ["worker"])</div>
  <div class='cmd'>resource "aws_instance" "web" { for_each = toset(["api","worker"]) }</div>
  <div class='cmd'>resource "aws_instance" "web" { for_each = var.instances_map }</div>
</div>
<p>The trap with <b>count</b>: removing an item from the middle of the list shifts every subsequent index, so Terraform destroys and recreates everything after it (index 1 becomes 0, etc.). <b>for_each</b> keys instances by a stable identifier, so adding/removing one entry only affects that entry. Use <code>count</code> only for truly identical, position-independent instances or simple on/off toggles (<code>count = var.enabled ? 1 : 0</code>); use <code>for_each</code> whenever instances have distinct identities.</p>
<div class='warn'><b>Classic production incident:</b> a list with <code>count</code> where someone removes a middle element → mass recreation of unrelated resources. Default to <code>for_each</code> with a map/set keyed by a stable name. This is one of the most-asked Terraform discriminators.</div>`
  },
  {
    n:51, tag:'modules',
    q:'How do you version and distribute internal modules across many teams?',
    body:`<p>Modules need versioning so consumers get reproducible, opt-in upgrades. Distribution options range from Git refs to a private registry.</p>
<div class='section-title'>Versioning & sources</div>
<div class='cmd-list'>
  <div class='cmd'># Private registry (best at scale): semantic versions + version constraints</div>
  <div class='cmd'>module "vpc" { source="app.terraform.io/org/vpc/aws" version="~&gt; 3.2" }</div>
  <div class='cmd'># Git with a pinned tag/ref:</div>
  <div class='cmd'>module "vpc" { source="git::https://git/org/modules.git//vpc?ref=v3.2.1" }</div>
  <div class='cmd'># Always PIN the version; never float on a branch:</div>
  <div class='cmd'>version = "3.2.1"   # exact   or   "~&gt; 3.2"  (&gt;=3.2.0, &lt;3.3.0)</div>
</div>
<p>Publish modules to a <b>private registry</b> (Terraform Cloud/Enterprise or an OSS one) with semantic versioning so consumers pin via <code>version</code> constraints and upgrade deliberately. If using Git sources, always pin to a tag (<code>?ref=v3.2.1</code>), never a branch — floating on <code>main</code> means a module change can silently break every consumer’s next apply. SemVer signals intent: patch = safe, minor = additive, major = breaking.</p>
<div class='danger-tip'><b>Never use an unpinned module source in production.</b> <code>source="...//vpc"</code> without <code>?ref</code> or <code>version</code> pulls latest — an upstream change then alters infra on your next apply with no review. Pin everything; treat module upgrades as reviewed PRs.</div>`
  },
  {
    n:52, tag:'perf',
    q:'Terraform plan/apply is very slow on a large configuration. How do you diagnose and speed it up?',
    body:`<p>Slowness usually comes from refresh time (many resources, slow provider APIs), an oversized monolithic state, or excessive provider calls. Diagnose first, then attack the dominant cause.</p>
<div class='section-title'>Speed-up techniques</div>
<div class='cmd-list'>
  <div class='cmd'>terraform plan -refresh=false           # skip refresh if you trust no drift (big win)</div>
  <div class='cmd'>terraform plan -target=module.x         # scope to a subset while iterating</div>
  <div class='cmd'>terraform apply -parallelism=20         # raise concurrency (default 10) if API allows</div>
  <div class='cmd'>TF_LOG=trace ... 2&gt;&1 | grep duration   # find slow provider calls</div>
  <div class='cmd'># Structural fixes:</div>
  <div class='cmd'>Split monolithic state into layers/services (smaller graphs, faster refresh)</div>
  <div class='cmd'>Reduce data sources that hit slow APIs on every plan</div>
</div>
<p>The biggest lever is usually <b>state size</b>: a monolith with thousands of resources refreshes slowly because every plan reads every resource’s live state. Splitting into layered/service states shrinks each graph dramatically. Tactically, <code>-refresh=false</code> skips the slow refresh (safe only when drift is unlikely), <code>-target</code> scopes work during iteration, and raising <code>-parallelism</code> helps if the provider API tolerates it. Excessive <code>data</code> sources that call slow APIs on every plan are a common hidden cost.</p>
<div class='tip'><b>Diagnose before optimizing:</b> <code>TF_LOG=trace</code> reveals where time goes (refresh vs specific slow API calls). The durable fix for genuinely large infra is state segmentation, not flags — say that to show architectural thinking.</div>`
  },
  {
    n:53, tag:'modules',
    q:'What are dynamic blocks and when should you avoid them?',
    body:`<p>Dynamic blocks generate repeated nested configuration blocks (e.g. multiple ingress rules) from a collection, avoiding copy-paste. They are powerful but hurt readability when overused.</p>
<div class='section-title'>Dynamic block usage</div>
<div class='cmd-list'>
  <div class='cmd'>dynamic "ingress" {</div>
  <div class='cmd'>  for_each = var.ingress_rules</div>
  <div class='cmd'>  content {</div>
  <div class='cmd'>    from_port = ingress.value.from</div>
  <div class='cmd'>    to_port   = ingress.value.to</div>
  <div class='cmd'>    protocol  = ingress.value.protocol</div>
  <div class='cmd'>  }</div>
  <div class='cmd'>}</div>
</div>
<p>Use dynamic blocks when a resource has a repeatable nested block whose count/content is data-driven — security group rules, IAM policy statements, load balancer listeners. They keep config DRY. But they obscure the resulting configuration (you cannot read the actual rules at a glance), complicate diffs, and make modules harder to understand. If the nesting is fixed or small, write the blocks out literally for clarity.</p>
<div class='warn'><b>Readability cost:</b> heavily nested or conditional dynamic blocks become write-only code. Prefer explicit blocks when the set is small/static; reserve dynamic blocks for genuinely variable, data-driven repetition. Over-engineering modules with dynamic-everything is a real anti-pattern interviewers probe for.</div>`
  },
  {
    n:54, tag:'modules',
    q:'Explain variable validation, type constraints, and how to build a robust module interface.',
    body:`<p>A robust module rejects bad input early with clear errors rather than failing deep in a provider call. Type constraints and validation blocks are the tools.</p>
<div class='section-title'>Typed, validated inputs</div>
<div class='cmd-list'>
  <div class='cmd'>variable "instance_type" {</div>
  <div class='cmd'>  type        = string</div>
  <div class='cmd'>  description = "EC2 instance type"</div>
  <div class='cmd'>  default     = "t3.micro"</div>
  <div class='cmd'>  validation {</div>
  <div class='cmd'>    condition     = can(regex("^t3\\\\.", var.instance_type))</div>
  <div class='cmd'>    error_message = "Only t3 family is allowed."</div>
  <div class='cmd'>  }</div>
  <div class='cmd'>}</div>
  <div class='cmd'>variable "subnets" { type = map(object({ cidr = string, az = string })) }</div>
</div>
<p>Use precise <b>type constraints</b> (<code>map(object({...}))</code>, <code>list(string)</code>) so callers get a clear type error instead of a confusing downstream failure. Add <code>validation</code> blocks to enforce business rules (allowed values, naming patterns, ranges) with human-readable <code>error_message</code>s. Provide sensible <code>default</code>s for optional inputs and mark secrets <code>sensitive</code>. This turns the module interface into a contract that fails fast and self-documents.</p>
<div class='tip'><b>Newer features to mention:</b> <code>optional()</code> attributes in object types (with defaults) let you build flexible-but-typed inputs, and custom <code>validation</code> with <code>can()</code>/<code>regex()</code> catches misuse at plan time. Fast, clear failure is a hallmark of a production-grade module.</div>`
  },
  {
    n:55, tag:'perf',
    q:'How does Terraform parallelism work, and when would you tune it?',
    body:`<p>Terraform walks the resource graph concurrently, processing independent resources in parallel up to a limit (default 10). Tuning trades speed against provider/API rate limits.</p>
<div class='section-title'>Parallelism control</div>
<div class='cmd-list'>
  <div class='cmd'>terraform apply -parallelism=20    # raise from default 10</div>
  <div class='cmd'>terraform apply -parallelism=1     # serialize (debugging ordering/races)</div>
  <div class='cmd'># The graph dictates what CAN run in parallel; -parallelism caps how many at once</div>
</div>
<p>The DAG determines which resources are independent; <code>-parallelism</code> caps how many of those run simultaneously. Raising it speeds up large applies <b>if</b> the provider API can handle the concurrency. Lowering it (even to 1) helps when you hit API rate limits/throttling, or when debugging suspected ordering issues. It does not change ordering — dependent resources still wait for their prerequisites.</p>
<div class='warn'><b>The trap:</b> cranking parallelism on a provider with strict rate limits causes throttling errors and slower (or failed) applies, not faster ones. Tune based on the provider’s limits; sometimes <i>lowering</i> parallelism fixes intermittent apply failures caused by API throttling.</div>`
  },
  {
    n:56, tag:'modules',
    q:'How do you compose modules (root calling child modules) and pass data between them?',
    body:`<p>Composition is the heart of scalable Terraform: a thin root module wires together child modules, passing one module’s outputs as another’s inputs.</p>
<div class='section-title'>Composition pattern</div>
<div class='cmd-list'>
  <div class='cmd'>module "network" { source = "./modules/network"  cidr = var.cidr }</div>
  <div class='cmd'>module "app" {</div>
  <div class='cmd'>  source     = "./modules/app"</div>
  <div class='cmd'>  subnet_ids = module.network.private_subnet_ids   # output → input wiring</div>
  <div class='cmd'>  vpc_id     = module.network.vpc_id</div>
  <div class='cmd'>}</div>
  <div class='cmd'>output "app_url" { value = module.app.url }         # re-export child output</div>
</div>
<p>The root module should be mostly <b>wiring</b>: instantiate child modules and connect them by feeding outputs into inputs (<code>module.network.vpc_id → module.app.vpc_id</code>). This creates the dependency graph automatically and keeps each child focused and reusable. The root re-exports the outputs callers care about. Keep business logic in children; keep the root declarative and readable.</p>
<div class='tip'><b>Anti-pattern to avoid:</b> deeply nested module trees (modules calling modules calling modules) become hard to trace and slow to plan. Favor a flat-ish composition — a root composing a handful of well-bounded children — over deep hierarchies.</div>`
  },
  {
    n:57, tag:'perf',
    q:'What is the dependency lock file (.terraform.lock.hcl) and how do you manage it?',
    body:`<p>The lock file pins exact provider versions and their checksums so every run and every teammate uses identical providers — reproducibility and supply-chain integrity.</p>
<div class='section-title'>Lock file management</div>
<div class='cmd-list'>
  <div class='cmd'>terraform init                      # creates/updates .terraform.lock.hcl</div>
  <div class='cmd'>terraform providers lock -platform=linux_amd64 -platform=darwin_arm64  # multi-platform hashes</div>
  <div class='cmd'>terraform init -upgrade             # update providers within constraints + refresh lock</div>
  <div class='cmd'># COMMIT .terraform.lock.hcl to version control</div>
</div>
<p><code>.terraform.lock.hcl</code> records the selected provider versions and cryptographic checksums. <b>Commit it</b> so CI and every developer resolve to the exact same providers — otherwise a teammate could silently pull a newer provider with behavior changes. Add multi-platform hashes with <code>terraform providers lock</code> when developers and CI run on different OS/arch (e.g. Mac ARM laptops, Linux CI), or init fails on a missing checksum. Upgrade deliberately with <code>-upgrade</code> and review the diff.</p>
<div class='good'><b>Supply-chain angle:</b> the checksums defend against a tampered/substituted provider binary. Committing the lock file is both a reproducibility and a security control — frame it that way. Treat lock-file bumps as reviewable PRs like any dependency upgrade.</div>`
  },
  {
    n:58, tag:'modules',
    q:'How do you handle conditional resource creation and optional features in a module?',
    body:`<p>Modules often need to toggle resources on/off or vary behavior by input. The idiomatic tools are count-as-toggle, for_each over conditional collections, and optional object attributes.</p>
<div class='section-title'>Conditional patterns</div>
<div class='cmd-list'>
  <div class='cmd'># On/off toggle with count:</div>
  <div class='cmd'>resource "aws_nat_gateway" "this" { count = var.enable_nat ? 1 : 0 }</div>
  <div class='cmd'># Conditional set membership with for_each:</div>
  <div class='cmd'>for_each = var.create ? toset(var.names) : toset([])</div>
  <div class='cmd'># Optional attributes with defaults (object type):</div>
  <div class='cmd'>variable "cfg" { type = object({ size = optional(string, "small") }) }</div>
  <div class='cmd'># Reference a count=0/1 resource safely:</div>
  <div class='cmd'>value = var.enable_nat ? aws_nat_gateway.this[0].id : null</div>
</div>
<p>Use <code>count = condition ? 1 : 0</code> for a simple on/off resource, and <code>for_each</code> over a conditionally-empty collection for variable sets. The <code>optional()</code> modifier in object types gives flexible inputs with defaults. Be careful referencing conditional resources: a <code>count</code>-gated resource must be indexed (<code>[0]</code>) and guarded so you do not dereference it when it does not exist.</p>
<div class='warn'><b>The footgun:</b> referencing <code>aws_nat_gateway.this[0].id</code> when <code>count</code> is 0 errors. Always guard with the same condition (<code>var.enable_nat ? ...[0].id : null</code>). Overusing conditionals also makes modules hard to reason about — sometimes two clear modules beat one conditional-laden one.</div>`
  },
  {
    n:59, tag:'perf',
    q:'How do you reduce the number of provider/API calls and avoid hitting rate limits?',
    body:`<p>Excessive data sources, oversized state, and high parallelism drive API call volume. Reducing calls speeds plans and avoids throttling.</p>
<div class='section-title'>Reducing API pressure</div>
<div class='cmd-list'>
  <div class='cmd'>Minimize data sources that query on EVERY plan (cache values in SSM/locals instead)</div>
  <div class='cmd'>Split state so each plan refreshes fewer resources</div>
  <div class='cmd'>Lower -parallelism when the provider throttles</div>
  <div class='cmd'>Use -refresh=false for fast iterative plans (when drift is unlikely)</div>
  <div class='cmd'>-target during iteration to avoid refreshing the whole graph</div>
</div>
<p>Every <code>data</code> source and every managed resource is refreshed/queried on plan. The big reductions come from <b>fewer resources per state</b> (segmentation) and <b>fewer expensive data sources</b> (publish stable values to SSM/Parameter Store once rather than querying the API on every plan). When you do hit limits, lowering parallelism and using <code>-refresh=false</code>/<code>-target</code> for iteration reduces call bursts.</p>
<div class='tip'><b>Provider-specific:</b> some providers support request caching or have known rate limits; check provider docs and cloud quotas. Persistent throttling on a huge config is a signal to segment state, not just to retry harder.</div>`
  },
  {
    n:60, tag:'modules',
    q:'Explain locals, variables, and outputs — and the right use of each.',
    body:`<p>These are the three data primitives of a configuration. Confusing their roles leads to messy, hard-to-maintain code.</p>
<div class='section-title'>Roles</div>
<div class='cmd-list'>
  <div class='cmd'>variable : INPUT to a module/config (set by caller, CLI, tfvars, env)</div>
  <div class='cmd'>local    : computed/intermediate value, DRY within a module (not an input)</div>
  <div class='cmd'>output   : value EXPOSED to the caller or other configs</div>
  <div class='cmd'>locals { name_prefix = "\${var.project}-\${var.env}" }</div>
  <div class='cmd'>output "vpc_id" { value = aws_vpc.main.id }</div>
</div>
<p><b>Variables</b> are the module’s inputs — the knobs callers turn. <b>Locals</b> are internal computed values used to avoid repetition and to name things consistently (e.g. a derived name prefix or a merged tag map); they are not settable from outside. <b>Outputs</b> publish values for other modules or the root to consume. A clean module reads inputs (variables), derives internals (locals), provisions resources, and publishes results (outputs).</p>
<div class='tip'><b>Common smell:</b> using a variable with a default as a “constant” that callers should never set — that should be a <code>local</code>. And overusing locals for trivial one-off values adds indirection. Match the primitive to the role: caller-facing → variable/output, internal → local.</div>`
  },
  {
    n:61, tag:'perf',
    q:'What is -target and why is it considered a code smell in routine use?',
    body:`<p><code>-target</code> limits an operation to specific resources and their dependencies. It is a legitimate recovery/iteration tool but a warning sign when used routinely.</p>
<div class='section-title'>Targeted operations</div>
<div class='cmd-list'>
  <div class='cmd'>terraform apply -target=aws_instance.web        # apply only this + its deps</div>
  <div class='cmd'>terraform plan -target=module.network           # scope to a module</div>
  <div class='cmd'>terraform apply -replace=aws_instance.web        # targeted replacement</div>
</div>
<p>Targeting is appropriate for <b>recovery</b> (apply just the resource that failed mid-run) and <b>iteration speed</b> on a huge config while developing. But routine reliance on <code>-target</code> means your normal plan/apply is unmanageable — usually a sign the state is too big (should be split) or the config has hidden coupling. Targeting also skips parts of the graph, so it can apply an inconsistent partial change that a full apply would have ordered differently.</p>
<div class='warn'><b>Why it is a smell:</b> a healthy config can run a full <code>plan</code>/<code>apply</code> routinely. Constant targeting hides a structural problem (monolithic state, slow refresh). The fix is state segmentation, not normalizing <code>-target</code>. HashiCorp explicitly warns it is for exceptional use.</div>`
  },
  {
    n:62, tag:'modules',
    q:'How do you test Terraform modules? Walk through the testing pyramid.',
    body:`<p>Terraform testing spans static checks, unit-ish plan assertions, and integration tests that actually provision. A layered approach catches different failure classes cheaply.</p>
<div class='section-title'>Testing layers</div>
<div class='cmd-list'>
  <div class='cmd'>Static : terraform validate, fmt, tflint, checkov/tfsec (security)</div>
  <div class='cmd'>Native test framework (1.6+): tests in .tftest.hcl with assert blocks</div>
  <div class='cmd'>  run "plan" { command = plan  assert { condition=...  error_message=... } }</div>
  <div class='cmd'>Integration : Terratest (Go) — apply to a real sandbox, assert, destroy</div>
  <div class='cmd'>Policy : OPA/Conftest or Sentinel against the plan JSON</div>
</div>
<p>Bottom of the pyramid (cheap, fast, run on every PR): <code>validate</code>, <code>fmt</code>, <code>tflint</code>, and security scanners (checkov/tfsec). The middle: Terraform’s <b>native test framework</b> (1.6+) with <code>.tftest.hcl</code> files asserting on plan/apply outputs without leaving Terraform. The top (slow, expensive, fewer): <b>Terratest</b> spins up real resources in a sandbox account, asserts they work, and tears them down — catching issues only visible against real APIs. Policy-as-code gates compliance against the plan.</p>
<div class='good'><b>Modern emphasis:</b> the native <code>terraform test</code> framework (1.6+) reduced the need to reach straight for Terratest — mention it. Pyramid logic applies: many cheap static/plan tests, few expensive apply-and-verify tests.</div>`
  },
  {
    n:63, tag:'perf',
    q:'How do you handle Terraform with thousands of resources without applies becoming unmanageable?',
    body:`<p>At thousands of resources, monolithic state makes plans slow, applies risky, and locks painful. The answer is architectural decomposition plus orchestration tooling.</p>
<div class='section-title'>Scaling strategies</div>
<div class='cmd-list'>
  <div class='cmd'>Decompose state by layer (network/data/compute) and by service/team</div>
  <div class='cmd'>Cross-layer references via SSM/data sources, not giant shared state</div>
  <div class='cmd'>Orchestrate ordering with Terragrunt (dependencies) or pipelines</div>
  <div class='cmd'>Per-state CI plan/apply so blast radius and runtime stay bounded</div>
  <div class='cmd'>Use -refresh=false strategically + periodic drift checks per state</div>
</div>
<p>The core move is <b>state segmentation</b>: many small, independently-applied states instead of one monolith. Each state plans fast, has bounded blast radius, and can be owned by one team. Cross-state data flows through loosely-coupled mechanisms (SSM, provider data sources). Orchestration tools (Terragrunt for DRY config + dependency ordering, or a pipeline that sequences states) manage the inter-state ordering that segmentation introduces.</p>
<div class='tip'><b>Trade-off to name:</b> segmentation buys speed, isolation, and ownership at the cost of orchestration complexity (ordering, more backends, more remote-state plumbing). The skill is segmenting along genuine ownership/change-rate boundaries, not arbitrarily — that judgment is the staff-level signal.</div>`
  },
  {
    n:64, tag:'modules',
    q:'What are provider aliases and how do you manage multi-region or multi-account providers in modules?',
    body:`<p>Provider aliases let one configuration use multiple instances of the same provider — different regions or accounts — and pass the right one to each module/resource.</p>
<div class='section-title'>Aliased providers</div>
<div class='cmd-list'>
  <div class='cmd'>provider "aws" { region = "us-east-1" }                 # default</div>
  <div class='cmd'>provider "aws" { alias = "eu"  region = "eu-west-1" }</div>
  <div class='cmd'>resource "aws_s3_bucket" "eu" { provider = aws.eu }</div>
  <div class='cmd'># Passing aliased providers INTO a module:</div>
  <div class='cmd'>module "replica" { source="./m"  providers = { aws = aws.eu } }</div>
  <div class='cmd'># Module declares it needs a provider via required_providers/configuration_aliases</div>
</div>
<p>Define multiple provider blocks with <code>alias</code>, then assign <code>provider = aws.eu</code> on resources or pass providers into modules via the <code>providers</code> argument. This is how you build multi-region replication or multi-account deployments in one config. Modules that need a specific aliased provider declare it (via <code>configuration_aliases</code>) so callers must supply it explicitly.</p>
<div class='warn'><b>Footgun:</b> a module should generally NOT define its own provider blocks — that breaks reusability and complicates destroy. Pass providers in from the root via <code>providers = {}</code>. Self-contained provider config inside modules is a known anti-pattern that causes “provider configuration not present” errors on removal.</div>`
  },
  {
    n:65, tag:'modules',
    q:'Explain the difference between terraform.tfvars, *.auto.tfvars, env vars, and -var precedence.',
    body:`<p>Terraform sources variable values from several places with a defined precedence. Knowing the order prevents “why is my value being ignored?” confusion.</p>
<div class='section-title'>Precedence (later overrides earlier)</div>
<div class='cmd-list'>
  <div class='cmd'>1. Environment variables (TF_VAR_name)</div>
  <div class='cmd'>2. terraform.tfvars</div>
  <div class='cmd'>3. terraform.tfvars.json</div>
  <div class='cmd'>4. *.auto.tfvars / *.auto.tfvars.json (alphabetical order)</div>
  <div class='cmd'>5. -var and -var-file on the CLI (highest precedence)</div>
</div>
<p>Values are applied in increasing precedence: env vars (<code>TF_VAR_</code>) first, then <code>terraform.tfvars</code>, then auto-loaded <code>*.auto.tfvars</code> (alphabetical), and finally explicit <code>-var</code>/<code>-var-file</code> flags win over everything. Variable <b>defaults</b> apply only when no source sets the value. <code>*.auto.tfvars</code> is loaded automatically (handy for environment-specific files); a plain <code>secret.tfvars</code> requires explicit <code>-var-file</code>.</p>
<div class='tip'><b>Practical use:</b> commit non-secret <code>*.auto.tfvars</code> per environment for auto-loading; pass secrets via <code>TF_VAR_</code> env vars or a <code>-var-file</code> that is not in the repo. Knowing the precedence order is a common quick-fire interview check.</div>`
  },
  {
    n:66, tag:'perf',
    q:'What is terraform graph and how do you use it to debug or optimize a configuration?',
    body:`<p><code>terraform graph</code> emits the dependency DAG in DOT format, letting you visualize and analyze resource relationships — useful for debugging ordering and spotting unnecessary coupling.</p>
<div class='section-title'>Graph inspection</div>
<div class='cmd-list'>
  <div class='cmd'>terraform graph | dot -Tpng &gt; graph.png      # render the dependency graph</div>
  <div class='cmd'>terraform graph -type=plan                    # graph for a specific operation</div>
  <div class='cmd'># Look for: unexpected edges (hidden coupling), long dependency chains,</div>
  <div class='cmd'>#           resources that should be parallel but are serialized</div>
</div>
<p>The graph reveals why Terraform orders things the way it does. Debugging uses: spotting an <b>unexpected dependency</b> (often an overzealous <code>depends_on</code> serializing work that could be parallel), confirming a resource depends on what you think, or understanding why a change ripples. Optimization uses: long serial chains or excessive cross-edges indicate coupling you can break (e.g. removing unnecessary <code>depends_on</code> or splitting state) to increase parallelism and reduce blast radius.</p>
<div class='tip'><b>When it earns its keep:</b> on a confusing “why is this being recreated / why does apply order surprise me” problem, visualizing the graph often makes the hidden edge obvious. Pair with removing needless <code>depends_on</code> to restore parallelism.</div>`
  },
{
    n:67, tag:'cicd',
    q:'How do you structure a Terraform CI/CD pipeline with plan and apply stages?',
    body:`<p>A safe Terraform pipeline separates <b>plan</b> (read-only, on PR) from <b>apply</b> (mutating, gated on merge), so changes are reviewed as a concrete diff before touching infrastructure.</p>
<div class='section-title'>Pipeline stages</div>
<div class='cmd-list'>
  <div class='cmd'>terraform fmt -check         # fail on unformatted code</div>
  <div class='cmd'>terraform validate           # syntax + internal consistency</div>
  <div class='cmd'>terraform plan -out=tfplan   # on PR: produce a saved plan artifact</div>
  <div class='cmd'># post the plan as a PR comment for review (Atlantis / tf-cloud / custom)</div>
  <div class='cmd'>terraform apply tfplan       # on merge: apply the EXACT reviewed plan</div>
</div>
<p>Saving the plan to a file (<code>-out=tfplan</code>) and applying that exact artifact is the key safety property: it guarantees you apply what was reviewed, not a freshly-recomputed plan that may have drifted. The PR shows the diff; merge triggers apply of the approved plan.</p>
<div class='tip'><b>Interview tip:</b> emphasize plan-on-PR / apply-on-merge with a saved plan artifact, plus required approvals for production. Atlantis and Terraform Cloud/Enterprise provide this orchestration out of the box; many teams also build it on GitHub Actions/GitLab CI.</div>`
  },
  {
    n:68, tag:'cicd',
    q:'Why should you apply a saved plan file rather than re-running plan during apply?',
    body:`<p>Running a bare <code>terraform apply</code> recomputes the plan at apply time against current state — which may differ from what the reviewer saw. Applying a saved plan eliminates that gap.</p>
<div class='cmd-list'>
  <div class='cmd'>terraform plan -out=tfplan    # capture the reviewed plan</div>
  <div class='cmd'>terraform apply tfplan        # apply EXACTLY that, no recompute</div>
  <div class='cmd'># vs the unsafe pattern:</div>
  <div class='cmd'>terraform apply -auto-approve # recomputes; could apply unexpected changes</div>
</div>
<p>Between review and apply, someone might change a resource manually (drift), another pipeline might alter shared state, or a data source might return new values. A bare apply would silently incorporate those into a new plan. Applying the saved plan file makes the operation deterministic and auditable: the bytes you reviewed are the bytes you apply.</p>
<div class='danger-tip'><b>Production rule:</b> never <code>-auto-approve</code> a freshly-computed plan in prod. Either apply a saved, reviewed plan, or require a human to inspect the apply-time plan before confirming.</div>`
  },
  {
    n:69, tag:'cicd',
    q:'How do you manage Terraform across multiple environments (dev/staging/prod) in CI/CD?',
    body:`<p>The two dominant patterns are <b>directory-per-environment</b> and <b>workspaces</b>. Directory-per-environment is generally preferred for production isolation.</p>
<div class='section-title'>Directory-per-environment (recommended)</div>
<div class='cmd-list'>
  <div class='cmd'>environments/dev/main.tf      # own backend key, own tfvars</div>
  <div class='cmd'>environments/staging/main.tf</div>
  <div class='cmd'>environments/prod/main.tf</div>
  <div class='cmd'># shared logic lives in ../../modules/, called by each env</div>
</div>
<div class='section-title'>Workspaces (use with care)</div>
<div class='cmd-list'>
  <div class='cmd'>terraform workspace new staging</div>
  <div class='cmd'>terraform workspace select prod</div>
  <div class='cmd'># same backend key prefix; differentiate via terraform.workspace</div>
</div>
<p>Directory-per-environment gives each env its own state file, backend config, and variable values — strong isolation, and a blast-radius boundary (a bad dev apply cannot touch prod state). Workspaces share one configuration and backend, which is lighter but risks cross-environment mistakes and makes per-env backend differences awkward. For production, most teams choose separate directories (or separate root modules) and wire the env into the pipeline.</p>
<div class='tip'><b>Interview tip:</b> state the trade-off explicitly — workspaces are convenient for ephemeral/similar environments, but directory-per-environment is safer for prod because of isolated state and independent backends. Avoid using workspaces as the <i>only</i> separation between dev and prod.</div>`
  },
  {
    n:70, tag:'cicd',
    q:'How do you run Terraform plan automatically on pull requests and surface the diff?',
    body:`<p>Automating plan-on-PR turns infrastructure changes into reviewable diffs, the same way code review works for application code.</p>
<div class='cmd-list'>
  <div class='cmd'># In CI (GitHub Actions example flow):</div>
  <div class='cmd'>terraform init -input=false</div>
  <div class='cmd'>terraform plan -no-color -out=tfplan</div>
  <div class='cmd'>terraform show -no-color tfplan &gt; plan.txt   # human-readable</div>
  <div class='cmd'># post plan.txt as a PR comment via the platform API or a tool</div>
</div>
<p>Tools like <b>Atlantis</b> and <b>Terraform Cloud</b> do this natively: they detect the PR, run plan, and comment the diff directly on the PR, then let an approver trigger apply with a comment (e.g. <code>atlantis apply</code>). On bare CI you replicate it: run plan, render with <code>terraform show</code>, and post it back. The reviewer evaluates the concrete resource changes, not just the HCL.</p>
<div class='tip'><b>Interview tip:</b> the value is that reviewers see the <i>effect</i> (resources to add/change/destroy), not just the source change. Highlight that a "+/- destroy" in a plan comment is exactly the signal that catches dangerous changes before merge.</div>`
  },
  {
    n:71, tag:'cicd',
    q:'A Terraform apply failed halfway through in CI. What is the state, and how do you recover?',
    body:`<p>Terraform applies resources incrementally and records each success in state as it goes. A mid-apply failure leaves a <b>partial</b> apply: some resources created and tracked, others not.</p>
<div class='section-title'>Recovery</div>
<div class='cmd-list'>
  <div class='cmd'>terraform plan               # shows what's left to do (already-created resources are in state)</div>
  <div class='cmd'># fix the cause of the failure (quota, permission, dependency, provider bug)</div>
  <div class='cmd'>terraform apply              # continues from where it stopped; idempotent</div>
  <div class='cmd'>terraform state list         # confirm what's tracked</div>
  <div class='cmd'># if a resource was created but NOT recorded (rare), import it:</div>
  <div class='cmd'>terraform import &lt;addr&gt; &lt;id&gt;</div>
</div>
<p>Because Terraform writes state as each resource completes, re-running <code>plan</code> after fixing the root cause shows only the remaining work — it will not recreate what already succeeded. The dangerous edge case is a resource that was created in the cloud but whose state write failed (e.g. lock/network issue at the wrong moment): then plan wants to create it again and you may hit "already exists." Resolve by importing it into state.</p>
<div class='danger-tip'><b>Locking matters here:</b> ensure state locking (DynamoDB/GCS) is enabled so a failed CI run does not leave a dangling lock blocking the retry. <code>terraform force-unlock &lt;lock-id&gt;</code> clears a stuck lock — use only after confirming no apply is actually running.</div>`
  },
  {
    n:72, tag:'cicd',
    q:'How do you handle Terraform provider and module version pinning in a team?',
    body:`<p>Unpinned versions cause "works on my machine" drift and surprise breakages when a new provider/module release ships. Pin deterministically and commit the lock file.</p>
<div class='cmd-list'>
  <div class='cmd'>terraform {</div>
  <div class='cmd'>  required_version = "~&gt; 1.7"</div>
  <div class='cmd'>  required_providers {</div>
  <div class='cmd'>    aws = { source = "hashicorp/aws", version = "~&gt; 5.40" }</div>
  <div class='cmd'>  }</div>
  <div class='cmd'>}</div>
  <div class='cmd'>module "vpc" { source = "..."  version = "5.8.1" }   # pin modules exactly</div>
  <div class='cmd'># Commit .terraform.lock.hcl — it pins provider checksums across the team</div>
</div>
<p>Use <code>required_version</code> and <code>required_providers</code> with sensible constraints (<code>~&gt;</code> allows patch/minor but not breaking majors), pin registry <b>modules to exact versions</b>, and — critically — commit <code>.terraform.lock.hcl</code> so every developer and CI run resolves the same provider checksums. Upgrade deliberately via <code>terraform init -upgrade</code> in a reviewed PR.</p>
