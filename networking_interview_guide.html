{n:57,tag:'dns',q:'Explain DNS caching layers and negative caching. Why is a stale or cached failure so persistent?',body:`<p>DNS answers are cached at many layers, each with its own TTL handling — which is why both good and bad answers can stick around far longer than expected.</p>
<div class='sec'>The caching layers</div>
<div class='cmds'>
  <div class='cmd'>Application/runtime : e.g. JVM caches DNS (historically forever!), connection pools
OS resolver cache   : systemd-resolved / nscd / Windows DNS Client
Recursive resolver  : the big shared cache (8.8.8.8, corporate, NodeLocal DNSCache)
Authoritative TTL   : the value the zone owner sets per record</div>
</div>
<div class='sec'>Negative caching (caching the failure)</div>
<p>NXDOMAIN and SERVFAIL responses are cached too, governed by the SOA's minimum TTL. So after you create a record, a prior "does not exist" answer can linger — the record exists but clients still get NXDOMAIN until the negative cache expires.</p>
<div class='warn'><b>JVM gotcha:</b> Older JVMs cache successful lookups <i>forever</i> (<code>networkaddress.cache.ttl=-1</code>) — so a failover that changes an IP never takes effect for that JVM until restart. Set a finite <code>networkaddress.cache.ttl</code>. Connection pools that resolve once at startup have the same problem.</p>
<div class='tip'><b>Interview tip:</b> Two senior points: (1) negative caching means "I just created the record but it still says NXDOMAIN" is expected until the SOA negative TTL expires; (2) application-level DNS caching (especially the JVM) defeats DNS-based failover — the app keeps hitting the dead IP. The fix is finite caching TTLs and re-resolving on connection errors.</div>`},
{n:58,tag:'troubleshoot',q:'\'DNS works for some names but not others.\' Walk through how you isolate the cause.',body:`<p>Selective DNS failure points to a specific zone, resolver, or record rather than total DNS breakage. Bisect systematically.</p>
<div class='sec'>1. Compare a working vs failing name against the same resolver</div>
<div class='cmds'>
  <div class='cmd'>dig good.example.com       # works
dig bad.example.com        # fails — note the status (NXDOMAIN? SERVFAIL? timeout?)
# NXDOMAIN = record truly missing;  SERVFAIL = resolver/authoritative error;
# timeout = network/resolver reachability</div>
</div>
<div class='sec'>2. Bypass caches / try different resolvers</div>
<div class='cmds'>
  <div class='cmd'>dig bad.example.com @8.8.8.8      # public resolver
dig bad.example.com @&lt;internal-resolver&gt;
dig +trace bad.example.com        # find WHERE the delegation/answer breaks</div>
</div>
<div class='sec'>3. Common selective-failure causes</div>
<div class='cmds'>
  <div class='cmd'>- Split-horizon: internal zone missing the record the public zone has (or vice versa)
- One authoritative NS out of several is broken -> intermittent SERVFAIL
- search-domain / ndots: short name expands wrong (works as FQDN, fails as short)
- DNSSEC validation failure on one zone -> SERVFAIL only for that zone
- A specific subdomain delegated to a down nameserver</div>
</div>
<div class='tip'><b>Interview tip:</b> Lead with reading the response <i>status</i> — NXDOMAIN vs SERVFAIL vs timeout each points somewhere different. Then bisect by resolver (internal vs public) and use <code>dig +trace</code> to localize a broken delegation. Selective failure almost always means one zone/resolver/record, not "DNS is down" — saying that shows structured thinking.</div>`},
{n:59,tag:'dns',q:'What is DNSSEC and what does a SERVFAIL caused by validation failure look like?',body:`<p>DNSSEC cryptographically signs DNS records so resolvers can verify answers weren't forged (cache poisoning / spoofing). The cost is operational fragility.</p>
<div class='sec'>How it works</div>
<div class='cmds'>
  <div class='cmd'>- Each zone signs its records (RRSIG); publishes public key (DNSKEY)
- A chain of trust: parent zone holds a DS record hashing the child's key
- Validating resolver walks root -> TLD -> zone, checking signatures
- Tampered/unsigned-but-expected answer -> validation FAILS</div>
</div>
<div class='sec'>The failure mode</div>
<p>A DNSSEC validation failure returns <b>SERVFAIL</b> to validating resolvers (not NXDOMAIN) — the name may resolve fine on non-validating resolvers, so it's intermittent depending on which resolver a client uses.</p>
<div class='cmds'>
  <div class='cmd'>dig +dnssec example.com           # shows RRSIG records if signed
dig +cd example.com               # "checking disabled" — bypasses validation;
                                  # if +cd WORKS but normal FAILS -> DNSSEC issue</div>
</div>
<div class='warn'><b>Operational risk:</b> Expired signatures (RRSIG has a validity window — forget to re-sign and the whole zone goes SERVFAIL), a broken chain of trust (DS record not updated after a key rollover), or a registrar that mishandles DS records. DNSSEC outages take a domain fully dark for validating clients.</div>
<div class='tip'><b>Interview tip:</b> The diagnostic gem: DNSSEC failures = SERVFAIL on validating resolvers, and <code>dig +cd</code> (checking disabled) succeeding while a normal query fails confirms it. Stress the operational fragility — expired RRSIGs and botched key rollovers cause real outages — which is why some orgs weigh DNSSEC's benefit against its blast radius.</div>`},
{n:60,tag:'dns',q:'Compare DNS over UDP/TCP, DNS over TLS (DoT), and DNS over HTTPS (DoH). Operational impact?',body:`<p>Classic DNS is plaintext UDP (with TCP fallback); DoT and DoH add encryption, which changes privacy, security, and your ability to observe/control DNS.</p>
<div class='sec'>The transports</div>
<div class='cmds'>
  <div class='cmd'>UDP/53  : default; fast, but truncated large answers fall back to TCP/53
TCP/53  : used for big responses (DNSSEC, zone transfers) + when UDP truncates
DoT     : DNS over TLS on port 853 — encrypted, on a dedicated port (visible as DNS)
DoH     : DNS over HTTPS on 443 — encrypted AND blended with web traffic (hard to see)</div>
</div>
<div class='sec'>Operational impact</div>
<div class='cmds'>
  <div class='cmd'>+ Privacy/integrity: queries can't be sniffed or trivially tampered
- Visibility loss: DoH on 443 bypasses your DNS-based monitoring/filtering
- Browsers shipping DoH can ignore your corporate/NodeLocal resolver entirely
- Harder to enforce split-horizon / internal resolution if clients use external DoH</div>
</div>
<div class='warn'><b>Gotcha:</b> A browser or app silently using public DoH can break internal name resolution (it skips your private resolver/split-horizon) and evade security DNS filtering — "works on my phone's data, fails on corp wifi" or vice versa. Enterprises often disable client DoH or point it at an internal DoH endpoint.</div>
<div class='tip'><b>Interview tip:</b> The trade-off is privacy vs control/observability: DoT is encrypted but still identifiable on 853 (you can manage it); DoH on 443 is deliberately indistinguishable from HTTPS, which is great for user privacy but breaks enterprise DNS visibility, filtering, and split-horizon. Knowing why DoH specifically complicates ops is the senior point.</div>`},
{n:61,tag:'tcp',q:'Walk through the TCP three-way handshake and connection teardown. What are TIME_WAIT and CLOSE_WAIT?',body:`<p>TCP establishes a connection in three steps and tears it down in four. The lingering states (TIME_WAIT, CLOSE_WAIT) are common sources of confusion and production issues.</p>
<div class='sec'>Handshake + teardown</div>
<div class='cmds'>
  <div class='cmd'>OPEN:  SYN ->  | <- SYN-ACK | ACK ->          (3-way)
CLOSE: FIN -> | <- ACK | <- FIN | ACK ->        (4-way, each side closes)</div>
</div>
<div class='sec'>TIME_WAIT (the active closer)</div>
<p>The side that closes first sits in TIME_WAIT for ~2*MSL (often 60s) to absorb stray delayed packets and ensure the final ACK arrived. Many TIME_WAIT sockets is <b>normal</b> on a busy client/proxy, but can exhaust local ports if it initiates huge numbers of short connections.</p>
<div class='sec'>CLOSE_WAIT (the bug signal)</div>
<div class='cmds'>
  <div class='cmd'># CLOSE_WAIT = the OTHER side sent FIN, but YOUR app hasn't called close().
# Piling-up CLOSE_WAIT sockets = an APPLICATION BUG (leaked sockets / fds).
ss -tan state close-wait | wc -l     # if this grows, your app isn't closing conns</div>
</div>
<div class='warn'><b>Key distinction:</b> Lots of TIME_WAIT is usually fine (it's the kernel doing its job); lots of CLOSE_WAIT is almost always your application failing to close sockets — leading to file-descriptor exhaustion and eventual "too many open files".</div>
<div class='tip'><b>Interview tip:</b> Nail the distinction: TIME_WAIT is on the active closer and self-clears (tune with reuse, not the dangerous <code>tcp_tw_recycle</code>); CLOSE_WAIT growth means the app isn't closing connections — a code bug, not a tuning knob. Saying that confidently separates people who've debugged this from those who haven't.</div>`},
{n:62,tag:'tcp',q:'What is ephemeral port exhaustion and how do you diagnose and fix it?',body:`<p>Every outbound connection consumes a local source port from the ephemeral range. A host making many connections to the same destination can run out.</p>
<div class='sec'>The mechanism</div>
<div class='cmds'>
  <div class='cmd'># A connection is uniquely keyed by the 4-tuple:
#   (src IP, src PORT, dst IP, dst PORT)
# To ONE dst IP:port, you have only ~28k-64k source ports available.
cat /proc/sys/net/ipv4/ip_local_port_range   # the ephemeral range</div>
</div>
<div class='sec'>Symptoms + diagnosis</div>
<div class='cmds'>
  <div class='cmd'>- "Cannot assign requested address" (EADDRNOTAVAIL) on connect()
- Bursts of failures when connecting to one backend/DB/proxy
ss -s                            # summary of socket states
ss -tan | grep TIME-WAIT | wc -l # often TIME_WAIT eating the ports</div>
</div>
<div class='sec'>Fixes</div>
<div class='cmds'>
  <div class='cmd'>- Connection POOLING / keep-alive (reuse connections — the real fix)
- Widen ip_local_port_range
- net.ipv4.tcp_tw_reuse=1 (safely reuse TIME_WAIT for new OUTbound conns)
- Spread load across more destination IPs/ports (more 4-tuples)</div>
</div>
<div class='warn'><b>Gotcha:</b> The limit is <b>per destination</b> 4-tuple, so a service hammering a single DB or downstream IP exhausts ports long before the host is "busy." Don't reach for the deprecated/dangerous <code>tcp_tw_recycle</code> (removed in modern kernels, breaks behind NAT).</div>
<div class='tip'><b>Interview tip:</b> The headline fix is connection pooling — reuse instead of churn. The 4-tuple insight (per-destination limit) explains why "the host isn't even busy" yet connections fail. Cite <code>tcp_tw_reuse</code> (safe, outbound) and explicitly warn against <code>tcp_tw_recycle</code> — that distinction is a senior tell.</div>`},
{n:63,tag:'tcp',q:'Explain TCP keep-alive vs HTTP keep-alive, and how load balancer idle timeouts cause errors.',body:`<p>Two different "keep-alive" mechanisms at different layers — confusing them leads to mysterious connection-reset errors behind load balancers.</p>
<div class='sec'>The two keep-alives</div>
<div class='cmds'>
  <div class='cmd'>TCP keep-alive : kernel probes to detect a DEAD peer on an idle connection
                 (default ~2hrs — too slow to be useful by default)
HTTP keep-alive: REUSE one TCP connection for multiple HTTP requests
                 (avoids handshake per request) — an app/L7 concept</div>
</div>
<div class='sec'>The LB idle-timeout trap</div>
<div class='cmds'>
  <div class='cmd'># LB silently drops a connection idle longer than its idle timeout (e.g. 60s).
# Client thinks the (pooled, kept-alive) connection is still good, reuses it,
# and gets a RST / "connection reset by peer" or 502 on the next request.</div>
</div>
<p>This hits long-lived pools, databases behind an LB, and idle HTTP keep-alive connections.</p>
<div class='warn'><b>The fix — order the timeouts:</b> client/app idle timeout &lt; LB idle timeout &lt; backend idle timeout. If the client's keep-alive idle is shorter than the LB's, the client recycles the connection before the LB kills it, avoiding the reset. Also enable TCP keep-alive on long-lived/pooled connections so dead ones are detected.</div>
<div class='tip'><b>Interview tip:</b> The senior insight is the <b>timeout ordering</b>: most "random 502/connection reset behind the ALB" issues come from the app's connection-pool idle timeout being longer than the LB's idle timeout. Set the client idle below the LB idle. This is one of the most common real cloud bugs.</div>`},
{n:64,tag:'tcp',q:'What is head-of-line blocking? How do HTTP/1.1, HTTP/2, and HTTP/3 (QUIC) address it?',body:`<p>Head-of-line (HOL) blocking is when one stuck item delays everything queued behind it. It appears at both the HTTP and TCP layers, and each protocol generation tackles a different layer.</p>
<div class='sec'>HTTP/1.1 — application-layer HOL</div>
<p>One request per connection at a time; a slow response blocks reuse. Browsers work around it by opening ~6 parallel connections per host (wasteful).</p>
<div class='sec'>HTTP/2 — multiplexing (fixes app-layer, not TCP)</div>
<div class='cmds'>
  <div class='cmd'># Many streams multiplexed over ONE TCP connection -> no app-layer HOL.
# BUT all streams share one TCP byte-stream: a single lost packet stalls
# ALL streams until retransmit -> TCP-layer HOL blocking remains.</div>
</div>
<div class='sec'>HTTP/3 — QUIC over UDP (fixes TCP-layer too)</div>
<div class='cmds'>
  <div class='cmd'># QUIC runs over UDP with independent streams: a lost packet only stalls
# ITS stream, not the others. Also: 0/1-RTT handshakes, connection migration
# (survives IP changes), TLS 1.3 built in.</div>
</div>
<div class='warn'><b>Gotcha:</b> HTTP/2's win is real for high-latency/many-object pages, but on a lossy network its single TCP connection can be <i>worse</i> than HTTP/1.1's parallel connections because one loss stalls every stream. That's exactly the gap HTTP/3 closes by moving to per-stream delivery over UDP.</div>
<div class='tip'><b>Interview tip:</b> The clean progression: HTTP/1.1 = app HOL (one-at-a-time), HTTP/2 = multiplex over one TCP (fixes app HOL, keeps TCP HOL), HTTP/3/QUIC = independent streams over UDP (fixes TCP HOL + faster handshakes + connection migration). Knowing that HTTP/2 still suffers TCP-layer HOL is the detail interviewers probe.</div>`},
{n:65,tag:'tcp',q:'Explain TCP congestion control and what BBR changes versus loss-based algorithms like CUBIC.',body:`<p>Congestion control governs how fast TCP sends to avoid overwhelming the network. The big shift is from loss-based to model-based algorithms.</p>
<div class='sec'>Loss-based (Reno/CUBIC — long the default)</div>
<div class='cmds'>
  <div class='cmd'># Ramp up until packet LOSS, then back off (loss = congestion signal).
# Slow start (exponential) -> congestion avoidance (linear) -> loss -> halve.
# Problem: treats ALL loss as congestion, and fills buffers (bufferbloat).</div>
</div>
<div class='sec'>BBR (model-based)</div>
<div class='cmds'>
  <div class='cmd'># Models the path's bottleneck BANDWIDTH and round-trip propagation time,
# paces sending to that estimate instead of waiting for loss.
# -> high throughput on lossy/long-haul links, less bufferbloat/latency.
sysctl net.ipv4.tcp_congestion_control     # see/set the algorithm</div>
</div>
<div class='sec'>Why it matters</div>
<p>On long-haul or lossy paths (mobile, cross-region, satellite), loss-based CUBIC under-performs because random (non-congestion) loss makes it back off needlessly. BBR keeps throughput high and latency low, which is why CDNs and cloud providers adopted it.</p>
<div class='tip'><b>Interview tip:</b> The crisp contrast: CUBIC infers congestion from loss (and bloats buffers); BBR builds a bandwidth/RTT model and paces to it, winning on high-BDP and lossy links. Mention bufferbloat and that enabling BBR is a common, low-risk throughput/latency win for cross-region or edge traffic — a practical optimization, not just theory.</div>`},
{n:66,tag:'tcp',q:'What are the SYN backlog and accept queue, and how do SYN cookies defend against SYN floods?',body:`<p>Inbound TCP connections pass through two kernel queues. Understanding them explains both SYN-flood attacks and "connection dropped under load" issues.</p>
<div class='sec'>The two queues</div>
<div class='cmds'>
  <div class='cmd'>SYN queue (incomplete): half-open conns awaiting the final ACK (after SYN-ACK)
                         sized by net.ipv4.tcp_max_syn_backlog
Accept queue (complete): fully established, waiting for the app to accept()
                         sized by min(somaxconn, app's listen() backlog)</div>
</div>
<div class='sec'>SYN flood + SYN cookies</div>
<div class='cmds'>
  <div class='cmd'># Attack: flood SYNs, never send the final ACK -> SYN queue fills ->
#         legit connections dropped.
# Defense: net.ipv4.tcp_syncookies=1 -> when the SYN queue is full, the kernel
#   encodes connection state into the SYN-ACK sequence number instead of
#   storing it. Validates the returned ACK -> no queue state needed.</div>
</div>
<div class='warn'><b>Accept-queue overflow:</b> If the app accept()s too slowly (event-loop blocked, thread starvation), the accept queue fills and the kernel drops/resets new connections even though SYNs succeed. <code>ss -ltn</code> shows Recv-Q (current) vs Send-Q (max) on listening sockets — a full Recv-Q means the app isn't accepting fast enough.</div>
<div class='tip'><b>Interview tip:</b> Two takeaways: SYN cookies defend the SYN queue against floods without storing per-connection state (at the cost of some TCP options); and a backed-up <b>accept queue</b> (slow app, low <code>somaxconn</code>/listen backlog) drops connections under load. Reading <code>ss -ltn</code> Recv-Q/Send-Q on a listener is the diagnostic.</div>`},
{n:67,tag:'routing',q:'How does a host decide where to send a packet? Explain the routing table and longest-prefix match.',body:`<p>Every packet's next hop is chosen by consulting the routing table and picking the most specific matching route — longest-prefix match.</p>
<div class='sec'>The routing table</div>
<div class='cmds'>
  <div class='cmd'>ip route                       # show the routing table
ip route get 8.8.8.8           # show exactly which route a dest would use
# Example:
# default via 10.0.0.1 dev eth0          (0.0.0.0/0 — catch-all)
# 10.0.0.0/24 dev eth0 proto kernel      (directly connected subnet)
# 10.0.5.0/24 via 10.0.0.9 dev eth0      (more specific route)</div>
</div>
<div class='sec'>Longest-prefix match</div>
<p>If multiple routes match a destination, the one with the <b>longest prefix</b> (most specific, largest /N) wins. A packet to <code>10.0.5.20</code> matches both <code>10.0.0.0/24</code>... no — it matches <code>10.0.5.0/24</code> (more specific) over the <code>default</code> route. The default route (<code>/0</code>) is the last resort.</p>
<div class='warn'><b>Gotcha:</b> Adding a more-specific route silently overrides a broader one — a stray <code>/32</code> or a VPN pushing routes can hijack traffic you expected to go elsewhere. <code>ip route get &lt;dst&gt;</code> is the definitive answer to "which path will this actually take," rather than eyeballing the table.</div>
<div class='tip'><b>Interview tip:</b> The two facts: longest-prefix-match (most specific wins) and the default route as catch-all. The killer tool is <code>ip route get &lt;ip&gt;</code> — it resolves the exact route + source IP + interface the kernel will use, ending arguments about "why is traffic going out the wrong interface." Great for debugging asymmetric routing and VPN route leaks.</div>`},
{n:68,tag:'routing',q:'Explain CIDR and subnetting. How do you size and avoid overlap in VPC design?',body:`<p>CIDR notation (<code>/N</code>) defines how many bits are the network prefix; the rest are host addresses. Subnet planning is a day-0 decision that's painful to undo.</p>
<div class='sec'>CIDR math</div>
<div class='cmds'>
  <div class='cmd'>/24 = 256 addresses (254 usable)      /16 = 65,536
/28 = 16 addresses (small subnet)     /8  = 16,777,216
# usable = 2^(32-N) minus reserved (network, broadcast, + cloud reserves a few)
# AWS reserves 5 IPs per subnet (.0 network, .1 router, .2 DNS, .3 future, .255 bcast)</div>
</div>
<div class='sec'>VPC sizing principles</div>
<div class='cmds'>
  <div class='cmd'>- Pick a large VPC CIDR (e.g. 10.0.0.0/16) with room to grow
- Carve subnets per AZ + tier (public/private/data) — leave gaps for expansion
- NEVER overlap CIDRs between VPCs/on-prem you intend to peer/VPN
  (overlapping ranges can't be routed/peered without NAT gymnastics)</div>
</div>
<div class='warn'><b>The cardinal sin:</b> Using the same range (e.g. everyone defaults to 10.0.0.0/16) across VPCs or with on-prem. You can't VPC-peer or VPN overlapping CIDRs — routing is ambiguous. Plan a global IP address scheme up front; resizing or re-IPing later is a major project.</div>
<div class='tip'><b>Interview tip:</b> Two senior points: (1) plan non-overlapping CIDRs across all VPCs/on-prem from the start because peering/VPN require unique ranges; (2) cloud reserves addresses per subnet (AWS: 5), and Kubernetes pod CIDRs consume real VPC IPs — so size generously. Mention that overlap forces ugly NAT workarounds, which is why address planning is a foundational architecture task.</div>`},
{n:69,tag:'routing',q:'What is asymmetric routing and why does it break stateful firewalls and load balancers?',body:`<p>Asymmetric routing is when the request and its reply take different network paths. It's fine for plain routing but breaks anything that tracks connection state.</p>
<div class='sec'>The problem</div>
<div class='cmds'>
  <div class='cmd'># Request:  client -> path A -> firewall A -> server
# Reply:    server -> path B -> firewall B -> client
# Firewall B never saw the SYN, so the reply looks like an unsolicited packet
#   -> dropped by the stateful firewall (no matching conntrack entry).</div>
</div>
<div class='sec'>Where it bites</div>
<div class='cmds'>
  <div class='cmd'>- Multiple egress paths / multi-homed hosts / dual NAT gateways
- Stateful firewalls or LBs in each path that must see BOTH directions
- Linux rp_filter (reverse-path filtering) dropping packets arriving on an
  interface the route table wouldn't have used to reach the source</div>
</div>
<div class='warn'><b>Gotcha:</b> Stateless routing tolerates asymmetry; stateful devices (firewalls, NAT, L4 LBs, conntrack) require seeing both directions on the same device. Symptoms: connections that establish but hang, or work intermittently depending on path. <code>rp_filter</code> can silently drop the asymmetric replies on multi-NIC hosts.</div>
<div class='tip'><b>Interview tip:</b> The crux: state requires symmetry. Fix by forcing both directions through the same stateful device (policy/source-based routing, sticky paths), syncing firewall state, or relaxing <code>rp_filter</code> to <code>loose</code> mode on multi-homed hosts. Recognizing that "it establishes then hangs with multiple gateways" smells like asymmetric routing is a strong signal.</div>`},
{n:70,tag:'routing',q:'What is BGP, and how do BGP issues cause large internet/cloud outages?',body:`<p>BGP is the protocol that routes between autonomous systems (the internet's backbone routing). It's trust-based, which makes misconfigurations and hijacks high-impact.</p>
<div class='sec'>What BGP does</div>
<div class='cmds'>
  <div class='cmd'>- Autonomous Systems (ASes) advertise which IP prefixes they can reach
- Neighbors choose best paths by policy + AS-path length
- It's the glue between ISPs, clouds, and large networks
- Largely trust-based historically: you believe what peers advertise</div>
</div>
<div class='sec'>How it causes outages</div>
<div class='cmds'>
  <div class='cmd'>- Route leak / fat-finger: an AS wrongly advertises prefixes it shouldn't
  -> traffic blackholes or detours globally (e.g. major provider self-outages)
- BGP hijack: a malicious/erroneous AS claims someone else's prefixes
  -> traffic redirected/intercepted
- Withdrawing your own routes by mistake -> your services vanish from the internet</div>
</div>
<div class='sec'>Mitigation: RPKI</div>
<p><b>RPKI</b> (Resource Public Key Infrastructure) cryptographically validates that an AS is authorized to announce a prefix (Route Origin Validation), reducing accidental leaks and hijacks. Adoption is growing but partial.</p>
<div class='tip'><b>Interview tip:</b> You won't run BGP as an app engineer, but understanding that a BGP misconfiguration can withdraw a provider's own routes (causing a global self-outage) or let someone hijack prefixes explains real headline incidents. Naming <b>RPKI / Route Origin Validation</b> as the defense shows you understand internet-scale routing risk — relevant when reasoning about provider dependencies and DR.</div>`},
{n:71,tag:'cloud',q:'Compare VPC peering, Transit Gateway, VPN, and Direct Connect. When use each?',body:`<p>These connect networks together; they differ in topology, scale, bandwidth, and whether traffic crosses the public internet.</p>
<div class='sec'>The options</div>
<div class='cmds'>
  <div class='cmd'>VPC Peering     : 1:1 private link between two VPCs; NOT transitive; simple/cheap
                  -> mesh of peerings gets unmanageable at scale (N^2)
Transit Gateway : hub-and-spoke router connecting MANY VPCs + on-prem; transitive
                  -> the scalable answer for many-VPC/multi-account networks
Site-to-Site VPN: encrypted tunnel over the PUBLIC internet to on-prem
                  -> quick, cheap, but internet-variable latency + bandwidth caps
Direct Connect  : DEDICATED private physical link to the cloud
                  -> consistent low latency, high bandwidth, no public internet</div>
</div>
<div class='sec'>Choosing</div>
<div class='cmds'>
  <div class='cmd'>Few VPCs, simple        -> VPC peering
Many VPCs / hub-spoke   -> Transit Gateway
On-prem, cheap/fast set  -> VPN
On-prem, performance/SLA -> Direct Connect (often + VPN as encrypted backup)</div>
</div>
<div class='warn'><b>Gotcha:</b> VPC peering is <b>non-transitive</b> — if A peers B and B peers C, A still can't reach C. People build sprawling peering meshes then hit this; Transit Gateway exists precisely to provide transitive hub-and-spoke routing. And remember: overlapping CIDRs can't peer at all.</div>
<div class='tip'><b>Interview tip:</b> The two senior points: peering is non-transitive (so it doesn't scale past a handful of VPCs — use Transit Gateway as the hub), and VPN vs Direct Connect is the internet-vs-dedicated trade-off (cost/speed-to-deploy vs consistent performance, often combined with VPN as encrypted backup over Direct Connect).</div>`},
{n:72,tag:'routing',q:'What is policy-based / source-based routing and when do you need it?',body:`<p>Normal routing decides by <i>destination</i> only. Policy-based routing (PBR) lets you route by source, mark, port, or other attributes using multiple routing tables.</p>
<div class='sec'>The mechanism (Linux)</div>
<div class='cmds'>
  <div class='cmd'>ip rule add from 10.0.5.0/24 table 100   # traffic FROM this source uses table 100
ip route add default via 10.0.5.1 table 100
ip rule list                              # show policy rules (consulted in order)
# Selectors: from (source), fwmark, iif, dport, etc. -> pick a routing table</div>
</div>
<div class='sec'>When you need it</div>
<div class='cmds'>
  <div class='cmd'>- Multi-homed host: replies must egress the SAME interface they arrived on
  (fixes the asymmetric-routing/rp_filter drop problem)
- Send specific subnets/apps over a VPN or a specific gateway
- Separate management vs data-plane traffic onto different links
- Multiple ISPs/egress paths with per-source policy</div>
</div>
<div class='warn'><b>Gotcha:</b> Without source-based routing on a dual-NIC host, replies to traffic that arrived on eth1 may try to leave via eth0's default route — asymmetric routing, and <code>rp_filter</code> then drops them. PBR pins the reply to the correct interface/table.</div>
<div class='tip'><b>Interview tip:</b> The canonical use is the multi-homed / dual-gateway host where you must reply out the interface a request came in on — exactly the fix for the asymmetric-routing problem from the routing section. <code>ip rule</code> + a dedicated routing table per source is the implementation. Recognizing when destination-only routing isn't enough is the signal.</div>`},
{n:73,tag:'troubleshoot',q:'How do you distinguish packet loss, latency, and jitter — and what does mtr tell you?',body:`<p>These three degrade connections differently, and conflating them sends you down the wrong debugging path. <code>mtr</code> exposes all three per hop.</p>
<div class='sec'>The three</div>
<div class='cmds'>
  <div class='cmd'>Latency : time for a packet to travel one way / round trip (RTT)
Packet loss : % of packets that never arrive (triggers TCP retransmits -> slow)
Jitter  : VARIATION in latency between packets (kills VoIP, video, real-time)</div>
</div>
<div class='sec'>mtr — traceroute + ping per hop, continuously</div>
<div class='cmds'>
  <div class='cmd'>mtr -rwzbc 100 &lt;host&gt;      # 100 cycles, report mode, per-hop loss% + latency
# Read it: loss that STARTS at a hop and CONTINUES to the end = real loss there.
# Loss at ONE middle hop that DOESN'T continue = that router de-prioritizing ICMP
#   (cosmetic, not real loss) — a classic misread.</div>
</div>
<div class='warn'><b>Gotcha:</b> A single hop showing loss while later hops show none is almost always ICMP rate-limiting on that router, NOT a real problem — many people chase this phantom. Real loss <b>persists</b> from the offending hop through to the destination. Also: high RTT to a far region is physics (distance), not necessarily a fault.</div>
<div class='tip'><b>Interview tip:</b> Show you can read <code>mtr</code> correctly: loss must persist to the final hop to be real; transient mid-path loss is usually ICMP deprioritization. Match the symptom to the metric — retransmits/throughput issues = loss; slow-but-steady = latency; choppy real-time = jitter. That diagnostic precision is exactly what's being tested.</div>`},
{n:74,tag:'routing',q:'What is hairpinning / NAT loopback and why does an internal service fail to reach itself by public name?',body:`<p>Hairpinning is when traffic from inside a network goes out to a public endpoint and must "turn around" to come back to a host on the same network. Many setups don't support it.</p>
<div class='sec'>The scenario</div>
<div class='cmds'>
  <div class='cmd'># Internal client resolves api.example.com -> the PUBLIC LB IP
# Packet goes to the gateway/LB and must hairpin back to an internal backend
#   on the same network it came from.
# Many NAT gateways / LBs don't allow this loopback -> connection fails/times out.</div>
</div>
<div class='sec'>Why it fails + fixes</div>
<div class='cmds'>
  <div class='cmd'>- NAT device won't route a packet back out the interface it arrived on
- Source/dest on the same subnet confuses the NAT/security path
FIXES:
- Split-horizon DNS: internal clients resolve to the PRIVATE IP (no hairpin)
- An internal load balancer for internal traffic
- Enable NAT loopback/hairpinning on the gateway (if supported)</div>
</div>
<div class='warn'><b>Gotcha:</b> The tell is "works from outside, fails from inside" (or from the same host/subnet) when using the public hostname. It's not a DNS or app bug — it's the network refusing the U-turn. This is extremely common with containers calling their own service's public URL.</div>
<div class='tip'><b>Interview tip:</b> The clean fix ties back to split-horizon DNS — internal clients should resolve the name to the private endpoint so traffic never has to hairpin. Recognizing "external works, internal-to-itself fails" as NAT loopback (not DNS) demonstrates real network debugging, and the private-IP/internal-LB fix is the production-grade answer.</div>`},
{n:75,tag:'tcp',q:'What does \'connection reset by peer\' (RST) actually mean, and what are the common causes?',body:`<p>An RST is TCP's abrupt "this connection is over now" — unlike a graceful FIN. It signals one side tore down or rejected the connection unexpectedly.</p>
<div class='sec'>RST vs FIN</div>
<div class='cmds'>
  <div class='cmd'>FIN : graceful close ("I'm done sending") — normal teardown
RST : abort NOW — no graceful close; in-flight data may be lost
# Seen by the app as ECONNRESET / "connection reset by peer"</div>
</div>
<div class='sec'>Common causes</div>
<div class='cmds'>
  <div class='cmd'>- Sending to a socket the peer already closed (use-after-close)
- LB/firewall idle timeout killed the connection; you reused it (the LB trap)
- Backend crashed / OOMKilled / restarted mid-connection
- Connecting to a port with nothing listening (RST instead of timeout)
- A firewall configured to REJECT (RST) rather than DROP (silent)
- Backpempt: app calling close() with unread data (SO_LINGER) sends RST</div>
</div>
<div class='warn'><b>RST vs timeout distinction:</b> An RST is an <i>active</i> rejection (something replied "no") — port closed, app crashed, or firewall REJECT. A <i>timeout</i> is silence — wrong IP, DROP firewall, or network black hole. RST = someone said no; timeout = no one answered. That distinction alone narrows the cause dramatically.</div>
<div class='tip'><b>Interview tip:</b> Two strong moves: (1) RST = active rejection vs timeout = silence — immediately splits "reachable but refusing" from "unreachable"; (2) the most common production RST is the LB idle-timeout + connection-pool reuse pattern from the keep-alive question. Capturing with <code>tcpdump</code> to see who sent the RST (and when) pinpoints it.</div>`},
{n:76,tag:'http',q:'Walk through the full lifecycle of an HTTPS request from URL to rendered response.',body:`<p>A single HTTPS request touches DNS, TCP, TLS, and HTTP. Knowing each stage lets you attribute latency precisely.</p>
<div class='sec'>The stages</div>
<div class='cmds'>
  <div class='cmd'>1. DNS    : resolve hostname -> IP (may be cached at several layers)
2. TCP    : 3-way handshake to IP:443 (1 RTT)
3. TLS    : handshake — negotiate version/cipher, validate cert, key exchange
            (TLS 1.2 = 2 RTT, TLS 1.3 = 1 RTT, 0-RTT on resume)
4. HTTP   : send request; server processes; sends response
5. Transfer + render</div>
</div>
<div class='sec'>Attributing latency with curl</div>
<div class='cmds'>
  <div class='cmd'>curl -w "dns:%{time_namelookup} conn:%{time_connect} \\
tls:%{time_appconnect} ttfb:%{time_starttransfer} total:%{time_total}\\n" \\
  -o /dev/null -s https://example.com</div>
</div>
<p>This breaks the request into DNS, TCP connect, TLS, time-to-first-byte, and total — so you know <i>which</i> stage is slow.</p>
<div class='warn'><b>Reading it:</b> High <code>time_namelookup</code> = DNS; gap between connect and appconnect = TLS; high <code>time_starttransfer</code> after TLS = slow server (TTFB); high total but fast TTFB = large body / slow transfer. Each points to a different fix.</div>
<div class='tip'><b>Interview tip:</b> The <code>curl -w</code> timing breakdown is the single most useful HTTP-debugging trick — it turns "the site is slow" into "DNS is slow" or "TLS is slow" or "the server's TTFB is slow." Citing the per-phase timing variables shows you debug latency empirically, not by guessing.</div>`},
{n:77,tag:'http',q:'Explain the TLS 1.3 handshake and how it improves on TLS 1.2. What is 0-RTT and its risk?',body:`<p>TLS 1.3 streamlined the handshake for speed and removed legacy insecure options, cutting a round trip and enabling session resumption with zero round trips.</p>
<div class='sec'>1.2 vs 1.3 handshake</div>
<div class='cmds'>
  <div class='cmd'>TLS 1.2 : 2 round trips (ClientHello/ServerHello, then key exchange) before data
TLS 1.3 : 1 round trip — client sends key share in ClientHello; server responds
          with everything needed -> app data after 1 RTT
          Also: removed old ciphers/RSA key exchange, forward secrecy mandatory</div>
</div>
<div class='sec'>0-RTT resumption</div>
<div class='cmds'>
  <div class='cmd'># On a RESUMED connection, the client can send app data in the FIRST flight
# (0 round trips) using a pre-shared key from the prior session.
# Great for latency — but...</div>
</div>
<div class='warn'><b>0-RTT replay risk:</b> 0-RTT early data can be <b>replayed</b> by an attacker (it's sent before the handshake completes, so there's no freshness guarantee). Only use 0-RTT for idempotent, non-state-changing requests (e.g. a GET) — never for a POST that transfers money. Many servers restrict 0-RTT to safe methods for this reason.</div>
<div class='tip'><b>Interview tip:</b> Two points score well: TLS 1.3 cuts the handshake to 1 RTT (and 0-RTT on resume) while mandating forward secrecy and dropping weak ciphers; and 0-RTT's replay vulnerability means it's only safe for idempotent requests. Knowing the security caveat, not just the speed win, is the senior signal.</div>`},
{n:78,tag:'http',q:'How does TLS certificate validation work, and what is the \'missing intermediate certificate\' trap?',body:`<p>A client validates a server's certificate by building a chain of trust from the server's cert up to a trusted root CA. A broken chain causes confusing "works in browser, fails elsewhere" errors.</p>
<div class='sec'>The chain of trust</div>
<div class='cmds'>
  <div class='cmd'>Server (leaf) cert  -> signed by -> Intermediate CA -> signed by -> Root CA
# Client trusts the Root (in its trust store); must be able to build the full
# chain leaf -> intermediate(s) -> root to validate.</div>
</div>
<div class='sec'>The missing-intermediate trap</div>
<div class='cmds'>
  <div class='cmd'># The SERVER must send leaf + intermediate(s). If it sends only the leaf:
# - Browsers often still work (they cache/fetch intermediates, AIA chasing)
# - curl, Java, Go, mobile apps FAIL: "unable to get local issuer certificate"
openssl s_client -connect host:443 -showcerts   # inspect the chain the server sends</div>
</div>
<div class='warn'><b>Classic gotcha:</b> "It works in my browser but my service/curl/Java client gets a cert error." The server is sending an incomplete chain (missing intermediate); browsers paper over it via AIA fetching or cached intermediates, but strict clients don't. Fix: configure the server to present the full chain (fullchain.pem), not just the leaf.</div>
<div class='tip'><b>Interview tip:</b> The tell "browser works, programmatic client fails" almost always = missing intermediate cert. <code>openssl s_client -showcerts</code> reveals exactly what the server sends. The fix is serving the full chain. This is one of the most common real TLS misconfigurations and recognizing the asymmetry instantly is a strong signal.</div>`},
{n:79,tag:'http',q:'Explain the difference between 502, 503, and 504 errors. How do you debug each?',body:`<p>These 5xx errors come from a gateway/proxy/LB and each points to a distinct backend condition — knowing which narrows the cause immediately.</p>
<div class='sec'>The three</div>
<div class='cmds'>
  <div class='cmd'>502 Bad Gateway     : proxy got an INVALID/garbage response from the backend
                      (backend crashed mid-response, protocol mismatch, RST)
503 Service Unavailable : no healthy backend to send to (all failing health checks,
                      overloaded, or scaled to zero)
504 Gateway Timeout : backend accepted but didn't respond in time
                      (slow backend, deadlock, downstream dependency hang)</div>
</div>
<div class='sec'>Debugging each</div>
<div class='cmds'>
  <div class='cmd'>502 -> check backend logs for crashes/RST; protocol/keep-alive mismatch; OOMKills
503 -> check health checks + backend pool: are ANY targets healthy? scaled down?
504 -> check backend latency + its downstream calls (DB, API); raise/align timeouts
        or fix the slow dependency (don't just bump the timeout)</div>
</div>
<div class='warn'><b>Gotcha:</b> A 504 often masks a downstream problem — the backend is waiting on a slow DB/API. Bumping the gateway timeout hides the symptom; find the actual slow dependency. A 502 frequently traces to the LB-idle-timeout/keep-alive reset pattern (backend closed the pooled connection).</div>
<div class='tip'><b>Interview tip:</b> The crisp mapping: 502 = bad/garbage response (backend broke), 503 = no healthy backend (capacity/health), 504 = backend too slow (timeout). Tie 504 to chasing the downstream dependency rather than raising timeouts, and 502 to the connection-reset/keep-alive pattern — that connects this to the TCP section and shows systems thinking.</div>`},
{n:80,tag:'http',q:'Explain HTTP idempotency and safe methods. How do idempotency keys make retries safe?',body:`<p>Idempotency — the same request applied multiple times has the same effect as once — is the foundation of safe retries in distributed systems.</p>
<div class='sec'>Method semantics</div>
<div class='cmds'>
  <div class='cmd'>Safe (no side effects)     : GET, HEAD, OPTIONS
Idempotent (repeat = same)  : GET, PUT, DELETE  (PUT sets a value; repeating = same)
NOT idempotent              : POST (each call may create a new resource)</div>
</div>
<div class='sec'>Why it matters for retries</div>
<div class='cmds'>
  <div class='cmd'># A timeout is ambiguous: did the request succeed and the response get lost,
# or did it fail? Safe to retry an idempotent op; retrying a POST might
# double-charge / double-create.</div>
</div>
<div class='sec'>Idempotency keys</div>
<div class='cmds'>
  <div class='cmd'># Client sends a unique key with a POST:  Idempotency-Key: &lt;uuid&gt;
# Server records the key + result; a retry with the SAME key returns the
# stored result instead of re-executing -> POST becomes safe to retry.</div>
</div>
<div class='warn'><b>Gotcha:</b> Blind retries (LB/client auto-retry, mesh retry policies) on non-idempotent endpoints cause duplicates — double payments, duplicate orders. Retries are only safe on idempotent operations or POSTs protected by idempotency keys. This is why payment APIs require an idempotency key.</div>
<div class='tip'><b>Interview tip:</b> The senior framing: a timeout is ambiguous, so retries are mandatory for reliability but dangerous on non-idempotent ops. The fix is idempotency keys (server dedupes by key) — exactly how Stripe et al. make POST retries safe. Mention that mesh/LB auto-retry policies must be scoped to idempotent methods, or they create duplicates under load.</div>`},
{n:81,tag:'security',q:'Explain cookies, SameSite, and CORS. What problems does each solve?',body:`<p>These browser mechanisms govern how credentials and cross-origin requests behave — central to web security and a frequent source of "works locally, breaks in prod" bugs.</p>
<div class='sec'>Cookie attributes</div>
<div class='cmds'>
  <div class='cmd'>Secure   : only sent over HTTPS
HttpOnly : not readable by JavaScript (mitigates XSS token theft)
SameSite : Strict / Lax / None — controls cross-site sending (CSRF defense)
           None requires Secure; Lax is the modern default</div>
</div>
<div class='sec'>SameSite (CSRF defense)</div>
<p><code>SameSite=Lax</code> (default) means cookies aren't sent on cross-site subrequests (e.g. a forged POST from another site), blunting CSRF. <code>None</code> allows cross-site (needed for third-party/embedded contexts) but must be <code>Secure</code>.</p>
<div class='sec'>CORS (Cross-Origin Resource Sharing)</div>
<div class='cmds'>
  <div class='cmd'># Browser enforces Same-Origin Policy; CORS is how a server OPTS IN to
# cross-origin JS requests via response headers:
Access-Control-Allow-Origin: https://app.example.com
Access-Control-Allow-Credentials: true   # to send cookies cross-origin
# Preflight: browser sends OPTIONS first for non-simple requests</div>
</div>
<div class='warn'><b>Gotcha:</b> CORS is enforced by the <b>browser</b>, not the server — a CORS error means the server didn't return the right allow headers, not that the request was blocked server-side (curl/Postman ignore CORS, which is why "it works in Postman but fails in the browser"). And <code>Allow-Origin: *</code> can't be combined with credentialed requests.</div>
<div class='tip'><b>Interview tip:</b> Clarify that CORS is a browser-side relaxation of the same-origin policy (server opts in via headers; the preflight OPTIONS catches people out), and SameSite cookies are the modern CSRF defense. The "works in Postman, fails in browser" tell for CORS, and HttpOnly+Secure+SameSite as the cookie hardening trio, are the practical points.</div>`},
{n:82,tag:'http',q:'How does HTTP caching work? Explain Cache-Control, ETag, and the validation flow.',body:`<p>HTTP caching avoids re-fetching unchanged content, using freshness directives and validators. Misconfiguring it causes either stale content or no caching at all.</p>
<div class='sec'>Freshness (Cache-Control)</div>
<div class='cmds'>
  <div class='cmd'>Cache-Control: max-age=3600          # fresh for 1 hour, serve from cache
Cache-Control: no-cache              # MUST revalidate before using (not "don't cache")
Cache-Control: no-store              # truly don't cache (sensitive data)
Cache-Control: private / public      # browser-only vs shared (CDN) caches
Cache-Control: immutable             # never revalidate (fingerprinted assets)</div>
</div>
<div class='sec'>Validation (ETag / Last-Modified)</div>
<div class='cmds'>
  <div class='cmd'># When stale, the client revalidates instead of re-downloading:
Response:  ETag: "abc123"
Next req:  If-None-Match: "abc123"
Server:    304 Not Modified  (no body — cheap!)  OR  200 + new body</div>
</div>
<div class='warn'><b>Common confusion:</b> <code>no-cache</code> does NOT mean "don't cache" — it means "cache but always revalidate." Use <code>no-store</code> for truly sensitive data. The classic strategy: long <code>max-age + immutable</code> for fingerprinted static assets (<code>app.a1b2c3.js</code>), and <code>no-cache</code> for HTML that references them.</div>
<div class='tip'><b>Interview tip:</b> Two points: the freshness-then-validation model (max-age serves from cache; on expiry, ETag/304 avoids re-downloading unchanged bodies), and the <code>no-cache</code> vs <code>no-store</code> distinction that trips everyone up. The fingerprinted-assets-immutable + no-cache-HTML pattern is the production caching strategy worth naming.</div>`},
{n:83,tag:'security',q:'What is mutual TLS (mTLS) and where do you use it in production architectures?',body:`<p>In standard TLS only the server proves its identity. mTLS adds client authentication — both sides present and verify certificates — establishing strong two-way identity.</p>
<div class='sec'>How it differs from one-way TLS</div>
<div class='cmds'>
  <div class='cmd'>One-way TLS : server presents cert; client verifies it (typical web HTTPS)
mTLS        : server AND client present certs; each verifies the other
              -> the connection itself authenticates both parties</div>
</div>
<div class='sec'>Where it's used</div>
<div class='cmds'>
  <div class='cmd'>- Service-to-service auth in a mesh (Istio/Linkerd auto-mTLS, SPIFFE identity)
- Zero-trust internal networks: identity per workload, not network location
- Machine-to-machine / API clients where a shared secret is too weak
- IoT/device auth; high-security B2B APIs</div>
</div>
<div class='sec'>Operational cost</div>
<p>You need a certificate authority and, crucially, <b>rotation/lifecycle</b> — short-lived certs auto-issued and rotated (a mesh handles this; doing it by hand is painful).</p>
<div class='warn'><b>Gotcha:</b> The hard part of mTLS is certificate lifecycle, not the protocol — expired client certs cause outages, and manual rotation doesn't scale. This is why service meshes (which issue short-lived per-workload certs automatically) are the usual delivery vehicle for mTLS.</div>
<div class='tip'><b>Interview tip:</b> Frame mTLS as the core of zero-trust service identity — authenticate the workload via cert, not the network it sits on. The senior nuance is that the protocol is easy but cert lifecycle/rotation is the operational challenge, which is exactly why meshes (with SPIFFE identities + auto-rotation) exist. Ties directly to the service-mesh and zero-trust topics.</div>`},
{n:84,tag:'security',q:'What does a WAF do, and what are its limits? How does it relate to L7 DDoS protection?',body:`<p>A Web Application Firewall inspects HTTP(S) requests at L7 to block application-layer attacks — but it's a filter, not a substitute for secure code.</p>
<div class='sec'>What a WAF blocks</div>
<div class='cmds'>
  <div class='cmd'>- Common injection patterns: SQLi, XSS, command injection (OWASP Top 10)
- Known bad bots / scanners; suspicious request shapes
- Rate-based rules; geo/IP reputation blocking
- Virtual patching: block a CVE's exploit pattern before you can patch the app</div>
</div>
<div class='sec'>Limits</div>
<div class='cmds'>
  <div class='cmd'>- Signature/rule-based -> bypassable with novel/encoded payloads
- False positives block legitimate traffic (tuning burden)
- Can't fix the underlying vulnerability — it's defense in depth, not a fix
- Sees only what it can decrypt (must terminate or inspect TLS)</div>
</div>
<div class='sec'>Relation to L7 DDoS</div>
<p>WAFs often pair with L7 DDoS protection (rate limiting, bot management, challenge pages) since application-layer floods (expensive queries, login bursts) look like valid HTTP and can't be stopped by L3/4 volumetric defenses alone.</p>
<div class='tip'><b>Interview tip:</b> Position the WAF as defense-in-depth / virtual patching, not a security fix — secure code still matters, and rule-based WAFs are bypassable and noisy. The strong nuance: L7 DDoS (app-layer floods of valid-looking requests) needs WAF/rate-limiting/bot management, distinct from L3/4 volumetric DDoS handled upstream by the network/CDN — connecting to the next question.</div>`},
{n:85,tag:'security',q:'Explain L3/L4 vs L7 DDoS attacks and the layered defenses against each.',body:`<p>DDoS attacks target different layers, and the defenses differ accordingly — volumetric flooding versus application exhaustion.</p>
<div class='sec'>L3/L4 (volumetric / protocol)</div>
<div class='cmds'>
  <div class='cmd'>- UDP/ICMP floods, amplification (DNS/NTP reflection), SYN floods
- Goal: saturate bandwidth or exhaust connection state
- Defense: upstream scrubbing/CDN absorbs volume, SYN cookies, anycast to
  spread load across many POPs, provider-level DDoS protection</div>
</div>
<div class='sec'>L7 (application)</div>
<div class='cmds'>
  <div class='cmd'>- HTTP floods, slowloris (slow requests holding connections), hitting
  expensive endpoints (search, login, report generation)
- Looks like valid traffic -> can't filter by volume alone
- Defense: rate limiting, bot detection/challenges (CAPTCHA/JS), WAF rules,
  caching/CDN to absorb, autoscaling as a buffer (with cost guardrails)</div>
</div>
<div class='sec'>Why anycast helps</div>
<p>Anycast advertises the same IP from many locations; volumetric attack traffic is distributed across global POPs instead of hammering one site, and a CDN absorbs/scrubs it close to the source.</p>
<div class='warn'><b>Gotcha:</b> Autoscaling to absorb an L7 flood can rescue availability but blow up your bill (a "denial of wallet" attack). Pair autoscaling with rate limits and cost guardrails so an attack doesn't simply convert downtime into a huge invoice.</div>
<div class='tip'><b>Interview tip:</b> The clean split: L3/4 = volume (absorb/scrub upstream with anycast + CDN + provider DDoS), L7 = valid-looking app requests (rate limit, bot management, WAF, caching). Naming anycast for distributing volumetric load and the "denial of wallet" autoscaling risk are both senior-level observations.</div>`},
{n:86,tag:'cloud',q:'What cloud-native network security controls would you layer for a defense-in-depth posture?',body:`<p>Cloud network security is layered — no single control suffices. You stack controls from the edge down to the workload.</p>
<div class='sec'>The layers (edge to workload)</div>
<div class='cmds'>
  <div class='cmd'>Edge      : CDN + DDoS protection + WAF (absorb/scrub/filter at the perimeter)
Network    : VPC segmentation (public/private/data subnets), NACLs (subnet guardrails)
Instance   : Security Groups (stateful, least-privilege per service)
Egress     : controlled outbound (NAT GW + egress filtering / no open 0.0.0.0/0 out)
Private     : VPC endpoints / PrivateLink so traffic to cloud services stays private
Workload    : mTLS / service mesh, NetworkPolicies (K8s), identity-based auth</div>
</div>
<div class='sec'>Key principles</div>
<div class='cmds'>
  <div class='cmd'>- Least privilege both INBOUND and OUTBOUND (egress filtering stops exfil/beaconing)
- Private by default: no public IPs unless required; use private endpoints
- Segment so a breach in one tier can't reach the data tier
- Identity-based (zero-trust) over network-location trust</div>
</div>
<div class='warn'><b>Commonly missed:</b> Egress control. Most teams lock down inbound but leave outbound wide open (0.0.0.0/0) — which is exactly what malware uses to beacon out and exfiltrate. Default-deny egress with an allowlist is a high-value, often-skipped control.</div>
<div class='tip'><b>Interview tip:</b> Structure the answer edge-to-workload (CDN/WAF -> VPC segmentation -> SG/NACL -> egress control -> private endpoints -> mTLS/NetworkPolicy) and stress two things teams skip: egress filtering (stops exfiltration/beaconing) and private endpoints (PrivateLink keeps cloud-service traffic off the public internet). Defense-in-depth + least-privilege-both-directions is the framing.</div>`},
{n:87,tag:'security',q:'Explain zero-trust networking versus the traditional perimeter model.',body:`<p>The perimeter model trusts anything inside the network; zero-trust trusts nothing by default and verifies every request regardless of location.</p>
<div class='sec'>Perimeter ('castle and moat')</div>
<div class='cmds'>
  <div class='cmd'># Hard outer wall (firewall/VPN); once inside, broad implicit trust.
# Problem: a single breach -> lateral movement across the flat internal network.
# VPN access = "you're inside" = trusted -> over-broad access.</div>
</div>
<div class='sec'>Zero-trust ('never trust, always verify')</div>
<div class='cmds'>
  <div class='cmd'>- Identity-based: authenticate + authorize EVERY request (user AND workload)
- Network location grants NO trust (inside == outside)
- Least-privilege, per-resource access; continuous verification
- Micro-segmentation: limit blast radius if one workload is compromised
- mTLS for service identity; short-lived credentials</div>
</div>
<div class='sec'>In practice</div>
<p>Identity-aware proxies (BeyondCorp-style) replace VPNs for user access; service mesh mTLS + NetworkPolicies enforce workload-to-workload zero-trust; secrets are short-lived and identity-bound.</p>
<div class='tip'><b>Interview tip:</b> The headline contrast: perimeter trusts location (and a breach moves laterally freely); zero-trust trusts verified identity per request, so a compromised workload can't roam. Concretely: replace VPN-grants-everything with identity-aware access, and enforce service identity via mTLS + micro-segmentation. This ties together mTLS, NetworkPolicy, and least-privilege egress from earlier answers.</div>`},
{n:88,tag:'http',q:'What is a reverse proxy vs a forward proxy vs an API gateway? Give concrete uses.',body:`<p>All sit between clients and servers, but they face different directions and serve different roles.</p>
<div class='sec'>The three</div>
<div class='cmds'>
  <div class='cmd'>Forward proxy : sits in front of CLIENTS, proxies their outbound requests
                (corporate egress proxy, content filtering, caching, anonymity)
Reverse proxy : sits in front of SERVERS, fronts inbound requests to backends
                (NGINX/Envoy: TLS termination, LB, caching, routing)
API gateway   : a specialized reverse proxy for APIs — adds auth, rate limiting,
                request transformation, versioning, metering, aggregation</div>
</div>
<div class='sec'>Concrete uses</div>
<div class='cmds'>
  <div class='cmd'>Forward : employees -> egress proxy -> internet (filter/log/cache outbound)
Reverse : internet -> NGINX -> app servers (terminate TLS, route /api vs /static)
Gateway : clients -> Kong/Apigee/cloud API GW -> microservices
          (JWT validation, per-key rate limits, usage plans, canary routing)</div>
</div>
<div class='warn'><b>Distinction:</b> Forward proxy protects/serves the <i>client</i> side (who's making requests); reverse proxy protects/serves the <i>server</i> side (what's receiving them). An API gateway is a reverse proxy with API-management features bolted on — don't conflate it with a plain LB.</div>
<div class='tip'><b>Interview tip:</b> The crisp mental model: forward proxy faces clients (egress control), reverse proxy faces servers (ingress: TLS/LB/routing), API gateway = reverse proxy + API concerns (auth, rate limit, metering, transformation). Knowing where the gateway adds value over a plain LB (auth, rate limiting, per-consumer plans) shows platform-level thinking.</div>`},
{n:89,tag:'security',q:'How do you securely expose an internal service to the public internet?',body:`<p>Exposing an internal service safely is about minimizing the attack surface and adding layers between the internet and the workload.</p>
<div class='sec'>The layered exposure</div>
<div class='cmds'>
  <div class='cmd'>Internet
  -> CDN/edge (DDoS protection, WAF, caching)
  -> Public load balancer (TLS termination, single managed entry point)
  -> private subnet backends (NO public IPs on the actual workloads)
# Only the LB is internet-facing; backends live in private subnets.</div>
</div>
<div class='sec'>Controls to apply</div>
<div class='cmds'>
  <div class='cmd'>- Terminate TLS at the edge/LB; valid certs; modern TLS only
- WAF + rate limiting in front; bot protection if needed
- Security Groups: backends accept ONLY from the LB's SG (not 0.0.0.0/0)
- AuthN/AuthZ at the gateway (don't rely on "internal = trusted")
- Least-privilege egress from the backends; private endpoints for cloud deps
- Logging/monitoring on the edge for abuse detection</div>
</div>
<div class='warn'><b>Anti-pattern:</b> Slapping a public IP directly on the workload, or opening the backend's security group to <code>0.0.0.0/0</code>. The workload should only be reachable <i>through</i> the LB, whose SG is the only allowed source — so even if someone learns the backend IP, they can't reach it directly.</div>
<div class='tip'><b>Interview tip:</b> The pattern: CDN/WAF -> public LB (TLS) -> private backends, with backend SGs that trust only the LB's SG, plus gateway auth (no implicit internal trust). The key control is that workloads have no public IP and only accept traffic from the LB — single, hardened, observable entry point. This is the production-grade exposure answer.</div>`},
{n:90,tag:'http',q:'Compare gRPC and REST over HTTP. What networking issues does gRPC introduce with load balancers?',body:`<p>gRPC uses HTTP/2 with binary Protobuf for efficient, strongly-typed RPC; REST is typically JSON over HTTP/1.1. The performance win comes with load-balancing gotchas.</p>
<div class='sec'>gRPC vs REST</div>
<div class='cmds'>
  <div class='cmd'>gRPC : HTTP/2, binary Protobuf, streaming (bi-directional), strict contracts,
       low overhead, great for internal service-to-service
REST : HTTP/1.1 + JSON, human-readable, ubiquitous tooling/caching,
       great for public APIs and browser clients</div>
</div>
<div class='sec'>The load-balancing problem</div>
<div class='cmds'>
  <div class='cmd'># gRPC multiplexes many calls over ONE long-lived HTTP/2 connection.
# An L4 (connection-level) LB pins that connection to ONE backend ->
# all requests hit one pod; new/scaled pods get no traffic. Uneven load.</div>
</div>
<div class='sec'>Fixes</div>
<div class='cmds'>
  <div class='cmd'>- L7 LB that balances per-REQUEST (Envoy, gRPC-aware ingress, service mesh)
- Client-side LB: resolve all endpoints (headless service) + round_robin policy
- Connection max-age to force periodic re-resolution/rebalancing</div>
</div>
<div class='warn'><b>Gotcha:</b> Scaling up a gRPC service often doesn't relieve load — existing HTTP/2 connections never move to the new pods. You must force request-level balancing or connection recycling; adding replicas alone does nothing.</div>
<div class='tip'><b>Interview tip:</b> The headline gRPC networking issue: per-connection (L4) balancing breaks HTTP/2 multiplexing, so you need request-level L7 balancing, client-side LB, or connection max-age. This is the same multiplexing problem as the HTTP/2 HOL discussion and ties to load-balancer behavior — connecting the protocol and LB sections shows depth.</div>`},
{n:91,tag:'loadbalancing',q:'Compare L4 and L7 load balancing in depth. What can each see and not see?',body:`<p>The layer a load balancer operates at determines what information it can route on and what it costs in performance and visibility.</p>
<div class='sec'>L4 load balancer</div>
<div class='cmds'>
  <div class='cmd'>- Operates on IP:port (TCP/UDP); doesn't parse the payload
- Can balance by connection/4-tuple; very fast, low overhead, high throughput
- Preserves source IP more easily; protocol-agnostic (any TCP/UDP app)
- CANNOT: route by URL/header/cookie, terminate TLS, inspect HTTP</div>
</div>
<div class='sec'>L7 load balancer</div>
<div class='cmds'>
  <div class='cmd'>- Parses HTTP: routes by path/host/header/method; terminates TLS
- Can do content-based routing, header rewrite, WAF, sticky by cookie
- Two connections (client<->LB, LB<->backend) -> source IP needs X-Forwarded-For
- More CPU/latency per request; the app-aware choice</div>
</div>
<div class='sec'>Choosing</div>
<p>L4 for raw TCP/UDP, extreme throughput, non-HTTP protocols, static-IP needs. L7 when you must route on HTTP attributes, centralize TLS, or apply app-layer policy.</p>
<div class='warn'><b>Gotcha:</b> Because an L7 LB terminates the connection, the backend sees the LB's IP, not the client's — you must propagate the real client via <code>X-Forwarded-For</code> (and trust it carefully). An L4 LB in passthrough preserves source IP but can't do any HTTP-level routing.</div>
<div class='tip'><b>Interview tip:</b> The principle: pick the lowest layer that satisfies your routing needs. L4 = fast, protocol-agnostic, source-IP-friendly, no app awareness; L7 = app-aware routing + TLS termination at a CPU/latency cost and source-IP indirection. Real examples (AWS NLB vs ALB) anchor it.</div>`},
{n:92,tag:'loadbalancing',q:'Explain load balancing algorithms (round-robin, least-conn, consistent hashing). When use each?',body:`<p>The algorithm decides which backend gets each request; the right choice depends on request uniformity and whether you need stickiness.</p>
<div class='sec'>The algorithms</div>
<div class='cmds'>
  <div class='cmd'>Round-robin     : rotate evenly; great when requests + backends are uniform
Least-connections: send to the backend with fewest active conns;
                  better for variable/long-lived request durations
Weighted        : bias toward bigger/faster backends (heterogeneous fleet, canary)
IP hash / consistent hashing : map a key (client IP, session) to a backend
                  deterministically -> stickiness + cache locality</div>
</div>
<div class='sec'>Consistent hashing — why special</div>
<div class='cmds'>
  <div class='cmd'># Plain "hash mod N" reshuffles EVERYTHING when N changes (add/remove a backend).
# Consistent hashing remaps only ~1/N of keys on a change -> minimal disruption.
# Used for cache affinity, sharding, sticky routing that survives scaling.</div>
</div>
<div class='warn'><b>Gotcha:</b> Least-connections beats round-robin when request costs vary widely (round-robin can pile expensive requests on one node). But avoid stickiness/hashing unless you need it — it undermines even distribution and can hot-spot one backend (a heavy client pinned to one node).</div>
<div class='tip'><b>Interview tip:</b> Match algorithm to workload: round-robin for uniform short requests, least-conn for variable/long-lived ones, consistent hashing when you need stickiness or cache locality with minimal reshuffling on scale events. Explaining why consistent hashing (only 1/N keys move) beats hash-mod-N on resize is the standout detail.</div>`},
{n:93,tag:'loadbalancing',q:'How do health checks work, and how can a misconfigured health check cause a cascading outage?',body:`<p>Load balancers route only to backends passing health checks. The check's design is safety-critical — a bad one can take down a healthy fleet.</p>
<div class='sec'>Active vs passive</div>
<div class='cmds'>
  <div class='cmd'>Active  : LB periodically probes /health on each backend
Passive : LB observes real traffic (consecutive errors -> mark unhealthy)
Key knobs: interval, timeout, healthy/unhealthy thresholds, the probe path</div>
</div>
<div class='sec'>Shallow vs deep checks</div>
<div class='cmds'>
  <div class='cmd'>Shallow (/healthz returns 200): is the process up? — safe, isolated
Deep (/health checks DB + deps): is everything OK? — DANGEROUS as an LB check</div>
</div>
<div class='sec'>The cascade</div>
<p>If the health check is <b>deep</b> (verifies a shared dependency like the DB) and that dependency blips, <i>every</i> backend fails its check simultaneously, the LB marks the entire fleet unhealthy and has nowhere to route — turning a brief dependency hiccup into a total outage.</p>
<div class='warn'><b>Rule:</b> LB health checks should be shallow ("is this instance serving?"), NOT deep ("is the database up?"). A shared-dependency check shared across all instances is a single point of failure that fails them all at once. Keep dependency checks for readiness/alerting, not for the load balancer's route decision.</div>
<div class='tip'><b>Interview tip:</b> This mirrors the Kubernetes liveness-probe trap: a health check that depends on a shared downstream takes out the whole fleet when that downstream blips. Keep LB checks shallow and instance-local; surface dependency health via separate signals. Also mention thresholds — too-aggressive checks flap healthy nodes out under transient load.</div>`},
{n:94,tag:'loadbalancing',q:'What is session affinity (sticky sessions) and why is it considered an anti-pattern?',body:`<p>Session affinity pins a client to the same backend across requests (via cookie or IP hash). It's sometimes necessary but undermines the benefits of load balancing.</p>
<div class='sec'>How it's done</div>
<div class='cmds'>
  <div class='cmd'>Cookie-based : LB sets a cookie naming the backend; routes that client back to it
IP-based     : hash source IP -> same backend (breaks behind NAT/shared IPs)</div>
</div>
<div class='sec'>Why it's an anti-pattern</div>
<div class='cmds'>
  <div class='cmd'>- Uneven load: long-lived sticky sessions hot-spot some backends
- Scaling is blunted: new backends get only NEW sessions, not existing load
- Resilience hit: a backend dying drops all its sticky sessions' state
- Deploys/rollouts disrupt pinned users</div>
</div>
<div class='sec'>The better pattern</div>
<p>Make backends <b>stateless</b> — externalize session state to a shared store (Redis/Memcached) or use signed stateless tokens (JWT). Then any backend can serve any request; no stickiness needed.</p>
<div class='warn'><b>Gotcha:</b> IP-hash affinity breaks badly behind NAT/CGNAT — many users share one source IP and all pin to one backend (hot spot), while a single user behind round-robin NAT may bounce backends. Cookie affinity is more reliable but still carries the load-skew and resilience costs.</div>
<div class='tip'><b>Interview tip:</b> The senior answer: stickiness is a crutch for stateful backends — fix the root cause by externalizing state (Redis/JWT) so the tier is stateless and any node serves any request. If you must use affinity (e.g. legacy app, WebSocket), prefer cookie-based over IP-based and acknowledge the load-skew/resilience trade-offs.</div>`},
{n:95,tag:'loadbalancing',q:'How do you load balance WebSockets and other long-lived connections?',body:`<p>WebSockets are long-lived, stateful, full-duplex connections — they break assumptions that load balancers make about short request/response cycles.</p>
<div class='sec'>The challenges</div>
<div class='cmds'>
  <div class='cmd'>- Connections persist for minutes/hours -> load set at connect time, never rebalances
- A backend deploy/restart drops all its live sockets (clients must reconnect)
- LB idle timeouts can kill a quiet-but-active socket -> need keep-alive/ping-pong
- Scaling up doesn't move existing connections to new nodes</div>
</div>
<div class='sec'>Handling them</div>
<div class='cmds'>
  <div class='cmd'>- Ensure the LB supports WS upgrade (HTTP/1.1 Upgrade) and long idle timeouts
- App-level ping/pong heartbeats to keep the connection alive < LB idle timeout
- Least-connections balancing (not round-robin) since connections are long-lived
- Graceful drain on deploy: stop new connections, let existing ones finish/migrate
- Externalize state + use a pub/sub backplane (Redis) so any node can serve any client</div>
</div>
<div class='warn'><b>Gotcha:</b> Because connections are assigned at connect time and never move, a rolling deploy or scale-up leaves load badly skewed (old nodes full, new nodes empty) until clients reconnect. Plan reconnection (client backoff + jitter) so a mass reconnect after a deploy doesn't thundering-herd one node.</div>
<div class='tip'><b>Interview tip:</b> Key points: enable WS upgrade + long/aligned idle timeouts, heartbeat to beat the idle timeout, least-conn over round-robin, connection draining on deploy, and a pub/sub backplane for cross-node fan-out. The reconnect-thundering-herd risk (and client jitter to avoid it) is the detail that shows you've run real-time systems at scale.</div>`},
{n:96,tag:'loadbalancing',q:'What is connection draining (graceful deregistration) and why is it essential for zero-downtime deploys?',body:`<p>Connection draining lets a backend finish in-flight requests before it's removed from the pool, preventing dropped requests during deploys and scale-down.</p>
<div class='sec'>The problem without it</div>
<div class='cmds'>
  <div class='cmd'># Deregister a backend instantly -> in-flight requests are cut off mid-response
# -> users see errors/resets during every deploy or scale-in event.</div>
</div>
<div class='sec'>How draining works</div>
<div class='cmds'>
  <div class='cmd'>1. Mark the target "draining" -> LB stops sending NEW requests to it
2. Existing in-flight requests are allowed to COMPLETE (up to a drain timeout)
3. After they finish (or timeout), the target is fully deregistered/terminated</div>
</div>
<div class='sec'>Ties to the platform</div>
<p>This is the LB side of graceful shutdown: it must pair with the app handling SIGTERM (stop accepting, finish in-flight) and, in Kubernetes, a <code>preStop</code> delay so endpoint removal propagates before the process exits.</p>
<div class='warn'><b>Gotcha:</b> The drain timeout must exceed your longest legitimate request, or long requests still get cut. And there's a race: the LB must remove the target from rotation <i>before</i> the process stops — without a small delay (preStop sleep / deregistration delay), the LB may still send a request to a shutting-down instance.</div>
<div class='tip'><b>Interview tip:</b> Connect it to the full zero-downtime chain: LB connection draining + app SIGTERM handling + (in K8s) preStop delay so deregistration propagates first. The two gotchas — drain timeout sized to longest request, and the dereg-before-stop race — are exactly what separates "I clicked deploy" from "I designed for zero downtime."</div>`},
{n:97,tag:'cloud',q:'Explain VPC anatomy: subnets, route tables, internet gateway, and NAT gateway.',body:`<p>A VPC is your isolated virtual network in the cloud. A handful of components determine what's public, what's private, and how traffic flows.</p>
<div class='sec'>The components</div>
<div class='cmds'>
  <div class='cmd'>VPC          : the isolated network + its CIDR (e.g. 10.0.0.0/16)
Subnet       : a CIDR slice, tied to one AZ; "public" or "private" by ROUTING
Route table  : per-subnet rules deciding where traffic goes
Internet GW  : enables bidirectional internet for PUBLIC subnets
NAT Gateway  : lets PRIVATE subnets egress to the internet (outbound only)</div>
</div>
<div class='sec'>What makes a subnet public vs private</div>
<div class='cmds'>
  <div class='cmd'># It's the ROUTE TABLE, not a flag:
Public subnet  : route 0.0.0.0/0 -> Internet Gateway  (+ instances have public IPs)
Private subnet : route 0.0.0.0/0 -> NAT Gateway        (outbound only, no inbound)
# Typical 3-tier: public (LB) / private (app) / private (data)</div>
</div>
<div class='warn'><b>Gotcha:</b> A subnet is "public" only because its route table points 0.0.0.0/0 at the Internet Gateway AND the instance has a public IP — both are required. A common mistake: instance in a "public" subnet but no public IP (or vice versa), so connectivity silently fails. The NAT Gateway is one-directional: private instances reach out, but the internet can't reach in.</div>
<div class='tip'><b>Interview tip:</b> The insight that impresses: public-vs-private is defined by the route table (IGW vs NAT GW), not an attribute. Describe the standard 3-tier layout (public LB tier, private app tier, private data tier) and that NAT GW is egress-only. Mention NAT GW cost/data-transfer charges as a FinOps consideration — a frequent surprise on cloud bills.</div>`},
{n:98,tag:'cloud',q:'What are VPC endpoints / PrivateLink and why use them instead of going over the internet?',body:`<p>VPC endpoints let your resources reach cloud services (and third-party/partner services) privately, without traversing the public internet or a NAT gateway.</p>
<div class='sec'>The two types (AWS terms)</div>
<div class='cmds'>
  <div class='cmd'>Gateway endpoint   : for S3 / DynamoDB — a route-table entry, no cost, stays on-net
Interface endpoint : an ENI with a private IP in your subnet (PrivateLink) for most
                    services + your own/partner services exposed privately</div>
</div>
<div class='sec'>Why use them</div>
<div class='cmds'>
  <div class='cmd'>- Security: traffic to the cloud service never leaves the private network
- No NAT GW needed for that traffic -> avoids NAT data-processing cost
- Avoids the public internet entirely (compliance, reduced exposure)
- Can reach services even in fully private (no-IGW) subnets</div>
</div>
<div class='warn'><b>Gotcha:</b> Without endpoints, a private instance calling the cloud's API/S3 goes out through the NAT Gateway to the public endpoint — incurring NAT data-processing charges and leaving your network. For high-volume S3/API traffic this is both a cost and a security/compliance concern. Gateway endpoints (S3/DynamoDB) are free; use them.</div>
<div class='tip'><b>Interview tip:</b> The two wins are security (traffic stays private, never hits the internet) and cost (bypass the NAT Gateway's per-GB charge for cloud-service traffic). Knowing gateway endpoints (S3/DynamoDB, free) vs interface endpoints/PrivateLink (ENI-based, for most services and exposing your own services to other VPCs) is a strong cloud-networking detail.</div>`},
{n:99,tag:'loadbalancing',q:'How do load balancing, autoscaling, and health checks work together — including the warm-up problem?',body:`<p>These three form the elasticity loop: health checks gate the pool, autoscaling adjusts capacity, and the LB distributes — but timing issues like cold starts can cause failures.</p>
<div class='sec'>The loop</div>
<div class='cmds'>
  <div class='cmd'>1. Metric (CPU/RPS/latency) crosses threshold -> autoscaler adds instances
2. New instance boots, passes health check -> LB adds it to the pool
3. LB routes traffic; load drops -> autoscaler scales in (with draining)</div>
</div>
<div class='sec'>The warm-up / cold-start problem</div>
<div class='cmds'>
  <div class='cmd'># A new instance passes a shallow health check but isn't truly "warm":
# - JIT not compiled, caches cold, connection pools empty
# -> first requests are slow or error; sending full traffic immediately hurts.</div>
</div>
<div class='sec'>Mitigations</div>
<div class='cmds'>
  <div class='cmd'>- Slow-start / warm-up mode: ramp traffic to a new target gradually
- Readiness reflects real readiness (warm caches/pools) before taking full load
- Pre-scale ahead of predictable spikes; keep warm headroom
- Scale on a leading metric (RPS/queue depth) not lagging CPU</div>
</div>
<div class='warn'><b>Gotcha:</b> Reactive CPU-based autoscaling lags — by the time CPU spikes, you're already overloaded, and cold new instances make it worse before better. A traffic surge can outrun boot+warm time, causing a brief brownout. Scale on leading indicators and use slow-start so new nodes ramp in.</div>
<div class='tip'><b>Interview tip:</b> The standout is the warm-up problem: a node can be "healthy" yet cold, so flooding it with traffic causes errors — use LB slow-start/warm-up and readiness that reflects true warmth. Also note reactive CPU scaling lags; scale on leading signals (RPS/queue) and keep headroom. This shows you've operated elastic systems through real traffic spikes.</div>`},
{n:100,tag:'cloud',q:'What is anycast and how do CDNs and global load balancers use it?',body:`<p>Anycast advertises the <i>same</i> IP address from many locations; the network routes each client to the topologically nearest one. It's the backbone of global CDNs and DNS.</p>
<div class='sec'>How it works</div>
<div class='cmds'>
  <div class='cmd'># Many POPs advertise the same IP via BGP from different locations.
# Each client's packets are routed (by BGP) to the NEAREST advertising POP.
# One IP, many physical endpoints -> automatic geographic proximity routing.</div>
</div>
<div class='sec'>Where it's used</div>
<div class='cmds'>
  <div class='cmd'>- CDNs: serve content from the closest edge (low latency)
- Public DNS (8.8.8.8, 1.1.1.1): same IP answered by the nearest datacenter
- Global load balancers / DDoS absorption: spread load across POPs worldwide
- Automatic failover: a dead POP withdraws its BGP route -> clients reroute</div>
</div>
<div class='sec'>Anycast vs GeoDNS</div>
<p>GeoDNS returns different IPs based on the resolver's location (DNS-layer, subject to caching/TTL). Anycast uses one IP and lets routing pick the POP (network-layer, faster failover, no DNS caching issues).</p>
<div class='warn'><b>Gotcha:</b> Anycast routing can shift mid-session if BGP paths change (a POP withdrawing or a route flap), which is fine for stateless request/response (HTTP, DNS) but problematic for long-lived stateful connections that assume a fixed endpoint. It's ideal for short, stateless interactions.</div>
<div class='tip'><b>Interview tip:</b> Explain anycast as "one IP, nearest POP via BGP" and contrast with GeoDNS (DNS-layer, TTL-bound) — anycast gives faster, caching-free proximity routing and failover (dead POP withdraws its route). It underpins CDNs, public DNS, and volumetric DDoS absorption. The stateful-connection caveat is the nuance that signals depth.</div>`},
