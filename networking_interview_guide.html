{n:101,tag:'cloud',q:'How do you design multi-region networking for low latency and failover?',body:`<p>Multi-region serves users from the nearest region and survives a regional failure, but introduces cross-region latency and data-consistency challenges.</p>
<div class='sec'>Traffic steering to the right region</div>
<div class='cmds'>
  <div class='cmd'>- GeoDNS / latency-based routing OR anycast global LB -> nearest healthy region
- Health checks per region -> stop routing to a failed/degraded region
- CDN at the edge to serve cacheable content close to users</div>
</div>
<div class='sec'>The hard part: data</div>
<div class='cmds'>
  <div class='cmd'>Active-passive : one primary region writes; others standby (async replicate)
               -> simpler; failover promotes a standby (RTO/RPO trade-off)
Active-active  : all regions serve writes -> needs conflict resolution / global DB
               -> low latency everywhere, hard consistency + replication lag</div>
</div>
<div class='sec'>Cross-region connectivity</div>
<p>Connect regions privately (cloud backbone / inter-region peering / Transit Gateway peering) rather than over the public internet for security and consistent latency on replication traffic.</p>
<div class='warn'><b>Gotcha:</b> Cross-region latency is physics (e.g. tens of ms between continents) — you can't replicate it away. Synchronous cross-region writes add that latency to every request; most designs use async replication and accept some RPO, or keep writes in a home region. Don't pretend multi-region is free of consistency trade-offs.</div>
<div class='tip'><b>Interview tip:</b> Lead with the split: routing (GeoDNS/anycast + per-region health) is the easy half; <b>data</b> (active-passive vs active-active, replication lag, conflict resolution) is the hard half driven by RPO/RTO. Acknowledge cross-region latency as a physical constraint and connect regions over the private backbone. This honest, trade-off-aware framing is what senior interviews reward.</div>`},
{n:102,tag:'cloud',q:'Explain the shared responsibility model for networking in the cloud. What\'s yours vs the provider\'s?',body:`<p>Cloud security and networking responsibilities are split: the provider secures the infrastructure; you secure what you build on it. Networking spans both sides.</p>
<div class='sec'>Provider's responsibility ('of the cloud')</div>
<div class='cmds'>
  <div class='cmd'>- Physical network, hardware, hypervisor, backbone between regions/AZs
- The VPC isolation primitive, the LB/NAT GW service availability
- DDoS protection of the underlying infrastructure
- Patching the managed network services themselves</div>
</div>
<div class='sec'>Your responsibility ('in the cloud')</div>
<div class='cmds'>
  <div class='cmd'>- VPC/subnet design, route tables, public-vs-private placement
- Security Groups / NACLs / firewall rules (least privilege)
- TLS config, certs, what you expose publicly
- Egress controls, NetworkPolicies, application-layer security
- Correct use of private endpoints, encryption in transit</div>
</div>
<div class='warn'><b>Gotcha:</b> The provider gives you secure <i>primitives</i>, but a wide-open Security Group, a public S3 bucket, or 0.0.0.0/0 egress is entirely <b>your</b> fault — most cloud breaches are customer misconfiguration, not provider failure. "It's in the cloud" doesn't mean "it's secured for me."</div>
<div class='tip'><b>Interview tip:</b> The crisp line: provider secures the network fabric and service availability; you secure configuration — VPC design, SG/NACL rules, exposure, TLS, egress. Stressing that the vast majority of cloud incidents are customer misconfiguration (open SGs, public buckets) shows mature ownership and sets up why guardrails/policy-as-code matter.</div>`},
{n:103,tag:'cloud',q:'How does service discovery work in dynamic environments, and what role does DNS play?',body:`<p>In dynamic environments (autoscaling, containers) instances come and go with changing IPs, so clients can't hardcode addresses — service discovery provides current, healthy endpoints.</p>
<div class='sec'>Patterns</div>
<div class='cmds'>
  <div class='cmd'>Client-side  : client queries a registry (Consul, Eureka) -> picks an instance itself
Server-side  : client hits a stable endpoint (LB/VIP) that knows the backends
DNS-based    : a stable name resolves to current healthy IPs (K8s Services,
             Cloud Map, Consul DNS) -> the most common, transparent approach</div>
</div>
<div class='sec'>DNS's role + its caveats</div>
<div class='cmds'>
  <div class='cmd'># Kubernetes: svc.ns.svc.cluster.local -> current ready pod IPs (via EndpointSlices)
# Service mesh: control plane tracks endpoints, sidecars route to healthy ones
# CAVEAT: DNS TTL/caching means clients may use stale IPs after a change
#   -> low TTLs + re-resolution on connection failure</div>
</div>
<div class='warn'><b>Gotcha:</b> DNS-based discovery inherits DNS caching problems — a client (or JVM!) caching a resolved IP keeps hitting a dead instance after it's replaced. Health-aware discovery (mesh/registry) + finite TTLs + re-resolve-on-error avoid routing to gone endpoints. Pure round-robin DNS also lacks real-time health/load awareness.</div>
<div class='tip'><b>Interview tip:</b> Frame the three patterns (client-side registry, server-side LB/VIP, DNS-based) and note DNS is the most transparent but inherits caching/health-awareness limits — which is why meshes and registries add real-time health. The JVM/connection-pool stale-IP caching problem (from the DNS section) is the concrete failure mode to cite.</div>`},
{n:104,tag:'cloud',q:'How do you reduce cloud data transfer (egress) costs through network design?',body:`<p>Data transfer is a major, often-surprising cloud cost. Smart network design keeps traffic on cheaper paths and avoids needless egress.</p>
<div class='sec'>The cost hierarchy (roughly cheapest -> most expensive)</div>
<div class='cmds'>
  <div class='cmd'>Same AZ (private IPs)         : usually free / cheapest
Cross-AZ (same region)        : a per-GB charge (often overlooked at scale)
Cross-region                  : more expensive
Egress to the internet        : the most expensive (and NAT GW adds processing $)</div>
</div>
<div class='sec'>Design levers</div>
<div class='cmds'>
  <div class='cmd'>- Keep chatty services in the SAME AZ (AZ-aware routing / topology-aware hints)
- VPC endpoints/PrivateLink for S3/API traffic -> skip NAT GW egress charges
- CDN to serve cacheable content (offload origin egress)
- Compress + batch; avoid pulling large data across regions repeatedly
- Co-locate compute with the data it processes</div>
</div>
<div class='warn'><b>Gotcha:</b> Cross-AZ traffic is NOT free — a microservices mesh chatting across AZs, or a DB replica read across AZs, racks up per-GB charges that hide in the bill. NAT Gateway data processing for traffic that could have used a (free) gateway endpoint is another silent cost. These dominate bills more than people expect.</div>
<div class='tip'><b>Interview tip:</b> The cost hierarchy (same-AZ cheap -> cross-AZ -> cross-region -> internet egress) plus concrete levers (AZ-affinity for chatty services, VPC endpoints to dodge NAT charges, CDN offload) is a strong FinOps-meets-networking answer. Calling out that cross-AZ chatter and NAT data-processing are the hidden line items shows real cost ownership.</div>`},
{n:105,tag:'loadbalancing',q:'How do you implement rate limiting? Compare token bucket and leaky bucket, and where to enforce it.',body:`<p>Rate limiting protects services from overload and abuse. The algorithm shapes how bursts are handled, and the enforcement point determines coverage.</p>
<div class='sec'>Token bucket vs leaky bucket</div>
<div class='cmds'>
  <div class='cmd'>Token bucket : tokens refill at a steady rate; each request spends one.
             Allows BURSTS up to the bucket size, then throttles to the refill rate.
Leaky bucket : requests queue and drain at a FIXED rate (smooths output).
             No bursts — steady outflow regardless of input spikes.</div>
</div>
<div class='sec'>Where to enforce</div>
<div class='cmds'>
  <div class='cmd'>Edge/CDN/WAF : stop abuse before it costs you compute (best for DDoS/abuse)
API gateway  : per-API-key / per-tenant quotas + usage plans
Service mesh  : per-service limits between internal services
Application   : fine-grained, business-logic-aware limits (per-user action)</div>
</div>
<div class='sec'>Distributed challenge</div>
<p>Across many instances you need <b>shared</b> counters (e.g. Redis) so the limit is global, not per-instance — otherwise N instances each allow the full rate (N x the intended limit).</p>
<div class='warn'><b>Gotcha:</b> Per-instance in-memory rate limits don't enforce a global limit — 10 instances each allowing 100 rps = 1000 rps total. Use a shared store (Redis) or a coordinated edge limiter. Also: return <code>429</code> with <code>Retry-After</code> so clients back off correctly instead of hammering.</div>
<div class='tip'><b>Interview tip:</b> Token bucket = allows bursts (most common for APIs), leaky bucket = smooths to a constant rate. Enforce as early as possible (edge/gateway) to protect compute, with shared-state counters for a true global limit across instances. Returning 429 + Retry-After and the per-instance-counter pitfall are the practical details interviewers look for.</div>`},
{n:106,tag:'troubleshoot',q:'A service is unreachable. Walk through a systematic layer-by-layer debugging approach.',body:`<p>"Can't reach the service" is ambiguous — work up the stack (or down) methodically rather than guessing. Each layer has a definitive test.</p>
<div class='sec'>Layer-by-layer</div>
<div class='cmds'>
  <div class='cmd'>1. DNS   : does the name resolve, and to the RIGHT IP?    dig &lt;name&gt;
2. L3    : is the host reachable?                          ping &lt;ip&gt; (if ICMP allowed)
3. Route : which path does it take?                        ip route get &lt;ip&gt;; traceroute
4. L4    : is the PORT open / accepting?                   nc -vz &lt;ip&gt; &lt;port&gt;; curl
5. L7    : does the app respond correctly?                 curl -v https://&lt;host&gt;/path</div>
</div>
<div class='sec'>Interpreting results</div>
<div class='cmds'>
  <div class='cmd'>- DNS wrong IP        -> stale record / split-horizon / cache
- ping ok, port closed -> firewall/SG, app not listening, wrong port
- connection REFUSED   -> reached host, nothing listening (RST) — app/port issue
- connection TIMEOUT   -> firewall DROP, wrong route, security group, black hole
- TLS error            -> cert/chain problem (openssl s_client)</div>
</div>
<div class='warn'><b>Refused vs timeout is the key fork:</b> REFUSED means you reached the host and it actively said no (port closed / app down) — an app/port problem. TIMEOUT means silence (firewall DROP, wrong route, security group blocking) — a network/filtering problem. This single distinction halves your search space immediately.</div>
<div class='tip'><b>Interview tip:</b> Show a repeatable method (DNS -> L3 -> route -> L4 -> L7) and lead with the refused-vs-timeout fork — it's the fastest way to split "app problem" from "network problem." Naming the one tool per layer (<code>dig</code>, <code>ip route get</code>, <code>nc -vz</code>, <code>curl -v</code>, <code>openssl s_client</code>) demonstrates hands-on fluency.</div>`},
{n:107,tag:'troubleshoot',q:'How do you use tcpdump effectively to debug a network issue? Give a real workflow.',body:`<p>tcpdump captures packets to see what's <i>actually</i> on the wire — ground truth when logs and assumptions disagree. The skill is targeted capture + reading the result.</p>
<div class='sec'>Targeted capture</div>
<div class='cmds'>
  <div class='cmd'>tcpdump -i any -n host 10.0.0.5 and port 443     # filter to the flow you care about
tcpdump -i eth0 -nn 'tcp[tcpflags] & (tcp-syn|tcp-rst) != 0'   # just SYN/RST
tcpdump -i any -w capture.pcap host 10.0.0.5     # write to file -> open in Wireshark
tcpdump -A -s0 port 80                           # print ASCII payload (HTTP)</div>
</div>
<div class='sec'>A real workflow (intermittent failure)</div>
<div class='cmds'>
  <div class='cmd'>1. Reproduce while capturing on BOTH ends (client + server) with a tight filter
2. Look for: SYN with no SYN-ACK (firewall/route?), SYN-ACK no ACK (asymmetric?),
   RST (who sent it, when?), retransmits (loss?), no packets at all (DNS/route?)
3. Correlate timestamps with the app error to pin the exact failing exchange</div>
</div>
<div class='warn'><b>Reading tips:</b> SYN but no SYN-ACK = traffic not reaching/accepted (firewall, wrong port, no listener). SYN-ACK but client never ACKs = return-path/asymmetric routing. Unexpected RST = find which side sent it. Lots of retransmits = packet loss. <i>No</i> packets leaving = it's DNS or routing, not the network path. Capture on both ends to see which side is missing what.</div>
<div class='tip'><b>Interview tip:</b> Emphasize <b>targeted</b> filters (host + port) — never capture everything on a busy host. The diagnostic logic (SYN/SYN-ACK/ACK/RST/retransmit patterns) is what turns a capture into an answer, and capturing on both ends localizes one-way drops. Mention writing a pcap for Wireshark for deeper analysis. This is a strong "I actually debug networks" signal.</div>`},
{n:108,tag:'troubleshoot',q:'Intermittent connection timeouts under load, but fine when idle. What are the likely causes?',body:`<p>"Fine when idle, fails under load" points to a resource that's exhausted only at scale — a finite limit, not a path problem.</p>
<div class='sec'>Prime suspects (load-dependent limits)</div>
<div class='cmds'>
  <div class='cmd'>- conntrack table full (NAT/gateway/node) -> dmesg "table full, dropping packet"
- Ephemeral port exhaustion (many conns to one dest 4-tuple) -> EADDRNOTAVAIL
- Connection pool exhausted (app waits for a free conn -> timeout)
- Accept queue / backlog overflow (somaxconn) -> dropped SYNs under burst
- File descriptor limit hit (ulimit -n) -> "too many open files"
- NAT gateway / LB connection or bandwidth limits
- DB max_connections reached -> app blocks waiting</div>
</div>
<div class='sec'>How to confirm</div>
<div class='cmds'>
  <div class='cmd'>ss -s ; conntrack -C ; dmesg | grep -Ei 'conntrack|table full'
ss -ltn        # listener Recv-Q full = accept queue overflow
cat /proc/sys/fs/file-nr ; ulimit -n          # fd usage vs limit
# Correlate failure rate with concurrency/RPS -> confirms a saturation limit</div>
</div>
<div class='warn'><b>Key signal:</b> Failures scaling with load + healthy CPU/memory = a <i>countable resource limit</i> (ports, conntrack, fds, pool, accept queue, DB conns), not bandwidth or a broken path. The error is usually in <code>dmesg</code> or socket stats, not the app log.</div>
<div class='tip'><b>Interview tip:</b> The framing that scores: "fine idle, fails under load" = some finite resource exhausts at concurrency. Enumerate the usual suspects (conntrack, ephemeral ports, connection pool, accept queue/somaxconn, fd limit, DB connections) and how to confirm each. Connection pooling + raising the right limit is the fix — guessing "the network is slow" is the wrong instinct here.</div>`},
{n:109,tag:'troubleshoot',q:'What does \'netstat -s\' / \'ss\' tell you, and which counters reveal network problems?',body:`<p>Kernel network counters (<code>netstat -s</code>, <code>nstat</code>, <code>ss</code>) expose problems invisible in app logs — retransmits, drops, queue overflows.</p>
<div class='sec'>High-value counters</div>
<div class='cmds'>
  <div class='cmd'>netstat -s | grep -i retransmit     # TCP retransmits -> packet loss / congestion
netstat -s | grep -i "listen queue" # SYNs dropped (listen overflow) -> backlog too small
netstat -s | grep -i "buffer"        # out-of-memory pruning -> socket buffer pressure
nstat -az | grep -i TcpExt           # rich TCP extension counters (resets, drops)
ss -tin                              # per-socket: rtt, cwnd, retrans, pacing</div>
</div>
<div class='sec'>What they reveal</div>
<div class='cmds'>
  <div class='cmd'>Rising retransmits        -> loss or congestion on the path
ListenOverflows/Drops     -> accept queue too small / app accepting too slowly
SYN cookies sent          -> SYN queue overflow (load or SYN flood)
PruneCalled / collapsed   -> socket memory pressure (tune rmem/wmem)
TimeWait reuse/overflow   -> port pressure</div>
</div>
<div class='warn'><b>Gotcha:</b> These are cumulative since boot — take two snapshots and diff to see the <i>rate</i>, not the lifetime total. A big absolute retransmit number on a host up for a year may be nothing; a fast-climbing delta during an incident is the signal. <code>nstat</code> resets counters per run, which makes deltas easy.</div>
<div class='tip'><b>Interview tip:</b> Name the counters that matter — retransmits (loss), listen overflows (accept-queue/backlog), SYN cookies (SYN-queue pressure), buffer pruning (socket mem) — and stress reading the <i>delta</i> over time, not the total. <code>ss -tin</code> for per-socket RTT/cwnd/retrans is the modern, granular view. This shows you debug from kernel evidence, not vibes.</div>`},
{n:110,tag:'troubleshoot',q:'Users in one region report slowness while others are fine. How do you investigate?',body:`<p>Region-specific slowness localizes the problem to a path, POP, region, or routing decision affecting only those users — bisect by geography and layer.</p>
<div class='sec'>Narrow it down</div>
<div class='cmds'>
  <div class='cmd'>- Is it ALL users in that region or a subset (one ISP)? -> path vs regional issue
- Test from that region: mtr/traceroute to the endpoint (where does latency/loss start?)
- Compare DNS answers from that region (GeoDNS sending them to a far/unhealthy POP?)
- CDN: are they hitting a degraded/cold edge POP? check cache hit ratio + POP health
- Is the regional backend/replica itself degraded (DB read replica, cross-region hop)?</div>
</div>
<div class='sec'>Common region-specific causes</div>
<div class='cmds'>
  <div class='cmd'>- GeoDNS/anycast routing them to the wrong (distant or unhealthy) region/POP
- A bad transit/peering path for that region's ISP (mtr shows loss at a hop)
- CDN edge issue in that geography; cold cache after a purge
- Cross-region dependency: that region's app calling a DB/service far away
- Regional cloud incident (check the provider status page)</div>
</div>
<div class='warn'><b>Gotcha:</b> Don't assume it's your app — region-specific slowness is frequently <i>path</i> (ISP/transit/peering) or <i>routing</i> (GeoDNS/anycast steering to the wrong place), which <code>mtr</code> from the affected region reveals. Synthetic monitoring from multiple geographies catches this before users report it.</div>
<div class='tip'><b>Interview tip:</b> Structure it: confirm scope (whole region vs one ISP), then test from that geography with <code>mtr</code>/traceroute and compare GeoDNS/CDN routing. The senior insight is that the cause is often <i>outside your stack</i> — transit/peering paths or routing decisions — so multi-region synthetic monitoring and reading mtr from the affected region are how you prove it.</div>`},
{n:111,tag:'troubleshoot',q:'How do you debug a TLS/SSL handshake failure? What tools and what do the errors mean?',body:`<p>TLS failures throw varied, cryptic errors. <code>openssl s_client</code> is the universal probe to see exactly what the server presents and where the handshake breaks.</p>
<div class='sec'>The probe</div>
<div class='cmds'>
  <div class='cmd'>openssl s_client -connect host:443 -servername host   # SNI matters!
openssl s_client -connect host:443 -showcerts          # full chain server sends
openssl s_client -connect host:443 -tls1_2             # force a version to test support
curl -vI https://host                                  # curl's TLS verbose output</div>
</div>
<div class='sec'>Common errors -> meaning</div>
<div class='cmds'>
  <div class='cmd'>"unable to get local issuer certificate" -> missing INTERMEDIATE cert (server side)
"certificate has expired"                 -> expired cert (renew/automate!)
"hostname mismatch" / SNI                 -> cert CN/SAN doesn't match the name
                                            or no SNI sent (wrong vhost/cert returned)
"no shared cipher" / protocol             -> client/server TLS version/cipher mismatch
"self signed certificate"                 -> untrusted CA / cert not in trust store</div>
</div>
<div class='warn'><b>SNI gotcha:</b> Omitting <code>-servername</code> makes the server return its default cert, not the one for your hostname — leading to a false "wrong cert" diagnosis. Always pass SNI. And "works in browser, fails in client" is the missing-intermediate signature (browsers paper over it; strict clients don't).</div>
<div class='tip'><b>Interview tip:</b> <code>openssl s_client</code> (with <code>-servername</code> for SNI and <code>-showcerts</code> for the chain) is the answer — it shows the negotiated version, cipher, full chain, and exact failure. Mapping the top errors (missing intermediate, expired, hostname/SNI mismatch, no shared cipher) to causes, plus automating renewal to prevent expiry, demonstrates real TLS operations experience.</div>`},
{n:112,tag:'security',q:'What is SSRF and how does the cloud metadata endpoint make it dangerous? How is it mitigated?',body:`<p>Server-Side Request Forgery tricks a server into making requests on an attacker's behalf — and in the cloud it can reach the instance metadata endpoint to steal credentials.</p>
<div class='sec'>The attack</div>
<div class='cmds'>
  <div class='cmd'># App fetches a user-supplied URL (e.g. "fetch this image/webhook").
# Attacker supplies an INTERNAL target instead:
http://169.254.169.254/latest/meta-data/iam/security-credentials/&lt;role&gt;
# The server fetches it from INSIDE the trust boundary and returns/leaks
# the instance's temporary IAM credentials -> cloud account compromise.</div>
</div>
<div class='sec'>Why metadata is the prize</div>
<p>The link-local metadata service (<code>169.254.169.254</code>) hands out the instance's role credentials to anything that can reach it locally — exactly what SSRF gives an attacker a path to.</p>
<div class='sec'>Mitigations</div>
<div class='cmds'>
  <div class='cmd'>- IMDSv2: require a session token + hop limit (blocks simple SSRF GETs) — enforce it
- Validate/allowlist outbound URLs; block link-local + private ranges (RFC1918, 169.254)
- Egress controls / no direct metadata access from app containers
- Least-privilege instance roles (limit blast radius if creds leak)</div>
</div>
<div class='warn'><b>Gotcha:</b> The classic cloud breach chain is SSRF -> metadata -> IAM creds -> lateral movement. <b>IMDSv2</b> (token + low hop limit) defeats the naive version and should be <i>enforced</i> (not just available) — leaving IMDSv1 enabled keeps the door open. Block 169.254.0.0/16 and private ranges from any user-influenced fetch.</div>
<div class='tip'><b>Interview tip:</b> Connect SSRF to the cloud metadata endpoint as the high-value target (leaks IAM creds) — that chain is behind several famous breaches. Enforcing IMDSv2 (not just enabling it), URL allowlisting that blocks link-local/private ranges, and least-privilege roles are the layered defenses. Knowing 169.254.169.254 by heart signals real cloud-security awareness.</div>`},
{n:113,tag:'troubleshoot',q:'How do you debug \'connection refused\' vs \'connection timeout\' vs \'no route to host\'?',body:`<p>These three connection errors each point to a distinct layer — distinguishing them instantly narrows the cause.</p>
<div class='sec'>The three errors</div>
<div class='cmds'>
  <div class='cmd'>Connection REFUSED  : reached the host, but nothing listening on that port
                    (the host actively sent a TCP RST) -> ECONNREFUSED
Connection TIMEOUT  : silence — no response at all within the timeout
                    -> firewall DROP, wrong route, black hole, host down
No route to host     : the kernel has no route to the destination at all
                    (or an ICMP host-unreachable came back) -> EHOSTUNREACH</div>
</div>
<div class='sec'>What each means + next step</div>
<div class='cmds'>
  <div class='cmd'>REFUSED -> network path is FINE; app isn't listening / crashed / wrong port
         -> check the service is up + bound to the right addr:port (ss -ltn)
TIMEOUT -> something SILENTLY drops packets: firewall/SG DROP rule, wrong
         route, or the host is down -> check SG/NACL, ip route get, security groups
NO ROUTE -> routing/interface problem: missing route, interface down, bad gateway
         -> ip route get &lt;dst&gt;; ip addr; check subnet/route table</div>
</div>
<div class='warn'><b>Key insight:</b> REFUSED is GOOD news for the network — you reached the host and it answered (just nothing on that port), so it's an app/port issue. TIMEOUT means you never got an answer — a filtering or routing problem. NO ROUTE is local routing. Reading the exact error word saves enormous time.</div>
<div class='tip'><b>Interview tip:</b> Memorize the mapping: REFUSED = reached host, no listener (app/port); TIMEOUT = silent drop (firewall/route/down); NO ROUTE = local routing/interface. The senior move is recognizing REFUSED actually <i>confirms</i> network reachability, redirecting you to the app — while TIMEOUT sends you to firewalls/security groups. This precision is exactly what's being tested.</div>`},
{n:114,tag:'security',q:'How do you implement micro-segmentation and egress filtering, and why does egress matter so much?',body:`<p>Micro-segmentation limits east-west (service-to-service) traffic to only what's needed; egress filtering controls outbound traffic — together they contain a breach.</p>
<div class='sec'>Micro-segmentation (east-west)</div>
<div class='cmds'>
  <div class='cmd'>- Default-deny between services; explicitly allow only required flows
- Kubernetes: NetworkPolicies (or Cilium identity-based / L7 policies)
- Cloud: tight Security Groups referencing other SGs (not CIDRs), per-tier
- Goal: a compromised service can't freely reach the rest of the network</div>
</div>
<div class='sec'>Egress filtering (outbound)</div>
<div class='cmds'>
  <div class='cmd'>- Default-deny egress; allowlist only required destinations (APIs, registries)
- Block arbitrary outbound to the internet (0.0.0.0/0)
- Force traffic through an egress proxy/firewall for logging + allowlisting</div>
</div>
<div class='sec'>Why egress matters so much</div>
<p>Most teams lock down <i>inbound</i> and ignore <i>outbound</i> — but outbound is how compromised workloads <b>beacon to C2 servers and exfiltrate data</b>. Default-deny egress with an allowlist directly stops the most damaging post-compromise actions.</p>
<div class='warn'><b>Gotcha:</b> Wide-open egress (the default in most setups) means a breached container can exfiltrate your data and phone home freely. Egress control is one of the highest-value, most-skipped controls — and don't forget to allow DNS (port 53) and required service endpoints, or you'll break the app while locking it down.</div>
<div class='tip'><b>Interview tip:</b> Frame micro-segmentation + egress filtering as breach containment: segmentation stops lateral movement, egress filtering stops exfiltration/beaconing. Stress that egress is the commonly-neglected half and the highest-leverage control against data theft. Tie to identity-based policy (Cilium) and SG-referencing-SG patterns to show implementation depth — connects to zero-trust.</div>`},
{n:115,tag:'security',q:'Compare VPN, bastion host, and modern alternatives (SSM/IAP) for secure access to private resources.',body:`<p>Reaching private resources securely has evolved from network-level VPNs and SSH bastions toward identity-based, agent-mediated access with no open inbound ports.</p>
<div class='sec'>The approaches</div>
<div class='cmds'>
  <div class='cmd'>VPN        : extends the private network to the client; broad network access once on
           -> "you're inside = trusted" — over-broad, lateral-movement risk
Bastion/jump host : a hardened SSH gateway; you hop through it to private hosts
           -> single audited entry, but it's an internet-facing box to secure/patch
Modern (SSM Session Manager / IAP / Teleport) : identity-based, agent/proxy-mediated
           -> NO inbound ports open, per-session auth + audit, no standing SSH</div>
</div>
<div class='sec'>Why the modern approach wins</div>
<div class='cmds'>
  <div class='cmd'>- No public SSH port / no bastion to attack (agent dials OUT to the control plane)
- Per-session, identity-based authorization (IAM/SSO) + full session logging
- No long-lived SSH keys to manage/leak; ephemeral credentials
- Fine-grained: who can reach what, when, with recording</div>
</div>
<div class='warn'><b>Gotcha:</b> A VPN grants network-level trust — once connected, the user often can reach far more than they need (violating least privilege), and a compromised VPN credential is a broad foothold. Bastions remove that but are still an internet-facing target with SSH keys to manage. Agent-based (SSM/IAP) eliminates both the open port and the standing keys.</div>
<div class='tip'><b>Interview tip:</b> The trajectory is VPN (network trust) -> bastion (single audited hop) -> identity-based agent access (SSM/IAP/Teleport: no inbound port, per-session IAM auth, full audit, no standing keys). Framing it as zero-trust applied to admin access — least privilege per session instead of network-level trust — is the senior answer and ties to the zero-trust topic.</div>`},
{n:116,tag:'security',q:'Explain TLS termination, passthrough, and re-encryption at a load balancer. Trade-offs of each?',body:`<p>Where TLS is decrypted relative to the load balancer determines visibility, performance, and internal security.</p>
<div class='sec'>The three modes</div>
<div class='cmds'>
  <div class='cmd'>Termination (offload) : LB decrypts; LB<->backend is PLAINTEXT (HTTP)
                       -> LB can route/inspect/cache; backend offloaded from TLS
Passthrough           : LB forwards encrypted bytes; backend terminates TLS
                       -> end-to-end encryption, but LB can't see/route on HTTP (L4 only)
Re-encryption (bridging): LB decrypts (to inspect/route) then RE-encrypts to backend
                       -> L7 features AND encrypted internal hop (best of both, more CPU)</div>
</div>
<div class='sec'>Choosing</div>
<div class='cmds'>
  <div class='cmd'>Termination   : simple, fast, central cert mgmt; OK if the internal network is trusted
Passthrough   : compliance/end-to-end requirements, or backend must see the client cert
Re-encryption : zero-trust internal network + need L7 routing/WAF (common in regulated envs)</div>
</div>
<div class='warn'><b>Gotcha:</b> Plain termination leaves LB->backend traffic in cleartext on the internal network — fine only if you truly trust that segment. In a zero-trust model, that internal hop should be encrypted too (re-encryption or mesh mTLS). Passthrough gives end-to-end encryption but forfeits all L7 routing/inspection at the LB (it's L4-only).</div>
<div class='tip'><b>Interview tip:</b> Map the trade-off to your trust model: termination (fast, central certs, plaintext internal) for trusted networks; re-encryption when you need both L7 features and an encrypted internal hop (zero-trust/regulated); passthrough for true end-to-end or client-cert-to-backend needs. Noting that termination's cleartext internal hop conflicts with zero-trust — and mesh mTLS as the alternative — shows architectural maturity.</div>`},
{n:117,tag:'troubleshoot',q:'An app\'s connection pool keeps exhausting. How do you diagnose pool vs network vs backend issues?',body:`<p>Pool exhaustion ("timeout acquiring connection") can stem from the pool config, the network, or a slow backend — distinguishing them prevents fixing the wrong layer.</p>
<div class='sec'>The three root causes</div>
<div class='cmds'>
  <div class='cmd'>Pool too small / leaked : connections not returned (leak) or maxPoolSize too low
                        for the concurrency -> requests queue for a free conn
Slow backend            : each query/call takes longer -> conns held longer ->
                        pool drains even at normal request rates
Network/LB issue        : conns silently dead (LB idle timeout killed them) but
                        still "in" the pool -> acquiring a dead conn stalls/fails</div>
</div>
<div class='sec'>Diagnosis</div>
<div class='cmds'>
  <div class='cmd'>- Pool metrics: active vs idle vs waiting, acquire wait time, timeouts
- Is backend latency up? (slow query log, downstream p99) -> backend cause
- Are there RSTs/resets on reuse? (the LB idle-timeout pattern) -> network cause
- Does active-conn count grow without release? -> a LEAK (code not closing)
ss -tn dst &lt;backend&gt; | wc -l    # actual live conns vs what the pool thinks</div>
</div>
<div class='warn'><b>Multiplication trap:</b> If every app instance has a pool of N and you run M instances, the backend sees up to N*M connections — scaling out can exhaust the <i>backend's</i> max_connections even though each pool looks fine. Size pools with the total fan-in to the backend in mind, not per-instance.</div>
<div class='tip'><b>Interview tip:</b> Separate the three causes (undersized/leaked pool, slow backend holding conns longer, dead conns from LB idle timeout) and use pool metrics + backend latency + reset patterns to tell them apart. The connection-multiplication insight (N pools x M instances -> backend max_connections) is the senior detail — it explains why "we scaled up and the database fell over."</div>`},
{n:118,tag:'troubleshoot',q:'What is ECMP and how can it cause confusing, inconsistent network behavior?',body:`<p>Equal-Cost Multi-Path routing spreads traffic across multiple equal-cost paths for bandwidth and redundancy — but per-flow hashing can produce puzzling per-connection differences.</p>
<div class='sec'>How ECMP works</div>
<div class='cmds'>
  <div class='cmd'># Multiple equal-cost routes to a destination; the router hashes each FLOW
# (typically the 5-tuple: src/dst IP, src/dst port, proto) to pick a path.
# Same flow -> same path (consistent ordering); different flows -> spread.</div>
</div>
<div class='sec'>Why it confuses debugging</div>
<div class='cmds'>
  <div class='cmd'>- One connection is fine, another to the SAME host is slow/lossy
  (they hashed onto different paths, one of which is degraded)
- Intermittent issues that depend on the source port chosen for the flow
- A capture on one path misses traffic taking another path
- "It works sometimes" — really "it works on the healthy ECMP path"</div>
</div>
<div class='warn'><b>Gotcha:</b> Because ECMP pins a flow to a path by hash, a single bad link/path causes a <i>fraction</i> of connections to fail or slow down while others are perfectly fine — looking random, but it's deterministic per 5-tuple. Re-running with a different source port may hash to a good path and "fix" it, masking the real bad link.</div>
<div class='tip'><b>Interview tip:</b> Recognize the pattern: per-connection inconsistency to the same destination, where some flows are bad and others fine, often means ECMP hashing onto a degraded path. The tell that it changes with source port (different hash -> different path) confirms it. This is an advanced troubleshooting insight that signals you've debugged real multi-path networks, not just single links.</div>`},
{n:119,tag:'troubleshoot',q:'How do you design and verify network failover so it actually works when you need it?',body:`<p>Failover that's never tested usually fails when it matters. Designing it means accounting for detection time, convergence, and state — then proving it with drills.</p>
<div class='sec'>The components of failover time</div>
<div class='cmds'>
  <div class='cmd'>Detection  : how fast you notice failure (health-check interval x threshold)
Convergence: how fast traffic reroutes (DNS TTL, BGP, gratuitous ARP, LB dereg)
State      : what's lost on cutover (in-flight requests, sessions, sticky state)
RTO/RPO    : the actual downtime + data-loss you can tolerate</div>
</div>
<div class='sec'>Where failover silently doesn't work</div>
<div class='cmds'>
  <div class='cmd'>- DNS failover blocked by long client/JVM caching (TTL ignored) -> slow/no cutover
- Stale ARP/conntrack after VIP move -> peers keep hitting the dead node
- Standby was never actually in sync / never tested -> promotes to bad state
- Health check too lax (detects failure minutes late) or too aggressive (false failover)</div>
</div>
<div class='sec'>Verify it</div>
<div class='cmds'>
  <div class='cmd'>- GAME DAYS: actually kill the primary / a zone and measure real RTO/RPO
- Chaos testing: inject failures continuously, not once a year
- Monitor failover events; alert if the standby is unhealthy/out of sync</div>
</div>
<div class='warn'><b>Gotcha:</b> The most common failure is assuming a configured failover works — DNS TTL caching, unsynced standbys, and stale ARP/conntrack routinely defeat it. Detection + convergence often add up to far more than the "60s TTL" you assumed. Untested failover is a liability, not a safety net.</div>
<div class='tip'><b>Interview tip:</b> Break failover into detection + convergence + state, and name the silent killers (DNS/JVM caching defeating TTL, stale ARP/conntrack, unsynced standby). The headline: <b>test it with game days / chaos engineering</b> and measure real RTO/RPO — "we have failover configured" is meaningless until you've pulled the plug and watched it recover. This maturity is exactly what senior/SRE interviews probe.</div>`},
{n:120,tag:'cloud',q:'Design the network architecture for a highly available 3-tier web application across multiple AZs.',body:`<p>This is a capstone design question. The goal: no single point of failure, secure tiering, and graceful handling of an AZ loss.</p>
<div class='sec'>The architecture (per region, spanning >=2 AZs)</div>
<div class='cmds'>
  <div class='cmd'>Edge   : Route53/GeoDNS + CDN + WAF/DDoS protection
Tier 1 : PUBLIC subnets (one per AZ) -> internet-facing LB (multi-AZ, L7)
Tier 2 : PRIVATE subnets (one per AZ) -> app servers in an autoscaling group,
         spread across AZs; reachable ONLY from the LB's security group
Tier 3 : PRIVATE/data subnets (one per AZ) -> primary DB + standby in another AZ
         (synchronous replica), reachable only from the app tier's SG
Egress : NAT Gateway per AZ (not one shared -> avoid an AZ-failure SPOF)
Private : VPC endpoints for S3/API traffic (skip NAT, stay private)</div>
</div>
<div class='sec'>HA properties</div>
<div class='cmds'>
  <div class='cmd'>- Multi-AZ everything: lose an AZ -> LB routes to surviving AZs, DB fails over
- Autoscaling replaces failed app instances; health checks gate the pool
- Least-privilege SGs per tier (LB->app->db chain, no public IPs on app/db)
- Connection draining + graceful shutdown for zero-downtime deploys</div>
</div>
<div class='warn'><b>Common SPOF mistakes:</b> a single NAT Gateway (its AZ dies -> all private egress dies — use one per AZ), a single-AZ database with no standby, or all replicas in one AZ. Also: a deep LB health check on a shared DB can fail the whole app tier at once. Spread across AZs and keep checks shallow.</div>
<div class='tip'><b>Interview tip:</b> Walk it tier by tier (edge -> public LB -> private app ASG -> private multi-AZ DB), stressing multi-AZ at every layer, least-privilege SG chaining (LB->app->DB, no public IPs below the LB), and per-AZ NAT gateways to avoid an egress SPOF. Then state how it survives an AZ loss. Calling out the classic SPOFs (single NAT GW, single-AZ DB) and tying in draining/graceful shutdown shows you can design AND operate it.</div>`}
];

let activeFilter = 'all';
let openCards = new Set();

function badge(tag){
  const labels={fundamentals:'Fundamentals',dns:'DNS',tcp:'TCP/UDP',routing:'Routing & subnets',http:'HTTP/TLS',security:'Network security',loadbalancing:'Load balancing',cloud:'Cloud networking',troubleshoot:'Troubleshooting'};
  return `<span class="badge ${tag}">${labels[tag]||tag}</span>`;
}

function render(qs){
  document.getElementById('count-bar').textContent=`Showing ${qs.length} of 120 questions`;
  document.getElementById('q-list').innerHTML=qs.map(q=>`
    <div class="q-card" id="card-${q.n}">
      <div class="q-header" onclick="toggle(${q.n})">
        <span class="q-num">Q${q.n}</span>
        <span class="q-title">${q.q}</span>
        <div class="q-right">${badge(q.tag)}<span class="chevron${openCards.has(q.n)?' open':''}" id="chev-${q.n}">▼</span></div>
      </div>
      <div class="q-body${openCards.has(q.n)?' open':''}" id="body-${q.n}">${q.body}</div>
    </div>`).join('');
}

function toggle(n){
  const body=document.getElementById('body-'+n);
  const chev=document.getElementById('chev-'+n);
  if(openCards.has(n)){openCards.delete(n);body.classList.remove('open');chev.classList.remove('open');}
  else{openCards.add(n);body.classList.add('open');chev.classList.add('open');}
  document.getElementById('viewed-count').textContent=openCards.size;
}

function setFilter(f,el){
  activeFilter=f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  filterQs();
}

function filterQs(){
  const q=document.getElementById('search').value.toLowerCase();
  let filtered=QS;
  if(activeFilter!=='all') filtered=filtered.filter(x=>x.tag===activeFilter);
  if(q) filtered=filtered.filter(x=>x.q.toLowerCase().includes(q)||x.body.toLowerCase().includes(q));
  render(filtered);
}

render(QS);


/* ── DARK MODE ────────────────────── */
(function(){
  var saved = localStorage.getItem('ekn-dark');
  if (saved === '1') document.body.classList.add('dark');
})();
function toggleDark() {
  var on = document.body.classList.toggle('dark');
  localStorage.setItem('ekn-dark', on ? '1' : '0');
  var btn = document.getElementById('dm-btn');
  if (btn) btn.textContent = on ? '☀ Light' : '☾ Dark';
}

/* ── INTERVIEW MODE ───────────────── */
var fmAll = [], fmIdx = 0, fmGot = 0, fmTotal = 0;

function fmStart() {
  // collect currently visible QS
  fmAll = [];
  var cards = document.querySelectorAll('.q-card');
  cards.forEach(function(c) {
    var n = parseInt(c.id.replace('card-',''));
    var q = QS.find ? QS.find(function(x){ return x.n === n; })
                    : (function(){ for(var i=0;i<QS.length;i++){ if(QS[i].n===n) return QS[i]; } })();
    if (q) fmAll.push(q);
  });
  // shuffle
  for (var i = fmAll.length-1; i > 0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var tmp = fmAll[i]; fmAll[i] = fmAll[j]; fmAll[j] = tmp;
  }
  fmIdx = 0; fmGot = 0; fmTotal = fmAll.length;
  var bar = document.getElementById('fm-bar');
  if (bar) { bar.classList.add('open'); fmShow(); }
}
function fmShow() {
  var bar = document.getElementById('fm-bar');
  if (!bar || fmIdx >= fmTotal) { fmDone(); return; }
  var q = fmAll[fmIdx];
  var pct = fmTotal > 0 ? Math.round((fmIdx/fmTotal)*100) : 0;
  document.getElementById('fm-prog').style.width = pct + '%';
  document.getElementById('fm-meta').textContent = 'Question ' + (fmIdx+1) + ' of ' + fmTotal;
  document.getElementById('fm-q-text').textContent = q.q;
  document.getElementById('fm-answer').innerHTML = q.body;
  document.getElementById('fm-answer').classList.remove('show');
  document.getElementById('fm-reveal').style.display = '';
  document.getElementById('fm-got').style.display    = 'none';
  document.getElementById('fm-miss').style.display   = 'none';
  document.getElementById('fm-score').textContent    = fmGot + ' / ' + fmIdx + ' correct';
}
function fmReveal() {
  document.getElementById('fm-answer').classList.add('show');
  document.getElementById('fm-reveal').style.display = 'none';
  document.getElementById('fm-got').style.display    = '';
  document.getElementById('fm-miss').style.display   = '';
}
function fmNext(ok) {
  if (ok) fmGot++;
  fmIdx++;
  fmShow();
}
function fmStop() {
  var bar = document.getElementById('fm-bar');
  if (bar) bar.classList.remove('open');
}
function fmDone() {
  var bar = document.getElementById('fm-bar');
  if (!bar) return;
  bar.innerHTML = '<div class="fm-done">&#127881; Session complete! You got <strong>' + fmGot + ' / ' + fmTotal + '</strong> correct.</div>'
    + '<button class="fm-stop" onclick="fmStop()">Close</button>';
}

</script>
