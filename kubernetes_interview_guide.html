<script>
const QS = [
  { n:1, tag:'pods',
    q:'What happens when a pod is stuck in Pending state — how do you debug it?',
    body:`<p>Pending means the scheduler cannot place the pod on any node. The root cause is almost always resource constraints, node selectors, taints, or missing PVCs.</p>
<div class='sec'>Debug commands</div>
<div class='cmds'>
  <div class='cmd'>kubectl describe pod &lt;pod&gt; -n &lt;ns&gt;  # check Events section — scheduler message is here</div>
  <div class='cmd'>kubectl get nodes -o wide           # confirm nodes are Ready</div>
  <div class='cmd'>kubectl describe nodes | grep -A5 "Allocated resources"  # check capacity</div>
  <div class='cmd'>kubectl get events --sort-by='.lastTimestamp' -n &lt;ns&gt;</div>
</div>
<p>Common causes: insufficient CPU/memory on all nodes (scale node pool or reduce requests), node selector / affinity rules not matching any node, taint with no matching toleration, PVC stuck in Pending (storage class issue), or image pull waiting on volume mount.</p>
<div class='tip'><b>Interview tip:</b> Mention the scheduler's filter + score pipeline — Pending means the filter phase eliminated all nodes. The Events section tells you which predicate failed.</div>`
  },
  { n:2, tag:'pods',
    q:'Pod is in CrashLoopBackOff — how do you diagnose and fix it?',
    body:`<p>CrashLoopBackOff means the container starts, crashes, Kubernetes restarts it, and it crashes again — with exponential backoff delay (10s → 20s → 40s → max 5min).</p>
<div class='cmds'>
  <div class='cmd'>kubectl logs &lt;pod&gt; --previous          # logs from the crashed container</div>
  <div class='cmd'>kubectl logs &lt;pod&gt; -c &lt;container&gt; -f   # follow live logs</div>
  <div class='cmd'>kubectl describe pod &lt;pod&gt;             # check Exit Code and Last State</div>
</div>
<p>Exit code meanings: 0 = success (CMD exited cleanly — check your ENTRYPOINT), 1 = app error, 137 = OOMKilled (increase memory limit), 139 = segfault, 143 = SIGTERM (graceful shutdown issue). Fix the application error, check liveness probe config, verify env vars and secrets are mounted correctly.</p>
<div class='warn'><b>OOMKilled pattern:</b> If Exit Code is 137 consistently, increase <code>resources.limits.memory</code> or find the memory leak. Kubernetes never lies about OOM.</div>`
  },
  { n:3, tag:'pods',
    q:'Pod is in ImagePullBackOff — how do you resolve it?',
    body:`<div class='cmds'>
  <div class='cmd'>kubectl describe pod &lt;pod&gt;  # check Events for exact pull error</div>
  <div class='cmd'>kubectl get secret &lt;pull-secret&gt; -o jsonpath='{.data.\.dockerconfigjson}' | base64 -d</div>
  <div class='cmd'>kubectl create secret docker-registry regcred --docker-server=&lt;registry&gt; --docker-username=&lt;u&gt; --docker-password=&lt;p&gt;</div>
</div>
<p>Causes: image tag does not exist, wrong registry URL, missing or expired <code>imagePullSecret</code>, registry authentication failure, or network policy blocking egress to the registry. Verify the image exists with <code>docker pull</code> from the node. Check the service account has the pull secret attached.</p>
<div class='tip'><b>GKE/GCP context:</b> For GCR/Artifact Registry, use Workload Identity — no secrets needed. The node SA must have <code>roles/artifactregistry.reader</code>.</div>`
  },
  { n:4, tag:'pods',
    q:'A Deployment is not rolling out — pods are stuck in old version. How do you debug?',
    body:`<div class='cmds'>
  <div class='cmd'>kubectl rollout status deployment/&lt;name&gt;     # check rollout progress</div>
  <div class='cmd'>kubectl rollout history deployment/&lt;name&gt;    # list revisions</div>
  <div class='cmd'>kubectl describe deployment &lt;name&gt;          # check conditions</div>
  <div class='cmd'>kubectl rollout undo deployment/&lt;name&gt;       # rollback to previous</div>
  <div class='cmd'>kubectl rollout undo deployment/&lt;name&gt; --to-revision=2  # rollback to specific</div>
</div>
<p>Common blockers: new pods are CrashLoopBackOff so the rolling update stalls (maxUnavailable / maxSurge config), readiness probe failing so new pods never become Ready, resource quota exceeded so new pods can't schedule, or PodDisruptionBudget blocking old pod termination.</p>
<div class='tip'><b>Principal-level answer:</b> Explain the <code>maxUnavailable</code> and <code>maxSurge</code> parameters and how they control rollout speed vs availability tradeoff. A stuck rollout with <code>maxUnavailable: 0</code> means the new pod must become Ready before the old one is removed.</div>`
  },
  { n:5, tag:'pods',
    q:'A StatefulSet pod is not coming up — how do you troubleshoot?',
    body:`<div class='cmds'>
  <div class='cmd'>kubectl describe pod &lt;sts-pod-0&gt;   # StatefulSet pods start sequentially</div>
  <div class='cmd'>kubectl get pvc -n &lt;ns&gt;            # check PVC binding status</div>
  <div class='cmd'>kubectl describe pvc &lt;pvc-name&gt;    # storage provisioner events</div>
</div>
<p>StatefulSets have ordered, sequential pod creation — pod-1 won't start until pod-0 is Running and Ready. PVC binding failure is the most common blocker. Check: storage class exists and has a provisioner, the provisioner pod itself is running, correct access modes (ReadWriteOnce vs ReadWriteMany), and sufficient storage quota.</p>
<div class='warn'><b>Critical difference from Deployments:</b> Deleting a StatefulSet pod does NOT delete its PVC. If you need to wipe data, delete the PVC explicitly. This is intentional — protect stateful data.</div>`
  },
  { n:6, tag:'pods',
    q:'How do you handle a pod that is consuming too much CPU or memory in production?',
    body:`<div class='cmds'>
  <div class='cmd'>kubectl top pod &lt;pod&gt; -n &lt;ns&gt;      # current resource usage</div>
  <div class='cmd'>kubectl top pod --sort-by=memory   # find top consumers</div>
  <div class='cmd'>kubectl describe pod &lt;pod&gt; | grep -A4 Limits  # check current limits</div>
</div>
<p>Immediate: if OOMKilling, increase memory limit with <code>kubectl set resources deployment</code>. Long term: add Vertical Pod Autoscaler (VPA) in recommendation mode to get right-sized request/limit suggestions. Set resource requests accurately — they affect scheduling; limits affect throttling/OOM.</p>
<div class='tip'><b>CPU vs memory:</b> CPU throttling is silent — the pod runs slowly. Memory OOM kills the container. Both cause degraded performance. Use Prometheus metrics (<code>container_cpu_throttled_seconds_total</code>) to detect CPU throttling in production.</div>`
  },
  { n:7, tag:'networking',
    q:'A Service is not routing traffic to pods — how do you debug?',
    body:`<div class='cmds'>
  <div class='cmd'>kubectl get endpoints &lt;svc&gt; -n &lt;ns&gt;       # if empty — label selector mismatch</div>
  <div class='cmd'>kubectl describe svc &lt;svc&gt;                  # check selector labels</div>
  <div class='cmd'>kubectl get pods --show-labels -n &lt;ns&gt;      # verify pod labels match selector</div>
  <div class='cmd'>kubectl exec -it &lt;pod&gt; -- curl &lt;svc&gt;:&lt;port&gt; # test from inside cluster</div>
</div>
<p>The most common cause is empty Endpoints — the service selector doesn't match any pod labels. Also check: targetPort matches the container port (not the service port), pods are in Ready state (only Ready pods get endpoints), and kube-proxy / CNI is functioning on the node.</p>
<div class='good'><b>Quick test:</b> <code>kubectl run tmp --image=curlimages/curl -it --rm -- curl http://&lt;svc&gt;.&lt;ns&gt;.svc.cluster.local</code> to test DNS resolution and connectivity in one command.</div>`
  },
  { n:8, tag:'networking',
    q:'DNS resolution is failing inside the cluster — how do you troubleshoot?',
    body:`<div class='cmds'>
  <div class='cmd'>kubectl exec -it &lt;pod&gt; -- nslookup kubernetes.default  # basic DNS check</div>
  <div class='cmd'>kubectl get pods -n kube-system | grep coredns         # CoreDNS health</div>
  <div class='cmd'>kubectl logs -n kube-system -l k8s-app=kube-dns --tail=50</div>
  <div class='cmd'>kubectl describe cm coredns -n kube-system             # check Corefile config</div>
</div>
<p>Check CoreDNS pods are Running. Check ConfigMap for Corefile syntax errors. Verify the pod's <code>/etc/resolv.conf</code> points to the cluster DNS IP (usually 10.96.0.10). Network policies can block DNS (UDP 53) from pods to CoreDNS — always allow this in custom NetworkPolicies.</p>
<div class='warn'><b>Common trap:</b> A NetworkPolicy with <code>podSelector: {}</code> (deny all) will break DNS unless you explicitly allow egress to CoreDNS on port 53 UDP/TCP.</div>`
  },
  { n:9, tag:'networking',
    q:'Ingress is not routing traffic — how do you debug Ingress issues?',
    body:`<div class='cmds'>
  <div class='cmd'>kubectl describe ingress &lt;name&gt; -n &lt;ns&gt;            # check rules and backend</div>
  <div class='cmd'>kubectl get pods -n ingress-nginx                   # controller running?</div>
  <div class='cmd'>kubectl logs -n ingress-nginx &lt;controller-pod&gt; -f   # access + error logs</div>
  <div class='cmd'>kubectl get events -n &lt;ns&gt; | grep ingress</div>
</div>
<p>Troubleshooting layers: (1) Is the Ingress controller running and has an external IP? (2) Does the IngressClass match the controller? (3) Is the backend Service and port correct? (4) Does the host header in the request match the Ingress rule? (5) Is TLS cert valid for the hostname? Check controller logs — nginx/envoy logs show exactly which requests arrive and why they fail.</p>
<div class='tip'><b>GKE context:</b> GKE Ingress uses a GCP HTTP(S) Load Balancer. Provisioning takes 5–10 minutes. Check GCP Console → Load Balancers for backend health status — unhealthy backends mean readiness probe failures.</div>`
  },
  { n:10, tag:'networking',
    q:'Network Policy is blocking traffic unexpectedly — how do you debug?',
    body:`<div class='cmds'>
  <div class='cmd'>kubectl get networkpolicy -n &lt;ns&gt; -o yaml   # review all policies in namespace</div>
  <div class='cmd'>kubectl describe networkpolicy &lt;name&gt;        # ingress/egress rules</div>
  <div class='cmd'># Test connectivity: kubectl exec -it &lt;pod&gt; -- nc -zv &lt;target-ip&gt; &lt;port&gt;</div>
</div>
<p>NetworkPolicies are additive for allow rules but the default (if any policy selects a pod) is deny-all for unmatched traffic. Debug by temporarily removing NetworkPolicies to confirm they are the cause, then add back one by one. Check both ingress rules on the destination pod AND egress rules on the source pod.</p>
<div class='warn'><b>Important:</b> NetworkPolicies are enforced by the CNI plugin (Calico, Cilium, etc.). If your CNI doesn't support them (like Flannel without addons), policies are silently ignored. Verify CNI support first.</div>`
  },
  { n:11, tag:'storage',
    q:'PersistentVolumeClaim is stuck in Pending — how do you fix it?',
    body:`<div class='cmds'>
  <div class='cmd'>kubectl describe pvc &lt;name&gt; -n &lt;ns&gt;     # provisioner events are here</div>
  <div class='cmd'>kubectl get sc                            # list storage classes</div>
  <div class='cmd'>kubectl describe sc &lt;name&gt;               # check provisioner and parameters</div>
  <div class='cmd'>kubectl get pods -n kube-system | grep provisioner</div>
</div>
<p>Causes: no default StorageClass defined, StorageClass provisioner pod is not running, access mode mismatch (requesting ReadWriteMany on a block storage that only supports ReadWriteOnce), storage quota exceeded, or the <code>volumeBindingMode: WaitForFirstConsumer</code> means PVC binds only when a pod using it is scheduled.</p>
<div class='tip'><b>WaitForFirstConsumer:</b> With this binding mode, the PVC stays Pending until a pod claims it. This is correct behavior for topology-aware provisioning (e.g., AWS EBS in a specific AZ).</div>`
  },
  { n:12, tag:'storage',
    q:'A pod lost its persistent data after restart — how do you investigate?',
    body:`<div class='cmds'>
  <div class='cmd'>kubectl describe pod &lt;pod&gt; | grep -A10 Volumes   # check volume mounts</div>
  <div class='cmd'>kubectl get pvc -n &lt;ns&gt;                           # PVC still bound?</div>
  <div class='cmd'>kubectl describe pv &lt;pv-name&gt;                     # reclaim policy</div>
</div>
<p>Root causes: pod was using <code>emptyDir</code> instead of a PVC (emptyDir is ephemeral — wiped on pod restart), PVC had <code>reclaimPolicy: Delete</code> and the pod/PVC was deleted, or the volume was mounted at wrong path. Always use PVCs with <code>reclaimPolicy: Retain</code> for production stateful data. Confirm the data directory in the container matches the <code>mountPath</code> in the pod spec.</p>
<div class='warn'><b>Never use emptyDir for production data.</b> It survives container restarts within the same pod but is destroyed when the pod is evicted or deleted.</div>`
  },
  { n:13, tag:'security',
    q:'How do you secure secrets in Kubernetes — what are the risks of using Kubernetes Secrets natively?',
    body:`<p>Kubernetes Secrets are base64-encoded (not encrypted) by default. Anyone with RBAC access to <code>get secrets</code> can read them. They are stored in etcd — if etcd is compromised without encryption-at-rest, all secrets are exposed.</p>
<div class='sec'>Production hardening</div>
<div class='cmds'>
  <div class='cmd'># Enable etcd encryption at rest (EncryptionConfiguration)</div>
  <div class='cmd'># Use external secret stores: External Secrets Operator + AWS SSM/GCP Secret Manager</div>
  <div class='cmd'># Use Vault Agent Injector for sidecar-based secret injection</div>
  <div class='cmd'>kubectl get rolebinding,clusterrolebinding -A | grep secrets  # audit RBAC</div>
</div>
<div class='tip'><b>Best practice:</b> Never store secrets in Git (even encrypted tfvars). Use External Secrets Operator to sync from GCP Secret Manager — secrets live in GCP, K8s Secret is auto-synced and rotated. This is the production standard.</div>`
  },
  { n:14, tag:'security',
    q:'A pod is running as root — how do you harden the pod security posture?',
    body:`<div class='cmds'>
  <div class='cmd'># In pod spec: securityContext</div>
  <div class='cmd'>runAsNonRoot: true</div>
  <div class='cmd'>runAsUser: 1000</div>
  <div class='cmd'>allowPrivilegeEscalation: false</div>
  <div class='cmd'>readOnlyRootFilesystem: true</div>
  <div class='cmd'>capabilities: { drop: ["ALL"] }</div>
</div>
<p>Use Pod Security Admission (PSA) with <code>enforce: restricted</code> label on namespaces in production. Audit existing pods with <code>kubectl get pods -o json | jq '.items[].spec.containers[].securityContext'</code>. For CKS exam: know the difference between privileged, baseline, and restricted PSA profiles.</p>
<div class='good'><b>CKS relevance:</b> This is a core CKS domain. Know how to audit with <code>kube-bench</code>, configure PSA, and use Falco for runtime security detection.</div>`
  },
  { n:15, tag:'security',
    q:'RBAC is misconfigured — a service account has too much access. How do you audit and fix?',
    body:`<div class='cmds'>
  <div class='cmd'>kubectl auth can-i --list --as=system:serviceaccount:&lt;ns&gt;:&lt;sa&gt;</div>
  <div class='cmd'>kubectl get rolebinding,clusterrolebinding -o yaml | grep -A5 &lt;sa-name&gt;</div>
  <div class='cmd'>kubectl describe clusterrolebinding &lt;name&gt;</div>
</div>
<p>Follow least-privilege principle: avoid ClusterRoleBindings when a RoleBinding scoped to a namespace suffices. Avoid binding to default service accounts. Audit with tools like <code>rbac-tool</code> or <code>kubectl-who-can</code>. Never use <code>cluster-admin</code> for application service accounts.</p>
<div class='tip'><b>Common mistake:</b> Helm deployments often create ClusterRoleBindings for convenience. Audit every Helm chart's RBAC manifests before applying to production.</div>`
  },
  { n:16, tag:'security',
    q:'How do you detect and prevent privilege escalation in a Kubernetes cluster?',
    body:`<div class='cmds'>
  <div class='cmd'># Runtime detection: Falco with default ruleset</div>
  <div class='cmd'>falco -r /etc/falco/falco_rules.yaml  # detects privileged container exec, etc.</div>
  <div class='cmd'># Admission control: OPA/Gatekeeper or Kyverno policies</div>
  <div class='cmd'>kubectl get constrainttemplate  # OPA Gatekeeper policies</div>
</div>
<p>Prevention layers: PSA restricted profile blocks privileged containers at admission, NetworkPolicies limit lateral movement, Falco detects anomalous runtime behavior (unexpected exec, file writes in /etc), and audit logging captures API server activity. For CKS: know how to write Falco rules and Kyverno ClusterPolicies.</p>
<div class='warn'><b>Audit logging:</b> Enable API server audit policy. Without it, you cannot do forensics after a breach. This is often missed in self-managed clusters.</div>`
  },
  { n:17, tag:'scheduling',
    q:'Pods are not being scheduled on specific nodes — how do you control pod placement?',
    body:`<div class='cmds'>
  <div class='cmd'>kubectl label node &lt;node&gt; disktype=ssd          # add node label</div>
  <div class='cmd'>kubectl taint node &lt;node&gt; key=value:NoSchedule  # add taint</div>
</div>
<p>Placement mechanisms (in order of preference for production use): (1) <code>nodeSelector</code> — simple label match, (2) Node Affinity — richer rules with preferred vs required, (3) Pod Affinity/AntiAffinity — place pods relative to other pods, (4) Taints + Tolerations — node-side repulsion with pod-side override. For high availability: use <code>topologySpreadConstraints</code> to spread pods across zones evenly.</p>
<div class='tip'><b>Production pattern:</b> Use AntiAffinity with <code>topologyKey: kubernetes.io/hostname</code> to ensure Deployment replicas land on different nodes. Use zone-level spread for HA across AZs.</div>`
  },
  { n:18, tag:'scheduling',
    q:'Nodes are under resource pressure — how do you handle node eviction and resource management?',
    body:`<div class='cmds'>
  <div class='cmd'>kubectl describe node &lt;node&gt; | grep -A10 Conditions   # MemoryPressure, DiskPressure</div>
  <div class='cmd'>kubectl get pods --field-selector=status.phase=Failed -A  # recently evicted pods</div>
  <div class='cmd'>kubectl top nodes  # resource utilization</div>
</div>
<p>Kubelet evicts pods under memory or disk pressure using QoS classes: BestEffort (no requests/limits) evicted first, then Burstable, then Guaranteed (requests = limits). Set accurate resource requests to avoid BestEffort classification for production pods. Use PodDisruptionBudgets to limit voluntary evictions during node drain/maintenance.</p>
<div class='good'><b>Best practice:</b> Set <code>requests = limits</code> for memory on critical pods (Guaranteed QoS). Never leave requests unset in production — the scheduler and eviction manager both rely on them.</div>`
  },
  { n:19, tag:'scheduling',
    q:'HPA (Horizontal Pod Autoscaler) is not scaling — how do you debug?',
    body:`<div class='cmds'>
  <div class='cmd'>kubectl describe hpa &lt;name&gt; -n &lt;ns&gt;   # check current metrics and conditions</div>
  <div class='cmd'>kubectl get apiservice v1beta1.metrics.k8s.io   # metrics-server available?</div>
  <div class='cmd'>kubectl top pods -n &lt;ns&gt;                # verify metrics are flowing</div>
</div>
<p>HPA requires metrics-server to be running. Common failures: metrics-server not installed, pod resource requests not set (HPA computes utilization % of requests — without requests it cannot calculate), scale-down cooldown period active (default 5min), or minReplicas == maxReplicas. For custom metrics HPA, verify Prometheus Adapter is running and the metric is registered as an APIService.</p>
<div class='tip'><b>Production tip:</b> Always set both CPU and memory HPA targets. CPU alone misses memory-bound workloads. For GKE, use custom metrics from Cloud Monitoring for queue-depth-based scaling.</div>`
  },
  { n:20, tag:'scheduling',
    q:'Node is NotReady — how do you diagnose and recover?',
    body:`<div class='cmds'>
  <div class='cmd'>kubectl describe node &lt;node&gt;             # check Conditions and Events</div>
  <div class='cmd'>kubectl get pods -A --field-selector spec.nodeName=&lt;node&gt;  # pods on the node</div>
  <div class='cmd'># SSH to node:</div>
  <div class='cmd'>systemctl status kubelet                  # kubelet running?</div>
  <div class='cmd'>journalctl -u kubelet -n 100             # kubelet logs</div>
  <div class='cmd'>systemctl status containerd              # container runtime</div>
</div>
<p>NotReady causes: kubelet stopped/crashed, container runtime (containerd/docker) failed, network plugin (CNI) crashed, node OOM at OS level, disk full, or certificate expired. Fix: restart kubelet and containerd. For a fully unrecoverable node, drain it (<code>kubectl drain --ignore-daemonsets --delete-emptydir-data</code>) and replace it.</p>
<div class='warn'><b>Node drain before delete:</b> Always drain before deleting/replacing a node to gracefully evict pods and respect PodDisruptionBudgets.</div>`
  },
  { n:21, tag:'observability',
    q:'How do you debug a pod that is Running but application is not responding?',
    body:`<div class='cmds'>
  <div class='cmd'>kubectl logs &lt;pod&gt; -f --tail=100         # live application logs</div>
  <div class='cmd'>kubectl exec -it &lt;pod&gt; -- sh             # exec into container</div>
  <div class='cmd'>kubectl exec -it &lt;pod&gt; -- curl localhost:&lt;port&gt;/health</div>
  <div class='cmd'>kubectl describe pod &lt;pod&gt; | grep -A5 Readiness  # readiness probe status</div>
</div>
<p>Running state only means the container process is alive — the application inside may be deadlocked, misconfigured, or healthy-checked incorrectly. Check: readiness probe endpoint is responding (if not, pod is excluded from Service endpoints), application logs for panics/errors, env vars/configmaps mounted correctly, and network connectivity to dependencies (DB, cache).</p>
<div class='tip'><b>Readiness vs Liveness:</b> Readiness probe failure removes pod from Service endpoints (traffic stops). Liveness probe failure restarts the container. Use both strategically — don't make liveness probe too aggressive or you'll cause unnecessary restarts under load.</div>`
  },
  { n:22, tag:'observability',
    q:'How do you set up effective observability for a Kubernetes cluster?',
    body:`<p>Production observability has three pillars: metrics, logs, and traces.</p>
<div class='cmds'>
  <div class='cmd'># Metrics: Prometheus + Grafana (kube-prometheus-stack Helm chart)</div>
  <div class='cmd'># Logs: Fluent Bit (DaemonSet) → Elasticsearch/Loki → Grafana/Kibana</div>
  <div class='cmd'># Traces: OpenTelemetry Collector → Jaeger/Tempo</div>
  <div class='cmd'># Alerting: Prometheus AlertManager with PagerDuty/OpsGenie</div>
</div>
<p>Key metrics to alert on: pod restart rate, HPA at max replicas, PVC usage %, node CPU/memory %, etcd latency, API server request latency, and coredns error rate. Set up dashboards for: cluster overview, namespace resource usage, and per-deployment golden signals (latency, traffic, errors, saturation).</p>
<div class='good'><b>GKE context:</b> GKE Autopilot includes managed Prometheus. For SonicWall GCP role, Google Cloud Monitoring + Cloud Logging reduces operational overhead significantly vs self-managed Prometheus stack.</div>`
  },
  { n:23, tag:'observability',
    q:'Kubernetes API server is slow or unresponsive — how do you troubleshoot?',
    body:`<div class='cmds'>
  <div class='cmd'>kubectl get --raw /metrics | grep apiserver_request_duration</div>
  <div class='cmd'>kubectl get --raw /healthz                    # API server health</div>
  <div class='cmd'># Check etcd: etcdctl endpoint health</div>
  <div class='cmd'>kubectl top nodes                             # control plane node pressure</div>
</div>
<p>Causes: etcd performance degradation (high disk latency — use SSDs for etcd), too many LIST operations (watch storms from controllers), control plane node under memory/CPU pressure, too many objects in etcd (clean up unused resources), or webhook latency (admission webhooks adding round-trip time to every API call).</p>
<div class='warn'><b>Webhook timeout:</b> Misconfigured admission webhooks with long timeouts can make every API call slow. Set <code>failurePolicy: Ignore</code> and short timeouts for non-critical webhooks. Check webhook latency with <code>apiserver_admission_webhook_admission_duration_seconds</code>.</div>`
  },
  { n:24, tag:'cluster',
    q:'How do you perform a zero-downtime Kubernetes cluster upgrade?',
    body:`<div class='cmds'>
  <div class='cmd'># 1. Upgrade control plane first (one minor version at a time)</div>
  <div class='cmd'>kubectl drain &lt;control-plane-node&gt; --ignore-daemonsets</div>
  <div class='cmd'># 2. Upgrade kubelet and kubectl on control plane node</div>
  <div class='cmd'># 3. Upgrade worker nodes one by one:</div>
  <div class='cmd'>kubectl drain &lt;worker-node&gt; --ignore-daemonsets --delete-emptydir-data</div>
  <div class='cmd'>kubectl uncordon &lt;worker-node&gt;   # after upgrade</div>
</div>
<p>Rules: upgrade only one minor version at a time (1.28 → 1.29, not 1.28 → 1.30). Control plane must be upgraded before workers. Ensure PodDisruptionBudgets are set so draining doesn't violate availability. Test in staging first. For GKE: use GKE's managed upgrade with surge upgrade enabled (adds extra nodes during upgrade).</p>
<div class='tip'><b>GKE shortcut:</b> Enable auto-upgrade with maintenance windows and surge upgrade. GKE handles the upgrade orchestration — you define the maintenance policy and it does the rest safely.</div>`
  },
  { n:25, tag:'cluster',
    q:'etcd is unhealthy — how do you recover a Kubernetes cluster?',
    body:`<div class='cmds'>
  <div class='cmd'>etcdctl endpoint health --endpoints=&lt;ip&gt;:2379</div>
  <div class='cmd'>etcdctl member list   # check cluster membership</div>
  <div class='cmd'># Restore from snapshot:</div>
  <div class='cmd'>etcdctl snapshot restore /backup/etcd.db --data-dir=/var/lib/etcd-restore</div>
</div>
<p>etcd is the source of truth for the entire cluster. If the majority of etcd members are down, the cluster is read-only (no writes). Recovery steps: restore from a snapshot backup, reconfigure the etcd data directory, restart the etcd service, then restart kube-apiserver. Always take regular etcd snapshots in production (automated, stored in durable object storage).</p>
<div class='warn'><b>etcd quorum:</b> A 3-node etcd cluster tolerates 1 failure. A 5-node cluster tolerates 2. Never run single-node etcd in production. For GKE and managed services, etcd is managed for you — this question is more relevant for self-managed clusters (CKA/CKS exam domain).</div>`
  },
  { n:26, tag:'cluster',
    q:'How do you drain a node safely without causing downtime?',
    body:`<div class='cmds'>
  <div class='cmd'>kubectl cordon &lt;node&gt;    # prevent new pods from scheduling</div>
  <div class='cmd'>kubectl drain &lt;node&gt; --ignore-daemonsets --delete-emptydir-data --grace-period=60</div>
  <div class='cmd'>kubectl uncordon &lt;node&gt;  # re-enable scheduling after maintenance</div>
</div>
<p>Before draining: verify PodDisruptionBudgets allow eviction (if PDB has <code>minAvailable: 100%</code> and only 1 replica, drain will hang). Ensure other nodes have capacity to absorb the evicted pods. DaemonSet pods are ignored by default (<code>--ignore-daemonsets</code>). Pods using <code>emptyDir</code> require <code>--delete-emptydir-data</code> flag to proceed.</p>
<div class='tip'><b>Production checklist:</b> Check HPA max replicas, PDB definitions, and node capacity before draining. Schedule drains during low-traffic windows for safety.</div>`
  },
  { n:27, tag:'cluster',
    q:'Certificate expired in the cluster — how do you renew Kubernetes certificates?',
    body:`<div class='cmds'>
  <div class='cmd'>kubeadm certs check-expiration          # list all cert expiry dates</div>
  <div class='cmd'>kubeadm certs renew all                 # renew all control plane certs</div>
  <div class='cmd'>systemctl restart kubelet               # restart to pick up new certs</div>
  <div class='cmd'>openssl x509 -in /etc/kubernetes/pki/apiserver.crt -noout -dates</div>
</div>
<p>kubeadm-managed clusters: certs expire after 1 year by default. Rotate before expiry using <code>kubeadm certs renew</code>. After renewal, restart all control plane components. Set up a monitoring alert for cert expiry (Prometheus <code>x509_cert_expiry</code> metric). For managed clusters (GKE/EKS), certificate rotation is handled automatically.</p>
<div class='warn'><b>Expired cert symptoms:</b> kubectl commands fail with TLS errors, pods can't pull images, webhooks fail. This is a full cluster outage scenario — certificate monitoring is non-negotiable.</div>`
  },
  { n:28, tag:'cicd',
    q:'How do you implement GitOps for Kubernetes using ArgoCD?',
    body:`<p>GitOps principle: Git is the single source of truth for cluster state. ArgoCD continuously reconciles cluster state with the Git repository.</p>
<div class='cmds'>
  <div class='cmd'>argocd app create myapp --repo &lt;git-url&gt; --path k8s/ --dest-server &lt;cluster&gt;</div>
  <div class='cmd'>argocd app sync myapp          # manual sync</div>
  <div class='cmd'>argocd app get myapp           # health and sync status</div>
  <div class='cmd'>argocd app diff myapp          # what would change on sync</div>
</div>
<p>ArgoCD polls the repo (default 3min) or uses Git webhooks for instant sync. Set sync policy to <code>automated</code> with <code>prune: true</code> and <code>selfHeal: true</code> for fully automated GitOps. Use ApplicationSets for multi-cluster or multi-environment deployments from a single template.</p>
<div class='tip'><b>Interview differentiator:</b> Mention the App-of-Apps pattern for bootstrapping cluster infrastructure. ArgoCD manages ArgoCD itself — the entire cluster config is in Git.</div>`
  },
  { n:29, tag:'cicd',
    q:'How do you implement a blue-green or canary deployment in Kubernetes?',
    body:`<p>Blue-green: two full deployments (blue=current, green=new). Switch traffic at the Service level. Canary: route a percentage of traffic to new version.</p>
<div class='cmds'>
  <div class='cmd'># Blue-green: patch service selector to switch</div>
  <div class='cmd'>kubectl patch svc myapp -p '{"spec":{"selector":{"version":"green"}}}'</div>
  <div class='cmd'># Canary with Argo Rollouts:</div>
  <div class='cmd'>kubectl argo rollouts get rollout myapp --watch</div>
  <div class='cmd'>kubectl argo rollouts promote myapp   # advance canary steps</div>
</div>
<p>Native Kubernetes: use multiple Deployments with weighted Services or Ingress traffic splitting. Production-grade: use Argo Rollouts or Flagger with analysis templates — they automate canary promotion/rollback based on Prometheus metrics (error rate, latency). This is far more sophisticated than manual Deployment switching.</p>
<div class='good'><b>Principal-level answer:</b> Describe analysis-driven progressive delivery — canary receives 10% traffic, if P99 latency stays under threshold for 10min, promote to 25%, then 50%, then 100%. Argo Rollouts automates this entire workflow.</div>`
  },
  { n:30, tag:'cicd',
    q:'CI/CD pipeline is failing to deploy to Kubernetes — how do you troubleshoot?',
    body:`<div class='cmds'>
  <div class='cmd'># Check: kubectl is configured with correct kubeconfig</div>
  <div class='cmd'>kubectl config current-context   # verify target cluster</div>
  <div class='cmd'>kubectl auth can-i create deployment --as=system:serviceaccount:cicd:deployer</div>
  <div class='cmd'># Check: image was pushed to registry before apply</div>
  <div class='cmd'>kubectl rollout status deployment/&lt;name&gt; --timeout=120s</div>
</div>
<p>Common pipeline failures: kubeconfig not configured or expired token, CI service account lacks RBAC permissions (create/update deployments, secrets), image not yet pushed when apply runs (race condition), wrong namespace or context, or Helm values file referencing wrong environment. Always check <code>kubectl auth can-i</code> with the pipeline's service account identity.</p>
<div class='tip'><b>GKE pipeline pattern:</b> Use Workload Identity Federation to authenticate GitHub Actions to GCP — no service account key files needed. OIDC token exchange is the production standard.</div>`
  },
  { n:31, tag:'pods',
    q:'How do you handle pod disruption during node maintenance to maintain availability?',
    body:`<div class='cmds'>
  <div class='cmd'># Create PodDisruptionBudget</div>
  <div class='cmd'>kubectl apply -f - &lt;&lt;EOF
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: myapp-pdb }
spec:
  minAvailable: 2
  selector: { matchLabels: { app: myapp } }
EOF</div>
  <div class='cmd'>kubectl get pdb -n &lt;ns&gt;   # check current disruptions allowed</div>
</div>
<p>PDBs guarantee that at least N pods (or at most X% are unavailable) during voluntary disruptions (drain, eviction). Set <code>minAvailable: "50%"</code> or <code>maxUnavailable: 1</code>. PDBs only apply to voluntary disruptions — a node crash is involuntary and PDBs don't protect against it. Combine PDBs with proper replica counts and anti-affinity for full HA.</p>
<div class='warn'><b>PDB trap:</b> A PDB with <code>minAvailable</code> equal to current replicas will block all drains. Always set minAvailable to less than total replicas.</div>`
  },
  { n:32, tag:'cluster',
    q:'How do you manage multi-tenancy in a Kubernetes cluster?',
    body:`<p>Multi-tenancy means multiple teams/applications share a cluster safely with isolation and fair resource usage.</p>
<div class='cmds'>
  <div class='cmd'># Namespace per team/environment with ResourceQuota:</div>
  <div class='cmd'>kubectl create quota team-quota --hard=cpu=10,memory=20Gi,pods=50 -n team-a</div>
  <div class='cmd'># LimitRange for default resource requests:</div>
  <div class='cmd'>kubectl apply -f limitrange.yaml -n team-a</div>
</div>
<p>Isolation layers: Namespaces (logical), ResourceQuota (resource limits per namespace), LimitRange (per-pod defaults and limits), NetworkPolicies (network isolation), RBAC (API access isolation), PSA (security posture enforcement per namespace). For stronger isolation between untrusted tenants, use separate node pools with taints/tolerations per tenant, or separate clusters.</p>
<div class='tip'><b>Principal recommendation:</b> Soft multi-tenancy (namespace isolation) for trusted teams. Hard multi-tenancy (separate clusters or node pools) for compliance-sensitive or untrusted workloads.</div>`
  },
  { n:33, tag:'observability',
    q:'How do you troubleshoot high latency in a microservices application running on Kubernetes?',
    body:`<div class='cmds'>
  <div class='cmd'>kubectl top pods -n &lt;ns&gt; --sort-by=cpu   # CPU-saturated pods</div>
  <div class='cmd'># Check Prometheus golden signals per service:</div>
  <div class='cmd'># http_request_duration_seconds (latency), http_requests_total (traffic), error rate</div>
  <div class='cmd'>kubectl exec -it &lt;pod&gt; -- curl -s /metrics | grep duration</div>
</div>
<p>Systematic approach: (1) Identify which service in the call chain is slow using distributed traces (Jaeger/Tempo), (2) Check if the slow pod is CPU-throttled (increase limits or HPA), (3) Check DNS resolution latency (ndots:5 config causes multiple DNS lookups), (4) Check network policy overhead, (5) Check external dependency (DB, cache) latency. Use service mesh (Istio/Linkerd) for automatic tracing and traffic metrics.</p>
<div class='tip'><b>DNS latency fix:</b> Set <code>dnsConfig.options: [{name: ndots, value: "1"}]</code> to reduce spurious DNS lookups. This alone can reduce P99 latency by hundreds of milliseconds in chatty microservices.</div>`
  },
  { n:34, tag:'security',
    q:'How do you implement image security scanning in a Kubernetes cluster?',
    body:`<div class='cmds'>
  <div class='cmd'># CI: trivy image &lt;image&gt;:&lt;tag&gt;  # scan before push</div>
  <div class='cmd'># Admission: OPA/Gatekeeper or Kyverno to block unscanned images</div>
  <div class='cmd'># Runtime: Falco to detect anomalous container behavior</div>
  <div class='cmd'># Registry: GCR/Artifact Registry with Container Analysis API</div>
</div>
<p>Defense in layers: (1) Scan in CI pipeline — block PRs with critical CVEs, (2) Admission webhook — only allow images from approved registries with scan results, (3) Use digest pinning (<code>image: repo/app@sha256:abc...</code>) not mutable tags in production, (4) Enable runtime scanning with Falco, (5) Regularly re-scan deployed images for newly discovered CVEs.</p>
<div class='good'><b>GCP Artifact Registry:</b> Enables automatic vulnerability scanning with Container Analysis. Combine with Binary Authorization to enforce only attested images run in production — a cryptographic proof of scan completion.</div>`
  },
  { n:35, tag:'cicd',
    q:'How do you design a production-grade Kubernetes platform for multiple teams — what does a Principal Platform Engineer own here?',
    body:`<p>This is the Principal-level systems design question. The answer spans infrastructure, developer experience, and organizational patterns.</p>
<div class='cmds'>
  <div class='cmd'># Infrastructure: IaC (Terraform) for cluster provisioning, GitOps (ArgoCD) for config</div>
  <div class='cmd'># Developer experience: internal developer platform, self-service namespace creation</div>
  <div class='cmd'># Reliability: multi-region clusters, cross-cluster traffic routing</div>
  <div class='cmd'># Governance: OPA/Kyverno policies, admission webhooks, cost attribution</div>
</div>
<p>A Principal Platform Engineer owns: cluster lifecycle (provisioning, upgrades, capacity planning), golden paths (opinionated templates teams use to deploy safely), reliability SLOs for the platform itself, security posture enforcement, observability standards, and developer productivity metrics. The platform should make the right thing the easy thing — teams deploy to production without thinking about Kubernetes internals.</p>
<div class='tip'><b>SonicWall context:</b> Frame your answer around mentoring — a Principal defines the standards other engineers follow. Show you think in terms of platforms and APIs, not just individual cluster operations. That's what separates a Staff/Principal from a Senior engineer.</div>`
  },
  { n:36, tag:'pods',
    q:'Explain init containers vs sidecar containers. When do you use each in production?',
    body:`<p>Both add containers to a pod beyond the main app, but they differ in lifecycle. Init containers run to completion <b>before</b> app containers start, sequentially; sidecars run <b>alongside</b> the main container for its whole life.</p>
<div class='sec'>Init container — runs once, before app</div>
<div class='cmds'>
  <div class='cmd'>initContainers:
  - name: wait-for-db
    image: busybox
    command: ['sh','-c','until nc -z db 5432; do sleep 2; done']</div>
</div>
<p>Use init containers for: waiting on a dependency, running DB migrations, fetching config/secrets, setting kernel params, cloning a git repo into a shared volume.</p>
<div class='sec'>Sidecar — runs for the pod's lifetime</div>
<p>Use sidecars for: log shippers, service-mesh proxies (Envoy), metrics exporters, config reloaders. Since K8s 1.28+ native sidecars are <code>initContainers</code> with <code>restartPolicy: Always</code> — they start before the app and shut down after it, fixing the old job-sidecar termination problem.</p>
<div class='tip'><b>Interview tip:</b> The native sidecar (1.29 GA) solved two long-standing pain points: sidecars now start before the main container (so the proxy is ready first) and don't block Job completion. Mention this — it shows you track recent K8s.</div>`
  },
  { n:37, tag:'pods',
    q:'What is the difference between resources.requests and resources.limits? What happens at each boundary?',
    body:`<p>Requests are what the scheduler reserves; limits are the hard ceiling the runtime enforces. They drive scheduling, QoS class, and eviction order.</p>
<div class='cmds'>
  <div class='cmd'>resources:
  requests: { cpu: "250m", memory: "256Mi" }   # scheduler reserves this
  limits:   { cpu: "500m", memory: "512Mi" }   # hard cap</div>
</div>
<div class='sec'>What happens at the boundary</div>
<p>CPU is compressible: exceeding the CPU limit <b>throttles</b> the container (CFS quota), it is not killed. Memory is incompressible: exceeding the memory limit gets the container <b>OOMKilled</b> (exit 137). Requests affect which node it lands on and the QoS class.</p>
<div class='sec'>QoS classes (eviction priority)</div>
<div class='cmds'>
  <div class='cmd'>Guaranteed  : requests == limits for all resources  (evicted last)
Burstable   : requests &lt; limits                       (evicted middle)
BestEffort  : no requests/limits set                   (evicted first)</div>
</div>
<div class='warn'><b>Production gotcha:</b> Setting a CPU limit can cause latency spikes from CFS throttling even when the node has spare CPU. Many teams set CPU <i>requests</i> but omit CPU <i>limits</i> for latency-sensitive workloads, while always setting memory limits to prevent node OOM.</div>`
  },
  { n:38, tag:'pods',
    q:'Walk through the full pod lifecycle and termination sequence. Why do graceful shutdowns fail?',
    body:`<p>Understanding termination is key to zero-downtime deploys. The sequence is not just "send SIGTERM."</p>
<div class='sec'>Termination sequence</div>
<div class='cmds'>
  <div class='cmd'>1. Pod marked Terminating; removed from Endpoints (stops getting new traffic)
2. preStop hook runs (if defined)
3. SIGTERM sent to PID 1 in each container
4. Wait up to terminationGracePeriodSeconds (default 30s)
5. SIGKILL if still running</div>
</div>
<div class='sec'>Why graceful shutdown fails</div>
<p>The endpoint removal (step 1) and SIGTERM (step 3) happen <b>in parallel</b>, not in order — kube-proxy/ingress may still route traffic for a moment after SIGTERM. The app can get requests after it started shutting down.</p>
<div class='cmds'>
  <div class='cmd'>lifecycle:
  preStop:
    exec: { command: ["sh","-c","sleep 5"] }   # let endpoint removal propagate
terminationGracePeriodSeconds: 45</div>
</div>
<div class='tip'><b>Interview tip:</b> The classic fix is a <code>preStop</code> sleep of a few seconds so load balancers de-register the pod before SIGTERM, plus an app that handles SIGTERM by draining in-flight requests. Also ensure PID 1 actually receives SIGTERM (use an init like <code>tini</code> if your entrypoint is a shell that swallows signals).</div>`
  },
  { n:39, tag:'pods',
    q:'Deployment vs StatefulSet vs DaemonSet vs Job/CronJob — when do you choose each?',
    body:`<p>Picking the right workload controller is a common design question.</p>
<div class='sec'>The four</div>
<div class='cmds'>
  <div class='cmd'>Deployment  : stateless, interchangeable replicas; rolling updates
StatefulSet : stable identity + ordered start/stop + per-pod storage
DaemonSet   : one pod per node (agents)
Job/CronJob : run-to-completion / scheduled batch</div>
</div>
<div class='sec'>StatefulSet guarantees</div>
<p>Stable network ID (<code>pod-0</code>, <code>pod-1</code>...), stable storage (PVC per pod via <code>volumeClaimTemplates</code>), ordered rollout and scale-down (reverse order). Use for databases, Kafka, ZooKeeper, anything needing identity or per-replica disks.</p>
<div class='sec'>DaemonSet examples</div>
<p>Log collectors (Fluent Bit), node monitoring (node-exporter), CNI agents, storage daemons, security agents — anything that must run on every node.</p>
<div class='tip'><b>Interview tip:</b> A frequent trap: "can I run a database as a Deployment?" Technically yes with a single replica, but you lose stable identity and ordered operations. For HA stateful systems use a StatefulSet (or better, an operator like CloudNativePG / Strimzi that manages the StatefulSet plus failover logic).</div>`
  },
  { n:40, tag:'pods',
    q:'How do liveness, readiness, and startup probes differ? What\'s the danger of a bad liveness probe?',
    body:`<p>The three probe types serve different purposes and conflating them causes outages.</p>
<div class='cmds'>
  <div class='cmd'>livenessProbe   : is it alive? FAIL -&gt; restart the container
readinessProbe  : ready for traffic? FAIL -&gt; remove from Service endpoints
startupProbe    : has it finished booting? gates the other two for slow starters</div>
</div>
<div class='sec'>The danger of a bad liveness probe</div>
<p>If a liveness probe is too aggressive (short timeout, low threshold) or depends on a downstream service, a transient blip restarts healthy containers. Under load this creates a <b>restart storm</b> — the very thing you didn't want. Liveness should check only "is this process wedged," never "is my database up."</p>
<div class='cmds'>
  <div class='cmd'>readinessProbe:
  httpGet: { path: /healthz/ready, port: 8080 }
  periodSeconds: 5
  failureThreshold: 3
livenessProbe:
  httpGet: { path: /healthz/live, port: 8080 }
  initialDelaySeconds: 15
  failureThreshold: 3</div>
</div>
<div class='warn'><b>Rule:</b> Readiness can depend on dependencies (so you stop serving when DB is down); liveness must NOT — it should only detect a deadlocked process. A liveness probe that pings the DB will restart-loop your whole fleet during a DB incident.</div>`
  },
  { n:41, tag:'pods',
    q:'Explain HPA, VPA, and how they conflict. How does HPA actually compute replica count?',
    body:`<p>Horizontal Pod Autoscaler scales replica count; Vertical Pod Autoscaler adjusts requests/limits. They fight if both target CPU/memory.</p>
<div class='sec'>HPA formula</div>
<div class='cmds'>
  <div class='cmd'>desiredReplicas = ceil( currentReplicas * (currentMetric / targetMetric) )

# e.g. 4 pods at 80% CPU, target 50%:
# ceil(4 * 80/50) = ceil(6.4) = 7 replicas</div>
</div>
<p>HPA reads metrics from <code>metrics-server</code> (resource metrics) or custom/external metrics adapters (Prometheus Adapter, KEDA). It has a stabilization window to avoid flapping and won't scale on missing metrics.</p>
<div class='sec'>The HPA/VPA conflict</div>
<p>Both reacting to CPU/memory will oscillate. Safe combos: HPA on CPU + VPA on memory in <code>recommendation</code>-only mode, or HPA on custom metrics (RPS, queue depth) + VPA on resources. Never both on the same signal in <code>Auto</code> mode.</p>
<div class='tip'><b>Interview tip:</b> For event-driven scaling (queue length, Kafka lag, scale-to-zero), name <b>KEDA</b> — it extends HPA with external scalers. For node-level scaling mention Cluster Autoscaler or Karpenter. Showing the formula and the HPA/VPA conflict is what separates a real answer.</div>`
  },
  { n:42, tag:'scheduling',
    q:'Explain taints, tolerations, node affinity, and pod affinity/anti-affinity with a real use case.',
    body:`<p>These control where pods land. Taints repel; affinities attract; anti-affinity spreads.</p>
<div class='sec'>Taints + tolerations (node repels unless pod tolerates)</div>
<div class='cmds'>
  <div class='cmd'>kubectl taint nodes gpu-node-1 dedicated=gpu:NoSchedule
# pod must tolerate to land there:
tolerations:
- { key: dedicated, operator: Equal, value: gpu, effect: NoSchedule }</div>
</div>
<p>Effects: <code>NoSchedule</code> (don't place), <code>PreferNoSchedule</code> (soft), <code>NoExecute</code> (evict existing pods too).</p>
<div class='sec'>Node affinity (pod selects nodes) + pod anti-affinity (spread)</div>
<div class='cmds'>
  <div class='cmd'>affinity:
  podAntiAffinity:           # spread replicas across nodes
    requiredDuringSchedulingIgnoredDuringExecution:
    - labelSelector: { matchLabels: { app: web } }
      topologyKey: kubernetes.io/hostname</div>
</div>
<div class='sec'>Real use case</div>
<p>GPU nodes tainted so only ML workloads (with tolerations + node affinity for <code>gpu=true</code>) land there. Web tier uses pod anti-affinity across <code>topology.kubernetes.io/zone</code> so a zone failure never takes all replicas.</p>
<div class='tip'><b>Interview tip:</b> For simple even spreading prefer <code>topologySpreadConstraints</code> over anti-affinity — it scales better and supports <code>maxSkew</code>. Anti-affinity (especially <code>required</code>) can leave pods Pending if there aren't enough distinct nodes.</div>`
  },
  { n:43, tag:'scheduling',
    q:'What are topologySpreadConstraints and why are they preferred over pod anti-affinity?',
    body:`<p>Topology spread constraints distribute pods evenly across failure domains (zones, nodes) with a tunable skew, scaling far better than anti-affinity.</p>
<div class='cmds'>
  <div class='cmd'>topologySpreadConstraints:
- maxSkew: 1
  topologyKey: topology.kubernetes.io/zone
  whenUnsatisfiable: DoNotSchedule    # or ScheduleAnyway (soft)
  labelSelector: { matchLabels: { app: web } }</div>
</div>
<div class='sec'>Why preferred over anti-affinity</div>
<p>Pod anti-affinity is O(N^2) to evaluate (every pod checked against every other) and is binary — a pod either can or can't co-locate. Spread constraints are evaluated more efficiently and let you say "keep zones within 1 pod of each other" with <code>maxSkew</code>, giving even distribution instead of just "not together."</p>
<div class='sec'>whenUnsatisfiable</div>
<p><code>DoNotSchedule</code> = hard (pod stays Pending if it would violate skew); <code>ScheduleAnyway</code> = best-effort. Combine zone-level and node-level constraints for resilient placement.</p>
<div class='warn'><b>Gotcha:</b> With <code>DoNotSchedule</code> and a cluster that lacks enough zones/nodes, pods go Pending. Use <code>ScheduleAnyway</code> for soft spreading, or ensure your node pools actually span the topology keys you reference.</div>`
  },
  { n:44, tag:'scheduling',
    q:'How does the kube-scheduler decide where to place a pod? Explain the filter and score phases.',
    body:`<p>The scheduler runs a two-phase pipeline per pending pod: filter (which nodes <i>can</i> run it) then score (which is <i>best</i>).</p>
<div class='sec'>Filter (predicates) — eliminate infeasible nodes</div>
<div class='cmds'>
  <div class='cmd'>- NodeResourcesFit   : enough allocatable CPU/mem for requests?
- NodeAffinity       : node selector / affinity match?
- TaintToleration    : tolerates the node's taints?
- NodeUnschedulable  : node cordoned?
- VolumeBinding      : can required PVCs bind here?</div>
</div>
<div class='sec'>Score (priorities) — rank feasible nodes</div>
<div class='cmds'>
  <div class='cmd'>- NodeResourcesBalancedAllocation : even CPU/mem usage
- ImageLocality                   : node already has the image
- InterPodAffinity / TopologySpread
- LeastAllocated vs MostAllocated  : spread vs bin-pack</div>
</div>
<p>Highest-scoring node wins; the pod is bound (a write to the API setting <code>nodeName</code>), then kubelet on that node starts it.</p>
<div class='tip'><b>Interview tip:</b> Pending almost always means the <i>filter</i> phase rejected every node — <code>kubectl describe pod</code> Events shows which predicate failed (insufficient cpu, untolerated taint, no matching affinity, unbound PVC). You can customize scoring via the scheduler framework or run multiple scheduler profiles.</div>`
  },
  { n:45, tag:'scheduling',
    q:'Explain PodDisruptionBudgets. How do they interact with node drains and upgrades?',
    body:`<p>A PodDisruptionBudget limits how many pods of an app can be voluntarily disrupted at once, protecting availability during drains, upgrades, and autoscaling.</p>
<div class='cmds'>
  <div class='cmd'>apiVersion: policy/v1
kind: PodDisruptionBudget
spec:
  minAvailable: 2        # or maxUnavailable: 1
  selector: { matchLabels: { app: web } }</div>
</div>
<div class='sec'>Voluntary vs involuntary</div>
<p>PDBs only govern <b>voluntary</b> disruptions: <code>kubectl drain</code>, cluster autoscaler scale-down, node pool upgrades. They do <b>not</b> protect against involuntary events (node crash, OOM, kernel panic).</p>
<div class='sec'>Interaction with drains</div>
<p><code>kubectl drain</code> uses the Eviction API, which respects PDBs. If evicting a pod would violate <code>minAvailable</code>, the eviction is blocked and the drain waits. A misconfigured PDB (e.g. <code>minAvailable</code> equal to replica count) makes drains hang forever.</p>
<div class='warn'><b>Production gotcha:</b> <code>minAvailable: 100%</code> or a PDB on a single-replica Deployment deadlocks node maintenance — the node can never be safely drained. Always leave headroom (e.g. <code>maxUnavailable: 1</code>) and run >=2 replicas for anything with a PDB.</div>`
  },
  { n:46, tag:'pods',
    q:'What is a ConfigMap vs Secret, and how do you safely roll config changes without downtime?',
    body:`<p>ConfigMaps hold non-sensitive config; Secrets hold sensitive data (base64-encoded, not encrypted by default). Both can be mounted as volumes or injected as env vars.</p>
<div class='sec'>Env var vs volume mount — a key difference</div>
<p>Env vars are read <b>once at container start</b> — changing the ConfigMap does NOT update them; you must restart the pod. Volume-mounted ConfigMaps/Secrets are <b>updated in place</b> (eventually, via kubelet sync) but the app must re-read the file.</p>
<div class='sec'>Rolling config safely</div>
<div class='cmds'>
  <div class='cmd'># Trigger a rollout when config changes: hash the config into an annotation
kubectl rollout restart deployment/web        # simplest manual trigger
# or use a checksum annotation in the pod template so the hash change rolls pods</div>
</div>
<div class='warn'><b>Security note:</b> Secrets are only base64-encoded in etcd by default. Enable <b>encryption at rest</b> (EncryptionConfiguration with a KMS provider) and restrict RBAC on secrets. Better: pull from an external store (Vault, cloud Secret Manager) via CSI Secrets Store or External Secrets Operator so secrets never live in etcd/git.</div>
<div class='tip'><b>Interview tip:</b> Mention the <code>immutable: true</code> field on ConfigMaps/Secrets — it improves performance (kubelet stops watching) and prevents accidental edits; you roll a new named object instead.</div>`
  },
  { n:47, tag:'pods',
    q:'How do you debug a pod that\'s running but the application inside is misbehaving (no shell in image)?',
    body:`<p>Distroless/scratch images have no shell, so <code>kubectl exec</code> fails. Use ephemeral debug containers.</p>
<div class='sec'>kubectl debug — ephemeral container</div>
<div class='cmds'>
  <div class='cmd'>kubectl debug -it &lt;pod&gt; --image=busybox --target=&lt;container&gt; -- sh
# shares the target container's process namespace — see its PIDs, /proc, network</div>
</div>
<div class='sec'>Debug a node</div>
<div class='cmds'>
  <div class='cmd'>kubectl debug node/&lt;node&gt; -it --image=ubuntu   # host PID/net/IPC, /host mount</div>
</div>
<div class='sec'>Copy a pod with a shell for deeper work</div>
<div class='cmds'>
  <div class='cmd'>kubectl debug &lt;pod&gt; -it --copy-to=debug-pod --image=nicolaka/netshoot --share-processes</div>
</div>
<p>Other tools: <code>kubectl logs --previous</code> for crashed instances, <code>kubectl cp</code> to pull files, <code>kubectl port-forward</code> to hit the app locally, and <code>nsenter</code>/<code>crictl</code> on the node for runtime-level inspection.</p>
<div class='tip'><b>Interview tip:</b> <code>kubectl debug</code> with <code>--target</code> and process-namespace sharing is the modern answer for distroless images. <code>netshoot</code> is the go-to debug image (dig, curl, tcpdump, ss). This shows you operate hardened, shell-less production images.</div>`
  },
  { n:48, tag:'pods',
    q:'Explain rolling update strategy parameters (maxSurge, maxUnavailable) and how to do a safe canary.',
    body:`<p>Deployment rollout speed and safety are governed by two knobs.</p>
<div class='cmds'>
  <div class='cmd'>strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 25%          # extra pods above desired during rollout
    maxUnavailable: 0      # never drop below desired (safest)</div>
</div>
<p><code>maxUnavailable: 0</code> + <code>maxSurge: 1</code> gives zero-downtime: a new pod must be Ready before an old one is removed. Larger surge = faster but more resource use.</p>
<div class='sec'>Canary without extra tooling</div>
<div class='cmds'>
  <div class='cmd'># Run a small second Deployment with the new image + same Service selector
# 1 canary pod alongside 9 stable -&gt; ~10% traffic, watch metrics, then promote</div>
</div>
<div class='sec'>Canary with tooling</div>
<p>Argo Rollouts or Flagger give progressive delivery: automated step weights (10%->50%->100%), metric analysis, and auto-rollback on SLO breach — far safer than manual.</p>
<div class='tip'><b>Interview tip:</b> Tie in the earlier termination point — zero-downtime needs <code>maxUnavailable: 0</code> AND readiness probes AND preStop drain. All three together. Mention DB migrations must be backward-compatible (expand/contract) since old and new pods run simultaneously mid-rollout.</div>`
  },
  { n:49, tag:'scheduling',
    q:'What is pod priority and preemption? How can it cause cascading evictions?',
    body:`<p>PriorityClasses let higher-priority pods preempt (evict) lower-priority ones when the cluster is full.</p>
<div class='cmds'>
  <div class='cmd'>apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata: { name: high-priority }
value: 1000000
globalDefault: false</div>
</div>
<p>When a high-priority pod can't schedule, the scheduler finds the lowest-priority pods whose removal would make room and evicts them (respecting PDBs where possible).</p>
<div class='sec'>Cascading eviction risk</div>
<p>If many high-priority pods arrive, they can evict a wave of low-priority pods, which then re-queue and may themselves trigger node scale-up or further churn. Misused priorities (everything "high") defeat the purpose and cause thrash.</p>
<div class='warn'><b>Gotcha:</b> System-critical components use reserved classes <code>system-cluster-critical</code> / <code>system-node-critical</code>. Don't assign these to app workloads. Preemption can disrupt lower-priority pods even when they have PDBs if no other placement exists. Keep a sane priority hierarchy and use it sparingly.</div>
<div class='tip'><b>Interview tip:</b> Good real use: give batch/CI jobs low priority so they yield to production traffic during spikes, and use Cluster Autoscaler with priority expander so preemption is a bridge until new nodes come online.</div>`
  },
  { n:50, tag:'pods',
    q:'A pod was OOMKilled but the app\'s heap looks fine. What else could consume the memory limit?',
    body:`<p>The cgroup memory limit counts <b>everything</b> in the container, not just your app's heap. OOMKills with a "healthy" heap usually come from overlooked memory users.</p>
<div class='sec'>Hidden memory consumers</div>
<div class='cmds'>
  <div class='cmd'>- Page cache from heavy file I/O (counts toward cgroup memory)
- Off-heap / native allocations (JNI, mmap, direct ByteBuffers in JVM)
- tmpfs / emptyDir{medium: Memory} volumes count against the limit
- Thread stacks (many threads x stack size)
- The JVM/runtime itself not being container-aware (old runtimes)</div>
</div>
<div class='sec'>Diagnosis</div>
<div class='cmds'>
  <div class='cmd'>kubectl describe pod &lt;pod&gt;            # Last State: OOMKilled, exit 137
kubectl top pod &lt;pod&gt; --containers   # live usage
# on node: cat /sys/fs/cgroup/memory.max  and  memory.current</div>
</div>
<div class='warn'><b>JVM gotcha:</b> Pre-Java 10 JVMs ignored cgroup limits and sized the heap from host RAM -&gt; instant OOM. Use a container-aware JVM and <code>-XX:MaxRAMPercentage</code>. For Node.js, set <code>--max-old-space-size</code> below the limit.</div>
<div class='tip'><b>Interview tip:</b> Mention that <code>emptyDir</code> with <code>medium: Memory</code> and writable page cache both count against the limit — a surprising number of OOMKills are tmpfs or log files, not the heap.</div>`
  },
  { n:51, tag:'scheduling',
    q:'How does the Cluster Autoscaler work, and how is Karpenter different?',
    body:`<p>Cluster Autoscaler (CA) adds/removes <b>nodes</b> when pods can't schedule or nodes are underused. Karpenter is a newer, more flexible alternative.</p>
<div class='sec'>Cluster Autoscaler</div>
<p>Watches for Pending pods that fail only due to insufficient resources -&gt; scales up a node group (ASG/MIG). Scales down nodes that are underutilized and whose pods can move elsewhere (respecting PDBs, local storage, etc.). Works on fixed, pre-defined node groups.</p>
<div class='sec'>Karpenter — group-less, just-in-time</div>
<div class='cmds'>
  <div class='cmd'>- No node groups: picks instance types per pending pods' actual needs
- Faster: provisions nodes in seconds, bin-packs across instance types
- Consolidation: actively repacks workloads onto fewer/cheaper nodes
- Native spot handling and instance diversification</div>
</div>
<div class='warn'><b>Scale-down blockers:</b> CA won't remove a node running a pod without a controller, a pod with local storage, a pod that can't be moved due to PDB, or kube-system pods lacking a PDB. A single such pod can pin an expensive node up indefinitely.</div>
<div class='tip'><b>Interview tip:</b> Karpenter's consolidation + per-pod instance selection usually cuts cost vs CA's fixed groups. Mention the scale-down blockers — they're the #1 reason "autoscaling isn't saving money."</div>`
  },
  { n:52, tag:'pods',
    q:'Explain how a Service selects pods and what happens when none are Ready. How do headless Services differ?',
    body:`<p>A Service is a stable virtual IP that load-balances to a dynamic set of pod IPs chosen by a label selector. The glue is the Endpoints/EndpointSlice object.</p>
<div class='sec'>Selector -&gt; EndpointSlice</div>
<div class='cmds'>
  <div class='cmd'>kubectl get endpointslices -l kubernetes.io/service-name=&lt;svc&gt;
# only READY pods appear here; not-ready pods are excluded from routing</div>
</div>
<p>If no pods are Ready, the EndpointSlice is empty and connections fail (connection refused / timeout). This is why readiness probes matter — a failing readiness check pulls the pod from the endpoints, not the Service.</p>
<div class='sec'>Headless Service (clusterIP: None)</div>
<div class='cmds'>
  <div class='cmd'>spec:
  clusterIP: None      # no virtual IP / no proxying
  selector: { app: db }</div>
</div>
<p>DNS returns the <b>individual pod IPs</b> (A records) instead of one VIP. Used with StatefulSets so clients can address specific pods (<code>db-0.db.ns.svc</code>) — essential for databases and peer discovery.</p>
<div class='tip'><b>Interview tip:</b> Distinguish the Service types: ClusterIP (internal VIP), NodePort (port on every node), LoadBalancer (cloud LB), ExternalName (CNAME), and Headless (no VIP, direct pod DNS). Headless + StatefulSet is the standard pattern for stateful peer-aware systems.</div>`
  },
  { n:53, tag:'networking',
    q:'Walk through exactly how a packet travels from one pod to another pod on a different node.',
    body:`<p>This is the canonical CNI question. The path crosses veth pairs, the node's network namespace, and an overlay or routed fabric.</p>
<div class='sec'>The path (pod A on node1 -&gt; pod B on node2)</div>
<div class='cmds'>
  <div class='cmd'>1. Pod A sends to Pod B's IP; leaves via eth0 (one end of a veth pair)
2. Other veth end is in node1's root netns, attached to a bridge / CNI datapath
3. Routing: node knows Pod B's IP belongs to node2's pod CIDR
4. Encapsulation (overlay: VXLAN/Geneve) OR direct routing (no overlay)
5. Across the node network to node2
6. Decapsulate -&gt; node2 routes to Pod B's veth -&gt; Pod B eth0</div>
</div>
<div class='sec'>Overlay vs routed</div>
<p>Overlay (Flannel VXLAN, Calico IP-in-IP): pod traffic is encapsulated; works anywhere but adds overhead. Routed/native (Calico BGP, GKE/EKS VPC-native): pod IPs are real routable addresses in the VPC; lower overhead, integrates with cloud routing.</p>
<div class='tip'><b>Interview tip:</b> The K8s networking model requires: every pod gets its own IP, pods communicate without NAT, and nodes can reach all pods. CNI plugins implement this. Mention eBPF-based Cilium replacing kube-proxy/iptables for performance, and that the veth pair + per-node pod CIDR is the core mechanism. Knowing overlay-vs-routed trade-offs signals depth.</div>`
  },
  { n:54, tag:'networking',
    q:'How does kube-proxy implement Services? Compare iptables vs IPVS vs eBPF modes.',
    body:`<p>kube-proxy programs the node's datapath so a Service's virtual IP load-balances to backend pods. The mode determines how.</p>
<div class='sec'>iptables mode (default historically)</div>
<p>Installs iptables rules: Service VIP DNAT'd to a random backend pod IP. Simple and robust, but rule evaluation is O(N) — thousands of Services create huge rule chains and slow updates.</p>
<div class='sec'>IPVS mode</div>
<p>Uses the kernel's IPVS (hash tables) for O(1) lookup and real LB algorithms (round-robin, least-conn, etc.). Scales to thousands of Services far better than iptables.</p>
<div class='sec'>eBPF (Cilium, kube-proxy replacement)</div>
<div class='cmds'>
  <div class='cmd'># Cilium can REPLACE kube-proxy entirely:
# Service load-balancing done in eBPF at the socket/XDP layer
# - no iptables rule explosion, lower latency, better observability</div>
</div>
<div class='tip'><b>Interview tip:</b> The progression iptables -&gt; IPVS -&gt; eBPF is about scaling Service count and cutting latency. In large clusters, iptables rule churn becomes a real bottleneck (slow Service updates, CPU on rule eval). eBPF/Cilium is the modern direction — name it and explain <i>why</i> (no linear rule chains).</div>`
  },
  { n:55, tag:'networking',
    q:'Explain Kubernetes DNS. How is a Service name resolved and what are common DNS failure modes?',
    body:`<p>CoreDNS resolves Service and pod names cluster-wide. Understanding the resolution path and its pitfalls is key to debugging "intermittent" failures.</p>
<div class='sec'>Resolution</div>
<div class='cmds'>
  <div class='cmd'>svc.namespace.svc.cluster.local   # fully qualified Service name
# A pod's /etc/resolv.conf:
search ns.svc.cluster.local svc.cluster.local cluster.local
nameserver 10.96.0.10   # the CoreDNS Service ClusterIP
options ndots:5</div>
</div>
<div class='sec'>The ndots:5 performance trap</div>
<p><code>ndots:5</code> means any name with fewer than 5 dots is first tried against every search-domain suffix. <code>api.example.com</code> (2 dots) becomes 4+ failed lookups before the real one. High-QPS apps generate massive DNS load and latency from this.</p>
<div class='sec'>Common failure modes</div>
<div class='cmds'>
  <div class='cmd'>- CoreDNS pods under-resourced / not enough replicas (use autoscaler)
- ndots:5 amplifying lookups (use FQDN with trailing dot, or NodeLocal DNSCache)
- conntrack race on UDP (old kernels) -&gt; intermittent 5s timeouts
- NetworkPolicy accidentally blocking egress to CoreDNS</div>
</div>
<div class='tip'><b>Interview tip:</b> Name <b>NodeLocal DNSCache</b> as the standard fix — a per-node DNS cache that cuts CoreDNS load and avoids the UDP conntrack 5s-timeout bug. The <code>ndots:5</code> trap and using fully-qualified names (trailing dot) for external hosts is a classic senior optimization.</div>`
  },
  { n:56, tag:'networking',
    q:'What is an Ingress vs a Service of type LoadBalancer vs the Gateway API? When use each?',
    body:`<p>These expose workloads externally at different layers and maturity levels.</p>
<div class='sec'>Service type LoadBalancer</div>
<p>L4 (TCP/UDP). Provisions one cloud load balancer per Service — simple but one LB (and cost) per Service, no HTTP routing.</p>
<div class='sec'>Ingress</div>
<p>L7 HTTP(S) routing through a shared ingress controller (NGINX, Traefik, cloud LB). Host/path-based routing, TLS termination, one LB for many Services. The long-standing standard, but the spec is limited and vendors bolt on features via annotations.</p>
<div class='sec'>Gateway API — the successor</div>
<div class='cmds'>
  <div class='cmd'># Role-oriented: GatewayClass (infra) / Gateway (cluster-op) / HTTPRoute (app dev)
# Expressive routing (header/method/weight), protocol-aware, portable across vendors
# Replaces annotation-soup of Ingress; supports traffic splitting natively</div>
</div>
<div class='tip'><b>Interview tip:</b> Use LoadBalancer for raw TCP/non-HTTP; Ingress for HTTP routing today; and know the <b>Gateway API</b> is the future (GA, role separation, native traffic splitting and multi-protocol). Mentioning Gateway API and why it exists — to fix Ingress's expressiveness and annotation portability problems — signals current knowledge.</div>`
  },
  { n:57, tag:'networking',
    q:'Explain NetworkPolicies. Why is a pod \'open\' by default and how do you implement zero-trust?',
    body:`<p>By default, all pods can talk to all pods — the cluster is flat and open. NetworkPolicies add firewall rules, but only if the CNI enforces them.</p>
<div class='sec'>Default-open, then default-deny</div>
<div class='cmds'>
  <div class='cmd'># Start zero-trust: deny all ingress in a namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: default-deny-ingress }
spec:
  podSelector: {}            # all pods in namespace
  policyTypes: [Ingress]     # no ingress rules = deny all ingress</div>
</div>
<p>Then add explicit allow rules per app. The moment a pod is selected by any policy, it switches from allow-all to allow-only-what's-listed.</p>
<div class='sec'>Allow specific traffic</div>
<div class='cmds'>
  <div class='cmd'>ingress:
- from:
  - podSelector: { matchLabels: { app: frontend } }
  ports: [{ protocol: TCP, port: 8080 }]</div>
</div>
<div class='warn'><b>Critical:</b> NetworkPolicies are enforced by the CNI — Flannel (basic) ignores them; Calico/Cilium enforce them. A policy with no enforcing CNI is a silent no-op. Also remember to allow egress to CoreDNS (port 53) in default-deny-egress namespaces, or DNS breaks.</div>
<div class='tip'><b>Interview tip:</b> Zero-trust = default-deny + explicit allows per flow. Cilium adds L7-aware policies (allow only <code>GET /api</code>) and identity-based rules via eBPF, going beyond the L3/L4 stock NetworkPolicy.</div>`
  },
  { n:58, tag:'networking',
    q:'You have intermittent 5-second latency on some pod-to-service calls. What\'s the likely cause?',
    body:`<p>Intermittent ~5s delays on DNS or new connections are a fingerprint of the classic conntrack/DNS race on UDP.</p>
<div class='sec'>The root cause</div>
<p>On older kernels, parallel DNS lookups (A and AAAA sent simultaneously over UDP) hit a race in the kernel conntrack DNAT insertion; one packet is dropped, and the client waits for the <b>5s DNS retransmit timeout</b>. The <code>ndots:5</code> setting multiplies lookups, increasing the chance.</p>
<div class='sec'>Fixes</div>
<div class='cmds'>
  <div class='cmd'>- NodeLocal DNSCache (queries go to a local cache over TCP-ish path; avoids the race)
- single-request-reopen / use-vc in resolv.conf options
- reduce ndots / use FQDN for external names
- upgrade kernel (the conntrack race is fixed in newer kernels)</div>
</div>
<div class='sec'>How to confirm</div>
<div class='cmds'>
  <div class='cmd'>kubectl exec &lt;pod&gt; -- sh -c 'time nslookup my-svc'   # ~5s = the tell
# tcpdump on the node for DNS retransmits; check CoreDNS latency metrics</div>
</div>
<div class='tip'><b>Interview tip:</b> The 5-second-exactly pattern is the giveaway — it maps to the DNS UDP retransmit timer. NodeLocal DNSCache is the canonical fix and a great thing to name. This question tests whether you've actually operated clusters, not just read docs.</div>`
  },
  { n:59, tag:'storage',
    q:'Explain the PV / PVC / StorageClass model and dynamic provisioning end to end.',
    body:`<p>Kubernetes decouples storage requests (PVC) from storage implementation (PV) via StorageClass-driven dynamic provisioning.</p>
<div class='sec'>The objects</div>
<div class='cmds'>
  <div class='cmd'>StorageClass : the "type" of storage + provisioner (e.g. gp3, ssd)
PVC          : a pod's REQUEST for storage (size, access mode, class)
PV           : the actual provisioned volume (bound 1:1 to a PVC)</div>
</div>
<div class='sec'>Dynamic provisioning flow</div>
<div class='cmds'>
  <div class='cmd'>1. Pod references a PVC
2. PVC names a StorageClass
3. The CSI provisioner for that class creates a real disk (EBS/PD/etc.)
4. A PV is created and BOUND to the PVC
5. The volume is attached + mounted into the pod</div>
</div>
<div class='sec'>Access modes & binding</div>
<p><code>ReadWriteOnce</code> (one node), <code>ReadOnlyMany</code>, <code>ReadWriteMany</code> (needs NFS/EFS-style backend), <code>ReadWriteOncePod</code> (single pod). <code>volumeBindingMode: WaitForFirstConsumer</code> delays provisioning until a pod is scheduled, so the disk lands in the right zone.</p>
<div class='tip'><b>Interview tip:</b> The <code>WaitForFirstConsumer</code> binding mode is a key production detail — without it, a disk can be created in zone-a while the pod schedules to zone-b and can never mount it. Always use it for zonal block storage.</div>`
  },
  { n:60, tag:'storage',
    q:'What is the CSI architecture? Walk through what happens when a volume is attached to a pod.',
    body:`<p>The Container Storage Interface standardizes how K8s talks to storage backends via out-of-tree drivers. It has a controller plane and a node plane.</p>
<div class='sec'>Components</div>
<div class='cmds'>
  <div class='cmd'>CSI Controller (Deployment): Provision/Delete + Attach/Detach (talks to cloud API)
CSI Node (DaemonSet)       : Stage + Publish (mounts on the actual node)
Sidecars: external-provisioner, external-attacher, node-driver-registrar</div>
</div>
<div class='sec'>Attach -&gt; mount sequence</div>
<div class='cmds'>
  <div class='cmd'>1. ControllerPublishVolume : attach disk to the node (cloud API call)
2. NodeStageVolume         : format + mount to a global staging path on node
3. NodePublishVolume       : bind-mount staging path into the pod's mount namespace</div>
</div>
<p>Detach reverses it on pod deletion. The split (stage once per node, publish per pod) lets multiple pods share a staged volume where allowed.</p>
<div class='tip'><b>Interview tip:</b> CSI also enables snapshots, volume expansion, and cloning as standardized features. A common failure: a volume stuck attaching because the previous node didn't cleanly detach (force-detach / <code>VolumeAttachment</code> cleanup needed). Knowing the controller-vs-node split explains why some failures are cloud-side (attach) vs node-side (mount).</div>`
  },
  { n:61, tag:'storage',
    q:'A StatefulSet pod is stuck and its PVC won\'t move to a new node. Why, and how do you resolve it?',
    body:`<p>StatefulSet pods bind to specific PVCs and (for block storage) specific zones — that stickiness is by design but causes stuck-pod scenarios.</p>
<div class='sec'>Why it's stuck</div>
<div class='cmds'>
  <div class='cmd'>- ReadWriteOnce block volume can attach to only ONE node at a time
- If the old node died uncleanly, the volume is still "attached" to it
- The pod can't start on a new node until the volume detaches
- Zonal disk (EBS/PD) can only mount in its own zone -&gt; pod pinned to that zone</div>
</div>
<div class='sec'>Resolution</div>
<div class='cmds'>
  <div class='cmd'>kubectl get volumeattachment            # find the stale attachment
kubectl get pods -o wide                # confirm pod can't bind
# If node is truly gone: delete the Node object so the attach-detach
# controller force-detaches; then the pod can reschedule + mount.
kubectl delete node &lt;dead-node&gt;</div>
</div>
<div class='warn'><b>Danger:</b> Never force-detach a volume that might still be written to by a live node — RWO exists to prevent two writers corrupting data. Only force-detach when you're certain the old node is dead. This is why split-brain protection matters for stateful workloads.</div>
<div class='tip'><b>Interview tip:</b> Mention that the cloud's node-not-ready timeout (often ~6 min) gates automatic force-detach, which is why a failed-node stateful pod takes minutes to recover. For faster failover, operators (e.g. CloudNativePG) handle promotion at the app layer rather than relying on volume reattach.</div>`
  },
  { n:62, tag:'storage',
    q:'How do you expand a PVC, take snapshots, and back up stateful data in Kubernetes?',
    body:`<p>CSI standardizes volume expansion, snapshots, and (via tools) backup of stateful workloads.</p>
<div class='sec'>Online volume expansion</div>
<div class='cmds'>
  <div class='cmd'># StorageClass must have allowVolumeExpansion: true
kubectl patch pvc &lt;pvc&gt; -p '{"spec":{"resources":{"requests":{"storage":"50Gi"}}}}'
# CSI grows the disk; filesystem resize often happens online (no pod restart on modern CSI)</div>
</div>
<div class='sec'>Volume snapshots</div>
<div class='cmds'>
  <div class='cmd'>apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshot
spec:
  volumeSnapshotClassName: csi-snapclass
  source: { persistentVolumeClaimName: data-db-0 }
# restore by creating a PVC with dataSource pointing at the snapshot</div>
</div>
<div class='sec'>Application-consistent backups</div>
<p>Snapshots are crash-consistent, not app-consistent — quiesce the DB (or use its native backup) for consistency. <b>Velero</b> backs up cluster objects + PV snapshots together and restores to another cluster (DR).</p>
<div class='warn'><b>Gotcha:</b> You can only <i>grow</i> a PVC, never shrink it. And a snapshot of a running database without flushing/locking may be unrestorable — pair CSI snapshots with the DB's own consistent-backup hooks.</div>
<div class='tip'><b>Interview tip:</b> Name Velero for cluster-level backup/DR and stress crash-consistent vs application-consistent — the distinction interviewers look for in anyone who's restored real stateful data.</div>`
  },
  { n:63, tag:'networking',
    q:'How does service mesh mTLS work in Kubernetes, and what\'s the cost of running a mesh?',
    body:`<p>A service mesh (Istio, Linkerd) injects a sidecar proxy per pod that transparently encrypts and authenticates service-to-service traffic with mutual TLS.</p>
<div class='sec'>How mTLS works</div>
<div class='cmds'>
  <div class='cmd'>- Control plane issues short-lived per-workload certs (SPIFFE identity)
- Sidecar proxies intercept all pod traffic (via iptables/eBPF redirect)
- Proxy A presents its cert, proxy B verifies + presents its own -&gt; mutual auth
- Traffic encrypted in transit; app code unchanged</div>
</div>
<div class='sec'>What the mesh adds beyond mTLS</div>
<p>Uniform retries/timeouts/circuit-breaking, traffic splitting (canary), L7 observability (golden signals for every call), and authorization policies — all without app changes.</p>
<div class='sec'>The cost</div>
<div class='cmds'>
  <div class='cmd'>- Per-pod sidecar: extra CPU/memory + ~1 hop of latency per call
- A control plane to operate and upgrade
- Debugging complexity (traffic goes through proxies)
- Overkill for a handful of services</div>
</div>
<div class='tip'><b>Interview tip:</b> Be balanced: mesh gives free mTLS + observability + traffic control, but the sidecar tax (resources, latency, ops) is real. Mention <b>Linkerd</b> (lighter) vs <b>Istio</b> (feature-rich) and the move to sidecar-less / ambient / eBPF (Cilium) meshes to cut the per-pod overhead.</div>`
  },
