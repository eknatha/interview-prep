    body:`<p>Cilium uses eBPF to run networking, security, and load-balancing logic in the kernel datapath, replacing iptables-based kube-proxy and unlocking richer features.</p>
<div class='sec'>What eBPF replaces</div>
<div class='cmds'>
  <div class='cmd'>- kube-proxy iptables/IPVS -> eBPF Service load-balancing (no rule explosion)
- L3/L4 NetworkPolicy -> eBPF enforcement + identity-based (not IP-based) policy
- Adds L7-aware policy (allow only GET /api), DNS-aware policy
- Hubble: deep network observability (flow visibility) from eBPF</div>
</div>
<div class='sec'>Why teams adopt it</div>
<div class='cmds'>
  <div class='cmd'>- Performance at scale: no linear iptables chains; lower latency
- Identity-based security: policy follows workload identity, not ephemeral pod IPs
- Observability: Hubble shows every flow without sidecars
- kube-proxy replacement + sidecar-less service mesh (ambient/eBPF mesh)</div>
</div>
<div class='sec'>The shift</div>
<p>eBPF lets you run programmable logic in the kernel safely, so networking/security/observability move from userspace proxies and iptables into the datapath — faster and more flexible.</p>
<div class='tip'><b>Interview tip:</b> Connect to earlier points: iptables kube-proxy doesn't scale (linear rule eval), and IP-based NetworkPolicy is brittle as pods churn. Cilium's eBPF gives O(1) LB, identity-based policy, L7 awareness, and Hubble observability — and is moving toward sidecar-less service mesh. Naming Hubble and identity-based policy signals current knowledge.</div>`
  },
  { n:115, tag:'storage',
    q:'How do you handle stateful workload disaster recovery across regions in Kubernetes?',
    body:`<p>Stateful DR needs both the data (replicated/backed up off-region) and the ability to reconstitute the workload in another region/cluster.</p>
<div class='sec'>Data layer</div>
<div class='cmds'>
  <div class='cmd'>- App-level replication across regions (DB native: Postgres streaming/logical,
  Kafka MirrorMaker) -> warm standby, low RPO
- Volume snapshots replicated cross-region (object storage) -> higher RPO
- Velero: backs up K8s objects + PV snapshots, restore to another cluster</div>
</div>
<div class='sec'>RTO / RPO drive the design</div>
<div class='cmds'>
  <div class='cmd'>RPO (data loss tolerance):  continuous replication = near-zero; snapshots = minutes/hrs
RTO (downtime tolerance):   warm standby = minutes; backup-restore = hours
# Tighter RPO/RTO = more cost (active-active / continuous replication)</div>
</div>
<div class='sec'>Failover orchestration</div>
<p>Promote the standby (operator or runbook), repoint DNS/global LB to the DR region, and reconcile the workloads there (GitOps applies the same manifests to the DR cluster).</p>
<div class='warn'><b>Untested DR is no DR:</b> regularly run restore drills (Velero restore, standby promotion) and measure actual RTO/RPO — backups that have never been restored routinely fail when you need them.</div>
<div class='tip'><b>Interview tip:</b> Lead with RPO/RTO defining the architecture and cost, then map: continuous app-level replication (low RPO/RTO, costly) vs Velero snapshot/restore (cheaper, higher RPO/RTO). Stress tested restore drills and that GitOps makes re-deploying the workload to the DR cluster trivial — data is the hard part, not manifests.</div>`
  },
  { n:116, tag:'cluster',
    q:'How do you debug \'my cluster is slow\' when you don\'t know the layer? Give a systematic approach.',
    body:`<p>"Cluster is slow" is ambiguous — a systematic top-down sweep localizes it to control plane, node, network, or app.</p>
<div class='sec'>Narrow the scope first</div>
<div class='cmds'>
  <div class='cmd'>- Slow kubectl/deploys?  -> control plane (apiserver/etcd)
- Slow app responses?    -> app, network, or node resource
- Specific service or whole cluster? one node or all?
- When did it start? correlate with a deploy / scale event / upgrade</div>
</div>
<div class='sec'>Layer-by-layer checks</div>
<div class='cmds'>
  <div class='cmd'>Control plane: apiserver_request_duration, APF throttling, etcd fsync latency
Nodes:        kubectl top nodes; disk/network saturation; node conditions
Workloads:    kubectl top pods; CFS throttling; OOMKills; restart counts
Network:      DNS latency (the 5s tell), NetworkPolicy drops, conntrack table full
App/deps:     traces for slow hop; downstream DB latency</div>
</div>
<div class='sec'>Common culprits</div>
<p>etcd on slow disk, CPU CFS throttling, DNS (ndots/5s timeouts), conntrack table exhaustion on busy nodes, a chatty controller hammering the API, a noisy neighbor.</p>
<div class='tip'><b>Interview tip:</b> Show method, not guessing: scope it (control plane vs data plane vs network), correlate with a change, then drill the suspect layer with specific metrics. Naming the usual suspects — etcd disk latency, CFS throttling, DNS 5s timeouts, conntrack exhaustion, APF throttling — proves you've actually chased these down.</div>`
  },
  { n:117, tag:'pods',
    q:'What is a Job and CronJob, and how do you make batch workloads reliable on Kubernetes?',
    body:`<p>Jobs run pods to completion; CronJobs schedule Jobs. Reliability comes from tuning retries, parallelism, deadlines, and concurrency.</p>
<div class='sec'>Job knobs</div>
<div class='cmds'>
  <div class='cmd'>spec:
  completions: 5           # run to 5 successful pods
  parallelism: 2           # 2 at a time
  backoffLimit: 4          # retries before marking failed
  activeDeadlineSeconds: 600   # hard time cap
  ttlSecondsAfterFinished: 3600 # auto-clean finished jobs</div>
</div>
<div class='sec'>CronJob concurrency</div>
<div class='cmds'>
  <div class='cmd'>concurrencyPolicy: Forbid     # don't start a new run if the last is still going
                              # (Allow / Forbid / Replace)
startingDeadlineSeconds: 100  # skip missed runs older than this
successfulJobsHistoryLimit: 3</div>
</div>
<div class='sec'>Reliability concerns</div>
<p>Make jobs idempotent (they can re-run on retry/restart), set deadlines so a hung job doesn't run forever, use <code>ttlSecondsAfterFinished</code> to avoid pile-up, and handle the at-least-once nature (a job pod can run more than once).</p>
<div class='warn'><b>Gotcha:</b> Default <code>concurrencyPolicy: Allow</code> can overlap runs if a job runs longer than its schedule interval — pile-ups and double-processing. Use <code>Forbid</code> or <code>Replace</code> for non-idempotent work, and design jobs to be idempotent regardless.</div>
<div class='tip'><b>Interview tip:</b> Emphasize idempotency (Kubernetes gives at-least-once, a pod may re-run), <code>concurrencyPolicy</code> to prevent overlap, and <code>activeDeadlineSeconds</code>/<code>ttlSecondsAfterFinished</code> for hygiene. For complex DAGs of jobs, mention Argo Workflows. These details separate "I wrote a CronJob" from "I run reliable batch."</div>`
  },
  { n:118, tag:'scheduling',
    q:'How do descheduler and rebalancing work? Why doesn\'t Kubernetes rebalance pods on its own?',
    body:`<p>The scheduler places pods once and never moves them — so over time the cluster drifts out of balance. The Descheduler evicts pods so they get rescheduled better.</p>
<div class='sec'>Why K8s doesn't rebalance</div>
<div class='cmds'>
  <div class='cmd'># Scheduling is a one-time decision at pod creation.
# After that, nodes get added/drained, pods come/go, requests change ->
# the original placement becomes suboptimal, but nothing moves pods automatically.</div>
</div>
<div class='sec'>The Descheduler</div>
<div class='cmds'>
  <div class='cmd'># Runs as a Job/CronJob; evicts pods matching strategies, e.g.:
- RemoveDuplicates              : spread replicas off the same node
- LowNodeUtilization            : drain under-used nodes' candidates to rebalance
- RemovePodsViolatingTopologySpread / InterPodAntiAffinity (rule drift)
- RemovePodsViolatingNodeTaints</div>
</div>
<p>Evicted pods are recreated by their controllers and rescheduled per current state. It respects PDBs and won't evict un-replicated pods.</p>
<div class='warn'><b>Caution:</b> The descheduler causes churn (evictions = brief disruption). Tune it and rely on PDBs so it doesn't disrupt availability. Karpenter's consolidation does similar rebalancing for cost by repacking nodes.</div>
<div class='tip'><b>Interview tip:</b> The key concept: scheduling is one-shot, so the cluster needs an external rebalancer (Descheduler, or Karpenter consolidation) to correct drift after nodes/pods change. Mentioning that eviction churn must be bounded by PDBs shows you'd deploy it safely, not blindly.</div>`
  },
  { n:119, tag:'cluster',
    q:'How do you manage CRDs and operators at scale? What are the upgrade and versioning pitfalls?',
    body:`<p>CRDs extend the API; operators act on them. At scale, CRD versioning and operator upgrades become a real source of outages if mishandled.</p>
<div class='sec'>CRD versioning</div>
<div class='cmds'>
  <div class='cmd'>- CRDs support multiple versions (v1alpha1, v1beta1, v1) with a conversion webhook
- Stored version + served versions; migrating stored objects needs care
- Schema validation (OpenAPI) gates what users can submit</div>
</div>
<div class='sec'>Upgrade pitfalls</div>
<div class='cmds'>
  <div class='cmd'>- Helm does NOT upgrade CRDs by default (only installs on first install)
  -> CRD changes get silently skipped; operator expects new schema -> breaks
- A breaking CRD schema change can invalidate existing CRs
- Conversion webhook down -> CRs unreadable -> operator + deletes stuck (finalizers!)
- Operator RBAC drift after upgrade</div>
</div>
<div class='sec'>Safe practice</div>
<p>Version CRDs additively, test conversion webhooks, manage CRD upgrades explicitly (not via Helm's skip), and stage operator upgrades in nonprod. Watch for the finalizer-stuck-Terminating failure mode when a conversion webhook or operator is unhealthy.</p>
<div class='tip'><b>Interview tip:</b> The two pitfalls interviewers love: (1) Helm skips CRD upgrades, so schema changes get missed, and (2) a down conversion webhook makes CRs unreadable and blocks deletion (ties back to finalizers/stuck-Terminating). Treating CRDs as a versioned API with backward-compatible evolution is the senior framing.</div>`
  },
  { n:120, tag:'cluster',
    q:'You inherit an undocumented production cluster. How do you assess its health, risk, and cost?',
    body:`<p>A structured audit across reliability, security, and cost gives you a prioritized risk picture fast — a realistic senior/staff scenario.</p>
<div class='sec'>1. Inventory + reliability</div>
<div class='cmds'>
  <div class='cmd'>- Versions: kubelet/control-plane version, is it EOL? upcoming forced upgrade?
- Workloads without requests/limits, PDBs, multiple replicas, anti-affinity
- Single points of failure: single-replica critical services, one-zone deploys
- Backups: is etcd backed up? are stateful PVs backed up? ever restored?</div>
</div>
<div class='sec'>2. Security posture</div>
<div class='cmds'>
  <div class='cmd'>- kube-bench (CIS), kube-hunter; Trivy scan running images
- RBAC sprawl: who has cluster-admin? kubectl auth can-i audits
- privileged pods, hostPath/hostNetwork, no NetworkPolicies, secrets in env/git
- Pod Security Admission enforced? image signing/registry allowlist?</div>
</div>
<div class='sec'>3. Cost</div>
<div class='cmds'>
  <div class='cmd'>- Request-vs-usage gap (over-provisioned requests = wasted nodes)
- Idle/under-utilized nodes; oversized node pools; no autoscaling
- Orphaned PVs/LBs; right-sizing via VPA recommendations / Kubecost</div>
</div>
<div class='sec'>Then prioritize</div>
<p>Rank by risk x effort: backups + EOL version + cluster-admin sprawl are usually top. Document findings, quick wins first, build a remediation roadmap.</p>
<div class='tip'><b>Interview tip:</b> Structure beats trivia here — assess across reliability, security, cost, then prioritize by risk. Name concrete tools (kube-bench, Trivy, Kubecost, VPA) and the highest-impact gaps (no backups, EOL version, over-broad RBAC, no NetworkPolicies, request bloat). This is exactly the platform-ownership framing senior interviews probe for.</div>`
  }
];

let activeFilter = 'all';
let openCards = new Set();

function badge(tag) {
  const labels = {pods:'Pods & workloads',networking:'Networking',storage:'Storage',security:'Security',scheduling:'Scheduling',observability:'Observability',cluster:'Cluster ops',cicd:'CI/CD & GitOps'};
  return `<span class="badge ${tag}">${labels[tag]||tag}</span>`;
}

function render(qs) {
  document.getElementById('count-bar').textContent = `Showing ${qs.length} of 120 questions`;
  document.getElementById('q-list').innerHTML = qs.map(q => `
    <div class="q-card" id="card-${q.n}">
      <div class="q-header" onclick="toggle(${q.n})">
        <span class="q-num">Q${q.n}</span>
        <span class="q-title">${q.q}</span>
        <div class="q-right">
          ${badge(q.tag)}
          <span class="chevron${openCards.has(q.n)?' open':''}" id="chev-${q.n}">▼</span>
        </div>
      </div>
      <div class="q-body${openCards.has(q.n)?' open':''}" id="body-${q.n}">${q.body}</div>
    </div>
  `).join('');
}

function toggle(n) {
  const body = document.getElementById('body-'+n);
  const chev = document.getElementById('chev-'+n);
  if (openCards.has(n)) {
    openCards.delete(n);
    body.classList.remove('open');
    chev.classList.remove('open');
  } else {
    openCards.add(n);
    body.classList.add('open');
    chev.classList.add('open');
  }
  document.getElementById('viewed-count').textContent = openCards.size;
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  filterQs();
}

function filterQs() {
  const q = document.getElementById('search').value.toLowerCase();
  let filtered = QS;
  if (activeFilter !== 'all') filtered = filtered.filter(x => x.tag === activeFilter);
  if (q) filtered = filtered.filter(x => x.q.toLowerCase().includes(q) || x.body.toLowerCase().includes(q));
  render(filtered);
}

render(QS);


/* ── DARK MODE ────────────────────── */
(function(){
  var saved = localStorage.getItem('ekn-dark');
  if (saved === '1') document.body.classList.add('dark');
})();
function toggleDark() {
  var on = document.body.classList.toggle('dark');
  localStorage.setItem('ekn-dark', on ? '1' : '0');
  var btn = document.getElementById('dm-btn');
  if (btn) btn.textContent = on ? '☀ Light' : '☾ Dark';
}

/* ── INTERVIEW MODE ───────────────── */
var fmAll = [], fmIdx = 0, fmGot = 0, fmTotal = 0;

function fmStart() {
  // collect currently visible QS
  fmAll = [];
  var cards = document.querySelectorAll('.q-card');
  cards.forEach(function(c) {
    var n = parseInt(c.id.replace('card-',''));
    var q = QS.find ? QS.find(function(x){ return x.n === n; })
                    : (function(){ for(var i=0;i<QS.length;i++){ if(QS[i].n===n) return QS[i]; } })();
    if (q) fmAll.push(q);
  });
  // shuffle
  for (var i = fmAll.length-1; i > 0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var tmp = fmAll[i]; fmAll[i] = fmAll[j]; fmAll[j] = tmp;
  }
  fmIdx = 0; fmGot = 0; fmTotal = fmAll.length;
  var bar = document.getElementById('fm-bar');
  if (bar) { bar.classList.add('open'); fmShow(); }
}
function fmShow() {
  var bar = document.getElementById('fm-bar');
  if (!bar || fmIdx >= fmTotal) { fmDone(); return; }
  var q = fmAll[fmIdx];
  var pct = fmTotal > 0 ? Math.round((fmIdx/fmTotal)*100) : 0;
  document.getElementById('fm-prog').style.width = pct + '%';
  document.getElementById('fm-meta').textContent = 'Question ' + (fmIdx+1) + ' of ' + fmTotal;
  document.getElementById('fm-q-text').textContent = q.q;
  document.getElementById('fm-answer').innerHTML = q.body;
  document.getElementById('fm-answer').classList.remove('show');
  document.getElementById('fm-reveal').style.display = '';
  document.getElementById('fm-got').style.display    = 'none';
  document.getElementById('fm-miss').style.display   = 'none';
  document.getElementById('fm-score').textContent    = fmGot + ' / ' + fmIdx + ' correct';
}
function fmReveal() {
  document.getElementById('fm-answer').classList.add('show');
  document.getElementById('fm-reveal').style.display = 'none';
  document.getElementById('fm-got').style.display    = '';
  document.getElementById('fm-miss').style.display   = '';
}
function fmNext(ok) {
  if (ok) fmGot++;
  fmIdx++;
  fmShow();
}
function fmStop() {
  var bar = document.getElementById('fm-bar');
  if (bar) bar.classList.remove('open');
}
function fmDone() {
  var bar = document.getElementById('fm-bar');
  if (!bar) return;
  bar.innerHTML = '<div class="fm-done">&#127881; Session complete! You got <strong>' + fmGot + ' / ' + fmTotal + '</strong> correct.</div>'
    + '<button class="fm-stop" onclick="fmStop()">Close</button>';
}

</script>
