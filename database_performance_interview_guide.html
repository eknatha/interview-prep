<script>
const QS = [
  {n:1,tag:'indexing',q:'What is a database index and how does a B-tree index work internally?',
  body:`<p>An index is a separate data structure that allows the database engine to find rows without scanning every row in the table. Without an index, every query does a full sequential scan — O(n). With a B-tree index, lookups are O(log n).</p>
<div class='sec'>B-tree mechanics</div>
<div class='cmds'>
  <div class='cmd'>B-tree: balanced tree where each node holds sorted keys + pointers to children</div>
  <div class='cmd'>Leaf nodes: hold actual index entries → pointers to heap (table) rows</div>
  <div class='cmd'>Height: typically 3-4 levels for millions of rows (log base 100 of 10M ≈ 3.5)</div>
  <div class='cmd'>-- PostgreSQL: inspect index usage</div>
  <div class='cmd'>SELECT schemaname, tablename, indexname, idx_scan, idx_tup_read FROM pg_stat_user_indexes ORDER BY idx_scan;</div>
</div>
<p>B-tree supports: equality (=), range (&lt;, &gt;, BETWEEN), ORDER BY, IS NULL. It does NOT efficiently support: leading wildcard LIKE ('%foo'), full-text search, geometric queries, or array containment. For those, use specialized index types: GIN (full-text, arrays), GiST (geometric, range types), BRIN (large sequential tables like timestamps), Hash (equality-only, tiny).</p>
<div class='tip'><b>Interview tip:</b> Always explain the trade-off — indexes speed up reads but slow down writes (INSERT/UPDATE/DELETE must update all indexes on that table). Every additional index has a write-amplification cost. In write-heavy tables, too many indexes hurt overall throughput.</div>`},

  {n:2,tag:'indexing',q:'When does a query NOT use an index even though one exists — what are the common pitfalls?',
  body:`<div class='cmds'>
  <div class='cmd'>-- Function wrapping prevents index use:</div>
  <div class='cmd'>WHERE UPPER(email) = 'FOO@BAR.COM'     -- scans table (function on column)</div>
  <div class='cmd'>WHERE email = UPPER('foo@bar.com')     -- uses index (function on literal)</div>
  <div class='cmd'>-- Type mismatch:</div>
  <div class='cmd'>WHERE user_id = '123'  -- user_id is INT, implicit cast kills index</div>
  <div class='cmd'>-- Leading wildcard:</div>
  <div class='cmd'>WHERE name LIKE '%smith'  -- full scan (no prefix to match in B-tree)</div>
  <div class='cmd'>WHERE name LIKE 'smith%'  -- uses index (prefix match)</div>
  <div class='cmd'>-- Low cardinality: planner may prefer seq scan if index selectivity is poor</div>
  <div class='cmd'>WHERE status = 'active'  -- if 90% of rows are 'active', seq scan wins</div>
</div>
<p>The planner may also skip an index if: the table is small (sequential scan is faster for tiny tables), statistics are stale (ANALYZE hasn't run), or the cost estimate is wrong (adjust random_page_cost for SSD). Force index use for debugging with <code>SET enable_seqscan = off</code> (PostgreSQL) or <code>FORCE INDEX</code> (MySQL) — but never use these in production as permanent fixes.</p>
<div class='warn'><b>Implicit casts:</b> Passing a string where an integer is expected causes a cast on every row — the index is useless. Always match parameter type to column type. In ORMs, inspect the generated SQL to catch type mismatches.</div>`},

  {n:3,tag:'indexing',q:'What is a composite index — how does column order affect its usefulness?',
  body:`<div class='cmds'>
  <div class='cmd'>CREATE INDEX idx_user_status ON orders (user_id, status, created_at);</div>
  <div class='cmd'>-- This index supports these queries efficiently:</div>
  <div class='cmd'>WHERE user_id = 5                           -- uses index (leftmost prefix)</div>
  <div class='cmd'>WHERE user_id = 5 AND status = 'shipped'    -- uses index</div>
  <div class='cmd'>WHERE user_id = 5 AND status = 'shipped' AND created_at > '2024-01-01' -- full use</div>
  <div class='cmd'>-- These are NOT efficiently supported:</div>
  <div class='cmd'>WHERE status = 'shipped'                    -- skips leftmost column, full scan</div>
  <div class='cmd'>WHERE created_at > '2024-01-01'             -- skips two leftmost columns</div>
</div>
<p>The leftmost prefix rule: a composite index on (A, B, C) can be used for queries filtering on A, A+B, or A+B+C — but not B alone or C alone. Column order rule: put equality columns first, then range columns last (range condition stops further index use for subsequent columns). Put the most selective column first within the equality group to minimize the rows scanned.</p>
<div class='tip'><b>Design heuristic:</b> For a query <code>WHERE user_id = ? AND status = ? ORDER BY created_at</code>, the ideal index is <code>(user_id, status, created_at)</code> — the ORDER BY is satisfied by the index, eliminating a sort step. This pattern (equality + range/sort) is one of the most common index optimization patterns.</div>`},

  {n:4,tag:'indexing',q:'What is an index covering query — what is a covering index?',
  body:`<div class='cmds'>
  <div class='cmd'>-- Without covering index: index lookup → heap fetch for each row</div>
  <div class='cmd'>SELECT name FROM users WHERE email = 'x@y.com';  -- index on email, heap fetch for name</div>
  <div class='cmd'>-- With covering index: no heap fetch needed</div>
  <div class='cmd'>CREATE INDEX idx_email_name ON users (email) INCLUDE (name);  -- PostgreSQL 11+</div>
  <div class='cmd'>CREATE INDEX idx_email_name ON users (email, name);  -- MySQL covering index</div>
  <div class='cmd'>-- EXPLAIN shows "Index Only Scan" in PostgreSQL if covered</div>
  <div class='cmd'>EXPLAIN SELECT name FROM users WHERE email = 'x@y.com';</div>
</div>
<p>A covering index contains all columns needed by the query — the database never needs to go back to the heap (table) for additional data. This eliminates random I/O for heap fetches, which is often the most expensive part of an index lookup. In PostgreSQL, use <code>INCLUDE</code> to add non-key columns to the index without affecting sort order. In MySQL, all columns in the SELECT and WHERE must be in the index for an Index Only Scan (key-only lookup).</p>
<div class='good'><b>When to use:</b> Covering indexes are most valuable for high-frequency, read-heavy queries on large tables. The trade-off is larger index size and slower writes. Profile first — don't preemptively add INCLUDE columns to every index.</div>`},

  {n:5,tag:'indexing',q:'What is index bloat — how do you detect and fix it?',
  body:`<div class='cmds'>
  <div class='cmd'>-- PostgreSQL: check index bloat</div>
  <div class='cmd'>SELECT relname, pg_size_pretty(pg_relation_size(oid)) AS size FROM pg_class WHERE relkind = 'i' ORDER BY pg_relation_size(oid) DESC LIMIT 20;</div>
  <div class='cmd'>-- Extension for detailed bloat estimate:</div>
  <div class='cmd'>SELECT * FROM pgstattuple('idx_name');  -- requires pgstattuple extension</div>
  <div class='cmd'>-- Fix: rebuild the index (non-blocking in PG 12+)</div>
  <div class='cmd'>REINDEX INDEX CONCURRENTLY idx_name;</div>
  <div class='cmd'>-- MySQL: check index fragmentation</div>
  <div class='cmd'>SELECT TABLE_NAME, DATA_FREE FROM information_schema.TABLES WHERE TABLE_SCHEMA = 'mydb';</div>
  <div class='cmd'>OPTIMIZE TABLE tablename;  -- rebuilds and defragments (locks table in older MySQL)</div>
</div>
<p>Index bloat occurs when deleted/updated rows leave dead entries in the index. B-tree pages become sparse — more disk reads per lookup, more cache pressure. In PostgreSQL, VACUUM reclaims heap space but index bloat accumulates over time and requires REINDEX. Triggers for rebuilding: index is significantly larger than it should be, slow queries despite the index being used, or after bulk deletes/updates of a large fraction of the table.</p>
<div class='warn'><b>REINDEX vs REINDEX CONCURRENTLY:</b> Plain REINDEX locks the table — do not use in production. REINDEX CONCURRENTLY (PostgreSQL 12+) builds a new index alongside the old one and swaps atomically. Takes 2x space temporarily but causes zero downtime.</div>`},

  {n:6,tag:'query',q:'How do you read and interpret a query execution plan (EXPLAIN ANALYZE)?',
  body:`<div class='cmds'>
  <div class='cmd'>EXPLAIN (ANALYZE, BUFFERS, FORMAT TEXT) SELECT ...;  -- PostgreSQL full analysis</div>
  <div class='cmd'>EXPLAIN FORMAT=JSON SELECT ...;  -- MySQL (8.0+)</div>
  <div class='cmd'>-- Key nodes to understand (PostgreSQL):</div>
  <div class='cmd'>Seq Scan        -- full table scan (look for large row_count × cost)</div>
  <div class='cmd'>Index Scan      -- uses index, then fetches heap rows</div>
  <div class='cmd'>Index Only Scan -- covers query without heap fetch (best case)</div>
  <div class='cmd'>Bitmap Heap Scan -- combines multiple indexes, batches heap fetches</div>
  <div class='cmd'>Hash Join       -- builds hash table on smaller relation (good for large joins)</div>
  <div class='cmd'>Nested Loop     -- for each outer row, probe inner (good when inner is small/indexed)</div>
  <div class='cmd'>Merge Join      -- both sides sorted, merge in order (good for large sorted relations)</div>
</div>
<p>Key metrics: actual rows vs estimated rows (big discrepancy = stale statistics → run ANALYZE), actual time per node (find the expensive node), Buffers hit vs read (cache hit rate — more hits = better), and loops × time (nested loop with many loops can be very expensive). The plan reads bottom-up — the innermost node executes first.</p>
<div class='tip'><b>Rows estimate vs actual:</b> If estimated rows = 1 but actual rows = 100,000, the planner underestimated selectivity and may have chosen a bad join order or wrong index. Fix: <code>ANALYZE tablename</code> to refresh statistics, or increase <code>default_statistics_target</code> for skewed columns.</div>`},

  {n:7,tag:'query',q:'What is the N+1 query problem — how do you detect and fix it?',
  body:`<div class='cmds'>
  <div class='cmd'>-- N+1 pattern: 1 query to get list + N queries to get related data</div>
  <div class='cmd'>SELECT * FROM orders LIMIT 100;          -- 1 query</div>
  <div class='cmd'>SELECT * FROM users WHERE id = 1;        -- query per order (N=100)</div>
  <div class='cmd'>SELECT * FROM users WHERE id = 2;        -- ... repeated 100 times</div>
  <div class='cmd'>-- Fix: JOIN or IN clause</div>
  <div class='cmd'>SELECT o.*, u.name FROM orders o JOIN users u ON o.user_id = u.id LIMIT 100;</div>
  <div class='cmd'>-- Or: batch load with IN</div>
  <div class='cmd'>SELECT * FROM users WHERE id IN (1,2,3,...,100);  -- 1 query for all users</div>
  <div class='cmd'>-- Detection in PostgreSQL: log slow queries</div>
  <div class='cmd'>SET log_min_duration_statement = 10;  -- log queries taking > 10ms</div>
</div>
<p>N+1 queries are invisible in development (small datasets) but catastrophic in production (thousands of records). An ORM loading relationships lazily is the primary cause. Detection: pg_stat_statements (shows query frequency — same query called 10,000 times/minute), slow query log, or APM tools showing many identical fast queries. Fix at the ORM level: eager loading (Hibernate's JOIN FETCH, Rails' includes, Sequelize's include).</p>
<div class='good'><b>DataLoader pattern:</b> For GraphQL APIs, use DataLoader to batch and deduplicate queries within a single request — collects all IDs needed, fires one IN query. This solves N+1 at the API layer without changing the data model.</div>`},

  {n:8,tag:'query',q:'A query was fast last week and is now slow — what do you investigate?',
  body:`<div class='cmds'>
  <div class='cmd'>-- Step 1: Run EXPLAIN ANALYZE and compare to expected plan</div>
  <div class='cmd'>EXPLAIN (ANALYZE, BUFFERS) SELECT ...;</div>
  <div class='cmd'>-- Step 2: Check if statistics are stale</div>
  <div class='cmd'>SELECT last_analyze, last_autoanalyze, n_live_tup, n_dead_tup FROM pg_stat_user_tables WHERE relname = 'tablename';</div>
  <div class='cmd'>ANALYZE tablename;  -- refresh statistics manually</div>
  <div class='cmd'>-- Step 3: Check data growth</div>
  <div class='cmd'>SELECT pg_size_pretty(pg_total_relation_size('tablename'));</div>
  <div class='cmd'>SELECT COUNT(*) FROM tablename;  -- has table grown 10x?</div>
  <div class='cmd'>-- Step 4: Check if index is being used (or was dropped)</div>
  <div class='cmd'>SELECT * FROM pg_indexes WHERE tablename = 'tablename';</div>
</div>
<p>Common causes: table grew past the threshold where the planner switches from index scan to seq scan (statistics are stale, planner doesn't know it grew), an index was accidentally dropped during a migration, autovacuum is behind and dead tuple bloat is skewing statistics, data distribution changed (a value that was rare is now 50% of rows — index no longer selective), or a schema migration changed a column type breaking index compatibility.</p>
<div class='warn'><b>Plan regression after deploy:</b> A schema migration (adding a column, changing a type, adding a constraint) triggers a statistics reset. The planner may choose a different plan for a few minutes until autovacuum/autoanalyze catches up. This causes a classic "deploy → slow queries → recovers on its own in 5 minutes" pattern.</div>`},

  {n:9,tag:'query',q:'What are window functions and when do they outperform subqueries or self-joins?',
  body:`<div class='cmds'>
  <div class='cmd'>-- Rank users by order count per region — window function</div>
  <div class='cmd'>SELECT user_id, region, order_count,
  RANK() OVER (PARTITION BY region ORDER BY order_count DESC) AS rank
  FROM user_stats;</div>
  <div class='cmd'>-- Running total</div>
  <div class='cmd'>SELECT date, revenue,
  SUM(revenue) OVER (ORDER BY date ROWS UNBOUNDED PRECEDING) AS cumulative
  FROM daily_revenue;</div>
  <div class='cmd'>-- Lag/Lead: compare to previous row</div>
  <div class='cmd'>SELECT date, revenue,
  LAG(revenue, 1) OVER (ORDER BY date) AS prev_day_revenue
  FROM daily_revenue;</div>
</div>
<p>Window functions operate over a "window" of rows related to the current row without collapsing them (unlike GROUP BY). They are evaluated after WHERE, GROUP BY, and HAVING but before ORDER BY and LIMIT. Performance advantage: the database scans the result set once and computes the window in-memory — a self-join or correlated subquery to achieve the same result would require multiple scans. Common functions: RANK, DENSE_RANK, ROW_NUMBER, LAG, LEAD, FIRST_VALUE, LAST_VALUE, NTILE, SUM/AVG/COUNT with OVER.</p>
<div class='tip'><b>Frame specification matters:</b> <code>ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW</code> (running total) vs <code>ROWS BETWEEN 6 PRECEDING AND CURRENT ROW</code> (7-day rolling average). Getting the frame wrong produces silently incorrect results — always verify with sample data.</div>`},

  {n:10,tag:'query',q:'How do you optimize a slow JOIN query — what strategies do you apply?',
  body:`<div class='cmds'>
  <div class='cmd'>-- Ensure join columns are indexed on both sides:</div>
  <div class='cmd'>CREATE INDEX ON orders (user_id);   -- foreign key columns often missing indexes</div>
  <div class='cmd'>-- Filter early — push WHERE conditions to reduce join input size:</div>
  <div class='cmd'>-- Bad: join everything then filter</div>
  <div class='cmd'>SELECT * FROM orders o JOIN users u ON o.user_id = u.id WHERE o.status = 'active';</div>
  <div class='cmd'>-- Better (if planner doesn't auto-push): use subquery to pre-filter</div>
  <div class='cmd'>SELECT * FROM (SELECT * FROM orders WHERE status = 'active') o JOIN users u ON o.user_id = u.id;</div>
  <div class='cmd'>-- Check join order: smaller result set as outer loop in nested loop join</div>
  <div class='cmd'>SET join_collapse_limit = 1;  -- disable PostgreSQL join reorder (for testing only)</div>
</div>
<p>Join optimization checklist: index join columns (especially FK columns — databases don't auto-create FK indexes), ensure statistics are fresh (planner needs accurate row counts for join order), avoid functions on join columns, avoid SELECT * (retrieve only needed columns to reduce data movement), and consider materialized CTEs for complex multi-step transformations (reused intermediate results). For very complex multi-table joins, break into steps using temp tables or CTEs with MATERIALIZED hint.</p>
<div class='info'><b>Join algorithm choice:</b> Hash Join is best for large unsorted datasets. Nested Loop is best when the inner table is small or well-indexed. Merge Join requires both sides sorted. If the planner picks the wrong algorithm, stale statistics are usually the cause.</div>`},

  {n:11,tag:'postgres',q:'What is VACUUM in PostgreSQL — why is it critical for performance?',
  body:`<div class='cmds'>
  <div class='cmd'>-- Check autovacuum status per table:</div>
  <div class='cmd'>SELECT relname, n_live_tup, n_dead_tup, last_vacuum, last_autovacuum, last_autoanalyze FROM pg_stat_user_tables ORDER BY n_dead_tup DESC LIMIT 20;</div>
  <div class='cmd'>-- Manual vacuum (non-blocking):</div>
  <div class='cmd'>VACUUM tablename;</div>
  <div class='cmd'>-- Full vacuum (rewrites, reclaims disk — locks table):</div>
  <div class='cmd'>VACUUM FULL tablename;  -- never in production without planning</div>
  <div class='cmd'>-- Check transaction ID wraparound risk:</div>
  <div class='cmd'>SELECT datname, age(datfrozenxid) FROM pg_database ORDER BY age DESC;</div>
</div>
<p>PostgreSQL uses MVCC (Multi-Version Concurrency Control) — UPDATE and DELETE create new row versions, leaving old "dead tuples" in place. VACUUM reclaims this space for reuse. Without regular vacuuming: table bloat (dead tuples waste disk and slow sequential scans), statistics become inaccurate (planner makes bad decisions), and transaction ID wraparound risk grows (a PostgreSQL-specific catastrophic failure that forces the DB into read-only mode to prevent data corruption).</p>
<div class='warn'><b>Transaction ID wraparound:</b> PostgreSQL uses 32-bit transaction IDs. When age approaches 2 billion, PostgreSQL forces a VACUUM FREEZE. If you ignore autovacuum and this limit is exceeded, the DB shuts down in read-only mode. Monitor <code>age(datfrozenxid)</code> and alert above 1.5 billion. This has caused real production outages.</div>`},

  {n:12,tag:'postgres',q:'How do you identify and kill long-running queries in PostgreSQL?',
  body:`<div class='cmds'>
  <div class='cmd'>-- Find long-running queries:</div>
  <div class='cmd'>SELECT pid, now() - pg_stat_activity.query_start AS duration, query, state FROM pg_stat_activity WHERE state != 'idle' AND query_start < now() - interval '5 minutes' ORDER BY duration DESC;</div>
  <div class='cmd'>-- Find blocking locks:</div>
  <div class='cmd'>SELECT blocked.pid, blocking.pid AS blocking_pid, blocked.query AS blocked_query, blocking.query AS blocking_query FROM pg_stat_activity blocked JOIN pg_stat_activity blocking ON blocking.pid = ANY(pg_blocking_pids(blocked.pid)) WHERE cardinality(pg_blocking_pids(blocked.pid)) > 0;</div>
  <div class='cmd'>-- Cancel query (graceful):</div>
  <div class='cmd'>SELECT pg_cancel_backend(pid);</div>
  <div class='cmd'>-- Kill connection (immediate):</div>
  <div class='cmd'>SELECT pg_terminate_backend(pid);</div>
</div>
<p>Long-running queries hold locks that block other queries. An idle transaction (BEGIN without COMMIT/ROLLBACK) is especially dangerous — it holds locks indefinitely even though the query is done. Set <code>idle_in_transaction_session_timeout = '5min'</code> to auto-terminate idle-in-transaction sessions. Set <code>statement_timeout</code> per role to prevent runaway queries. Always investigate before terminating — a long-running VACUUM ANALYZE is legitimate.</p>
<div class='tip'><b>Lock hierarchy:</b> ALTER TABLE takes an AccessExclusiveLock — it blocks all reads and writes. Plan schema migrations carefully: use tools like pg_repack or pgroll for zero-downtime migrations that avoid heavy locking. Never run ALTER TABLE in production during peak hours.</div>`},

  {n:13,tag:'postgres',q:'What is pg_stat_statements — how do you use it to find the worst queries?',
  body:`<div class='cmds'>
  <div class='cmd'>-- Enable (requires postgresql.conf restart):</div>
  <div class='cmd'>shared_preload_libraries = 'pg_stat_statements'</div>
  <div class='cmd'>CREATE EXTENSION IF NOT EXISTS pg_stat_statements;</div>
  <div class='cmd'>-- Top 10 queries by total time:</div>
  <div class='cmd'>SELECT query, calls, total_exec_time/1000 AS total_sec, mean_exec_time AS avg_ms, rows FROM pg_stat_statements ORDER BY total_exec_time DESC LIMIT 10;</div>
  <div class='cmd'>-- Top 10 by average latency (worst per-call performance):</div>
  <div class='cmd'>SELECT query, calls, mean_exec_time AS avg_ms FROM pg_stat_statements WHERE calls > 100 ORDER BY mean_exec_time DESC LIMIT 10;</div>
  <div class='cmd'>-- Reset stats:</div>
  <div class='cmd'>SELECT pg_stat_statements_reset();</div>
</div>
<p>pg_stat_statements normalizes queries (replaces literals with $1, $2 placeholders) and tracks total execution time, call count, rows, shared blocks hit/read, and I/O timing. Use it to find: the query with highest total time (highest impact to optimize), queries called millions of times with even small latency (N+1 detection), and queries with low cache hit rate (high blks_read vs blks_hit — missing from shared_buffers). This is the first tool to reach for during a performance investigation.</p>
<div class='good'><b>Production standard:</b> Always have pg_stat_statements enabled. The overhead is minimal (&lt;5% CPU) and the visibility is invaluable. Cloud SQL, RDS, and Cloud Spanner all have equivalent query insights dashboards built on the same principle.</div>`},

  {n:14,tag:'postgres',q:'How do you tune PostgreSQL memory settings — what are the key parameters?',
  body:`<div class='cmds'>
  <div class='cmd'>shared_buffers = 25% of RAM          # PostgreSQL's own page cache</div>
  <div class='cmd'>effective_cache_size = 75% of RAM    # hints to planner about OS cache</div>
  <div class='cmd'>work_mem = 4MB–256MB                 # per-sort / per-hash operation</div>
  <div class='cmd'>maintenance_work_mem = 256MB–2GB    # for VACUUM, CREATE INDEX, ALTER TABLE</div>
  <div class='cmd'>wal_buffers = 64MB                   # WAL write buffer (auto-tuned in PG 12+)</div>
  <div class='cmd'>-- Check buffer hit rate (should be > 99%):</div>
  <div class='cmd'>SELECT sum(blks_hit)*100.0 / (sum(blks_hit)+sum(blks_read)) AS cache_hit_rate FROM pg_stat_database;</div>
</div>
<p>work_mem is the most commonly misunderstood parameter. It's allocated per sort/hash operation per query — a complex query with multiple sort nodes and 100 parallel connections can use work_mem × nodes × connections of RAM simultaneously. Setting it too high causes OOM; too low causes disk sorts (look for "Disk: true" in EXPLAIN output). Set a low default and use <code>SET work_mem = '256MB'</code> per session for analytics queries. shared_buffers should be 25% of RAM for dedicated PostgreSQL hosts.</p>
<div class='warn'><b>work_mem × connections math:</b> 100 connections × 10 sort nodes × 256MB work_mem = 256GB potential peak RAM. Always calculate the worst-case memory footprint before setting work_mem globally high.</div>`},

  {n:15,tag:'mysql',q:'How does the InnoDB buffer pool work — how do you tune it?',
  body:`<div class='cmds'>
  <div class='cmd'>-- Check buffer pool hit rate (should be > 99%):</div>
  <div class='cmd'>SHOW GLOBAL STATUS LIKE 'Innodb_buffer_pool_%';</div>
  <div class='cmd'>-- Calculate hit rate:</div>
  <div class='cmd'>SELECT (1 - (Innodb_buffer_pool_reads / Innodb_buffer_pool_read_requests)) * 100 AS hit_rate;</div>
  <div class='cmd'>-- Set buffer pool size (my.cnf):</div>
  <div class='cmd'>innodb_buffer_pool_size = 70-80% of RAM  # for dedicated MySQL server</div>
  <div class='cmd'>innodb_buffer_pool_instances = 8          # reduce mutex contention (1 per GB)</div>
  <div class='cmd'>-- Warm up buffer pool after restart:</div>
  <div class='cmd'>innodb_buffer_pool_dump_at_shutdown = ON</div>
  <div class='cmd'>innodb_buffer_pool_load_at_startup = ON</div>
</div>
<p>InnoDB buffer pool is MySQL's combined page cache and index cache — it's the most impactful single parameter for MySQL performance. It caches both data pages and index pages. A warm buffer pool serves reads from memory; a cold pool (after restart) has high I/O until pages are loaded. Enable dump/load to persist the "hot set" across restarts, dramatically reducing the post-restart performance dip.</p>
<div class='tip'><b>Multiple instances:</b> With a large buffer pool (> 8GB), split into 8 instances (<code>innodb_buffer_pool_instances=8</code>). Each instance has its own mutex, reducing lock contention for concurrent access. Without this, a single mutex on a 64GB buffer pool becomes a bottleneck.</div>`},

  {n:16,tag:'mysql',q:'What is the MySQL slow query log — how do you use it and what do you look for?',
  body:`<div class='cmds'>
  <div class='cmd'>-- Enable slow query log:</div>
  <div class='cmd'>slow_query_log = ON</div>
  <div class='cmd'>slow_query_log_file = /var/log/mysql/slow.log</div>
  <div class='cmd'>long_query_time = 1         # log queries > 1 second</div>
  <div class='cmd'>log_queries_not_using_indexes = ON  # catch full scans regardless of time</div>
  <div class='cmd'>-- Analyze with mysqldumpslow:</div>
  <div class='cmd'>mysqldumpslow -s t -t 10 /var/log/mysql/slow.log  # top 10 by total time</div>
  <div class='cmd'>mysqldumpslow -s c -t 10 /var/log/mysql/slow.log  # top 10 by count</div>
  <div class='cmd'>-- Or with pt-query-digest (more detailed):</div>
  <div class='cmd'>pt-query-digest /var/log/mysql/slow.log | head -100</div>
</div>
<p>The slow query log captures queries exceeding <code>long_query_time</code>. Enable <code>log_queries_not_using_indexes</code> to catch full scans even on fast small tables — they will degrade as data grows. Use <code>pt-query-digest</code> from Percona Toolkit for structured analysis: fingerprinted query patterns, sorted by total execution time, with response time distribution. This is the equivalent of PostgreSQL's pg_stat_statements but file-based.</p>
<div class='good'><b>Performance Schema:</b> MySQL 5.6+ has Performance Schema — enables <code>events_statements_summary_by_digest</code> for real-time query analytics without a log file. Use this in production for live query profiling without the disk I/O overhead of the slow log.</div>`},

  {n:17,tag:'mysql',q:'What is MySQL replication lag — how do you detect and reduce it?',
  body:`<div class='cmds'>
  <div class='cmd'>-- Check replication lag on replica:</div>
  <div class='cmd'>SHOW SLAVE STATUS\G  -- "Seconds_Behind_Master" field</div>
  <div class='cmd'>SHOW REPLICA STATUS\G  -- MySQL 8.0+ syntax</div>
  <div class='cmd'>-- Enable parallel replication (MySQL 5.7+):</div>
  <div class='cmd'>replica_parallel_workers = 8       # number of parallel apply threads</div>
  <div class='cmd'>replica_parallel_type = LOGICAL_CLOCK  # dependency-based parallelism</div>
  <div class='cmd'>-- Reduce binlog event size:</div>
  <div class='cmd'>binlog_row_image = MINIMAL  # only log changed columns, not full row</div>
</div>
<p>Replication lag sources: single-threaded replica applying multi-threaded primary writes (solve with parallel replication), long-running transactions on primary blocking replica, large bulk operations, or network latency between primary and replica. Monitor Seconds_Behind_Master but also compare GTID positions for more accurate lag measurement. In cloud: Cloud SQL and RDS replicas have built-in parallel apply.</p>
<div class='warn'><b>Reading stale data:</b> If your application reads from a replica, it may read data that hasn't been replicated yet. Implement read-your-writes consistency by routing writes AND the subsequent reads for the same user session to the primary (or wait for replica to catch up using WAIT_FOR_EXECUTED_GTID_SET).</div>`},

  {n:18,tag:'connections',q:'What is connection pooling — why is it essential for database performance?',
  body:`<div class='cmds'>
  <div class='cmd'>-- PostgreSQL: each connection is a forked process (~5-10MB RAM each)</div>
  <div class='cmd'>-- 1000 direct connections = 5-10GB RAM overhead on the DB server</div>
  <div class='cmd'>-- PgBouncer config (pgbouncer.ini):</div>
  <div class='cmd'>pool_mode = transaction  # most efficient — connection returned after each transaction</div>
  <div class='cmd'>max_client_conn = 10000  # clients can connect to PgBouncer</div>
  <div class='cmd'>default_pool_size = 25   # actual connections to PostgreSQL</div>
  <div class='cmd'>-- Check PgBouncer stats:</div>
  <div class='cmd'>psql -p 6432 pgbouncer -c "SHOW POOLS;"</div>
  <div class='cmd'>psql -p 6432 pgbouncer -c "SHOW STATS;"</div>
</div>
<p>PostgreSQL opens a new OS process per connection — expensive at scale. A 500-connection PostgreSQL instance with 8 cores is wasting 492 connections waiting (CPU can only run 8 at once). PgBouncer multiplexes thousands of application connections onto a small pool of actual DB connections. Pool modes: session (connection held for full session), transaction (returned after each transaction — most efficient), statement (returned after each statement — incompatible with multi-statement transactions).</p>
<div class='tip'><b>Cloud SQL / RDS:</b> Cloud SQL has built-in connection pooling via the Auth Proxy. For high-concurrency apps, still use PgBouncer in front — Cloud SQL's max_connections is often the bottleneck, not the Auth Proxy. Run PgBouncer as a sidecar in Kubernetes or as a dedicated service.</div>`},

  {n:19,tag:'connections',q:'Database is running out of connections — how do you diagnose and fix the connection exhaustion?',
  body:`<div class='cmds'>
  <div class='cmd'>-- PostgreSQL: check current connections</div>
  <div class='cmd'>SELECT count(*), state, wait_event_type, wait_event FROM pg_stat_activity GROUP BY state, wait_event_type, wait_event ORDER BY count DESC;</div>
  <div class='cmd'>SELECT setting FROM pg_settings WHERE name = 'max_connections';</div>
  <div class='cmd'>-- Find connections by application:</div>
  <div class='cmd'>SELECT application_name, count(*) FROM pg_stat_activity GROUP BY application_name ORDER BY count DESC;</div>
  <div class='cmd'>-- MySQL:</div>
  <div class='cmd'>SHOW STATUS LIKE 'Threads_connected';</div>
  <div class='cmd'>SHOW PROCESSLIST;  -- active queries + sleeping connections</div>
</div>
<p>Root causes: application not returning connections to pool (connection leak — missing finally/close() blocks), pool size set too large (each app instance claims N connections, N × pods exceeds max_connections), connection pool not configured (every request opens a new connection), or idle connections not timed out (sleeping connections accumulating). Fix immediately: restart the leaking service, reduce pool size, or increase max_connections temporarily. Fix permanently: add connection pooling layer (PgBouncer), fix the connection leak in code, set idle connection timeouts.</p>
<div class='warn'><b>Kubernetes scale-out:</b> When HPA scales from 5 to 50 pods, a pool of 20 connections per pod = 1000 connections to PostgreSQL. Plan for max_pod_replicas × pool_size when sizing PostgreSQL max_connections. PgBouncer decouples this — all 50 pods connect to PgBouncer's 1000-connection capacity, which maps to 25 real DB connections.</div>`},

  {n:20,tag:'connections',q:'What is a database deadlock — how do you detect, prevent, and recover from it?',
  body:`<div class='cmds'>
  <div class='cmd'>-- PostgreSQL deadlock detection (automatic, logged):</div>
  <div class='cmd'>tail -f /var/log/postgresql/postgresql.log | grep deadlock</div>
  <div class='cmd'>-- Or check pg_locks for current lock waits:</div>
  <div class='cmd'>SELECT l.pid, l.locktype, l.relation::regclass, l.mode, l.granted FROM pg_locks l WHERE NOT l.granted;</div>
  <div class='cmd'>-- MySQL: show last deadlock</div>
  <div class='cmd'>SHOW ENGINE INNODB STATUS\G  -- LATEST DETECTED DEADLOCK section</div>
  <div class='cmd'>-- Prevention: always acquire locks in the same order</div>
  <div class='cmd'>-- Transaction 1: lock table A, then table B</div>
  <div class='cmd'>-- Transaction 2: lock table A, then table B (not B then A)</div>
</div>
<p>A deadlock occurs when two transactions each hold a lock the other needs — they wait forever. PostgreSQL detects deadlocks automatically and kills one transaction (the victim) with an error. MySQL InnoDB does the same. Both log the deadlock details. Prevention: acquire locks in a consistent global order across all transactions, keep transactions short (reduce lock hold time), and use SELECT FOR UPDATE to explicitly lock rows in the order you'll update them.</p>
<div class='tip'><b>Application handling:</b> Deadlock victims receive an error (error code 40P01 in PostgreSQL). Application code MUST handle this with retry logic — deadlocks are normal under high concurrency. A deadlock-prone query that isn't retried will surface as a user-visible error under load.</div>`},

  {n:21,tag:'replication',q:'What is WAL in PostgreSQL — how does WAL enable replication and point-in-time recovery?',
  body:`<div class='cmds'>
  <div class='cmd'>-- WAL (Write-Ahead Log): all changes written to WAL before modifying data pages</div>
  <div class='cmd'>-- Check WAL directory size:</div>
  <div class='cmd'>SELECT pg_size_pretty(sum(size)) FROM pg_ls_waldir();</div>
  <div class='cmd'>-- WAL archiving (for PITR):</div>
  <div class='cmd'>archive_mode = on</div>
  <div class='cmd'>archive_command = 'gsutil cp %p gs://my-wal-archive/%f'  # copy WAL to GCS</div>
  <div class='cmd'>-- Streaming replication settings:</div>
  <div class='cmd'>wal_level = replica       # minimum for replication</div>
  <div class='cmd'>max_wal_senders = 10      # max replica connections</div>
  <div class='cmd'>wal_keep_size = 1GB       # keep WAL on primary for slow replicas</div>
</div>
<p>WAL ensures durability (data is never lost if fsync is on) and enables both streaming replication (replica receives WAL stream continuously) and PITR (replay archived WAL segments to any point in time). Replicas in streaming replication continuously apply WAL — they are always slightly behind the primary (replication lag). If a replica falls too far behind and the primary discards WAL it hasn't received, the replica must be rebuilt from a base backup.</p>
<div class='good'><b>PITR for Cloud SQL:</b> Cloud SQL automatically archives WAL to GCS. Enable PITR in Cloud SQL config — it retains 7 days of WAL by default. For compliance workloads, this is your RTO/RPO safety net: restore to any second within the retention window.</div>`},

  {n:22,tag:'replication',q:'What is the difference between synchronous and asynchronous replication — when do you choose each?',
  body:`<div class='cmds'>
  <div class='cmd'>-- PostgreSQL: configure synchronous replication</div>
  <div class='cmd'>synchronous_standby_names = 'replica1'  # in postgresql.conf</div>
  <div class='cmd'>-- Per transaction override:</div>
  <div class='cmd'>SET synchronous_commit = local;  # don't wait for replica (lower durability)</div>
  <div class='cmd'>SET synchronous_commit = remote_write;  # wait until replica has WAL in OS buffer</div>
  <div class='cmd'>SET synchronous_commit = on;  # wait until replica has WAL fsynced (full sync)</div>
  <div class='cmd'>-- Check replication lag in bytes:</div>
  <div class='cmd'>SELECT client_addr, state, sent_lsn, write_lsn, flush_lsn, replay_lsn, (sent_lsn - replay_lsn) AS lag_bytes FROM pg_stat_replication;</div>
</div>
<p>Async replication: primary commits as soon as WAL is locally fsynced. Replica applies WAL asynchronously. Pros: zero write latency overhead. Cons: data loss risk on primary failure (replica may be seconds behind). Sync replication: primary waits for replica to acknowledge WAL before returning to client. Pros: zero data loss (RPO=0). Cons: every write waits for a network round-trip to the replica — adds latency. Use sync for financial transactions and compliance workloads; async for high-throughput workloads that can tolerate seconds of potential data loss.</p>
<div class='tip'><b>Quorum commit:</b> PostgreSQL supports <code>ANY 1 (replica1, replica2)</code> — commit acknowledged when any 1 of 2 replicas confirm. This combines sync durability with high availability — if one replica goes down, the other still satisfies the quorum.</div>`},

  {n:23,tag:'replication',q:'A read replica is significantly lagging — what are the causes and how do you fix it?',
  body:`<div class='cmds'>
  <div class='cmd'>-- PostgreSQL: check replication lag</div>
  <div class='cmd'>SELECT now() - pg_last_xact_replay_timestamp() AS replication_lag;</div>
  <div class='cmd'>-- Check if replica is in recovery:</div>
  <div class='cmd'>SELECT pg_is_in_recovery();</div>
  <div class='cmd'>-- Check for replication slot bloat (replica not consuming WAL):</div>
  <div class='cmd'>SELECT slot_name, active, pg_size_pretty(pg_wal_lsn_diff(pg_current_wal_lsn(), restart_lsn)) AS lag FROM pg_replication_slots;</div>
  <div class='cmd'>-- MySQL: check replica threads</div>
  <div class='cmd'>SHOW REPLICA STATUS\G  -- check SQL_Delay, Seconds_Behind_Source</div>
</div>
<p>Lag causes: single-threaded WAL apply unable to keep up with parallel primary writes (enable parallel apply), long-running transactions on replica blocking WAL application, heavy read queries on the replica consuming I/O needed for WAL apply (dedicated replica for analytics vs serving reads), or replication slot not being consumed (slot accumulates WAL — can fill disk on primary). A replication slot with a lagging consumer is a disk bomb — always set <code>max_slot_wal_keep_size</code> as a safety limit.</p>
<div class='warn'><b>Replication slot danger:</b> An inactive replication slot causes the primary to retain ALL WAL since the slot's last confirmed LSN. If a logical replication consumer (like Debezium CDC) goes down for hours, the primary's <code>/pg_wal</code> directory can fill the disk, causing a primary outage. Monitor slot lag closely.</div>`},

  {n:24,tag:'schema',q:'How does schema design impact database performance — what are the key design decisions?',
  body:`<div class='cmds'>
  <div class='cmd'>-- Choose appropriate data types (smaller = faster):</div>
  <div class='cmd'>INT (4 bytes) vs BIGINT (8 bytes) — use INT until you need > 2 billion rows</div>
  <div class='cmd'>VARCHAR(255) vs TEXT — TEXT is fine in PostgreSQL (same storage), avoid in MySQL for indexing</div>
  <div class='cmd'>TIMESTAMPTZ vs TIMESTAMP — always TIMESTAMPTZ in PostgreSQL (stores in UTC)</div>
  <div class='cmd'>UUID vs BIGINT — UUID as PK causes index fragmentation (random inserts); use BIGSERIAL or ULIDs</div>
  <div class='cmd'>-- Normalization vs denormalization trade-off:</div>
  <div class='cmd'>3NF: minimize redundancy, maximize consistency (OLTP workloads)</div>
  <div class='cmd'>Denormalized: pre-compute joins for read performance (OLAP / reporting)</div>
</div>
<p>Key decisions: primary key type (UUID v4 causes B-tree fragmentation on insert-heavy tables — use sequential UUIDs/ULIDs/BIGSERIAL), column ordering (PostgreSQL aligns types — grouping 8-byte columns together reduces padding/wasted space), NOT NULL constraints (NULLable columns require extra storage bits and complicate query logic), and partitioning (range/list/hash partitioning for large tables improves query performance and maintenance operations like archival).</p>
<div class='good'><b>ULID over UUID:</b> ULID (Universally Unique Lexicographically Sortable Identifier) is time-ordered and random-suffix — it's globally unique like UUID but sequential like BIGSERIAL. New inserts always go to the rightmost B-tree leaf page instead of randomly scattered across the tree. Dramatically less index fragmentation and better cache locality for recent-data queries.</div>`},

  {n:25,tag:'schema',q:'What is table partitioning — when should you use it and what are the pitfalls?',
  body:`<div class='cmds'>
  <div class='cmd'>-- PostgreSQL declarative partitioning:</div>
  <div class='cmd'>CREATE TABLE events (id BIGINT, created_at TIMESTAMPTZ, data JSONB) PARTITION BY RANGE (created_at);</div>
  <div class='cmd'>CREATE TABLE events_2024_q1 PARTITION OF events FOR VALUES FROM ('2024-01-01') TO ('2024-04-01');</div>
  <div class='cmd'>CREATE TABLE events_2024_q2 PARTITION OF events FOR VALUES FROM ('2024-04-01') TO ('2024-07-01');</div>
  <div class='cmd'>-- Partition pruning: check if query prunes partitions</div>
  <div class='cmd'>EXPLAIN SELECT * FROM events WHERE created_at > '2024-06-01';  -- should show only q2+</div>
  <div class='cmd'>-- MySQL: check partition info</div>
  <div class='cmd'>SELECT PARTITION_NAME, TABLE_ROWS FROM information_schema.PARTITIONS WHERE TABLE_NAME = 'events';</div>
</div>
<p>Partitioning benefits: partition pruning (query only scans relevant partitions), faster archival (DROP old partition instead of DELETE millions of rows — near-instant), parallel query across partitions, and index sizes per partition stay manageable. Use for: time-series data (partition by month/quarter), multi-tenant data (partition by tenant_id), or any table growing beyond 50-100M rows. Pitfall: queries without a partition key in WHERE clause scan ALL partitions — worse than an unpartitioned table if the key is missing.</p>
<div class='warn'><b>Partition key in every query:</b> A partitioned table is only beneficial if your hot queries filter on the partition key. If your most common query does <code>WHERE user_id = ?</code> but the table is partitioned by <code>created_at</code>, you get no pruning — and the overhead of partition routing adds cost. Partition key must match your query patterns.</div>`},

  {n:26,tag:'schema',q:'What is database normalization vs denormalization — how do you decide in practice?',
  body:`<div class='cmds'>
  <div class='cmd'>-- Normalized (3NF): separate tables, joins at query time</div>
  <div class='cmd'>users(id, name, email)  +  orders(id, user_id, total)  → JOIN on user_id</div>
  <div class='cmd'>-- Denormalized: store user_name in orders to avoid join</div>
  <div class='cmd'>orders(id, user_id, user_name, total)  → no join needed</div>
  <div class='cmd'>-- Hybrid: JSONB column for flexible attributes without schema changes</div>
  <div class='cmd'>ALTER TABLE products ADD COLUMN attributes JSONB;</div>
  <div class='cmd'>CREATE INDEX idx_attributes_gin ON products USING GIN (attributes);  -- queryable</div>
</div>
<p>Normalized (3NF): eliminates data redundancy, simplifies writes (update one place), enforces consistency. Good for OLTP where writes are frequent. Denormalized: precomputes data, eliminates join overhead, simplifies read queries. Good for read-heavy analytics and reporting. In practice: start normalized, denormalize only where profiling shows join cost is a bottleneck. Materialized views are a middle ground — normalized source, precomputed denormalized view refreshed on schedule.</p>
<div class='tip'><b>JSONB for flexible attributes:</b> Store semi-structured or highly variable data in PostgreSQL JSONB columns with GIN indexes. You get schema flexibility without an EAV (Entity-Attribute-Value) anti-pattern, and JSONB is fully queryable with operators like <code>@&gt;</code> (containment) and <code>-&gt;&gt;</code> (field extraction).</div>`},

  {n:27,tag:'nosql',q:'When do you choose a NoSQL database over a relational database?',
  body:`<div class='cmds'>
  <div class='cmd'>Use cases for NoSQL:</div>
  <div class='cmd'>Document (MongoDB, Firestore): variable schema, nested objects, rapid iteration</div>
  <div class='cmd'>Key-Value (Redis, Memorystore): caching, sessions, counters, pub/sub</div>
  <div class='cmd'>Wide-Column (Bigtable, Cassandra): time-series, IoT, 100M+ rows, write-heavy</div>
  <div class='cmd'>Graph (Neo4j, Neptune): relationship traversal, social networks, fraud detection</div>
  <div class='cmd'>Search (Elasticsearch, OpenSearch): full-text search, log analytics, faceted search</div>
</div>
<p>Choose NoSQL when: data doesn't fit a relational model (variable schema, deeply nested), write throughput exceeds what a single PostgreSQL instance can handle horizontally (Cassandra/Bigtable scale horizontally), or you need a specific access pattern that relational databases serve poorly (graph traversal, full-text search). Don't choose NoSQL to avoid learning SQL or as a premature optimization — most apps scale to tens of millions of rows fine on PostgreSQL with proper indexing.</p>
<div class='warn'><b>Multi-document transactions:</b> Most NoSQL databases have weak or no cross-document transactions. If your data model requires atomic updates across multiple "records" (like transferring money between accounts), a relational database with ACID transactions is the correct choice. NoSQL consistency models (eventual, causal) require careful application-level handling.</div>`},

  {n:28,tag:'nosql',q:'How do you optimize Redis for production — what are the key performance and reliability concerns?',
  body:`<div class='cmds'>
  <div class='cmd'>-- Check memory usage and eviction policy:</div>
  <div class='cmd'>redis-cli INFO memory | grep -E "used_memory_human|maxmemory|mem_fragmentation"</div>
  <div class='cmd'>redis-cli CONFIG GET maxmemory-policy  # eviction when memory full</div>
  <div class='cmd'>-- Set for cache workloads:</div>
  <div class='cmd'>CONFIG SET maxmemory-policy allkeys-lru  # evict least recently used</div>
  <div class='cmd'>-- Find memory hogs:</div>
  <div class='cmd'>redis-cli --bigkeys              # scan for large keys</div>
  <div class='cmd'>redis-cli MEMORY USAGE key_name  # bytes for specific key</div>
  <div class='cmd'>-- Check slow log:</div>
  <div class='cmd'>redis-cli SLOWLOG GET 10         # last 10 slow commands</div>
  <div class='cmd'>redis-cli CONFIG SET slowlog-log-slower-than 10000  # log commands > 10ms</div>
</div>
<p>Redis is single-threaded for command processing — one slow command (KEYS *, LRANGE with huge list, SORT without index) blocks all other clients. Never run KEYS * in production — use SCAN with COUNT for iteration. Large values (&gt;1MB per key) slow serialization and network transfer. Pipeline multiple commands to reduce round-trips. Use Redis Cluster for horizontal scaling or Sentinel for HA without sharding. For GCP: Cloud Memorystore (managed Redis) handles replication and failover automatically.</p>
<div class='warn'><b>KEYS * in production:</b> <code>KEYS *</code> is O(n) and blocks the entire Redis instance while it scans. On an instance with 10 million keys, it can block for seconds. Use <code>SCAN 0 COUNT 100</code> for iterating keys — it returns a cursor and is non-blocking.</div>`},

  {n:29,tag:'nosql',q:'What is Bigtable/HBase — when is wide-column the right choice and how do you model data for it?',
  body:`<div class='cmds'>
  <div class='cmd'>-- Bigtable row key design (all access is by row key prefix scan):</div>
  <div class='cmd'>-- Bad: monotonic timestamp as row key → hot spot on latest tablet</div>
  <div class='cmd'>row_key = "2024-01-15T10:30:00#user123"  -- all writes go to same server</div>
  <div class='cmd'>-- Good: salted / reversed timestamp</div>
  <div class='cmd'>row_key = "user123#~2024-01-15T10:30:00"  -- spread across tablets</div>
  <div class='cmd'>-- Or: hash prefix for write distribution</div>
  <div class='cmd'>row_key = "hash(user_id)[0:4]#user123#timestamp"</div>
  <div class='cmd'>gcloud bigtable instances list</div>
  <div class='cmd'>cbt read &lt;table&gt; prefix="user123" count=10</div>
</div>
<p>Bigtable is designed for: massive scale (petabytes), high write throughput (millions of writes/second), and time-series or event data. Data model: one big sorted table — all queries are row key lookups or prefix scans. No secondary indexes, no joins, no SQL. Row key design IS your data model — you must design rows to support your access patterns. Hot spots (all writes going to one tablet) are the #1 performance problem — salt or hash the row key to distribute writes.</p>
<div class='tip'><b>When NOT to use Bigtable:</b> If your queries need secondary indexes, ad-hoc filters, or SQL-like flexibility, use Cloud Spanner or PostgreSQL. Bigtable's power comes from its access pattern constraints — brute-forcing relational patterns onto it produces worse results than just using a relational DB.</div>`},

  {n:30,tag:'cloud',q:'How do you tune Cloud SQL (PostgreSQL) for production on GCP?',
  body:`<div class='cmds'>
  <div class='cmd'>-- Key Cloud SQL flags to configure:</div>
  <div class='cmd'>max_connections = 200          # size based on pool config, not raw app connections</div>
  <div class='cmd'>shared_buffers = 25% of RAM    # Cloud SQL sets this automatically based on tier</div>
  <div class='cmd'>work_mem = 16MB                # adjust for analytics queries</div>
  <div class='cmd'>pg_stat_statements.track = all # enable query insights</div>
  <div class='cmd'>log_min_duration_statement = 1000  # log queries > 1s</div>
  <div class='cmd'>-- Check Cloud SQL metrics in Cloud Monitoring:</div>
  <div class='cmd'>cloudsql.googleapis.com/database/cpu/utilization</div>
  <div class='cmd'>cloudsql.googleapis.com/database/memory/utilization</div>
  <div class='cmd'>cloudsql.googleapis.com/database/disk/read_ops_count</div>
  <div class='cmd'>cloudsql.googleapis.com/database/postgresql/num_backends</div>
</div>
<p>Cloud SQL-specific: use SSD storage for production (HDD is 3x cheaper but 10x slower IOPS). Enable automatic storage increase to avoid disk-full outages. Use private IP (no public IP) and connect via Cloud SQL Auth Proxy. Enable Query Insights (built-in pg_stat_statements visualization). Choose the right machine tier — CPU is usually not the bottleneck; RAM (for shared_buffers + OS cache) and IOPS matter most. For read scaling, add read replicas in the same region as the consumers.</p>
<div class='good'><b>Read replica for analytics:</b> Route OLAP/reporting queries to a read replica to protect the primary from analytical workload interference. Use a larger replica tier if needed — you can size primary and replicas independently in Cloud SQL.</div>`},

  {n:31,tag:'cloud',q:'What is Cloud Spanner — when should you choose it over Cloud SQL?',
  body:`<div class='cmds'>
  <div class='cmd'>-- Spanner: globally distributed, horizontally scalable, ACID relational DB</div>
  <div class='cmd'>-- When to choose Spanner:</div>
  <div class='cmd'>✓ Need > 30,000 QPS on a single table (beyond single Cloud SQL node)</div>
  <div class='cmd'>✓ Multi-region writes with external consistency (banking, booking systems)</div>
  <div class='cmd'>✓ Zero-downtime horizontal scaling without sharding logic in app</div>
  <div class='cmd'>✓ 99.999% SLA requirement</div>
  <div class='cmd'>-- When NOT to choose Spanner:</div>
  <div class='cmd'>✗ Small to medium workloads (&lt; $500/month budget)</div>
  <div class='cmd'>✗ Complex analytical queries (use BigQuery instead)</div>
  <div class='cmd'>✗ Requires stored procedures or PL/pgSQL (use Cloud SQL)</div>
</div>
<p>Spanner uses TrueTime (GPS + atomic clock synchronization) to achieve external consistency across regions — a property no other globally distributed database provides. Primary key design is critical (avoid monotonic keys — causes hot splits). Interleaved tables (Spanner's parent-child relationship) co-locate related rows on the same Spanner node, eliminating cross-node joins for the most common access pattern. Cost: ~$0.90/node-hour for a single processing unit — significantly more than Cloud SQL. Justify with the SLA and scale requirements.</p>
<div class='tip'><b>Cloud SQL → Spanner migration trigger:</b> When you start sharding Cloud SQL manually (splitting users across multiple DB instances by ID range), that's the signal you should have moved to Spanner. Spanner eliminates application-level sharding entirely.</div>`},

  {n:32,tag:'ops',q:'How do you perform a zero-downtime schema migration on a large table in production?',
  body:`<div class='cmds'>
  <div class='cmd'>-- Problem: ALTER TABLE on a 500M row table takes hours and locks the table</div>
  <div class='cmd'>-- Solution: online schema change tools</div>
  <div class='cmd'>-- PostgreSQL: pg_repack or pgroll</div>
  <div class='cmd'>pg_repack --table tablename --jobs 4 dbname  # online table repack</div>
  <div class='cmd'>-- MySQL: pt-online-schema-change (Percona) or gh-ost (GitHub)</div>
  <div class='cmd'>pt-online-schema-change --alter "ADD COLUMN flag TINYINT DEFAULT 0" D=mydb,t=mytable --execute</div>
  <div class='cmd'>gh-ost --alter "ADD COLUMN flag TINYINT DEFAULT 0" --database mydb --table mytable --execute</div>
  <div class='cmd'>-- Manual expand-contract pattern:</div>
  <div class='cmd'>Step 1: Add new nullable column (fast, no data rewrite)</div>
  <div class='cmd'>Step 2: Deploy code to write to both old and new column</div>
  <div class='cmd'>Step 3: Backfill new column in batches (UPDATE WHERE id BETWEEN x AND y)</div>
  <div class='cmd'>Step 4: Deploy code to read from new column</div>
  <div class='cmd'>Step 5: Drop old column</div>
</div>
<p>The expand-contract (blue-green schema) pattern is the safest for zero-downtime migrations. Never add NOT NULL columns without defaults in a single step — it locks the table for the full rewrite. Add as nullable first, backfill, then add the constraint. Use batched backfills with rate limiting to avoid overwhelming the database during migration.</p>
<div class='warn'><b>Adding NOT NULL without default:</b> <code>ALTER TABLE ADD COLUMN status VARCHAR NOT NULL</code> on a 100M row table rewrites every row immediately under an exclusive lock. Always add nullable first, backfill, then add NOT NULL constraint. PostgreSQL 11+ allows NOT NULL with a constant default without rewrite — but complex defaults still rewrite.</div>`},

  {n:33,tag:'ops',q:'How do you take and restore a database backup safely — what are RTO and RPO?',
  body:`<div class='cmds'>
  <div class='cmd'>-- PostgreSQL: logical backup (portable, slow for large DBs)</div>
  <div class='cmd'>pg_dump -Fc -j 4 dbname > backup.dump    # parallel custom format</div>
  <div class='cmd'>pg_restore -Fc -j 4 -d targetdb backup.dump</div>
  <div class='cmd'>-- Physical backup (faster, same PG version required)</div>
  <div class='cmd'>pg_basebackup -D /backup/base -Ft -z -P  # full base backup</div>
  <div class='cmd'>-- PITR: restore base backup + replay WAL to target time</div>
  <div class='cmd'>recovery_target_time = '2024-01-15 14:30:00'  # in recovery.conf / postgresql.conf</div>
  <div class='cmd'>-- Test your restore regularly:</div>
  <div class='cmd'>pg_restore ... && psql -c "SELECT COUNT(*) FROM critical_table;"  # verify</div>
</div>
<p>RTO (Recovery Time Objective): how long can the system be down? Drives backup restore speed requirements. RPO (Recovery Point Objective): how much data loss is acceptable? Drives backup frequency and replication lag tolerance. A daily backup gives RPO of 24 hours (you lose up to a day of data). WAL archiving gives RPO of minutes (replay WAL up to the last archived segment). Streaming replication with sync commit gives RPO of zero. Test restores monthly — an untested backup is an untested failure.</p>
<div class='good'><b>Cloud SQL PITR:</b> Enable in Cloud SQL with one flag. GCP retains base backups + WAL for up to 7 days. Restore to any second within that window. This makes Cloud SQL's RTO/RPO significantly better than self-managed PostgreSQL with manual WAL archiving.</div>`},

  {n:34,tag:'ops',q:'Database disk is filling up — how do you diagnose and resolve it without downtime?',
  body:`<div class='cmds'>
  <div class='cmd'>-- PostgreSQL: find largest objects</div>
  <div class='cmd'>SELECT schemaname, tablename, pg_size_pretty(pg_total_relation_size(schemaname||'.'||tablename)) AS size FROM information_schema.tables ORDER BY pg_total_relation_size(schemaname||'.'||tablename) DESC LIMIT 20;</div>
  <div class='cmd'>-- Check for WAL accumulation:</div>
  <div class='cmd'>SELECT pg_size_pretty(sum(size)) FROM pg_ls_waldir();</div>
  <div class='cmd'>-- Check for bloated tables vs actual live data:</div>
  <div class='cmd'>SELECT relname, n_dead_tup, pg_size_pretty(pg_relation_size(oid)) FROM pg_stat_user_tables ORDER BY n_dead_tup DESC LIMIT 10;</div>
  <div class='cmd'>-- Run VACUUM to reclaim dead tuple space:</div>
  <div class='cmd'>VACUUM VERBOSE ANALYZE tablename;</div>
  <div class='cmd'>-- Emergency: drop old partitions, truncate log tables</div>
  <div class='cmd'>DROP TABLE events_2022_q1;  -- instant, no VACUUM needed</div>
</div>
<p>Disk space culprits: table bloat from dead tuples (VACUUM to reclaim), WAL accumulation from inactive replication slots or archive failure, index bloat, and log data growth. Immediate actions: run VACUUM on bloated tables, drop old partitions (instant disk recovery), check and fix WAL archiving, drop unused indexes. Long-term: implement automated archival/deletion of old data, monitor disk usage with alerts at 70% and 85% full.</p>
<div class='warn'><b>Replication slot disk bomb:</b> An inactive replication slot silently accumulates WAL — primary cannot remove WAL that the slot hasn't consumed. This is the most common cause of unexpected disk exhaustion in production PostgreSQL. Set <code>max_slot_wal_keep_size = 10GB</code> in postgresql.conf as a safety cap.</div>`},

  {n:35,tag:'ops',q:'How do you handle database connection pool exhaustion in a Kubernetes environment?',
  body:`<div class='cmds'>
  <div class='cmd'>-- Architecture: pods → PgBouncer → PostgreSQL</div>
  <div class='cmd'>-- PgBouncer as a Kubernetes Deployment:</div>
  <div class='cmd'>kubectl get pods -l app=pgbouncer -n db</div>
  <div class='cmd'>kubectl exec -it pgbouncer-pod -- psql -p 6432 pgbouncer -c "SHOW POOLS;"</div>
  <div class='cmd'>-- Key metrics to watch:</div>
  <div class='cmd'>cl_waiting: clients waiting for a connection (> 0 = pool exhausted)</div>
  <div class='cmd'>sv_active: active server connections</div>
  <div class='cmd'>sv_idle: idle server connections available</div>
  <div class='cmd'>-- Scale response: increase pool_size in PgBouncer config</div>
  <div class='cmd'>-- Or: scale PgBouncer horizontally (multiple replicas with shared backend)</div>
</div>
<p>In Kubernetes, connection exhaustion is amplified by HPA scaling — 50 pods × 20 pool connections = 1000 connections. Architecture: each app pod connects to PgBouncer (ClusterIP Service), PgBouncer maintains a small pool of actual PostgreSQL connections. PgBouncer itself can be scaled horizontally — multiple PgBouncer replicas share the backend PostgreSQL connection budget. Use transaction-mode pooling for highest efficiency. Monitor cl_waiting in PgBouncer — any clients waiting means the pool is undersized.</p>
<div class='tip'><b>Pgpool vs PgBouncer:</b> PgBouncer is lightweight and fast — best for connection pooling only. Pgpool-II adds load balancing, query caching, and connection pooling but is heavier. For most Kubernetes deployments, PgBouncer is the right choice. Pgpool only if you need its additional features.</div>`},

  {n:36,tag:'indexing',q:'What is a partial index — when does it dramatically outperform a full index?',
  body:`<div class='cmds'>
  <div class='cmd'>-- Full index on status column: indexes ALL rows including completed orders</div>
  <div class='cmd'>CREATE INDEX idx_orders_status ON orders (status);</div>
  <div class='cmd'>-- Partial index: only indexes rows where status = 'pending'</div>
  <div class='cmd'>CREATE INDEX idx_orders_pending ON orders (user_id, created_at) WHERE status = 'pending';</div>
  <div class='cmd'>-- This query uses the partial index efficiently:</div>
  <div class='cmd'>SELECT * FROM orders WHERE status = 'pending' AND user_id = 123 ORDER BY created_at;</div>
  <div class='cmd'>-- Check index size comparison:</div>
  <div class='cmd'>SELECT pg_size_pretty(pg_relation_size('idx_orders_pending'));</div>
</div>
<p>Partial indexes index only a subset of rows that match a WHERE condition. If your table has 100M orders but only 10,000 are 'pending' (the rows you query 99% of the time), a partial index on pending orders is 10,000x smaller, fits in cache, and is dramatically faster than a full index. Classic use cases: active/inactive flags (index only active), soft deletes (index only non-deleted), unprocessed queue items (index only unprocessed status).</p>
<div class='good'><b>Real-world impact:</b> A table with 500M rows where 0.01% are "active" — a full index is 500M entries; a partial index on active rows is 50K entries. The partial index fits entirely in shared_buffers; the full index is a cold disk read. This single change can reduce query time from seconds to microseconds.</div>`},

  {n:37,tag:'query',q:'What are CTEs (WITH clauses) — when do they help vs hurt performance?',
  body:`<div class='cmds'>
  <div class='cmd'>-- PostgreSQL 12+: CTEs are NOT optimization fences by default</div>
  <div class='cmd'>WITH active_users AS (
  SELECT id FROM users WHERE status = 'active'
)
SELECT o.* FROM orders o JOIN active_users u ON o.user_id = u.id;</div>
  <div class='cmd'>-- Force materialization (pre-12 behavior, optimization fence):</div>
  <div class='cmd'>WITH active_users AS MATERIALIZED ( SELECT id FROM users WHERE status = 'active' )</div>
  <div class='cmd'>-- Prevent materialization (inline the CTE):</div>
  <div class='cmd'>WITH active_users AS NOT MATERIALIZED ( SELECT id FROM users WHERE status = 'active' )</div>
  <div class='cmd'>-- Recursive CTE: tree traversal</div>
  <div class='cmd'>WITH RECURSIVE org_tree AS (
  SELECT id, name, parent_id FROM employees WHERE parent_id IS NULL
  UNION ALL
  SELECT e.id, e.name, e.parent_id FROM employees e JOIN org_tree o ON e.parent_id = o.id
) SELECT * FROM org_tree;</div>
</div>
<p>In PostgreSQL before version 12, CTEs were optimization fences — the planner couldn't push filters through them, and they were always materialized (computed once, stored in memory). In PG 12+, simple CTEs are inlined by default. When to use MATERIALIZED: when the CTE is referenced multiple times and computing it once saves repeated scans. When to avoid: CTE on a large table with a filter that could be pushed to an index — use a subquery instead so the planner can optimize.</p>
<div class='tip'><b>Recursive CTEs:</b> Recursive CTEs are the correct tool for hierarchical data (org charts, category trees, graph traversal). They outperform application-level recursion by orders of magnitude. Learn the pattern — it comes up in any job involving hierarchical data.</div>`},

  {n:38,tag:'postgres',q:'What is logical replication in PostgreSQL — how does it differ from physical replication?',
  body:`<div class='cmds'>
  <div class='cmd'>-- Physical replication: streams WAL byte-for-byte (same PG version required)</div>
  <div class='cmd'>-- Logical replication: streams row-level changes (flexible — cross-version, cross-DB)</div>
  <div class='cmd'>-- Set up logical replication:</div>
  <div class='cmd'>wal_level = logical  # in postgresql.conf (requires restart)</div>
  <div class='cmd'>-- On publisher:</div>
  <div class='cmd'>CREATE PUBLICATION my_pub FOR TABLE users, orders;</div>
  <div class='cmd'>-- On subscriber:</div>
  <div class='cmd'>CREATE SUBSCRIPTION my_sub CONNECTION 'host=primary ...' PUBLICATION my_pub;</div>
  <div class='cmd'>-- Check replication status:</div>
  <div class='cmd'>SELECT * FROM pg_stat_subscription;</div>
</div>
<p>Logical replication use cases: zero-downtime major version upgrades (logical rep from old to new version), selective table replication (replicate only specific tables to analytics DB), cross-database aggregation, and CDC (Change Data Capture) with tools like Debezium. Physical replication is better for HA replicas (faster, lower overhead, full DB copy). Logical replication allows schema differences between publisher and subscriber — the subscriber can have additional indexes, different column ordering, or even a different DB system (via Debezium → Kafka).</p>
<div class='warn'><b>Replication slot management:</b> Logical replication uses replication slots. A slot for a Debezium consumer that goes offline for 24 hours will accumulate 24 hours of WAL on the primary. Always monitor slot lag and set <code>max_slot_wal_keep_size</code> to prevent disk exhaustion.</div>`},

  {n:39,tag:'schema',q:'How do you efficiently store and query time-series data in a relational database?',
  body:`<div class='cmds'>
  <div class='cmd'>-- Partition by time range (monthly or quarterly):</div>
  <div class='cmd'>CREATE TABLE metrics (ts TIMESTAMPTZ NOT NULL, host TEXT, value FLOAT) PARTITION BY RANGE (ts);</div>
  <div class='cmd'>CREATE TABLE metrics_2024_01 PARTITION OF metrics FOR VALUES FROM ('2024-01-01') TO ('2024-02-01');</div>
  <div class='cmd'>-- Composite index: (host, ts) for common access pattern</div>
  <div class='cmd'>CREATE INDEX ON metrics_2024_01 (host, ts DESC);</div>
  <div class='cmd'>-- BRIN index: very cheap for sequential time data</div>
  <div class='cmd'>CREATE INDEX ON metrics_2024_01 USING BRIN (ts);  -- tiny index, good for seq scans</div>
  <div class='cmd'>-- Or: TimescaleDB extension for automated time-series management</div>
  <div class='cmd'>SELECT create_hypertable('metrics', 'ts', chunk_time_interval => INTERVAL '1 week');</div>
</div>
<p>Time-series patterns: always include timestamp in indexes as the trailing sort column (most queries are "latest N for entity X"), use DESC sort on timestamp index to serve "latest" queries from the leftmost pages, partition by time for fast archival (drop old partitions instead of DELETE), and use BRIN indexes for append-only time-ordered data (BRIN is 1000x smaller than B-tree for sequential data). For high-cardinality metrics (Prometheus-style), use TimescaleDB or a purpose-built TSDB (Victoria Metrics, InfluxDB).</p>
<div class='good'><b>TimescaleDB:</b> TimescaleDB is a PostgreSQL extension that adds automatic time-based partitioning (hypertables), continuous aggregates, and data retention policies. It's fully compatible with standard PostgreSQL — same SQL, same tools, same connection pooling. For serious time-series workloads on PostgreSQL, it's the right tool.</div>`},

  {n:40,tag:'ops',q:'How do you implement database observability — what metrics, logs, and alerts matter most?',
  body:`<div class='cmds'>
  <div class='cmd'>-- Critical PostgreSQL metrics to monitor:</div>
  <div class='cmd'>SELECT sum(blks_hit)*100.0/(sum(blks_hit)+sum(blks_read)) FROM pg_stat_database;  -- cache hit rate > 99%</div>
  <div class='cmd'>SELECT count(*) FROM pg_stat_activity WHERE state = 'active';  -- active connections</div>
  <div class='cmd'>SELECT count(*) FROM pg_stat_activity WHERE wait_event_type = 'Lock';  -- lock waits</div>
  <div class='cmd'>SELECT now() - pg_last_xact_replay_timestamp() FROM pg_stat_replication;  -- replica lag</div>
  <div class='cmd'>SELECT age(datfrozenxid) FROM pg_database ORDER BY age DESC LIMIT 1;  -- XID age</div>
  <div class='cmd'>-- Export to Prometheus:</div>
  <div class='cmd'>postgres_exporter --web.listen-address=:9187 --config.file=config.yml</div>
</div>
<p>Alert thresholds: cache hit rate &lt;99% (increase shared_buffers or add RAM), connection count &gt;80% of max_connections (add PgBouncer or scale), replication lag &gt;30s (investigate replica), transaction ID age &gt;1.5B (urgent VACUUM needed), disk &gt;80% full (archival or resize), lock wait time &gt;5s (investigate blocking query). Use postgres_exporter with Prometheus + Grafana for the full metrics pipeline, or Cloud SQL's built-in Query Insights for managed deployments.</p>
<div class='tip'><b>Principal-level practice:</b> Build SLO-based DB alerting — not just "query_time &gt; 1s" but "99th percentile query latency error budget burn rate". This separates platform observability maturity from ad-hoc monitoring. Treat the database as a service with its own SLO, not just infrastructure to watch.</div>`},

  {n:41,tag:'query',q:'What is a materialized view — how do you use it for performance and when does it go stale?',
  body:`<div class='cmds'>
  <div class='cmd'>-- Create a materialized view (stores results on disk):</div>
  <div class='cmd'>CREATE MATERIALIZED VIEW monthly_revenue AS
  SELECT DATE_TRUNC('month', created_at) AS month, SUM(total) AS revenue FROM orders GROUP BY 1 ORDER BY 1;
  WITH DATA;</div>
  <div class='cmd'>-- Refresh (blocks reads in PostgreSQL by default):</div>
  <div class='cmd'>REFRESH MATERIALIZED VIEW monthly_revenue;</div>
  <div class='cmd'>-- Non-blocking refresh (PostgreSQL 9.4+, requires unique index on matview):</div>
  <div class='cmd'>CREATE UNIQUE INDEX ON monthly_revenue (month);</div>
  <div class='cmd'>REFRESH MATERIALIZED VIEW CONCURRENTLY monthly_revenue;</div>
  <div class='cmd'>-- Query the matview like a regular table:</div>
  <div class='cmd'>SELECT * FROM monthly_revenue WHERE month >= '2024-01-01';</div>
</div>
<p>Materialized views precompute expensive aggregations and store the result. Great for: dashboards and reporting queries that aggregate millions of rows (run once, query many times), denormalizing normalized data for read performance, and caching the result of complex multi-table joins. Stale data: the matview reflects the data at the last REFRESH time — it does not auto-update. Schedule REFRESH CONCURRENTLY via pg_cron or external scheduler. For near-real-time data, TimescaleDB Continuous Aggregates incrementally update materialized views as new data arrives.</p>
<div class='good'><b>pg_cron for scheduled refresh:</b> <code>SELECT cron.schedule('refresh-revenue', '0 * * * *', 'REFRESH MATERIALIZED VIEW CONCURRENTLY monthly_revenue');</code> — refreshes hourly with no application code change needed. pg_cron runs inside PostgreSQL, survives container restarts, and has no external dependency.</div>`},

  {n:42,tag:'mysql',q:'What is EXPLAIN in MySQL — how do you interpret the output to find performance problems?',
  body:`<div class='cmds'>
  <div class='cmd'>EXPLAIN SELECT * FROM orders WHERE user_id = 123 AND status = 'pending';</div>
  <div class='cmd'>EXPLAIN FORMAT=JSON SELECT ...;  -- detailed JSON output (MySQL 8+)</div>
  <div class='cmd'>EXPLAIN ANALYZE SELECT ...;       -- actually executes + shows real times (MySQL 8.0.18+)</div>
  <div class='cmd'>-- Key columns in EXPLAIN output:</div>
  <div class='cmd'>type: ALL=full scan(bad), index=index scan, range=range scan, ref=non-unique index, eq_ref=unique, const=best</div>
  <div class='cmd'>key: which index was chosen (NULL = no index used)</div>
  <div class='cmd'>rows: estimated rows examined (multiply across joins for total cost)</div>
  <div class='cmd'>Extra: "Using filesort"=expensive sort, "Using temporary"=temp table, "Using index"=covering index(good)</div>
</div>
<p>type column priority (best to worst): system &gt; const &gt; eq_ref &gt; ref &gt; range &gt; index &gt; ALL. Seeing type=ALL on a large table is a red flag — add an index. "Using filesort" means MySQL cannot satisfy ORDER BY with an index — add the sort column to the index. "Using temporary" means a temp table was created for GROUP BY or ORDER BY — restructure the query or add a covering index. rows × loops (for nested queries) gives the total row examination cost.</p>
<div class='tip'><b>Index hints:</b> If MySQL picks the wrong index, use <code>FORCE INDEX (idx_name)</code> temporarily to confirm it's an optimizer issue, then fix by updating statistics (<code>ANALYZE TABLE</code>) rather than permanently forcing an index. Forced indexes break silently when the data distribution changes.</div>`},

  {n:43,tag:'connections',q:'What is optimistic vs pessimistic locking — when do you choose each?',
  body:`<div class='cmds'>
  <div class='cmd'>-- Pessimistic locking: lock the row before reading (prevent concurrent updates)</div>
  <div class='cmd'>BEGIN;
  SELECT * FROM inventory WHERE product_id = 1 FOR UPDATE;  -- row is now locked
  UPDATE inventory SET quantity = quantity - 1 WHERE product_id = 1;
  COMMIT;</div>
  <div class='cmd'>-- Optimistic locking: no lock, use version column to detect conflict</div>
  <div class='cmd'>SELECT id, quantity, version FROM inventory WHERE product_id = 1;
  -- In application: compute new_quantity = quantity - 1
  UPDATE inventory SET quantity = ?, version = version + 1
  WHERE product_id = 1 AND version = ?;  -- if 0 rows updated: conflict, retry</div>
</div>
<p>Pessimistic locking: acquire a lock before reading. Safe but reduces concurrency — all readers of the same row must queue. Use when: conflict probability is high (hot inventory items, bank account balances), the operation must not fail (you can't retry). Optimistic locking: no locks, detect conflicts at write time using a version counter. Use when: conflict probability is low (most reads are followed by a write that doesn't conflict), read-heavy workloads (no lock contention). ORM frameworks (Hibernate, ActiveRecord) support optimistic locking natively via a version column.</p>
<div class='warn'><b>SELECT FOR UPDATE scope:</b> A lock acquired with SELECT FOR UPDATE is released only at COMMIT or ROLLBACK. A slow application-level operation between the lock acquisition and the commit holds the lock for that entire duration — blocking all other writers. Keep critical section (SELECT FOR UPDATE → UPDATE → COMMIT) as short as possible.</div>`},

  {n:44,tag:'schema',q:'How do you handle database migrations safely in a CI/CD pipeline?',
  body:`<div class='cmds'>
  <div class='cmd'>-- Tools: Flyway, Liquibase, Alembic (Python), golang-migrate, sqitch</div>
  <div class='cmd'>-- Flyway example migration versioning:</div>
  <div class='cmd'>V1__Create_users_table.sql</div>
  <div class='cmd'>V2__Add_email_index.sql</div>
  <div class='cmd'>V3__Add_status_column.sql</div>
  <div class='cmd'>-- Run in CI/CD:</div>
  <div class='cmd'>flyway migrate -url=jdbc:postgresql://... -user=app -password=... -locations=filesystem:./migrations</div>
  <div class='cmd'>-- Safe migration checklist:</div>
  <div class='cmd'>✓ Add columns as nullable (no NOT NULL without default)</div>
  <div class='cmd'>✓ Add indexes CONCURRENTLY (non-blocking)</div>
  <div class='cmd'>✓ Never rename columns (use add + backfill + drop)</div>
  <div class='cmd'>✓ Never change column types directly (add new column, migrate data)</div>
  <div class='cmd'>✓ Use expand-contract for breaking schema changes</div>
</div>
<p>Schema migrations in CI/CD: migrations run automatically on deploy, schema and code changes must be backward-compatible for the duration of a rolling deployment (both old and new code run simultaneously against the new schema). Add columns before deploying code that uses them; drop columns only after all code references to them are removed. Use migration tools that track applied versions and are idempotent. Separate DDL migrations (fast, schema only) from data migrations (slow, batched) to avoid long deployment windows.</p>
<div class='good'><b>GitOps for migrations:</b> Commit migration files to Git alongside application code. The deployment pipeline applies pending migrations before starting the new app version. Migration history is version-controlled and auditable. Failed migrations should be caught in staging — never let an untested migration near production schema.</div>`},

  {n:45,tag:'ops',q:'Walk through your methodology for diagnosing a production database performance incident.',
  body:`<p>This is the Principal-level systems thinking question. The interviewer wants structure, prioritization, and depth — not a random list of commands.</p>
<div class='sec'>Incident triage methodology</div>
<div class='cmds'>
  <div class='cmd'>Phase 1 — Quantify: what's actually slow? Which query/table/operation? Since when?</div>
  <div class='cmd'>Phase 2 — Immediate relief: kill blocking queries, kill long-running idle transactions</div>
  <div class='cmd'>Phase 3 — Identify hottest queries: pg_stat_statements ORDER BY total_exec_time DESC</div>
  <div class='cmd'>Phase 4 — Explain the worst query: EXPLAIN (ANALYZE, BUFFERS) — look for seq scans, bad estimates</div>
  <div class='cmd'>Phase 5 — Check system resources: CPU, I/O wait, memory pressure, connection count</div>
  <div class='cmd'>Phase 6 — Check for lock contention: pg_stat_activity WHERE wait_event_type = 'Lock'</div>
  <div class='cmd'>Phase 7 — Check for bloat: n_dead_tup, last_autovacuum — is VACUUM behind?</div>
  <div class='cmd'>Phase 8 — Implement fix: index, query rewrite, or VACUUM</div>
  <div class='cmd'>Phase 9 — Verify and document: before/after metrics, root cause, prevention</div>
</div>
<p>Common root causes by symptom: sudden slowdown with high I/O wait → autovacuum running or index bloat. Sudden slowdown after deploy → plan regression (stale stats after schema change, run ANALYZE). Gradual slowdown over weeks → data growth past index threshold, table bloat. Spike-and-recover pattern → lock contention from long transactions. Steady increase in query time → N+1 queries introduced in new code or missing index on growing table.</p>
<div class='tip'><b>Principal-level deliverable:</b> After any performance incident, write a postmortem with: the query/queries involved, the root cause (index missing, stats stale, connection exhaustion), timeline, the fix applied, and what will prevent recurrence (alert added, index created, VACUUM frequency tuned). This turns a reactive incident into a proactive improvement — that is the Principal Platform Engineer's job.</div>`}
];

let activeFilter = 'all';
let openCards = new Set();

function badge(tag){
  const labels={indexing:'Indexing',query:'Query optimization',postgres:'PostgreSQL',mysql:'MySQL',connections:'Connections',replication:'Replication & HA',cloud:'Cloud databases',nosql:'NoSQL',schema:'Schema design',ops:'Ops & maintenance'};
  return `<span class="badge ${tag}">${labels[tag]||tag}</span>`;
}

function render(qs){
  document.getElementById('count-bar').textContent=`Showing ${qs.length} of 45 questions`;
  document.getElementById('q-list').innerHTML=qs.map(q=>`
    <div class="q-card" id="card-${q.n}">
      <div class="q-header" onclick="toggle(${q.n})">
        <span class="q-num">Q${q.n}</span>
        <span class="q-title">${q.q}</span>
        <div class="q-right">${badge(q.tag)}<span class="chevron${openCards.has(q.n)?' open':''}" id="chev-${q.n}">▼</span></div>
      </div>
      <div class="q-body${openCards.has(q.n)?' open':''}" id="body-${q.n}">${q.body}</div>
    </div>`).join('');
}

function toggle(n){
  const body=document.getElementById('body-'+n);
  const chev=document.getElementById('chev-'+n);
  if(openCards.has(n)){openCards.delete(n);body.classList.remove('open');chev.classList.remove('open');}
  else{openCards.add(n);body.classList.add('open');chev.classList.add('open');}
  document.getElementById('viewed-count').textContent=openCards.size;
}

function setFilter(f,el){
  activeFilter=f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  filterQs();
}

function filterQs(){
  const q=document.getElementById('search').value.toLowerCase();
  let filtered=QS;
  if(activeFilter!=='all') filtered=filtered.filter(x=>x.tag===activeFilter);
  if(q) filtered=filtered.filter(x=>x.q.toLowerCase().includes(q)||x.body.toLowerCase().includes(q));
  render(filtered);
}

render(QS);
</script>
